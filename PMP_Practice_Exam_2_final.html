<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PMP Exam Simulator</title>
    <style>
:root {
    --p-blue: #004b8d;
    --p-bg: #f5f5f5;
    --p-light: #f0f7ff;
    --p-selected: #cce0f5;
    --p-footer: #cccccc;
}
body { background: var(--p-bg); color: #333; font-family: Arial, sans-serif; margin:0; padding:0; min-height: 100vh; }
#startScreen, #scoreScreen { position: fixed; inset: 0; background: white; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 40px 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
#examScreen { display: none; flex-direction: column; min-height: 100vh; background: white; }
.exam-header { position: sticky; top: 0; background: var(--p-blue); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
.exam-header h2 { font-size: 0.9rem; margin: 0; text-transform: uppercase; }
.exam-body { flex: 1; padding: 30px 20px 120px; max-width: 900px; margin: 0 auto; width: 100%; box-sizing: border-box; }
.q-number { font-size: 1rem; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
.q-text { font-size: 1.1rem; line-height: 1.5; margin-bottom: 30px; font-weight: 500; }
.option-btn { display: flex; align-items: flex-start; padding: 15px; border: 1px solid transparent; background: white; cursor: pointer; width: 100%; text-align: left; margin-bottom: 2px; }
.option-btn:hover { background: var(--p-light); }
.option-btn.selected { background: var(--p-selected) !important; border: 1px solid var(--p-blue); }
.opt-letter { min-width: 26px; height: 26px; border: 2px solid #555; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 15px; font-weight: bold; font-size: 0.85rem; flex-shrink: 0; }
.option-btn.selected .opt-letter { background: var(--p-blue); color: white; border-color: var(--p-blue); }
.actions { position: fixed; bottom: 0; left: 0; right: 0; background: var(--p-footer); padding: 15px 30px; display: flex; justify-content: space-between; border-top: 1px solid #999; z-index: 500; }
.btn-p { background: linear-gradient(to bottom, #fff, #e5e5e5); border: 1px solid #888; padding: 10px 25px; font-weight: bold; cursor: pointer; border-radius: 3px; font-size: 0.9rem; min-width: 100px; text-transform: uppercase; }
.btn-next { color: var(--p-blue); border-color: var(--p-blue); }
.review-q-card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 20px; margin-bottom: 25px; text-align: left; width: 100%; box-sizing: border-box; }
.review-opt { padding: 10px; margin: 5px 0; border-radius: 4px; border: 1px solid #eee; font-size: 0.95rem; display: flex; align-items: flex-start; gap: 10px; }
.review-opt.is-correct { background: #e8f5e9; border-color: #66bb6a; font-weight: bold; }
.review-opt.user-wrong { background: #ffebee; border-color: #ef5350; }
.review-exp { margin-top: 15px; padding: 15px; background: #f8fafc; border-left: 4px solid var(--p-blue); font-size: 0.9rem; line-height: 1.6; color: #334155; }
.status-tag { display: inline-block; padding: 4px 12px; border-radius: 4px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 12px; }
.status-correct { background: #e8f5e9; color: #166534; }
.status-wrong { background: #ffebee; color: #991b1b; }
.score-big { font-size: 5rem; color: var(--p-blue); font-weight: 800; margin: 20px 0; }


.btn-home:hover { background: rgba(255,255,255,0.3); border-color: white; }
</style>
</head>
<body>

<div id="startScreen">
    <h1 style="margin-bottom:10px">PMP Practice Exam</h1>
    <p style="color:#666; margin-bottom:30px">Choose assessment volume:</p>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:30px; width:100%; max-width:400px;">
        <button class="btn-p" onclick="setCount(10)">10 Questions</button>
        <button class="btn-p" onclick="setCount(25)">25 Questions</button>
        <button class="btn-p" onclick="setCount(50)">50 Questions</button>
        <button class="btn-p" onclick="setCount(175)">Full Exam</button>
    </div>
    <button class="btn-p" style="padding:15px 50px; background:var(--p-blue); color:white; border:none;" onclick="startExam()">Launch Exam</button><br><br><a href="index.html" class="btn-p" style="text-decoration:none; display:inline-flex; align-items:center; justify-content:center; background:none; border:1px solid #ccc; color:#666; font-size:0.8rem;">← Return to Archive</a>
</div>

<div id="examScreen">
    <div class="exam-header">
        <h2>PMP Simulation</h2>
        <div id="timer" style="font-weight:bold">00:00:00</div>
    </div>
    <div class="exam-body">
        <div id="qNumber" class="q-number"></div>
        <div id="qText" class="q-text"></div>
        <div id="options" class="options"></div>
    </div>
    <div class="actions">
        <button class="btn-p" id="btnBack" onclick="prevQ()">Previous</button>
        <button class="btn-p btn-next" id="btnNext" onclick="nextQ()">Next</button>
    </div>
</div>

<div id="scoreScreen" style="display:none">
    <h1 id="scoreHeading">Exam Result</h1>
    <div class="score-big" id="finalScore">0%</div>
    <div id="scoreMeta" style="margin-bottom:30px; text-align:center; font-size:1.1rem; line-height:1.6;"></div>
    
    <div style="display:flex; gap:10px; margin-bottom:40px">
        <button class="btn-p" id="btnShowReview" onclick="showReview()">Review All</button>
        <button class="btn-p" onclick="location.reload()">Restart</button>
    </div>

    <div id="reviewContainer" style="display:none; width:100%; max-width:800px; border-top:1px solid #ddd; padding-top:40px;">
        <div id="reviewList"></div>
        <button class="btn-p" style="width:100%; margin-top:20px" onclick="location.reload()">Start New Session</button>
    </div>
</div>

<script>
const ALL_QUESTIONS = [{"q":"A project manager is working on a virtual project with a global team for the first time and encounters an issue with stakeholder participation in team meetings. Some stakeholders do not participate, others complain about scheduling, and others do not acknowledge meeting invitations. What should the project manager do to address these issues and ensure smoother meetings?","opts":["A.Allow the stakeholders to participate in asynchronous meetings using written communication.","B.Inform the project sponsor of the situation and ask for support in enforcing meeting attendance.","C.Review the organizational culture and structure to properly coordinate meetings.","D.Reschedule meetings for different times and dates according to time zones."],"correct":["C"],"explanation":"The project manager should review the organizational culture and structure to properly coordinate the meetings and avoid team discomfort and rejection during work. By conducting a review, the project manager can better understand the needs and expectations of the stakeholders and develop a meeting schedule and format that is more likely to work for everyone. Asynchronous meetings do not address or solve issues related to stakeholder engagement, scheduling complaints, or unacknowledged invitations. Asking the sponsor to help enforce meeting attendance should be a last resort and should only be "},{"q":"While closing a project, the client finds some defects in the deliverable. What should the project manager do next?","opts":["A.Review the output against the acceptance criteria.","B.Extend the project until all deliverables are accepted.","C.Persuade the client to accept the output as is.","D.Pay the penalty for the defective item."],"correct":["A"],"explanation":"Reviewing the output against acceptance criteria is the appropriate next action as this will confirm why the defect wasn't raised earlier during the monitoring and controlling phase. Extending the project without approval is not the appropriate next action as it would delay the project timeline. Persuading the client to accept the output as is may compromise the quality of the project and is not appropriate. Paying the penalty for the defective item is not appropriate unless that clause is documented in contract with the client."},{"q":"The research and development team is planning to build a new facility that will focus on improving existing products the organization has developed. It will be a multi-year initiative. What should the project manager do first?","opts":["A.Develop a scope management plan that will focus on the expected objectives of the initiative.","B.Develop a business case document that covers the return on investment (ROI) of the initiative.","C.Develop a resource management plan to cover resources and contingency planning.","D.Develop a communications management plan to address stakeholder needs."],"correct":["A"],"explanation":"The first step in planning for any project is to develop a scope management plan. This plan will define the project's goals, objectives, and deliverables. It will also identify the project's boundaries and constraints. The other answer choices are important, but they are not the first step that the project manager should take.\u00a0The business case document is important for justifying the project and securing funding, but it is not the first step in the planning process.\u00a0The resource management plan is important for ensuring that the project has the resources it needs to be successful, but it is n"},{"q":"An organization is adopting an agile approach to fulfill its customer's requirements. Prior to that, the organization worked with specialized resources and project managers who were assigned to the project for a fixed amount of time. What should the organization change to better adopt the agile approach for resource planning?","opts":["A.The product owner should request specialists to be assigned to the team only when they are required.","B.The team should consist of generalists and specialists capable of\u00a0adapting to changing requirements.","C.The agile team should decide on which customer requirements will be developed and delivered.","D.Customer involvement should be reduced in order to avoid disruptions and confusion."],"correct":["B"],"explanation":"An agile team is intended to work together and constantly improve. The organization should ensure that the agile team has an agreed mix of generalists and specialists for the duration of the project. This aligns with the agile philosophy of cross-functional teams and adaptability to evolving needs. The other answer choices are incorrect and do not align with the principles of agile development. Requesting for specialists only when required is inefficient and can lead to disruptions and delays. Customer involvement is important in agile, as it helps to ensure that the team is developing the rig"},{"q":"During the execution phase of a project, the project manager is reassigned to another project. A new project manager takes over and quickly realizes that the project is facing issues with the quality and scheduling of some deliverables. Which of the following should the new project manager do first?","opts":["A.Update the project plan to reflect the new schedule and quality requirements.","B.Review the project schedule and focus on delivering the project on time and within budget.","C.Meet with the project team to assess the situation and develop a plan to address the issues.","D.Evaluate the project team's skills and ask the project sponsor for additional resources."],"correct":["C"],"explanation":"The project team is responsible for the execution of the project and has the most knowledge about the issues that are being faced. By meeting with the team, the new project manager can gain a better understanding of the issues and work with the team to develop a plan to address them. The project manager should not make any decisions without a clear understanding of the problems. The other options should only be considered after the new project manager has assessed the situation and developed a plan to address the root cause of the issues. Updating the project plan or requesting additional reso"},{"q":"A project manager is preparing for an organization-wide software system replacement project that will have a significant impact on business operations. It is crucial to provide training to ensure that everyone within the organization can effectively use the new software system,\u00a0but training resources are limited. What is the most effective action the project manager should take to ensure successful training for all organization members?","opts":["A.Incorporate a detailed training and coaching component as a project deliverable.","B.Determine the specific needs and requirements of different user functions.","C.Recruit additional trainers to ensure adequate training coverage throughout the organization.","D.Prioritize training efforts by identifying which features are most essential."],"correct":["A"],"explanation":"Incorporating a comprehensive training and coaching component into the project's scope directly addresses the need for training despite limited training resources and is a strategic approach to ensuring everyone can use the new software system effectively. This means that training is not an afterthought, but an integral part of the project plan. By including training and coaching as project deliverables, the project manager ensures that it is a well-defined and prioritized aspect of the project.\u00a0The new software system is the output of the project, but the system itself does not enable the pro"},{"q":"A large transformation project has moved its project management office (PMO) to a virtual environment. There have been performance issues with the PMO team regarding the daily tasks they perform, which are now affecting the project. Which three actions should the project manager take to improve the performance of the PMO team? (Choose three)","opts":["A.Nurture confidence among the PMO team members by providing them with the required training on project management tools.","B.Hire a new senior manager for the virtual teams to improve collaboration between departments.","C.Suggest that management dissolves the virtual team or moves the PMO to a colocated area.","D.Build a collaborative environment by having regular connections among the PMO team members.","E.Provide access to communication tools to help the virtual teams connect better with the stakeholders."],"correct":["A","D","E"],"explanation":"The project manager is interested in improving the performance of the virtual PMO team. Providing the team with training that nurtures their confidence, building a collaborative environment through regular connections among the team members and providing access to communication tools towards better team connection will help towards achieving this. The other answer choices are incorrect. Dissolving the virtual team however does not help improve the PMO in its current environment and hiring a senior manager to improve collaboration between departments does not address issues of performance withi"},{"q":"An adaptative project team is globally distributed and the team members speak different primary languages. Daily meetings are conducted virtually in a common language. The project manager is made aware that there are some communication issues. Differences in pronunciation, accent, and vocabulary make it extremely difficult for some members to understand each other. What should the project manager tailor to improve the daily meeting and avoid misunderstanding?","opts":["A.Use the call to verbally summarize the work status as reported by the team members.","B.Use an electronic task board to give a visual representation of work status and progress.","C.Ask for a change in the project's budget to provide access to a translation service.","D.Ask all team members to report on work completed, upcoming work, and blockers."],"correct":["B"],"explanation":"To improve the daily meeting and avoid misunderstandings, the project manager should use an electronic task board to give a visual summary of the work progress for each member. Visual displays with graphics can help the team absorb and make sense of information. This will help to ensure that everyone is on the same page and has a clear understanding of what is being discussed. The key is to promote clear and effective communication among team members despite differences in language and culture.\nThe other answer choices are incorrect. Verbally summarizing work or reporting work status does not "},{"q":"During a status meeting, a team member alerts the project manager that the delivery timeline for a component prototype is unattainable due to the unanticipated complexity of the requirements. After confirming the impending delay, the project manager must take action to address the situation. How should the project manager address this issue? (Choose two)","opts":["A.Identify the extent to which the complexity will impact the rest of the project.","B.Delegate prototype development to a more experienced team member.","C.Allocate additional funding to the development budget to expedite delivery.","D.Assign additional resources to prototype development and proceed as planned.","E.Prioritize the requirements and concentrate on the most important ones."],"correct":["A","E"],"explanation":"A. Identify the extent to which the complexity will impact the rest of the project. E. Prioritize the requirements and concentrate on the most important ones. Though complexity cannot be controlled, project teams can modify their activities to address impacts that occur as a result of complexity. In this scenario, the project manager should work to identify the impact of the complexity on the overall project and prioritize the requirements that the team can deliver. Additional impacts can cause serious implications down the road, so the project manager should assess the impacts of this issue. "},{"q":"The night before a standup meeting, a project manager realizes that they will be unable to attend the daily standup meeting in person but will join via phone. The project manager sent an email to the project team letting them know. One of the team members is upset that, despite having the longest commute, they are expected to attend the meeting in person. How should the project manager address this situation?","opts":["A.Amend the current attendance policy to allow all team members to attend standup meetings remotely.","B.Rotate the location of the standup meetings to ensure that everyone has an equal opportunity to attend in person.","C.Review the guidelines for meeting attendance including when remote attendance is allowed and under what circumstances.","D.Communicate the reasons for attending standup meetings in person and the benefits of doing so."],"correct":["C"],"explanation":"By reviewing guidelines and expectations, the project manager can address the team member's concerns and ensure that everyone feels valued and included in the project. This will help ensure that everyone is aware of the expectations and guidelines for attending meetings, and can help prevent misunderstandings or hurt feelings. The other options are incorrect. Amending the attendance policy to allow all team members to attend standup meetings remotely or rotating the location of meetings may not be feasible or practical, and may not address the underlying issue. Communicating the reasons for at"},{"q":"A project manager is working on a deployment project to replace some equipment that will soon become obsolete. A review of the schedule and cost has revealed that a 5-month delay is likely. How should the project manager address risks from the delay?","opts":["A.Analyze the business impact in order to reprioritize the deliverables.","B.Request to negotiate with the vendors for a longer support period.","C.Ask to order new equipment immediately so there will be no support issue.","D.Acknowledge these constraints and take them into account when planning."],"correct":["A"],"explanation":"The correct answer is to analyze the business impact in order to reprioritize the deliverables.\nIn order to address the risks related to the delay, they must first be analyzed. An analysis must be done to determine the impact of the risks in order to plan appropriate responses. The project manager must evaluate the importance of each risk in order to categorize and prioritize individual risks for further attention. The other answer choices are incorrect because they are reactionary and do not fully address risks from the delay. They also do not address the impact that the risks may have on the"},{"q":"An experienced project manager is mentoring a new project manager assigned to their first project. As the new project manager prepares for the project, they are overwhelmed by the number of stakeholders identified by the team. What should the experienced project manager tell the new project manager to do next?","opts":["A.Perform a stakeholder analysis to determine the relative importance.","B.Categorize key stakeholders using a workbook register.","C.Update the communications management plan with stakeholder preferences.","D.Prioritize stakeholders based on the stakeholder register."],"correct":["A"],"explanation":"Once stakeholders are identified, the project manager and the project team should seek to understand and analyze stakeholders. The new project manager should analyze aspects of each stakeholder\u2019s position on and perspective of the project. Stakeholder analysis involves systematically gathering and analyzing quantitative and qualitative information about stakeholders to determine whose interests should be taken into account throughout the project. The other options are incorrect because they should come after performing a stakeholder analysis. Categorizing key stakeholders, updating the communi"},{"q":"A project manager has received quotes from two vendors for the same parts. Vendor A has informed the project manager that they fulfilled a similar order two months ago at a price that was 2% under the original planned cost. Vendor B has a history of on-time delivery but has announced a price increase. How should the project manager evaluate this situation?","opts":["A.Review the agreements and procurement documentation for Vendor B to force them to keep the original pricing.","B.Evaluate the contract clauses to reduce the orders from Vendor B, and buy them from Vendor A to improve project indicators.","C.Use the metrics from Vendor A to request better pricing from Vendor B, keeping both providers as a risk mitigation strategy.","D.Review the work performance information of both vendors against their contracts to find the preferred supplier."],"correct":["D"],"explanation":"To evaluate the situation, the project manager should review the work performance information of both vendors against their contracts to find the preferred supplier. If the project manager decides to go for an alternative source, they must first review the vendors' past performance.\u00a0The project manager should not make a decision based solely on price. They should consider a variety of factors. By reviewing the work performance information of both vendors, the project manager can gain a better understanding of their strengths and weaknesses. The other answer choices are incorrect.\u00a0It is unlikel"},{"q":"A company has hired a project manager to implement an adaptive project framework. The project has made some progress, but the team is frustrated because the client does not provide feedback or participate in defining acceptance criteria. What could have caused this situation?","opts":["A.The development team has no experience in managing an adaptive project.","B.The client plans to implement the project and does not need to participate.","C.The client does not understand the importance of their involvement.","D.The development team has not produced a complete prototype."],"correct":["C"],"explanation":"The development team needs clear direction from the client\u00a0regarding project requirements, outcomes, and expectations. In adaptive\u00a0project environments, the need for ongoing feedback is greater because the project teams are exploring and developing product elements within specific increments. In this case, the client is not engaging in a way that aligns with an adaptive project framework.\u00a0In an adaptive framework, requirements are often subject to a high level of uncertainty and volatility and are likely to change throughout the project. It is important that clients and development teams\u00a0excha"},{"q":"A project manager has been hired to lead a multinational enterprise program with a geographically distributed team. The team members are located in different countries and have varying opinions about status reporting. Some prefer detailed reports, while others prefer them to be brief. Some team members want to send daily status reports, while others want to send weekly status reports. How should the project manager resolve the issue?","opts":["A.Ask the team to adhere to the communications management plan.","B.Escalate the reporting issue to the project sponsor for guidance.","C.Request that the team resolve the issue amongst themselves.","D.Change the existing template for status reporting to accommodate."],"correct":["A"],"explanation":"The communication management plan describes how, when, and by whom information about the project will be administered and disseminated. Adhering to the established communications management plan ensures consistency in status reporting across the geographically distributed team. The other options are incorrect. Escalating the issue is inappropriate at this stage and should be a last resort. Asking the team to resolve the issue themselves will not be effective as the team is currently unable to reach a consensus. Changing the existing template could lead to inconsistencies and confusion in repor"},{"q":"A project manager has just taken over an ongoing project from another project manager. During a review of the project management plan, the new project manager realizes that the cost variance and schedule variance are largely negative. Several reported issues have not been resolved, vendors have not been paid for work done, and risk mitigation is quickly depleting the budget. Which two actions should the original project manager have taken to avoid this situation? (Choose two)","opts":["A.Outlined the project's assumptions and documented them in the project charter.","B.Added a substantial contingency reserve budget to the project charter.","C.Identified high-level risks and risk responses in the project planning phase.","D.Identified appropriate and comprehensive project handoff procedures.","E.Ensured that the project governance controls were approved and implemented."],"correct":["A","C"],"explanation":"A. Outlined the project's assumptions and documented them in the project charter. C. Identified high-level risks and risk responses in the project planning phase. The original project manager should have outlined and documented the project's assumptions in the project charter and identified high-level risks and responses in the project planning phase to avoid the situation described. Clear assumptions in the project charter can help ensure that all stakeholders have a common understanding of the project scope, objectives, and assumptions. Identifying high-level risks and responses in the proje"},{"q":"A product development project has run into design issues. As a result, the team has decided to change the approach of the product design phase from a predictive to an iterative approach. What should the project manager do to ensure a smooth transition between approaches?","opts":["A.Schedule a workshop with the team to plan the upcoming iterations.","B.Work with the team to establish a team site and product artifacts.","C.Meet with the product manager to analyze upcoming user stories.","D.Work with the product manager to define the number of iterations."],"correct":["A"],"explanation":"It is very important that the team understands the advantages of moving to an iterative approach from the existing predictive approach. Scheduling a workshop with the team to plan the upcoming iterations is the best way to ensure a smooth transition between approaches. All other options do not help with the transition between approaches. The activities are appropriate but not at this time of transition."},{"q":"The project teams are having difficulties coordinating their tasks due to several constraints and dependencies. The project management office (PMO) suggests a monthly project report be distributed to stakeholders. However, the customer is concerned about not knowing the progress and what is holding up the project. What three solutions can the project manager use to resolve this situation? (Choose three)","opts":["A.Add a daily meeting to review project status and impediments.","B.Share missing performance information in the monthly status meeting.","C.Add a daily or weekly project status report that includes dependencies.","D.Adapt a project status report to include missing information.","E.Ask vendors to provide a monthly status report for the customer."],"correct":["A","C","D"],"explanation":"A. Add a daily meeting to review project status and impediments. C. Add a daily or weekly project status report that includes dependencies. D. Adapt a project status report to include missing information. These are the three best choices because with this information the customer will have visibility on the project progress and what are the blockers holding the progress. Customers should not wait for a month to receive updates, it will be better to have more frequent communications with customers and team, as well as adapting the standard PMO report to the requirements of the current stakehold"},{"q":"A group of agile team members have just completed in-person training for a number of critical and complex organizational processes. The next day, several team members voiced concerns and said they were having trouble remembering what they learned. Another training session is available next week, but the team is already behind schedule on some critical tasks, and the training takes a full workday. What should the project manager do to address this concern?","opts":["A.Ask team members to partner with one another to share the information they learned.","B.Create an information radiator with the key takeaways from the training.","C.Invite team members to reattend the training if they need a refresher.","D.Refer team members to training review notes to find the information they need."],"correct":["B"],"explanation":"Creating an information radiator with the key takeaways from the training is the most effective and time-sensitive solution. Information radiators, also known as big visible charts (BVCs), are visible, physical displays that provide information, enabling timely knowledge sharing. They are posted where people can easily see the information, allowing everyone to review key information at a glance and reinforcing learning. An information radiator provides a more visible and easily accessible solution, which is often preferred in agile contexts. The other options are incorrect because they are not"},{"q":"In an environment subject to various elements of ambiguity and change, what should an agile project manager do to keep track of artifacts? (Choose two)","opts":["A.Update the artifacts frequently and quickly in a transparent fashion.","B.Define which technology to use in the project management plan.","C.Define which technology to use in the communications management plan.","D.Increase the use of social computing tools.","E.Use historical information from previous projects as a template."],"correct":["A","D"],"explanation":"A. Update the artifacts frequently and quickly in a transparent fashion. D. Increase the use of social computing tools. The two best practices for an agile project manager to keep track of artifacts in an environment subject to various elements of ambiguity and change are updating\u00a0the artifacts frequently and quickly in a transparent fashion and increasing\u00a0the use of social computing tools. Updating the artifacts frequently and quickly in a transparent fashion will help to ensure that the artifacts are always up-to-date and that everyone involved in the project has access to the latest informa"},{"q":"A key member of a project team publicly declares that another team member has been speaking negatively about them. The team member threatens to quit their job if the project manager does not take immediate action to address the conflict. What should the project manager do first?","opts":["A.Call a team meeting because the project is in jeopardy without the key team member.","B.Meet with the accused team member to understand their point of view.","C.Schedule a meeting in the future to allow the issue to diffuse over time.","D.Decide to remove one of the two members of\u00a0the team to address the conflict."],"correct":["B"],"explanation":"The project manager should meet with the accused team member to understand more about the situation first before attempting to start resolving this conflict. The other answer choices are incorrect. Calling a team meeting is not effective as the other team members are not involved in the conflict between the two members; the option to remove one of the members will jeopardize the work delivery without resolving the conflict; and scheduling a meeting in the future does not address the current issue and conflicts should be addressed immediately."},{"q":"A project manager has been engaged by a managing director to transform the project management office (PMO) from a waterfall structure focused on software development to an agile PMO. The manager of the PMO has been particularly resistant to the change. Upon investigation, the project manager realizes that the manager's resistance is due to a lack of agile knowledge may make them seem incompetent. How should the project manager proceed?","opts":["A.Ask the managing director to intervene with the PMO manager to explain why this is necessary.","B.Ask the project team to support the transformation regardless of the PMO manager's negativity.","C.Implement a change management strategy to ensure that the process meets governance requirements.","D.Implement a training program on agile for all staff to ensure there is congruency of learning for everyone."],"correct":["D"],"explanation":"Mentoring activities and agile training courses can help people transition to an agile mindset and upgrade their skills. The project manager should proceed by implementing a training program on agile for all staff, including the manager of the PMO, to ensure there is congruency of learning for everyone. Developing the manager's skills\u00a0will help to eliminate their fear of seeming incompetent and build their support for the change. The other answer choices are incorrect because they do not address the lack of skills. The focus is to help staff transition from a waterfall to an agile mindset. It "},{"q":"Project team members inform their project manager of a challenge they are facing. This challenge will likely impact project timelines. What should the project manager do next?","opts":["A.Determine if the team's challenges impact the critical path.","B.Initiate a change request to extend the project timeline.","C.Work with the team to assess the impact on the overall project.","D.Escalate to the project sponsor for proper resolution."],"correct":["C"],"explanation":"The project manager should consider the impact of the challenge and work with the team members to understand and evaluate the impact on the overall project. When any new issue or change request occurs, it is necessary to first understand if it impacts the project and then initiate a change control procedure as needed. The other answer choices are incorrect. Determining the impact on the critical path should come after understanding the challenge. Initiating a change request or escalating to the sponsor without proper evaluation can lead to premature and potentially unnecessary actions."},{"q":"A project manager is experiencing issues with the functional manager of a project team member. The functional manager has given the team member another assignment and has told the team member that the previous project should be a lower priority. What should the project manager do?","opts":["A.Escalate the issue to senior management.","B.Communicate the importance of the project to the team.","C.Refer the functional manager to the project charter.","D.Request additional resources for your project."],"correct":["A"],"explanation":"The best way for a project manager to address an issue with a functional manager who is giving a team member a lower-priority assignment is to escalate the issue to senior management. This is the most direct and effective way to resolve the issue and ensure that the project team member has the time and resources they need to complete their project tasks. The other answer choices are not as effective. Communicating the importance of the project to the team is important, but it is unlikely to resolve the issue with the functional manager.\u00a0Referring the functional manager to the project charter m"},{"q":"A newly launched product prototype is receiving a number of customer complaints. To reduce negative feedback, the team comes up with an action plan. At the end of the quarter, however, the project manager found there was no significant reduction in complaints. What should the project manager do next?","opts":["A.Identify the key performers on the team and recognize them appropriately.","B.Identify the team members who lack the required skills and train them.","C.Revisit and reevaluate the project\u2019s key performance indicators (KPIs).","D.Report the status to the executive management team and seek help."],"correct":["C"],"explanation":"In an agile project, the project manager should revisit and reevaluate KPIs frequently to check the effectiveness of the action plan. This is an important agile practice, as it allows the team to quickly identify and address any issues that may be preventing them from achieving their goals. This will help to ensure that the team is aligned on the goals and objectives of the project and that they are empowered to take action to resolve the issue of customer complaints. The other answer choices are incorrect because they do not effectively address the issue of customer complaints. Recognizing th"},{"q":"During project closure, the team considers that the final sprint retrospective is not necessary because there are no remaining sprints. What could be a possible helpful outcome of holding this sprint retrospective?","opts":["A.Improvement in velocity if the same team is formed in the future","B.Promotion opportunities for the team members","C.Information that could be useful for future projects","D.Tips for adapting to working together if that happens in the near future"],"correct":["C"],"explanation":"Even though there are no remaining sprints, holding a final sprint retrospective can still provide valuable insights and lessons learned for future projects. It allows the team to reflect on their overall performance, identify areas of improvement, and capture knowledge that can be applied in similar projects or for continuous improvement. The retrospective helps to foster a culture of learning and provides an opportunity for the team to celebrate their successes and address any remaining issues or challenges. The other answers are incorrect. Velocity improvement for the same team in the futur"},{"q":"During a one-year project, a team delivered everything as requested and defined by the product owner and met all of the sprint goals. The project was on track regarding schedule, scope, and budget. A few months after the project release, the product satisfaction surveys show that the customer's level of satisfaction is surprisingly low. What should the project manager do to prevent this situation in the future?","opts":["A.Hold a kick-off meeting at the beginning of the project.","B.Improve application of test automation techniques.","C.Increase project management office (PMO) involvement.","D.Conduct periodic reviews with customer involvement."],"correct":["D"],"explanation":"The project manager should conduct periodic reviews with the customer. During the whole project, there was no real user involvement and input on the product being created. Although the team was performing well, they were not creating the 'right' product to satisfy customers. The other answer choices are incorrect. Holding a kick-off meeting at beginning of project is not sufficient; and increasing PMO involvement and test automation do not address customer satisfaction issue."},{"q":"Due to economic implications, a company announces imminent layoffs. A project is nearing delivery, and the team is worried about losing their jobs. Team morale is very low, and the project manager is experiencing increased delivery delays from the team. What should the project manager do to address team morale?","opts":["A.Replace team members who are not delivering optimally to improve overall productivity.","B.Provide regular updates on the layoff situation and discuss its impact on the team and the project.","C.Keep all information about the layoffs confidential to avoid causing further anxiety.","D.Meet with the project team to assure them that they will not be laid off and their jobs are safe."],"correct":["B"],"explanation":""},{"q":"A project manager conducted an analysis with relevant stakeholders to validate project alignment with organizational strategy and expected business value. Several key stakeholders missed the analysis session and their input was not included in the analysis. What is the main consequence of stakeholders missing the analysis session?","opts":["A.Formal approval of project change requests is delayed.","B.Stakeholder dissatisfaction with key project deliverables.","C.Conflict in subsequent phases of the project may result.","D.Inconsistent input on benefits from key stakeholders."],"correct":["D"],"explanation":"Project teams and stakeholders establish measures of progress and success, and performance is compared to plans. Quality management processes and practices help produce deliverables and outcomes that meet project objectives and align with the expectations, uses, and acceptance criteria expressed by the organization and relevant stakeholders.\u00a0 If all stakeholders are not present there will be inconsistent input on benefits. It may result in ambiguity and a misalignment between the project goals and the expectations of key stakeholders. The other options are incorrect because they are not the ma"},{"q":"A project manager is concerned about delivering the planned business value because the product owner is not engaged. What should the project manager do to address the concern?","opts":["A.Review and update the communications management plan.","B.Review and update the stakeholder engagement plan.","C.Review and update the resource management plan.","D.Review and update the risk management plan."],"correct":["B"],"explanation":"The amount and effectiveness of stakeholder engagement should be monitored throughout the project. A disengaged product owner can cause negative impacts and diminish the probability of achieving intended outcomes. The project manager\u00a0should review the stakeholder engagement plan and assess whether the current engagement strategy is effective or if it needs to be adjusted. Once the project manager has reviewed the stakeholder engagement plan, they can determine the root cause of the issue and make adjustments to increase engagement. The other options are incorrect. The communications management"},{"q":"While gathering requirements for the project scope, the project manager realizes that some of the stakeholder requirements have a conflict. What should the project manager do to define a clear scope?","opts":["A.Assist affected stakeholders in reaching a consensus.","B.Follow the recommendation of the technical consultant.","C.Escalate to the project sponsor to make a decision.","D.Conduct a meeting with the disagreeing parties only."],"correct":["A"],"explanation":"The project manager has to be proactive to reach a consensus between the project team and stakeholders. All parties should be involved so that a consensus can be reached. The project manager must use all necessary communication techniques to gather and ensure requirements are clear. The other options are incorrect. They do not involve all parties to resolve the conflict."},{"q":"A member of a development project team informs the project manager that the operating system is not going to be installed on time due to a late upgrade by the supplier. What should the project manager do first?","opts":["A.Determine the impact of the situation.","B.Modify the schedule to reflect the situation.","C.Inform the stakeholders about the problem.","D.Have the project team brainstorm a solution."],"correct":["A"],"explanation":"The project manager must quantify an impact in order to understand the adjustments needed in the project in terms of schedule, budget, and/or resources. Only after the impact is assessed can the project manager\u00a0implement the appropriate responses to maintain optimal performance. The other answers may occur after this appraisal exercise."},{"q":"The project scope statement is approved by the project sponsor. The team members would like to modify the work breakdown structure (WBS) without changing the scope and send a request to the project manager. What should the project manager do with this request?","opts":["A.Determine which changes to implement and inform the team.","B.Refuse the request and escalate it to the project sponsor.","C.Tell the team that they cannot modify the established WBS.","D.Discuss it with the team and make a decision by consensus."],"correct":["D"],"explanation":"The project manager should discuss the request to modify the WBS with the team and empower them by working together to reach a consensus and make decisions. The team should feel trusted, supported, and encouraged to own and develop its working environment and make decisions. Engaging the project team to find and implement improvements shows trust in their skills and suggestions. Project team members who feel empowered to make decisions about the way they work perform better. The other answer choices are incorrect. Determining which changes to implement or telling the team that the WBS cannot b"},{"q":"A project team is creating a stakeholder engagement assessment matrix to govern stakeholder management activities during project execution. The team learns that a key stakeholder is aware of the project, but is unsupportive of the outcome. What type of stakeholder is this?","opts":["A.Resistant","B.Leading","C.Neutral","D.Supportive"],"correct":["A"],"explanation":"The key stakeholder is aware of the project but is unsupportive of the work or outcomes of the project, which makes them a resistant stakeholder. These stakeholders will be unsupportive of the work or outcomes of the project. The project manager can use the stakeholder engagement matrix to quickly assess stakeholders, prioritize focus, and develop a plan to address and improve those relationships. The other answers are incorrect. Stakeholders can be classified based on their level of engagement, such as unaware, resistant, neutral, supportive, or leading. Unaware\u00a0- Unaware of the project and i"},{"q":"A key project sponsor requires monthly progress reports and assigns a contact person to communicate with the project manager. Soon after, the contact person begins to request weekly reports and demands that they contain extra details. Despite delivering these frequent and highly detailed reports, the project manager finds out that the sponsor is complaining of non-receipt of the monthly progress reports.\nHow should the project manager address this situation?","opts":["A.Compile all previous reports, summarize them, and send the summary directly to the project sponsor.","B.Schedule a meeting with the project sponsor and contact person to address the communication gaps.","C.Explain the content and frequency of progress reporting to the contact person and the project sponsor.","D.Provide the project sponsor with full access to\u00a0the company\u2019s project management dashboard."],"correct":["B"],"explanation":""},{"q":"A customer reviewed a product and requested additional features that were not in the requirements documentation. The work-in-progress (WIP) limits have already been optimized for the teams working on different work components. How should the project manager begin to resolve the customer requirements?","opts":["A.Build the product according to the previously agreed customer requirements.","B.Discuss the feasibility and impact of the new features with the product owner.","C.Breakdown work on additional features with existing component teams.","D.Release increments of the additional features for customer validation."],"correct":["B"],"explanation":"The product owner is responsible for maximizing the product's value and is accountable for the end product. The project manager should discuss the feasibility and the impact of the new features with the product owner and work with them to manage expectations around adding scope, the implications to the budget, and the availability of project team members. As a result, new work can be thoroughly assessed, prioritized, and added to the product backlog as necessary. The other answer choices are incorrect. Building according to the previously agreed upon customer requirements ignores the customer'"},{"q":"Regular check-ins with the delivery team reveal low morale and a lack of efficiency. What should the project manager do to address these concerns?","opts":["A.Perform a skill assessment.","B.Conduct teambuilding exercises.","C.Remove all project roadblocks.","D.Conduct a satisfaction evaluation."],"correct":["D"],"explanation":"Before implementing a solution, the project manager should further assess the problem and the source. There is no indication as to the source of the low morale and lack of efficiency. It could result from conflicts, unachievable expectations, low motivation, etc. Before implementing a strategy to address these issues, the project manager must identify the root cause. A survey can be used to assess the degree of satisfaction and help identify the sources. The other answer choices are incorrect. A skills assessment should have been performed before the team is formed and is not an effective way "},{"q":"During a progress meeting, the project team learns that an identified risk materialized. The project manager decides to execute the risk response plan, but the contingency reserve does not cover the total budget for that plan. What should the project manager do?","opts":["A.Ask the project sponsor to apply the management reserve to cover the remaining cost of the response.","B.Ask the project sponsor to provide an additional budget to compensate for the cost overage.","C.Issue a change request to modify the scope, cost, and schedule baselines to support the new plan.","D.Use the contingency reserve and assess options to reduce the budget to cover the remaining work."],"correct":["C"],"explanation":"The implementation of a risk response plan necessitates a change in the current project management plan. Issuing a change request is the appropriate action to request the necessary budget, address rescheduling, and incorporate new activities into the scope. The management reserve is typically reserved for unidentified risks.\u00a0Since the risk has already been identified, the management reserve cannot be used to cover the cost of the risk response plan. Asking the project sponsor for an additional budget would require a change request. If the contingency reserve is not sufficient to cover the cost"},{"q":"After a few iterations, the project manager feels that even though the team is completing the work as planned, the team is not completely comfortable with some of the agile processes followed in the project. When should the project manager talk about this and make adjustments?","opts":["A.At the next daily standup meeting.","B.At the lessons learned workshop.","C.At the next retrospective meeting.","D.At the next\u00a0iteration planning meeting."],"correct":["C"],"explanation":"Sharing observations and agreeing on adjustments for improvement to the way of working should be done at the retrospective meeting. Retrospective meetings provide an opportunity for the project team to review the way in which it works and to suggest changes to improve processes and efficiency.\u00a0\nAt a planning meeting for the next iteration is incorrect because that is not the nature of those meetings. Daily standup meetings are brief collaboration meetings during which the project team reviews its progress from the previous day, declares intentions for the current day, and highlights any obstac"},{"q":"A newly hired project manager is assigned to a school construction project. The school serves students from surrounding neighborhoods and must be completely energy efficient. The project manager must provide a final report. How can the project manager determine whether the planned business value was delivered?","opts":["A.Inspect the approved technical specifications to confirm that they match the final product deliverables.","B.Consult with the team and confirm that the customer was satisfied with the construction of the school.","C.Review the project charter and business case to determine if the deliverables achieved the intended benefits.","D.Demonstrate that the school construction project was delivered on schedule and within budget."],"correct":["C"],"explanation":"Prior to the final closeout, the project charter and the business case should be reviewed to determine if the deliverables achieved the intended benefits and value. The project charter and business case outline the goals and objectives of the project, including the intended benefits. By reviewing these documents, the project manager can determine if the deliverables achieved the intended benefits and therefore if the planned business value was delivered.\nThe other answer options are not as effective.\u00a0\nInspecting the technical specifications only confirms that the final product matches the appr"},{"q":"An agile project team has not completed the tasks within the current iteration. During a meeting, the project sponsor gives the team a final date for task completion. How should the project manager proceed?","opts":["A.Request that a functional manager becomes a team lead to ensure processes are followed.","B.Appoint a team leader to take responsibility for the team's iteration planning and completion.","C.Advise the project sponsor that the team is responsible for managing work within iterations.","D.Advise the team to comply with the new schedule provided by the project sponsor."],"correct":["C"],"explanation":"Advising the project sponsor that the team is responsible for managing work within iterations is correct because, when taking an agile approach, the team takes responsibility for its work and process. Requesting that a functional manager become a team lead is incorrect. With agile, a cross-functional team is empowered to make decisions and the scrum master facilitates. A functional manager becoming a team lead does not come into play. Appointing a team leader to take responsibility for the team's iteration planning is incorrect. With agile, the concept of team lead does not come into play and "},{"q":"One day before starting a task, the technical lead proposed a new implementation approach that could reduce the schedule by one week. However, if the approach does not work, the task will be delayed by three days. What should the project manager do next?","opts":["A.Initiate a change request to reduce the schedule by one week.","B.Tell the technical lead that the new approach is not feasible.","C.Refer to the network diagram to determine the float for this task.","D.Communicate the possible three-day delay to the sponsor."],"correct":["C"],"explanation":"The project manager should refer to the network diagram to determine the float for this task. This allows the project manager to assess the flexibility in the schedule and make an informed decision. Float is the amount of time that a task can be delayed without delaying the entire project. By determining the float for this task, the project manager can determine if there is enough time to test the new implementation approach without delaying the project. If there is enough float, the project manager can allow the technical lead to proceed with the new approach. The other options are incorrect."},{"q":"A project manager is working on a project charter and discovers that two key stakeholders are transferring to other departments and replacements have not been identified yet. What should the project manager do next?","opts":["A.Put the project on hold until the replacements are identified.","B.Involve senior management to resolve the challenge.","C.Obtain support from the project sponsor to continue the project.","D.Perform an impact analysis of the possible delays."],"correct":["D"],"explanation":"The project manager should perform an impact analysis of the possible delays. This will help them understand the potential impact of the stakeholders leaving and identify any risks associated with the changes. Based on the impact analysis, the project manager can determine the best course of action and communicate the findings to the appropriate parties. The other options are incorrect. Putting the project on hold or obtaining support from the project sponsor to continue the project may not be necessary or feasible and could cause delays and impact the project. Involving senior management shou"},{"q":"A project team realizes that the product's architecture will not support the growing number of users. What should the project manager do?","opts":["A.Assign a team member to execute performance testing and ensure the product's performance is acceptable.","B.Hire external experts to assess the product architecture and come up with a resolution plan.","C.Engage with the product owner on the new development and prioritize the solution on the product backlog.","D.Negotiate with the stakeholders to slow down product development until a viable solution is available."],"correct":["C"],"explanation":"The first step for the project manager will be to share this vital information with the product owner, so that business stakeholders may be invited to share their thoughts and value considerations made, then the product backlog can be reprioritized to reflect this. This sequence allows for company, team, and business stakeholder concerns to be adequately addressed. The other answer choices are incorrect. Performance testing\u00a0happens concurrently during development or at the end of the iteration/release and will not solve the identified gap but only highlight it down the road. Hiring external ex"},{"q":"A project manager is assigned to a new project. The requirements are still evolving, but there is a need to deliver business value quickly. What approach should the project manager take in this situation?","opts":["A.Develop mitigation strategies to address the risks of evolving requirements.","B.Use a product backlog and complete the highest priority requirements first.","C.Ensure scope changes are documented in the requirements traceability matrix.","D.Develop a feature burndown chart and show progress on requirements."],"correct":["B"],"explanation":"The project manager should select an iterative and incremental (Agile or hybrid) approach to manage evolving requirements. They can use a product backlog to complete the highest priority requirements and ensure that business value is delivered early and frequently."},{"q":"During project implementation, a stakeholder is questioning the purpose of the project and wants to pause the project to assess a new process that may affect the final deliverable. What is one of the first things the project manager should do?","opts":["A.Use a power/interest grid to determine the stakeholder's influence on the execution of the project.","B.Consult with the project sponsor to determine the next steps and the potential new process.","C.Postpone any changes to a future project in order to fulfill the deliverables in the current project.","D.Revisit the acceptance criteria with the stakeholder to ensure the quality level is appropriate."],"correct":["A"],"explanation":"An impact/influence grid supports a grouping of stakeholders according to their level of authority (power), level of concern about the project's outcomes (interest), ability to influence the outcomes of the project (influence), or ability to cause changes to the project's planning or execution. Once the project manager has a better understanding of the stakeholder's power and interest, they can then develop a strategy for addressing their concerns. The other options are incorrect because they should not be the first thing the project manager does in response to this situation. The other option"},{"q":"A company has decided to utilize a diverse international team that will work virtually. This will be the first time that the team is working together. The project manager is creating a communication plan for the project. What should the project manager do in order to build an effective project communications management plan?","opts":["A.Study the impact of cultural differences on communication.","B.Implement a one-way email push communication method.","C.Create a cloud-based resource folder for the project team.","D.Appoint a skilled communications manager for the project."],"correct":["A"],"explanation":"Cultural awareness is the first step in understanding the differences between individuals, groups, and organizations and adapting the project\u2019s communication strategy in the context of these differences. The project manager needs to understand the differences between the diverse cultures and communication styles of the team to avoid miscommunications and enhance effective communication. Stakeholders located in remote locations may have different time zones, speak different languages, and have different cultural norms. The other answer choices are incorrect because they do not address the poten"},{"q":"A project manager notices that a critical team member has lost interest in the project. The team member's lack of interest has led to decreased productivity. How should the project manager address this issue?","opts":["A.Escalate this issue to the human resources (HR) manager.","B.Replace the team member with a more interested team member.","C.Schedule a meeting with the team member to identify the cause.","D.Increase the team member's salary and bonus opportunities."],"correct":["C"],"explanation":"It is important for the project manager to address disinterest among team members as soon as possible to prevent it from impacting the project's success. The project manager should schedule a meeting with the team member to identify and discuss the cause of their disinterest in the project. This will help the project manager understand the root cause of the issue and develop a plan to address it.\nThe other answer choices are incorrect because they suggest the project manager take action without assessing the situation first. There are many reasons why team members may lose interest in a projec"},{"q":"A project manager is preparing to start a project and notices that the project team is having difficulties communicating and collaborating. The team has never worked together before. The project manager wants to understand each individual's behavior and tailor the leadership style to create a more effective team environment. Which tools or techniques should the project manager use in this situation? (Choose two)","opts":["A.Personality assessments","B.Weekly teleconferences","C.One-on-one coaching","D.Technical assessments","E.Cultural assessments"],"correct":["A","C"],"explanation":"A. Personality assessments C. One-on-one coaching The project manager needs to establish a culture and environment that enables a group of diverse individuals to evolve into a high-performing project team. This includes recognizing the activities needed to foster project team development and encouraging leadership behaviors from all project team members. One-to-one coaching and personality assessments are the two vital techniques that the project manager should use in this scenario. The other answer choices are not as effective for understanding their behavioral styles and understanding indivi"},{"q":"A new project manager joins an organization that has never had formal project management processes. Some team members refuse to participate in basic tasks such as taking ownership of action items at meetings. What should the project manager do?","opts":["A.Set up a private meeting with the specific team members to discuss the benefits of project management.","B.Create an internal document outlining the benefits of project management for all team members.","C.Explore the benefits of project management with executives of the organization.","D.Host a meeting with the team focused on collaborative problem-solving to develop an approach to accomplishing project tasks."],"correct":["D"],"explanation":"The project manager should use collaborative problem-solving to allow for input from all team members without involving executive mandates, which allows for more buy-in from the team to accomplish the tasks. The other answer choices are incorrect. Setting up a meeting with individual project team members does not provide the opportunity for team buy-in; creating an internal document does not ensure buy-in from team members or create a team culture that the team is part of the problem-solving process; exploring the benefits of project management process with executives is a top-down approach an"},{"q":"Some of the project's materials have been ordered from overseas. The supplier notifies the project team that the materials will not reach the site on time due to a customs clearance delay that will affect the critical path. What should the project manager do first?","opts":["A.Ask the logistics team to arrange an expedited clearance.","B.Revisit the risk register and implement the respective risk response.","C.Identify the root cause of the delay and add it to the bid documents.","D.Ensure the suppliers cover any additional costs due to the delay."],"correct":["B"],"explanation":"The project manager should first revisit the risk register since corrective action has been identified at the beginning of the project. Information in a risk register can include the person responsible for managing the risk, probability, impact, risk score, planned risk responses, and other information used to get a high-level understanding of individual risks.\nThe other options are incorrect because the project manager should first review the risk register to determine the appropriate course of action.\nAsking the logistics team to arrange expedited clearance is incorrect because it may not be"},{"q":"A project manager realizes that an email intended for a specific team member has been mistakenly sent to the entire global project team. This email contains critical feedback regarding a recent incident. What should the project manager do next?","opts":["A.Ignore the mistake and assume that team members will understand the situation.","B.Acknowledge the mistake and apologize for any unintended consequences.","C.Request that the unintended email recipients delete the message without reading it.","D.Send a private message to the team member apologizing for the critical feedback."],"correct":["B"],"explanation":"The project manager should take responsibility for the mistake, acknowledge it to the global project team, and apologize for any unintended consequences. Openly addressing the error helps maintain transparency and trust within the team. Effective leaders seek to be role models in areas of honesty, integrity, and ethical conduct. Effective leaders focus on being transparent, behave unselfishly, and are able to ask for help. Effective leaders understand that project team members scrutinize and emulate the values, ethics, and behaviors that leaders exhibit. Therefore, leaders have an additional r"},{"q":"A project manager was recently assigned to an investigation project. Due to the complexity of the project, the project manager is unsure if any regulation applies. How should the project manager determine which regulations apply to the project?","opts":["A.Consult with a manager who has a higher level of authority for this decision.","B.Contact the project management office (PMO) manager as they are in charge of determining the regulations required for agile projects.","C.Schedule a meeting with key stakeholders, subject matter experts (SMEs), and the project team to better understand if any regulations are applicable.","D.Request a signed letter from the client to confirm if any regulations apply to any project deliverables."],"correct":["C"],"explanation":"The best option is to consult the experts available (SMEs), your resources, and any related stakeholders with expertise on the topic (Expert Judgement). The other answer choices are incorrect. PMO just provides guidance on the methodology to be used and not if any regulation needs to be applied. The high-level manager and the client may not be well informed of necessary regulations."},{"q":"An organization makes an acquisition of a similar product halfway through the development cycle of a potential product. This might create an overlap in the product portfolio. What should the project manager do next?","opts":["A.Assess the feasibility and viability of the project with the product owner.","B.Continue to develop the product for the benefit of the organization.","C.Discuss the potential impact of the acquisition with team members.","D.Halt the project until a clear path emerges for the product roadmap."],"correct":["A"],"explanation":"The project manager should assess the impact of the new acquisition and determine the next steps with the product owner. This would ensure that expectations are aligned. The other answer choices are incorrect. Continuing with the product development or halting the work is not reasonable, since the action may result in a waste of effort or time if the organization's intentions are not aligned. Discussing the potential impact is\u00a0valid, but is not the next step. The discussion should be with the product owner first. The team members may join the discussion later for the impact analysis."},{"q":"The tables below show the requirements and risks for an agile project. What should the priority order be in the risk-adjusted product backlog?\n\n[TABLE: Requirements]\n| Requirement   | ROI      |\n| Requirement 1 | $10,000  |\n| Requirement 2 | $8,000   |\n| Requirement 3 | $25,000  |\n\n[TABLE: Project Risks]\n| Risk   | Probability | Impact   | EMV    |\n| Risk 1 | 15%         | $25,000  | $3,750 |\n| Risk 2 | 20%         | $10,000  | $2,000 |\n| Risk 3 | 30%         | $30,000  | $9,000 |","opts":["A.Requirement 3, Requirement 1, Requirement 2, Risk 3","B.Risk 3, Risk 1, Risk 2, Requirement 3, Requirement 1, Requirement 2","C.Requirement 3, Risk 3, Requirement 1, Requirement 2, Risk 2","D.Requirement 3, Requirement 1, Risk 3, Requirement 2, Risk 1, Risk 2"],"correct":["D"],"explanation":"The expected monetary value (EMV) after risk analysis is: EMV = P*I Risk 1 = 3750 Risk 2 = 2000 Risk 3 = 9000 The requirements based on the return on investment (ROI) are: Requirement 1 = 10,000 Requirement 2 = 8,000 Requirement 3 = 25,000 Prioritizing based on monetary value, the order of risk-adjusted backlog becomes: Requirement 3, Requirement 1, Risk 3, Requirement 2, Risk 1, Risk 2"},{"q":"While reviewing progress in the middle of an iteration, the scrum master points out a major risk due to a user story dependency. What should the project manager do next?","opts":["A.Update the product backlog.","B.Update the project charter.","C.Update\u00a0the risk register.","D.Update the issue log."],"correct":["C"],"explanation":"The project manager should update the risk register next, upon learning about the major risk. The other answer choices are incorrect.\u00a0Updating\u00a0the product backlog is not the best option because it does not address the immediate risk.\u00a0Updating\u00a0the project charter is not the best option because the project charter is a high-level document that does not typically include details about risks. Updating\u00a0the issue log should not be done before the project manager has updated the risk register."},{"q":"A project manager is required to obtain approval for project requirements before proceeding to the delivery stage. During the project's execution, the project manager realizes that the initial estimates were unrealistic and the project will take much longer to complete. The project manager will have to obtain approval for more realistic project requirements. What should the project manager do to mitigate the problem and keep the project on track while waiting for approval?","opts":["A.Reprioritize project deliverables to enable phased delivery in increments.","B.Divide the project team into distinct units focusing on different components.","C.Survey the project team to see if anyone can work overtime to meet the deadline.","D.Update the schedule baseline so that it is based on realistic estimates."],"correct":["A"],"explanation":"Breaking down and reprioritizing project deliverables allows the project to continue progressing while waiting for approval on more realistic requirements. Reprioritizing project deliverables allows the project manager to identify critical components and deliver tangible results, even if the overall timeline needs adjustment. This allows the team to focus on delivering high-priority features first, then gradually adding components or features based on updated, more realistic estimates. The other options are less suitable for\u00a0ensuring successful project delivery. Dividing the team into separate"},{"q":"During a daily standup, some team members realized they were not all prioritizing the requirements in the same way. This could impact the current iteration's goals.\nWhat should the project manager do to resolve this issue?","opts":["A.Schedule an iteration review session and update backlog priorities.","B.Meet with the team and product owner to clarify priorities.","C.Ask the project sponsor to redefine the prioritized values.","D.Define priorities based on the urgency of requirements and risks."],"correct":["B"],"explanation":"The project manager should organize a meeting with the team and the product owner to clarify and prioritize requirements. Agile techniques are valuable for focusing on and resolving competing priorities through direct interaction with the product owner. This will help the team better understand the value of requirements added to the product in each iteration and optimize the flow of value.\nThe other options are incorrect because they are not the most effective way to resolve the issue of team members not prioritizing requirements in the same way."},{"q":"While working on a long project with many changes, a project manager is informed by a team member that some users are uncomfortable with certain product functionalities released in the previous iteration. Which action should the project manager take?","opts":["A.Ensure that the team assignments are clear.","B.Obtain stakeholder feedback and team insights.","C.Communicate the changes to the team.","D.Update the change log and issue log."],"correct":["B"],"explanation":"Obtaining stakeholder feedback and team insights on each release is part of an iterative approach to development, thus the project manager should do so. This enables alignment among stakeholder needs, expectations, and project objectives. The other answer choices are incorrect because they do not result in a change to the project and clarifying team assignments does not address the issue at hand."},{"q":"During a kick-off meeting with the project sponsor and various project members, it became clear that it was not necessary for some participants to be present. In addition, one required expert was not aware of the meeting and was not present at the meeting. What should the project manager have done to prevent this from happening?","opts":["A.Established a fixed communication platform to provide updates on the project to all stakeholders.","B.Managed stakeholder engagement by involving the stakeholders in the appropriate phases of the project.","C.Developed the project charter including the roles and responsibilities of all the stakeholders.","D.Created a responsibility matrix to notify stakeholders of the meetings they are required to attend."],"correct":["B"],"explanation":"Managing stakeholder engagement is the correct answer choice because it brings awareness to stakeholders so they know when their participation is required or optional. The other answer choices are incorrect because they do not address the engagement of the stakeholders, which would have prevented the unawareness of the required stake
