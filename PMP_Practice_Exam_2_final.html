holder's attendance."},{"q":"In the most recent sprint review meeting, the client announced that they need to implement two of the five modules committed for the project in a few weeks. What should the project manager do?","opts":["A.Conduct a brainstorming meeting.","B.Employ the nominal group technique.","C.Conduct a release plan meeting.","D.Use prototypes to refine the design."],"correct":["C"],"explanation":"Release planning meetings identify a high-level plan for releasing or transitioning a product, deliverable, or increment of value. The project manager should conduct a release plan meeting to discuss the upcoming release and create a plan for delivering it. This would allow them to re-prioritize the work to deliver the two modules first. Conducting a brainstorming meeting, employing the nominal group technique, or using prototypes, can be valuable tools in different contexts but do not directly address the client's immediate request to reprioritize and plan for the delivery of specific modules"},{"q":"A company is expanding its product manufacturing to a new country. The date the company will start operating is set and broadly communicated, but the project team is not sure if there is enough time to get all the product features implemented. What should the project manager do to ensure there is enough time to implement the critical features on the committed date?","opts":["A.Add resources to the project team, as this will increase the velocity and enable the team to deliver more value.","B.Collaborate with the project team to estimate the size of the minimum viable product (MVP) functionalities.","C.Cut operations documentation because this can be completed after product delivery and operation starts.","D.Escalate the concern to the executive level and request a new and feasible project due date."],"correct":["B"],"explanation":"This is a risk issue relating to scope and time. The project manager should work with the project team to evaluate the effort/size required to get the MVP features and functionality completed. This will provide the input for the next steps. The other options are not as effective at ensuring that the critical features are implemented on the committed date. Adding resources may not be feasible, is not guaranteed to solve the issue, and could introduce its own complexities. Cutting operations documentation will lead to insufficient documentation. Escalating the concern to the executive level shou"},{"q":"During execution, the customer submits a change request to maintain the project's business value, which has been threatened by a recently implemented government regulatory change. The project manager analyzes the change, which will require 50% of the project deliverable to be reworked and will incur additional costs to the customer. What should the project manager do?","opts":["A.Submit the change request to the CCB as the customer will be\u00a0comfortable absorbing all additional costs.","B.Submit the change request to the CCB and advise the panel to consider rejecting the request due to its impact.","C.Submit the change request to the CCB and explain the reason for the request, including a cost-impact analysis.","D.Submit the change request to show the change as having no impact, then proceed\u00a0without notifying the CCB."],"correct":["C"],"explanation":"The project manager should document and submit the change request to the CCB for review and approval. Since there is a significant cost impact, the cost-impact analysis must be part of the submission. The other answer choices are incorrect. Whether the customer is absorbing the cost or not is irrelevant to the change request. A change request is to capture the reasons for change, the impact on the project, and other relevant facts. It is not required for the project manager to advise as part of the request. The project manager should follow a code of ethics and must not make up or omit any imp"},{"q":"A project manager is leading a new implementation project with a global project team. As team members are in different geographical locations and time zones, the project manager has to decide on the most effective team engagement strategy. What is the first action the project manager should take?","opts":["A.Develop a communications management plan.","B.Set up daily conference calls to track work.","C.Ask all team members to utilize an online task board.","D.Ask team members to align their work schedules."],"correct":["A"],"explanation":"As the team members are in different geographical locations and time zones, it is very important that the project manager develops an effective engagement strategy first. As a result, a review of team communication requirements is needed. This is done in the communication management plan. The other answer choices are incorrect. Setting up daily conference calls or asking the team members to align their work schedules may not be possible as the team is geographically distributed. Online task boards may provide updates on the tasks, but primarily, there is always a need for engaging with stakeho"},{"q":"A project manager is working on a new healthcare management application. One of the team members will be leaving the organization and a new team member is taking over their tasks. The new team member is concerned that several parts of the new application cannot be tested yet, despite sign-off by the outgoing team member. How should the project manager address this situation?","opts":["A.Trust the sign-off from the outgoing team member and proceed with the project as planned.","B.Conduct a thorough review of the untested parts of the application before proceeding.","C.Inform the new team member that testing will happen in a later phase of the project.","D.Ensure that the outgoing team member creates a knowledge transfer document for the new team member."],"correct":["D"],"explanation":"Ensuring that the outgoing team member creates a knowledge transfer document is the most comprehensive and reliable way to ensure that the new team member has all the information they need to understand and test the untested parts of the application. By doing this, the project manager ensures that the new team member has all the necessary information to understand the current state of the project and can make informed decisions about whether further testing or review is needed. It also helps mitigate risks associated with relying solely on the sign-off from the outgoing team member without a p"},{"q":"A project manager realizes that some newly hired team members have not been as productive as expected. The project has a very rigid timeline, and the lower-than-expected productivity issue is putting the project at risk. What should the project manager do to address this issue?","opts":["A.Provide additional training to the new team members.","B.Conduct job shadowing within the project team.","C.Institute project milestone completion incentives.","D.Notify the team that productivity must improve."],"correct":["B"],"explanation":"The project manager should conduct job shadowing within the project team to help the newly hired team members become more productive. Conducting job shadowing activities will help the new team members learn from experienced team members and get up to speed on the project quickly. Job shadowing can help ensure that knowledge is shared by connecting the people who need the knowledge with people who have the knowledge. The other options are incorrect. Providing additional training is not the best option in this scenario. The project manager needs to address the issue quickly, and additional train"},{"q":"A project manager is assigned to a new project with a team that the project manager knows well and has worked with a number of projects. The team's average velocity is eight points per sprint. Another team has some time between projects and assists the team with sizing stories. The table below shows the estimated story points for each of the new features that will be built. The business wants to confirm a delivery date as soon as possible. Which two actions should the project manager take? (Choose two)","opts":["A.Explain to the business that the team will need ten sprints to deliver the features.","B.Inform the business that the team that will be doing the work needs to estimate the feature sizes.","C.Set up a meeting between both project teams to understand how their estimation of story sizes works.","D.Explain to the team that the sizing was already done and they will need to deliver the project in 10 sprints.","E.Discuss the business request with the team and determine a solution to plan for a five-sprint schedule."],"correct":["B","C"],"explanation":"B. Inform the business that the team that will be doing the work needs to estimate the feature sizes. C. Set up a meeting between both project teams to understand how their estimation of story sizes works. The number of story points a team can complete in a given time is unique to the team. Story point estimating involves project team members assigning abstract, but relative, points of effort required to implement a user story. It tells the project team about the difficulty of the story considering the complexity, risks, and effort involved. Each team\u2019s capacity is different so it is important"},{"q":"A team member with sufficient experience and knowledge informs the project manager about a conflict with another team member and asks for advice and assistance. The project manager schedules a meeting to discuss the conflict with the team members involved. What should the project manager do during the meeting to resolve the conflict?","opts":["A.Determine a resolution together.","B.Mandate the solution unilaterally.","C.Separate the team members.","D.Identify who instigated the issue."],"correct":["A"],"explanation":"The project manager should meet with the team members to discuss the conflict before it escalates and work with them to determine a favorable outcome. Damage incurred from conflict can be repaired by looking for resolutions and alternatives together. It can also create more constructive relationships. This moves the conflict into more of a problem-solving space where people can work together to resolve the conflict. The other options are not as effective in addressing the conflict because they don't involve the team members in the decision-making process. Mandating a solution is not collaborat"},{"q":"During the execution of repair work, the root cause of the damage was discovered to be failures that occurred during the construction phase. The same contractor who performed the construction work is performing the repairs. Because of this, the CEO wants to negotiate with the contractor for a reduced price.\nWhat should the project manager do?","opts":["A.Negotiate with the contractor to cancel the repair work and pay compensation for the previous work.","B.Negotiate the repair work with the contractor based on a shared risk-reward relationship.","C.Proceed with the contractor without mentioning the issue since the previous work is already closed.","D.Proceed with the contractor and subtract the amount paid for supervision of the previous work."],"correct":["B"],"explanation":"Since the same contractor performed the construction phase in which the failures have occurred, a collaborative approach is required. The project manager should negotiate the repair work with the contractor based on a shared risk-reward relationship. This means that both parties share in the risks and rewards of the project, and the contractor is incentivized to complete the repairs efficiently and effectively.\nThe other answer choices are incorrect because they do not benefit this situation, and the repair work cannot be canceled as it does not fall in the original scope. It is important for "},{"q":"During project execution, a key stakeholder is replaced with a new team member who has approval authority. The new member states that the project deliverables are not aligned with the design and does not approve them. However, a few weeks later the project manager learns that the new team member had not been informed of changes during execution. What should the project manager have done to avoid this miscommunication?","opts":["A.Organized a meeting with the sponsor before the execution began.","B.Updated the stakeholder register to include the new team member.","C.Asked the previous stakeholder to hold a meeting with the new team member before leaving.","D.Updated the project charter during the execution phase to include all the changes."],"correct":["B"],"explanation":"The project manager should have updated the stakeholder register to include the new team member. This would have ensured that the project manager was aware of all of the stakeholders on the project and that they were communicating with the new team member on a regular basis. The other answer choices are not as effective or relevant. Organizing\u00a0a meeting with the sponsor before the execution begins is a good practice, but it is not enough to avoid the miscommunication that occurred in this situation.\nAsking\u00a0the previous stakeholder to hold a meeting with the new team member before leaving is a "},{"q":"Halfway through implementation, the project co-sponsor, who is contributing a significant amount of capital to the project, informs the project team of an additional feature to the project deliverable. What should the project manager do?","opts":["A.Assess the impact of the new requirement and update the risk register.","B.Complete the current project as planned and update it later with the new requirements.","C.Collect the co-sponsor's requirements and perform the integrated change control process.","D.Convince the co-sponsor to maintain the current scope and complete the project as planned."],"correct":["C"],"explanation":"The co-sponsor is a key stakeholder in the project and their requirements should be prioritized. The project manager should collect the requirements and perform the integrated change control process. The other answer choices are incorrect. Updating the risk register happens after the change has been approved; completing the current project without the client's approval or convincing the client that their requirements are not worthwhile negatively impacts project success."},{"q":"An oil refinery project is in the middle of the execution phase. The project team found that the project is delayed because of an environmental regulation change, procurement delays, and a change in government. However, the project deliverable is still urgently needed. What should the project manager do next?","opts":["A.Terminate the project immediately, avoid further loss through more expenditure, and absorb the current loss.","B.Review the impact of the changes, comply with the new regulations, and then propose a realistic plan.","C.Make the necessary arrangements for the procurement materials, and continue the project as planned.","D.Stop the project and negotiate with the new government to pay the invoices for work done up to that point."],"correct":["B"],"explanation":"Any regulatory requirements or changes to requirements must be reviewed and aligned with the new regulations. By reviewing the impact of the changes, complying with the new regulations, and proposing a realistic plan, the project manager can increase the chances of success and minimize the impact of the delays.\nThe other options are too risky, drastic, or premature."},{"q":"A project is halfway complete, and despite a good schedule performance index (SPI), the customer has identified several minor issues. Most of the issues could be resolved quickly and easily if the customer could directly communicate with the development team. The project manager agrees, but some team members feel unsure about their ability to adequately engage the customer. How can the project manager support successful customer engagement?","opts":["A.Assess members' communication styles and provide feedback as needed to mentor the team.","B.Ensure that all project team members understand their specific roles and responsibilities.","C.Assess the project team's technical skills and provide additional product development training.","D.Update the schedule performance index (SPI) and review all project team communications."],"correct":["A"],"explanation":"The project manager should assess members' communication styles and provide feedback as needed to mentor the team for successful customer engagement. This can help to ensure that team members can effectively engage with customers and address any issues that may arise. Providing feedback on communication skills will help the team identify areas where they can improve and help them develop more effective communication strategies for engaging with customers. The other options are incorrect. Assessing the team's technical skills and ensuring that all team members understand their roles and respons"},{"q":"A new project has a team divided between onsite and offshore locations. The project manager observed a rising conflict between the two parts of the team during project initiation. What should the project manager do first?","opts":["A.Communicate the project scope to all team members.","B.Organize a face-to-face meeting during project kick-off.","C.Identify this conflict in the risk register log.","D.Record this conflict in the project issue log."],"correct":["C"],"explanation":"The best way for a project manager to address a rising conflict between onsite and offshore team members is to identify this conflict in the risk register log. This will help the project manager to track the conflict and to develop mitigation strategies. The other answer choices are also important, but they are not as effective in addressing the underlying conflict.\u00a0By identifying the conflict in the risk register log, the project manager can develop a plan to mitigate the risk and ensure that the project is successful."},{"q":"A stakeholder on an agile project has attended the sprint demo where the team shows the minimum viable product (MVP) as defined by the product owner. During the session, the stakeholder complains that there were no release notes or technical product guides provided. Which two actions should the project manager take? (Choose 2)","opts":["A.Explain that technical product guides are not part of the\u00a0agile process.","B.Tell the stakeholder to contact the product owner for documentation.","C.Clarify the stakeholder's need for release notes and technical product guides.","D.Acknowledge the stakeholder's concerns over missing documentation.","E.Provide\u00a0the release notes and technical product guides as soon as possible."],"correct":["D","E"],"explanation":"D. Acknowledge the stakeholder's concerns over missing documentation. E. Provide\u00a0the release notes and technical product guides as soon as possible. The project manager should acknowledge the stakeholder's concerns over missing documentation and provide the release notes and technical product guides as soon as possible.\u00a0By taking these two actions, the project manager can help to address the stakeholder's concerns and ensure that they have the information they need to use the MVP effectively. The other answer choices are incorrect.\u00a0Explaining that technical product guides are not part of the a"},{"q":"A project team member suddenly approaches the project manager and asks to resign from the project. The team member is upset because of poor treatment and consistent complaints from the technical leader. The team member explains that they are no longer willing to tolerate this treatment from the technical leader. The project manager has never had quality issues with the team member. How should the project manager handle this situation?","opts":["A.Allow the team member to resign and replace them since there are additional resources available.","B.Discuss the situation with the team member to determine why the technical leader is treating them poorly.","C.Talk to the technical leader to determine how the team member is poorly performing.","D.Speak with the team member and technical leader to analyze the conflict and resolve it through mediation."],"correct":["D"],"explanation":"The project manager should mediate between the technical leader and team member to ensure conflict resolution and collaboration. It is important to discuss with both parties to analyze and truly understand the issues they are facing. The other answer choices are incorrect. They propose a one-sided approach to conflict resolution, and allowing the team member to resign without assessing the issue with the technical leader may result in future issues between the technical leader and other team members."},{"q":"An agile team is developing a product with strict budget constraints. The customer is requesting a new independent feature be added to the solution in development. The project manager is concerned that adding the new feature will exceed the budget. What should the project manager do next?","opts":["A.Evaluate the new feature with the customer.","B.Reject adding the new feature.","C.Add the new feature to the product backlog.","D.Reprioritize the product backlog."],"correct":["A"],"explanation":"The project manager should first evaluate the new feature with the customer to determine if it is feasible and meets the customer's needs within the budget. This approach ensures that the project manager has a clear understanding of the feature's implications before making a decision. If the new feature is not feasible, the project manager should explain this to the customer and offer alternative solutions. If the new feature is feasible, the project manager can work with the customer to prioritize the feature and determine when it can be implemented. This evaluation allows for an informed dec"},{"q":"A company is implementing an agile approach for a new project. Which action should the project manager take to ensure they are acting as a servant leader?","opts":["A.Keep strict control of the team and their activities.","B.Serve as a backup in case a team member becomes ill.","C.Ensure the team follows all processes as defined without question.","D.Understand the bottlenecks and support the team to remove them."],"correct":["D"],"explanation":"Agile times thrive with servant leadership. Servant leadership is a style of leadership that focuses on understanding and addressing the needs and development of project team members in order to enable the highest possible project team performance. A critical role for the servant leader is to maximize delivery by removing impediments to their progress. This includes solving problems and removing obstacles that may be hampering the project team\u2019s work. By solving or easing these impediments, the project team can deliver value to the business faster. The other options are incorrect because they "},{"q":"A project manager is beginning a new project and is starting to form the project team. The project manager has not worked with anyone from this team previously, and most of the team members do not know each other, and some are located in different countries. Which two actions should the project manager take to help the team work more closely together? (Choose two)","opts":["A.Identify the cultural differences and potential conflict areas to mitigate these going forward.","B.Allocate a budget for the team members to temporarily relocate for the duration of the project.","C.Arrange virtual team building sessions that allow team members to get to know each other.","D.Select team members who have previously worked together to be allocated to the project.","E.Identify experienced team members to provide mentoring for the less experienced team members."],"correct":["A","C"],"explanation":"A. Identify the cultural differences and potential conflict areas to mitigate these going forward. C. Arrange virtual team building sessions that allow team members to get to know each other. Cultural differences can potentially lead to misunderstandings and conflict. The project manager should identify cultural differences and potential conflict areas to ensure that issues do not arise. Virtual team building sessions can help build trust, cohesion, and shared understanding. The other answer choices are less effective for helping a new team work more closely together. Allocating a budget for t"},{"q":"A dispersed project team just finished a sprint with complex tasks ahead of schedule. During the retrospective, a new member of the team interrupts and asks everyone to explain their roles and what they are planning on working on for the next sprint. What should the project manager do?","opts":["A.Address the situation immediately and answer the new team member directly.","B.Inform the team members that this would be best handled in another meeting.","C.Ask each team member to explain their role and what they will work on for the next sprint.","D.Set up one-on-one meetings with each team member and the new team member."],"correct":["B"],"explanation":"The project manager should politely tell the new team member that a retrospective meeting is not the best time to discuss the roles of other team members. This helps maintain the effectiveness and efficiency of the retrospective meeting and ensures that the team's time is used wisely. Retrospective meetings provide an opportunity for the project team to review their work and results and suggest changes to improve processes and efficiency. The other answer choices are incorrect as they suggest that the project manager should accommodate the new team member's question at an inappropriate time. T"},{"q":"A project manager has been assigned to an important project with stakeholders who have different expectations for the project. Some stakeholders also have a high degree of influence on the project. How should the project manager handle this situation?","opts":["A.Control the degree of stakeholder influence to better align with the project objectives.","B.Include the influential stakeholders' requirements and ensure other stakeholders are aligned with the project goals.","C.Elicit and negotiate stakeholder requirements according to each stakeholder's influence.","D.Manage the stakeholders carefully and apply stakeholder expectations without impacting the project objectives."],"correct":["C"],"explanation":"The project manager will first need to understand each stakeholder's influence and interest in the project thoroughly. Based on these two factors, the project manager can then negotiate and align each stakeholder's needs with the project goals. Thus, eliciting and negotiating stakeholder requirements according to each stakeholder's influence is the correct answer. The other answer choices are incorrect. It is not possible for the project manager to control the degree of stakeholder influence; include influential stakeholder's requests and make other stakeholders align with the project goals; o"},{"q":"A project team is unexpectedly audited. Several nonconformances were identified during the audit. Which three actions could the project manager have taken to prevent this situation? (Choose three)","opts":["A.Monitored conformance and quality standards.","B.Anticipated potential nonconformance items.","C.Asked that the team remain ready for an audit.","D.Ensured that the auditors were experienced.","E.Rejected the unexpected audit request."],"correct":["A","B","C"],"explanation":"A. Monitored conformance and quality standards. B. Anticipated potential nonconformance items. C. Asked that the team remain ready for an audit. Audits are a part of the process. The team is expected to be in compliance and maintain products and deliverables as per project standards. Monitoring conformance and quality standards and asking the team to remain prepared for an audit can help to identify and address any potential nonconformances before they become a problem. The project manager should also try to anticipate potential nonconformances and take steps to mitigate them. The other answer"},{"q":"A project manager was recently assigned to an information technology project. The project is in the initiation stage, and the team found a compatibility issue in the technical infrastructure used by the vendor and the organization. What initial step should the project manager take to address this issue effectively?","opts":["A.Examine if there is an alternate solution.","B.Escalate the issue to the technical infrastructure team.","C.Check the lessons learned database.","D.Consult the project sponsor about the issue."],"correct":["C"],"explanation":"Lessons learned register must be used to retrieve information from previous projects to help other projects during initiation. The project manager needs to check if this compatibility issue happened before in other projects within the organization. The other answer choices are incorrect. Examining if there is an alternate solution should be the next step if the project manager does not find this issue in the lessons learned. The lessons learned database may have information regarding alternate solutions, what has been considered, what has been tried in the past, and other information that coul"},{"q":"A project manager is leading a team of software engineers in developing a new mobile app. The team consistently meets deadlines but the quality of their work has been declining. The project manager suspects this may be due to a lack of training. How should the project manager address this situation?","opts":["A.Organize a team-building workshop to improve collaboration and team morale.","B.Hire new team members with more experience to compensate for the performance decline.","C.Conduct a skills gap analysis to identify specific training needs and provide targeted training.","D.Implement a strict performance evaluation system to motivate team members to improve their performance."],"correct":["C"],"explanation":"This approach allows for a data-driven response to identify and address the root causes of the issue, likely related to training or skill deficiencies. By conducting a skills gap analysis, the project manager can identify the specific training needs of each team member and develop a targeted training plan to address them. This will help to ensure that the team members have the skills and knowledge they need to produce high-quality work. The other options are incorrect because they are not the most effective ways to address the situation. Organizing a team-building workshop may be valuable for "},{"q":"An organizational transformation project has two workstreams running in parallel between corporate headquarters and an overseas office. Before kick-off, the project manager is scheduled to meet the overseas office leader. What should the focus of the meeting be?","opts":["A.Informing the overseas office leader of the project's strategic value, key deliverables, and their expected involvement.","B.Reaching an agreement on the choice of procurement strategies to be employed by the overseas office.","C.Assisting the overseas office leader in communicating with the corporate headquarters staff about the project.","D.Identifying and assigning a subject matter expert (SME) to represent the project at the overseas office."],"correct":["A"],"explanation":"Since the meeting is scheduled before the project kickoff, it is important to set expectations with all parties involved by informing the overseas office leader about the project's strategic value, key deliverables, and expected involvement. This will help to ensure that the overseas office leader is fully informed and prepared to contribute and that everyone is on the same page and working towards the same goals. The other answer choices may occur after the project has been kicked off."},{"q":"The development of a final project schedule is delayed due to the inability to negotiate an agreement with one of the vendors needed for successful project delivery. What should the project manager do?","opts":["A.Circulate meeting minutes and discuss the agreed and outstanding clauses with the project team and customer.","B.Meet with the vendor to discuss a path forward and identify an alternative vendor if necessary.","C.Meet with the project sponsor and seek their support in replacing the vendor due to the inability to negotiate an agreement.","D.Communicate the project needs and influence the vendor to accept the terms as soon as possible for successful project delivery."],"correct":["B"],"explanation":"It is in the best interest of the project to come to terms with the vendor; if not able to do so, the project manager should look for alternative vendors. The other answer choices are incorrect. Circulating the meeting minutes does not address or resolve the issue. Meeting with the project sponsor and seeking their support in replacing the vendor is premature. It may be necessary in extreme cases, but it's typically a last resort. Trying to pressure the vendor does not guarantee a timely or satisfactory resolution."},{"q":"A project manager is working on a project to modernize a bank's information technology (IT) infrastructure. The project manager recently received approval of the project's change management plan from the project sponsor. The project sponsor now requests that the project manager implement a new piece of technology in the solution. What should the project manager do next?","opts":["A.Add the new technology as a risk in the risk register.","B.Submit a change request to the change control board (CCB).","C.Update the schedule and cost baselines with the new technology.","D.Request the project sponsor to procure the new technology."],"correct":["B"],"explanation":"When there's a proposed change to a project, such as implementing a new piece of technology, the change should be formally documented, evaluated, and approved or rejected through a change control process. The project manager should submit a change request to the CCB, which will then decide whether to approve or reject the change based on its impact on project objectives. The other options are incorrect because they do not align with the standard project management practice of addressing scope changes through a formal change control process. Adding the new technology to the risk register is inc"},{"q":"A company is creating a new application for its users. The agile team completed the initiating stage and is performing iterations to complete planning and execution. However, a stakeholder wants to change the order of the deliverables to demonstrate new aspects of the app to stakeholders. How should the project manager address this situation?","opts":["A.Include the stakeholder in sprint planning to ensure the right priorities are assigned.","B.Use key performance indicators (KPIs) to verify that the project is progressing on schedule.","C.Ask the stakeholder for a change request and submit it to the change control board (CCB).","D.Explain to the stakeholder that modifying the schedule now will increase the delivery risk."],"correct":["A"],"explanation":"In agile projects, there is an expectation that work will evolve and adapt. Sprint planning allows for evolution and changes based on stakeholder feedback and technological advances. The project manager should include the stakeholder in sprint planning to ensure that the right priorities are assigned and to address the stakeholder's request for a change in the order of deliverables. This can help to ensure that the project stays on track and that the stakeholder's concerns are addressed. The other options are incorrect. Using KPIs to verify that the project is progressing on schedule does not "},{"q":"A project has a budgeted cost of $120,000.\u00a0According to the schedule, 15% of the project should have been completed after one month. After a month, only 12% of the project has actually been completed. What is the scheduled performance index (SPI)?","opts":["A.0.6","B.0.8","C.0.9","D.1.25"],"correct":["B"],"explanation":"The planned value is: $120,000 * 15% = $18,000.\u00a0\nThe earned value is: $120,000 * 12% = $14,400.\nThe SPI is equal to the earned value divided by the planned value: SPI = EV / PV = $14,400 / $18,000 = 0.8.\nThis means that for every estimated hour of work, the project team is only completing 0.8 hours or 48 minutes.\nSince the SPI is less than 1 then the project is running behind schedule. If the ratio has a value higher than 1 this indicates the project is progressing well against the schedule. If the SPI is 1, then the project is progressing exactly as planned."},{"q":"A new agile team is forming and the project manager notices that the team is struggling in many areas. The team is experiencing both the inability to meet iteration commitments and team member conflicts. What should the project manager do next?","opts":["A.Involve management to help resolve the conflicts.","B.Inform management that commitments will not be met.","C.Raise the issues in the retrospective and propose solutions.","D.Coach the team both as a whole and individually."],"correct":["D"],"explanation":"The project manager should coach the team both as a whole and individually because coaching helps the team\u2019s performance get better, in a series of steps. The other answer choices are incorrect. Involving management is not going to help the team to meet the iteration commitment not resolve the conflicts. Informing management that commitments will not be met is not the best choice because as a project manager it is required to inform the management about missing the commitment, but in agile teams, coaching is the best thing to do instead of directly informing to the management. Raising the issu"},{"q":"Part of a project has already been delivered as planned and on schedule. However, unclear requirements for some of the remaining requirements may negatively impact the scheduled completion. How should the project manager approach the issue?","opts":["A.Prioritize the most important features and clarify the vague requirements.","B.Initiate a change request for project sponsor approval for a scope change.","C.Record the issue and escalate it to the steering committee for a decision.","D.Acquire additional resources to complete all of the requirements on time."],"correct":["A"],"explanation":"When facing unclear requirements and the risk of not meeting the original deadline, it's important to prioritize the most critical or important features or aspects of the project. This approach allows the project manager to meet the original deadline to the greatest extent possible while also delivering the most important features.\u00a0\nThe other options are incorrect.\nChanging the scope of a project should be considered after other measures have been taken to address the issue.\nEscalating the issue to the steering committee should be a last resort when other options have been exhausted.\nAcquiring"},{"q":"The government of a country intends to construct a multibillion-dollar railway across three major cities and hires a contractor to oversee construction. The project's design will be finalized within a few months of signing the contract, but the government has time constraints and expects the project to be completed within 24 months. The project manager wants to ensure a balanced distribution of risk between the government and the contractor. Which two techniques should be considered during the development of the project management plan? (Choose two)","opts":["A.Fixed-price increments","B.Not-to-exceed time","C.Early cancellation option","D.Dynamic scope option","E.Graduated time and materials"],"correct":["A","E"],"explanation":"A. Fixed-price increments E. Graduated time and materials Fixed-price increments and graduated time and materials can help to ensure that both parties are sharing the risk equally and can help mitigate any potential issues that may arise during the project. Fixed-price increments allow for the project to be broken down into smaller, more manageable pieces, with payment being made upon completion of each increment. This helps to ensure that both parties are sharing the risk equally. Graduated time and materials is a pricing model that allows for the project to be completed within a certain time"},{"q":"A project team is working on a complex technology project. A competitor introduces a product with a new feature, forcing the team to make changes to keep their product from becoming obsolete.\u00a0The software that the team was using was outdated and could not accommodate the development of the new feature and must be replaced with new-to-market software. The team is excited, but they do not have experience working with the new software. What should the project manager do to address this knowledge gap?","opts":["A.Train the team to use the new software.","B.Hire new team members with software knowledge.","C.Ignore the technological advancements.","D.Discuss the new product features with the competitor."],"correct":["A"],"explanation":"The project manager should provide training for the team to learn how to use the new software effectively. It is important to make sure project team members understand and can fulfill their roles and responsibilities. This includes identifying gaps in knowledge and skills as well as strategies to address those gaps through training. In this case, the software is outdated and must be replaced, so training should be provided to ensure that the team has the knowledge necessary for this and future projects.\nHiring new team members is incorrect for several reasons. Because the software is new to th"},{"q":"After the transition and completion of a large equipment installation project, the project manager receives a request from the customer to add some operational cost to the project budget for team-building activities. The project was completed under budget, project contingency reserves were not spent, and the team-building activities will ensure the operational team's optimal performance. What should the project manager do?","opts":["A.Reject the request and close the project financials.","B.Perform the integrated change control process.","C.Approve the expenditure to ensure customer satisfaction.","D.Document the request in the lessons learned repository."],"correct":["A"],"explanation":"The request should be declined as the project had been completed already and transitioned to the customer. Even if the project is in the close out phase the request should still be declined as the contingency reserves are not to be used for operational items and any other items that are not related to the project's success. Financials should be closed and the budget released to the organization for other business opportunities."},{"q":"During a weekly team meeting, the project manager reviewed task progress and found that a senior team member did not follow the plan. They performed tasks by personal preference, without communicating with the project manager. The senior team member is an expert and a critical resource for the project. How should the project manager address this?","opts":["A.Discuss this with the resource personally, then update the resource management plan if necessary.","B.Discuss this with the functional manager, then update the resource management plan if necessary.","C.Discuss this with the functional manager, then update the team charter if necessary.","D.Discuss this with the resource personally, then update the team charter if necessary."],"correct":["D"],"explanation":"To solve this issue, the first thing the project manager should do is talk to the resource instead of the functional manager to understand the reason and try to solve the problem before escalating. If the senior team member has a suggestion that is a better option for the project, then update the team charter if required. A team charter is a document that establishes team values, agreements, and operating guidelines."},{"q":"A project manager has been assigned to an existing agile team and is preparing for an upcoming project. The last project that the team worked on was so successful that a senior stakeholder requested that the team use the same governance structure for the new project. What should the project manager do next?","opts":["A.Consult with the project management office (PMO) to gain their insight on governance for the project.","B.Collaborate with the team and the senior stakeholder to discuss tailoring the existing governance.","C.Inform senior management that the same project governance can be used for the new project.","D.Request that the senior stakeholder discuss all governance-related concerns with the product owner."],"correct":["B"],"explanation":"The project manager should collaborate with the project team and the senior stakeholder to discuss tailoring the existing governance. This will help ensure that the governance is tailored to the specific needs of the new project while still incorporating successful elements from the previous project. Tailoring involves the analysis, design, and deliberate modification of project governance to make it more suitable for the given environment and the work at hand. Collaboration with the senior stakeholder and the project team is important to ensure that the governance structure is appropriate and"},{"q":"A construction company is implementing a new strategic project with a fixed budget. While monitoring the project, it was discovered that the overall project cost was increasing. The project manager learns that this is because the team is using more materials than detailed in the original scope. The cause of this discrepancy is that two of the team members are new to the organization and have not been reporting the acquisition of new materials. What should the project manager have done to prevent this situation?","opts":["A.Documented the risk of a materials cost deviation in the project's risk matrix.","B.Provided training on the material acquisition process and reporting requirements.","C.Created a contingency reserve to cover cost overages associated with materials.","D.Avoided the inclusion of new engineers on a strategic project with a fixed budget."],"correct":["B"],"explanation":"To prevent the team from using more materials than detailed in the original scope, the project manager should have provided training on the material acquisition process and reporting requirements. This would ensure that all team members understand the process for acquiring new materials and help prevent discrepancies or issues with the project's budget. In this situation, the problem is that the new team members are not reporting material acquisitions, indicating that they lack sufficient awareness and understanding of the proper procedures. The other answer choices are incorrect. Documenting "},{"q":"A project manager works in a matrix organization. Following a reorganization, several key project resources are reassigned to another project. The project no longer has the resources needed to successfully deliver the project. What should the project manager do?","opts":["A.Refuse to release the newly reassigned resources.","B.Review the communications management plan.","C.Review resource allocation and utilization plans.","D.Review resource needs with the functional manager."],"correct":["D"],"explanation":"In a matrix environment, the project resources are typically shared between multiple projects. The project manager should review the project's resource needs with the functional manager because the resources report to their functional managers. The project manager should explain the impact of reassigning the resources and work with the functional manager to minimize the impact of the resource reassignment. The other answer choices are incorrect. Refusing to release the reassigned resources is not feasible and is beyond the project manager's authority. Reviewing the communications management pl"},{"q":"A project team member informs the project manager that all items are complete and the team is ready to move on to the next iteration. The project manager reviews the iteration board and notices incomplete items. The iteration ends today, and the missed items will not be completed on time. What should the project manager have done to ensure that all of the iteration backlog items were completed on time?","opts":["A.Validated iteration backlog items using the definition of done (DoD).","B.Scheduled longer delivery timelines for project iteration cycles.","C.Requested that the team reports progress during daily standups.","D.Asked team members to demo their work as soon as it was ready."],"correct":["A"],"explanation":"Validating the iteration backlog items using the definition of done (DoD) is the best way to ensure that all of the iteration backlog items are completed on time. A DoD checklist lists all the criteria that are required for a deliverable to be considered ready for customer use. The team should regularly validate the iteration backlog items using the DoD established previously to avoid delays before the iteration ends. Before considering the iteration complete, the project manager should seek to confirm that all criteria are met. The other options are incorrect. Scheduling longer delivery timel"},{"q":"A project team has complete access to all project-related data, including visual data and information like the Gantt chart, prioritization matrix, story map, and other inputs. However, a project team member repeatedly requests more granular details on a work package than the Gantt chart indicates. The Gantt chart is confirmed to be comprehensive and\u00a0current, and the other project team members feel that the current Gantt chart is sufficiently detailed. What should a project manager do to address this situation?","opts":["A.Create a new communication channel with granular updates.","B.Ensure that the team member understands the granular information retrieval process.","C.Remind the project team member that the Gantt chart was the agreed format.","D.Continue to ignore the project team members' requests."],"correct":["B"],"explanation":"Visual data and information are artifacts that organize and present data and information in a visual format, such as charts, graphs, matrices, and diagrams. Visualizing data makes it easier to absorb data and turn it into information. Visualization artifacts are often produced after data have been collected and analyzed. A Gantt chart is a bar chart that provides schedule information where activities are listed on the vertical axis, dates are shown on the horizontal axis, and activity durations are shown as horizontal bars placed according to start and finish dates. The project manager should "},{"q":"A five-year highway construction project is in its third year of execution when the project manager receives a complaint from a local community group. The group is upset because they noticed that the path of the highway changed and now runs closer to their homes. This conflict has disrupted construction and put the project in danger. What should the project manager have done to avoid this issue?","opts":["A.Created a contingency plan to mitigate the impact of community opposition.","B.Established an internal review board to integrate quality assurance activities.","C.Held community meetings to keep stakeholders informed of progress and changes.","D.Ensured that the project planning was confidential and well-documented."],"correct":["C"],"explanation":"Open and transparent planning that engages internal and external stakeholders is vital. The project manager should have held community meetings to keep stakeholders informed of progress and changes to avoid the conflict that arose due to the change in the path of the highway. By holding community meetings, the project manager can address the concerns of the local community group and keep them informed of any changes or progress in the project. This can help to build trust and maintain a positive relationship with stakeholders. The other options are incorrect. Creating a contingency plan to mit"},{"q":"During initial project planning, a project manager was informed that a team member had been exclusively allocated to the project. Halfway through the project, the team member was assigned to another project. What should the project manager do?","opts":["A.Discuss the impacts on project delivery with the functional manager and develop an appropriate course of action.","B.Register this as a risk in the risk register and implement the appropriate response.","C.Ensure that\u00a0team members are cross-trained on all project tasks to increase the potential value of the project outcome.","D.Escalate this issue to the project sponsor to develop an appropriate course of action."],"correct":["A"],"explanation":"The impact of resource reallocation/reassignment should first be discussed with the functional manager. The project manager should meet with the functional manager to discuss the reasoning behind reassigning the team member to another project, the impacts associated with the change, and potential solutions. There is no way of knowing why the team member was transferred or how to proceed. It is possible that the functional manager mistakenly thought that the team member was no longer necessary, or it could be a response to a larger issue. Without a meeting to discuss this, there is no clear way"},{"q":"A project manager is working on an internal project and notes that the visions and goals of other department leaders are not clear. This creates confusion and ambiguity within the project team, and it is becoming difficult to distinguish between the wish list and scope items. Which document should the project manager review to clarify this situation?","opts":["A.Project Charter","B.Communications Management Plan","C.Risk Register","D.Stakeholder Engagement Plan"],"correct":["A"],"explanation":"The project manager should review the project charter. The project is likely to fail if the documented vision and goal are not clear either by team members or stakeholders. The reason the project exists is because it was signed off by the project sponsor and it has been in line with business strategies."},{"q":"During a software development project, the team realized that several features failed to comply with quality requirements. After receiving instructions to fix the issues, one team member becomes frustrated, claiming that unclear requirements are causing the issues. Other team members argue that negligent testing is the real cause of these issues. The testers blame poor coding quality. What should the project manager do?","opts":["A.Support the project team in a retrospective to identify the root cause of the quality issues.","B.Remove the most frustrated resource from the team as the confusion is impacting team motivation.","C.Perform a quality review in each stage of the development life cycle to identify quality issues.","D.Discuss the issue with the management team to identify possible solutions to improve quality."],"correct":["A"],"explanation":"The project team is initially responsible for conflict resolution, but the project manager can facilitate it when required. Retrospective meetings provide an opportunity for the project team to review how they work and to suggest changes to improve processes and efficiency. Retrospectives can be used to identify threats to performance, and project team cohesion, and to seek improvements. Facilitation helps the project team create consensus around solutions, resolve conflicts, and make decisions. The other answer choices do not promote the same level of collaboration and problem-solving within "},{"q":"The project manager of a software development project for a financial institution realizes that team members are unusually delayed on their assigned tasks. The project manager has not experienced this before on previous, similar projects. After further investigation, the project manager determined that the delays were linked to the recent resignation of an experienced team member. What should the project manager have done to avoid this situation?","opts":["A.Ensured there was a well-defined path to promotion.","B.Provided continuous guidance to project team members.","C.Identified competency risks and developed a mitigation plan.","D.Scheduled periodic training for all project team members."],"correct":["C"],"explanation":"The project manager can better prepare for circumstances like team members leaving by identifying\u00a0risks in advance and having a mitigation plan prepared. This is a proactive approach to ensuring that the impact of a team member's departure is minimized. The other options are incorrect. A well-defined path to promotion is not directly related to the risk posed by the resignation of an experienced team member. Providing continuous guidance is not enough to mitigate the risk of losing a key team member. Periodic training may not be enough to ensure that team members have the necessary competencie"},{"q":"A project manager is beginning a new financial software project in a very competitive environment. The regulations for compliance are clear, but the requirements are not clear. The customer stresses that they need results as soon as possible. Which implementation approach should the project manager choose for this project?","opts":["A.Repeating and refining project phases in multiple iterations.","B.Progressing through a linear sequence of stages.","C.Embracing change and focusing on delivering value.","D.Focusing on delivering the project in multiple increments."],"correct":["D"],"explanation":"Focusing on delivering the project in multiple increments is correct because it delivers value to the customer before the final project release. Incremental delivery ensures that the customer gets usable and valuable functionality early in the project. This aligns with the customer's desire for quick results and allows for their feedback to be incorporated. Since the requirements are unclear and the environment is competitive, getting feedback from the customer early will reduce rework, promote stakeholder involvement, and provide an early return on investment. The other options are incorrect "},{"q":"A client has contracted a company to manage a large project in an agile environment with many subcontractors. The client is giving direct orders to the subcontractors, rather than to the contractor's project manager. This has created conflict within the team. What should the project manager do to prevent this situation from occurring again?","opts":["A.Keep the team informed about client expectations.","B.Invite the client to the team planning meeting.","C.Tell the team to avoid conflicts with the client.","D.Ask the client not to give direct orders to the subcontractors."],"correct":["D"],"explanation":"The best way for a project manager to prevent a client from giving direct orders to subcontractors on an agile project with many subcontractors is to ask the client not to do so. This is the most direct and effective way to address the problem. The other answer choices are not as effective. Keeping the team informed about client expectations is\u00a0important, but it will not prevent the client from giving direct orders to subcontractors.\u00a0Inviting the client to the team planning meeting\u00a0can help to improve communication between the client and the project team, but it will not prevent the client fro"},{"q":"During the design phase, a project manager realizes that the project will benefit from using adaptive tools. The effectiveness of this approach has been proven in past projects inside the organization. What should the project manager do first?","opts":["A.Confirm team capabilities before introducing adaptive tools and artifacts to the project.","B.Contact the project sponsor and request new team members who are familiar with adaptive projects.","C.Freeze the design stage and look for an external resource to run iterative design at extra cost.","D.Update project documents to include adaptive tools and artifacts and plan the first iterative session."],"correct":["A"],"explanation":"The project manager should first confirm team capabilities before introducing adaptive tools and artifacts to the project. The other answer choices are incorrect because they are not the first steps. Without knowing if the team has capabilities to deal with adaptive tools, the project manager may compromise some aspects of the project without the need to do so. Also, it is part of the project manager responsibilities to guarantee that the team has the necessary training to perform their roles in the project."},{"q":"Critical project equipment is being produced by an overseas vendor. A quality survey revealed noncompliance with some of the project specifications. What should the project manager do next?","opts":["A.Assign project personnel to oversee the vendor's facility to ensure compliance with the specifications.","B.Review the production contract to determine if the referenced specifications were included.","C.Schedule a workshop with vendor representatives to provide an overview of the project specifications.","D.Schedule regular meetings with the vendor to personally control this situation."],"correct":["B"],"explanation":"The project manager should review the production contract to determine if the referenced specifications were included. The production contract is the legal agreement between the project manager and the vendor, and it should outline all of the project requirements, including the specifications for the equipment. Checking the contract would be the best starting point because if the specifications were not included in the contract, the vendor could not be held accountable for compliance. Assigning project personnel to oversee the vendor's facility is premature without first verifying the contract"},{"q":"During a project closing review meeting, the project manager notes that a software development task took longer to complete than was planned. Which action should the project manager take for continuous project improvement?","opts":["A.Update the performance data in the lessons learned register.","B.Update the risk register so the problem will not happen in the future.","C.Update the problem in the issue log and distribute it to the project team.","D.Update the communications management plan with\u00a0details of the problem."],"correct":["A"],"explanation":"The project is at the project closing phase, so the issue is documented in the lesson learned register for continuous project improvement. The other options are only employed in execution, not during closing."},{"q":"The execution of a construction project in a remote area requires team members to live together in corporate dormitories when they are required to be on-site. Several team members approach the project manager to complain about the way one team member behaves after work. They have expressed concerns that the behavior is negatively impacting team morale and cohesion. What should the project manager do to address this issue?","opts":["A.Call a meeting to discuss the problem with the team.","B.Plan a team-building session to discuss the problem.","C.Move the team member in question to a new dormitory.","D.Review the team norms and discuss this with the team."],"correct":["D"],"explanation":"Team agreements represent a set of behavioral parameters and working norms established by the project team and upheld through individual and project team commitment. After-work behavior can still affect the team and the project, especially if team members are required to live together in corporate dormitories. Even though the behavior takes place after work hours, it can impact the project if other team members see it as a problem. The project manager can set clear expectations for behavior and collaboration by reviewing and discussing team norms with the entire team, the project manager can s"},{"q":"A project manager is delivering a complex project for a client who has their own project manager. The client's project manager is the sole decision maker for the project but is not the delegated financial authority. For every financial decision, the client's project manager must seek approval from a higher authority. This additional step has caused significant impacts on resource management, cost, and time of project delivery. How can the project manager resolve this problem?","opts":["A.Raise this problem in the quarterly project status report.","B.Add the problem to the lessons learned report.","C.Escalate the problem to the project steering committee.","D.Discuss the problem with the client's project manager."],"correct":["C"],"explanation":"The steering committee is an advisory body that is made up of senior stakeholders and experts that provide guidance on a lot of different issues that could face companies and projects such as budgets, new endeavors, company policy, marketing strategies, and project management concerns. An authority issue should only be resolved by the steering committee. In this case, the project team cannot resolve this issue on their own, so the problem should be escalated. In this case, the client's project manager is not the delegated financial authority. The client's project manager must seek approval fro"},{"q":"In preparation for a meeting with the CEO of an organization, a project manager asks a team member to prepare a monthly report for the CEO. The CEO provided a specific format for these reports at the start of the project. The day before the meeting, the project manager reviews the report and discovers that it is not formatted as specified by the CEO. What should the project manager have done to avoid this situation?","opts":["A.Asked for the report from the team member earlier to ensure it was in the requested format.","B.Requested that the CEO provide more detailed format requirements for creating monthly status reports.","C.Used interactive communication to confirm that the team member acknowledges the specified format.","D.Modified the communications management plan to include the new report format requirements."],"correct":["C"],"explanation":"Effective communication fosters awareness of the ideas of others, assimilation of other perspectives, and collective shaping of a shared solution. The project manager should have confirmed that the information being communicated was clear and complete and was correctly interpreted. Using interactive communication allows for a two-way exchange of information and helps to ensure that the team member fully understands and acknowledges the specified format. The other answer choices do not directly address the issue of ensuring the report is in the correct format. In this case, the CEO has already "},{"q":"The project manager of an agile project notices that many stakeholders are skipping iteration planning and review meetings. Some stakeholders admit that they do not see the value of the meetings and prefer not to participate. The project is in danger of falling behind schedule due to the lack of stakeholder participation. What should the project manager do first to address this issue?","opts":["A.Review and update the communications management plan.","B.Identify gaps and mentor stakeholders on the iterative approach.","C.Record the iteration review and share it with stakeholders.","D.Build a RACI matrix and develop a training plan for stakeholders."],"correct":["B"],"explanation":"The stakeholders admit that they do not see the value of attending the meetings, which indicates that they do not have a comprehensive understanding of the iterative approach and the importance of attending iteration planning and review meetings. The project manager should identify the gaps in understanding and address those gaps through mentoring. The project is in danger of falling behind schedule, so the project manager must take a proactive approach to encourage active participation and improve the effectiveness of the project. The other answer choices don't directly address the immediate "},{"q":"An agile project manager is overseeing a Kanban project and wants to assess task completion roadblocks for an upcoming major milestone. What should the project manager do?","opts":["A.Create a performance metric using the work in progress limit.","B.Ask a trusted team member about the issues the team is facing.","C.Review the blocked items with the team during standup meetings.","D.Host a stakeholder meeting to discuss task completion roadblocks."],"correct":["C"],"explanation":"A kanban board shows work in progress to help identify bottlenecks and overcommitments, thereby allowing the team to optimize the workflow. The project manager should engage with the team during standup meetings to review progress and highlight any obstacles encountered or anticipated. Daily standup meetings are helpful in identifying blockers and impediments that could become threats if they continue to delay progress. The other answer choices are incorrect because they are not as effective. Creating a performance metric using the WIP limit will not reveal specific roadblocks or their underly"},{"q":"As agreed at the start of a predictive project, all outgoing information should be shared beforehand with the project manager. During the project, one of the team leaders communicated directly with the sponsor, bypassing the project manager. As a result, unfiltered information was conveyed to the sponsor, and important information from the team was not being shared with the project manager. What should the project manager do next?","opts":["A.Remind the team leader to always inform the project manager before providing information to stakeholders.","B.Talk to the team leader to find out if they have any personal issues with the project manager.","C.Modify the team's agreements to obtain project manager approval prior to sending out any communication.","D.Talk to the sponsor to find out what the team leader has shared with the sponsor directly."],"correct":["A"],"explanation":"The project team's ground rules, which state that the project manager should receive all communication, had been agreed upon beforehand, so the best action for the project manager to take is to personally remind the team member who violated a ground rule. Effective and efficient engagement and communication include determining how, when, how often, and under what circumstances stakeholders want to be\u2014and should be\u2014engaged. Toolbox"},{"q":"A project team, distributed across three different countries, is having a difficult time arranging meetings. The team members are also unclear about the project requirements and are having trouble getting their questions answered. What should be done to increase project success?","opts":["A.Work independently until it is necessary to integrate the work.","B.Review the communications management plan and increase information sharing.","C.Increase the frequency of team meetings to discuss any questions.","D.Bring questions to the functional managers to resolve issues across the team."],"correct":["B"],"explanation":"The project manager should review and improve the communications management plan to improve information sharing. The other answer choices are incorrect. These options do not increase project success since independent work is not efficient if members are unclear about the requirements; increasing the frequency of meetings is also not likely to help if there is stated difficulty arranging them; and raising questions to functional management may transfer the work to functional managers unnecessarily. When teams are virtual/distributed, increased documentation helps ensure that requirements are un"},{"q":"During a project review meeting, an end user reports that the personal computers supplied for testing are experiencing performance degradation. Which three immediate actions should the project manager take to address this issue?","opts":["A.Record the issue in the issue log.","B.Change the project scope.","C.Assign ownership for the issue.","D.Buy new personal computers.","E.Implement a resolution of the issue."],"correct":["A","C","E"],"explanation":"A. Record the issue in the issue log. C. Assign ownership for the issue. E. Implement a resolution of the issue. The project manager should update the issue log with information on the performance degradation issues, assign ownership, and take steps to resolve the issue. Recording the issue in the issue log creates a formal record of the problem, including its description, impact, and potential causes. Assigning ownership ensures accountability and clarifies who is responsible for addressing and resolving the issue. Implementing a resolution involves taking steps to address, resolve, and preve"},{"q":"A project manager has just received news that a new regulation has been adopted and the expectation is that the project will be delivered compliant with this new regulation. This was previously documented as a risk item with a low probability and a moderate impact. What should the project manager do first?","opts":["A.Revisit the risk register and update the rating and response.","B.Update the issue log and apply corrective action.","C.Revise the project management plan.","D.Initiate a change request for the updated regulation."],"correct":["A"],"explanation":"The project manager should first revisit the risk register and update the rating and response for the risk of the new regulation. The probability of the risk has now increased to 100%, as the regulation has been adopted. The impact of the risk may also have increased, as the project is now required to be compliant with the regulation. The other answer choices are not as relevant or effective. Updating the issue log and applying corrective action is not the first thing that the project manager should do. The project manager should first update the risk register to reflect the new information. R"},{"q":"During project execution, the project sponsor decides to replace a subject matter expert (SME) on the project. What should the project manager do?","opts":["A.Negotiate with the project sponsor to retain the SME on the project.","B.Ensure there is sufficient knowledge transfer between the SME and their replacement.","C.Indicate to the new SME that the project knowledge base has all needed information.","D.Meet with the project sponsor to explain the conflicts among the project team."],"correct":["B"],"explanation":"The project manager should ensure sufficient knowledge transfer between the SME and their replacement. Knowledge transfer is required when there is a change of SMEs. The question explains that the SME is being replaced, so the best option in this situation would be to ensure sufficient knowledge transfer between the original SME and the replacement. The other answer choices are incorrect. Relying only on a knowledge base might not be sufficient to transfer all the SME's project knowledge; meeting with the project sponsor may not always be the right option as it depends on the sponsor's reason "},{"q":"At the beginning of a project, the project manager meets the product owner and the business analyst to work on a requirements-gathering process to create the list of requirements, features, and product backlog. Which elements should be considered to ensure all user stories are well-written and sized correctly to allow for smooth agile project delivery? (Choose two)","opts":["A.Independent, negotiable, and estimatable","B.Unique, applicable, and replicable","C.Subdivisible, suitable, and considerable","D.Concise, detailed, and executable","E.Valuable, small, and testable"],"correct":["A","E"],"explanation":"A. Independent, negotiable, and estimatable E. Valuable, small, and testable In order to create good user stories, start by remembering to INVEST in good user stories. INVEST is an acronym that encompasses the following concepts which make up a good user story: Independent - stories should be as independent as possible. Negotiable - a story is not a contract. A story is an invitation to a conversation. Valuable - if a story does not have discernable value it should not be done. Estimatable - a story has to be able to be estimated or sized so it can be properly prioritized. Small - stories shou"},{"q":"A project manager has been assigned to a new, multimillion-dollar project that is similar to a project the company executed three years ago. What should the project manager do to create a reliable cost estimate?","opts":["A.Identify the critical parameters and generate an estimate based on the variation of the parameters.","B.Take the original estimate and multiply it by a factor determined by the company's standard for every year.","C.Use the actual cost of the previous project as a reference and compute an estimated cost for each task and roll up.","D.Use a commodity exchange for material cost and labor rates for the cost variation and compute a new estimate."],"correct":["C"],"explanation":"Using the actual cost of the previous project as a reference is the best choice as a bottom-up estimating method and is the most reliable. Bottom-up estimating is generally more accurate because it starts at the bottom with the detailed costs of all specific components of each work activity and progressively forms the sum of all costs used in estimating the overall project budget. Bottom-up estimating would be the logical step after a project deliverable has been broken into its smallest components or work activities and detailed information has been gathered regarding the requirements of each"},{"q":"A new program manager checks the status of a project. The forecast shows the project is slightly behind schedule. However, in reporting, the project manager stated that the project is on track. The program manager asks the project manager to explain the discrepancy. The project manager explains that the forecast discrepancy is due to\u00a0a new estimation technique. What should the project manager have done to avoid this discrepancy?","opts":["A.Asked the program manager to use the old forecasting technique","B.Educated the program manager on the new\u00a0forecasting technique","C.Aligned the project artifacts with the new estimation technique and provided them to the program manager","D.Ensured that the program manager has the necessary knowledge to understand estimation techniques"],"correct":["C"],"explanation":"In this case, the project manager used a new forecasting technique but did not update the basis of forecasting.\u00a0Thus the discrepancy between the project manager's\u00a0and the new program manager's understanding of the forecast.\u00a0The project manager should have aligned the project artifacts with the new estimation technique and provided them to the program manager. This would have ensured that the program manager had access to the updated project artifacts reflecting the new estimation technique. This would have provided accurate and consistent information for the program manager to assess the proje"},{"q":"An external stakeholder has a significant impact on the project, as they have the ability to approve or reject changes to the project scope, timeline, and budget. What approach should the project manager take with this stakeholder?","opts":["A.Communicate with the stakeholder according to the stakeholder engagement and communications management plans.","B.Request feedback from the stakeholder so that the project meets the stakeholder's expectations and can be delivered as planned.","C.Add the stakeholder to the risk register and quantify the level of impact that the stakeholder could have on
