 the project goals.","D.Inform the stakeholder of the key project benefits and keep them updated on the project's progress and milestone achievements."],"correct":["A"],"explanation":"Managing stakeholder engagement helps to ensure that stakeholders clearly understand the project goals, objectives, benefits, and risks for the project, as well as how their contribution will enhance project success. Effective stakeholder engagement will help to ensure that the stakeholder is kept informed of the project's progress, has the opportunity to provide feedback, and is able to raise concerns. The other options are incorrect because they are not as effective or comprehensive."},{"q":"A company is transitioning from a predictive to an agile project management approach. The project manager has noticed that team members have valuable ideas on how to improve productivity. How can the project manager leverage these ideas?","opts":["A.Make use of project retrospective sessions for discussions and learning.","B.Use iteration planning to discuss and adopt new ways of working.","C.Develop and share guidelines for team training and mentoring.","D.Engage with the product owner to facilitate\u00a0fast-tracking of the transition."],"correct":["A"],"explanation":"Project retrospective sessions are a key tool for continuous improvement in agile project management. They provide an opportunity for the team to reflect on the previous sprint, identify areas for improvement, and develop a plan to address those areas in the next sprint. In this case, the project manager can use the retrospectives to collect ideas from the team on how to improve productivity in the new agile environment. The project manager can then work with the team to develop and implement a plan to implement these ideas. The other answer choices are not as relevant or effective. Iteration "},{"q":"A firm is currently facing a cost overrun and needs liquidity to overcome the financial crisis. A critical project is underway and is expected to bring a reasonable monetary return for the firm, yet, the project is over budget. Senior management needs to assess the project's alignment with organizational objectives and requests that the project manager provide a report on the matter. What should the project manager do to prepare a report for management?","opts":["A.Examine and evaluate documents to gain insights and extract meaningful information.","B.Compare actual results to planned ones by analyzing the differences between actual performance and budgeted values.","C.Identify and analyze patterns, tendencies, or changes in data over a specific period of time.","D.Assess the economic feasibility of the project, by comparing the costs with the benefits expected by senior management."],"correct":["B"],"explanation":"The project manager should compare the actual results of the project to the planned ones by analyzing the differences between actual performance and budgeted values. Comparing actual results to planned ones allows the project manager to assess the project's financial performance and understand where it deviates from the budgeted values. Once the project manager has identified the specific areas where the project is over budget and the root causes of these overruns, they can develop recommendations for addressing these problems and getting the project back on track.\nThe other options are incorr"},{"q":"For an agile project, some team members have other commitments or responsibilities. The project manager faces the challenge of not having a team that is fully dedicated to the project. How should the project manager ensure good velocity, cycle duration, and on-time iteration completion with a non-dedicated team? (Choose two)","opts":["A.Tell team members to log their time to guarantee that they prioritize their time effectively.","B.Request that the product owner and stakeholders provide cross-functional team members.","C.Get buy-in from the product owner and stakeholders for obtaining full-time team members.","D.Revisit the resource log to ensure the most skilled resources are on the project.","E.Deploy additional team members, irrespective of the story points or iterations."],"correct":["B","C"],"explanation":"B. Request that the product owner and stakeholders provide cross-functional team members. C. Get buy-in from the product owner and stakeholders for obtaining full-time team members. Dedicated team members are highly recommended in agile project development. The project manager should work with the product owner and stakeholders to communicate the importance of cross-functional and full-time team members. The other answer choices are incorrect. Telling members to log their time does not guarantee that the team member will prioritize their time effectively. Revisiting the resource log does not d"},{"q":"During the last five daily standups, one team member on a hybrid (predictive-agile) project has been vague about what they have accomplished and what they are planning to accomplish. What should the project manager do?","opts":["A.Meet with the team member to ensure that they have a clear understanding of what is expected of them.","B.Review the issue in the next retrospective meeting and determine what corrective action should be implemented.","C.Raise the issue of task accountability with the team and stakeholders at the next iteration review meeting.","D.Facilitate a meeting with the entire team and stakeholders to review the risks and impediments faced by the project."],"correct":["A"],"explanation":"In this case, the team member has been consistently vague, so the project manager needs to address this issue directly with the team member. Meeting with the team member can help clarify expectations, enforce the importance of clear communication, and expose any obstacles or challenges the team member might be facing. The meeting can also be an opportunity for the project manager to provide coaching and support to the team member. The other options are incorrect because they are not the most appropriate and effective approaches. Waiting until the retrospective allows the issue to continue for "},{"q":"A project manager has developed a schedule for a project involving various departments. The project manager met with each team member to develop a work breakdown structure (WBS). However, after the WBS was finalized, the project manager discovers that some tasks are redundant. What should the project manager have done to avoid this issue?","opts":["A.Enlisted\u00a0subject matter experts (SMEs) to provide scheduling guidance.","B.Organized group sessions for all team members to review the WBS together.","C.Improved the communication channels with all team members.","D.Prepared a task assignment matrix to represent the WBS."],"correct":["B"],"explanation":"All the project planning activities should be discussed during the joint planning sessions. During these sessions, team members will share their approaches and this will minimize activity overlap, and increase awareness among the team members. The other options are not as effective at avoiding redundant tasks. Enlisting SMEs, improving communication channels, and/or preparing a task assignment matrix can be part of the solution, but organizing group sessions to review the WBS is a more direct and effective way to pinpoint and avoid redundancy issues."},{"q":"Although a project is performing within its time, scope, and budget constraints, the project manager learns that the project sponsor is unhappy with its progress. What should the project manager have done to avoid this situation?","opts":["A.Conducted frequent reviews and assessments to identify and address any potential\u00a0risks.","B.Aligned project objectives with the expectations and requirements of the project sponsor.","C.Communicated regularly with the project sponsor to provide updates and address any concerns.","D.Implemented strict control measures to ensure that project milestones and deliverables are met."],"correct":["C"],"explanation":"The project manager must communicate with the project sponsor effectively. The sponsor provides resources and support for the project and is accountable for enabling success. Without regular communication, the project manager can not ensure that the sponsor is sufficiently informed and engaged. In this case, the sponsor is unhappy despite the project's performance, so the source of the dissatisfaction is not known. If there was open and ample communication between the project manager and the sponsor, the project manager would have known that the sponsor was unhappy and could have addressed the"},{"q":"Team members are transferred from a predictive project to a newly formed agile team. The new team members are expressing dissatisfaction about the additional training they are required to complete in the internal project team chat channel. How should the project manager address this situation?","opts":["A.Ignore the complaints and assume that the new team members will adapt over time.","B.Schedule a meeting to discuss the concerns and provide clarity on the training's importance.","C.Remove the additional\u00a0training requirement to alleviate team members' dissatisfaction.","D.Send a memo outlining the mandatory training and consequences for non-compliance."],"correct":["B"],"explanation":""},{"q":"During a final inspection of a new product, the project team discovers a significant defect in one of the key deliverables. This defect poses a security risk to the client, who expects to start using the deliverable in two weeks. What should the project manager do?","opts":["A.Conduct a quality investigation and initiate corrective action.","B.Use the contingency reserve to cover the cost of the defect.","C.Meet with the client to explain the cause of the defect.","D.Send the client a letter apologizing for the inconvenience."],"correct":["A"],"explanation":"The most appropriate approach is to assess the situation to identify the root cause of the defect and take corrective action. In this case, key deliverables fail to reach quality standards, pose a security risk to the client, and were discovered late in the product lifecycle, so the initial response should be to assess and resolve the issue quickly. In doing so, the project manager prioritizes the client's interests, safety, and project success. The other options are incorrect because they are less effective and should not be the project manager's first step. Using the contingency reserve is p"},{"q":"A customer has rejected an interim project deliverable. What should the project manager do?","opts":["A.Review the reason for the rejection, and check the deliverable against its acceptance criteria.","B.Analyze the customer requirements, and rework the deliverable to an acceptable quality.","C.Create a deliverable improvement plan, and implement it for the remainder of the project.","D.Document the rejection of the deliverable in the Lessons Learned log, and review it with the project delivery team."],"correct":["A"],"explanation":"The reason for customer rejection needs to be established and verified, whether valid or not. This can be done by reviewing the acceptance criteria of the deliverable. The other answer choices are incorrect. Reworking the deliverable, creating an improvement plan, and adding a Lessons Learned entry are premature, as the customer rejection must be investigated first."},{"q":"A project manager is working on a global project with team members in several different countries. To manage communications, the project manager plans to hold virtual meetings and on-site visits once a month. What should the project manager do next while working with this team?","opts":["A.Ask the IT manager of each site to manage the technical components of the virtual meetings.","B.Request the team members' r\u00e9sum\u00e9s and become familiar with the teams' experiences.","C.Propose and establish a team charter with the rules and principles to be followed.","D.Request the budget for weekly in-person meetings with the entire team to allow for direct contact."],"correct":["C"],"explanation":"The next thing the project manager should do is establish a team charter. The team charter is a document that establishes the team values, agreements, and operating guidelines. The project manager can use this document to solve or avoid problems in the team. Facilitating project team communication, problem-solving, and the process of coming to a consensus may include working with the project team to develop a project team charter and a set of operating guidelines or project team norms. The other answer choices are incorrect. The team has already been established so their resumes would have alr"},{"q":"During a multidisciplinary project, a project manager learns that there are many conflicts about design among team members from different disciplines. What should the project manager do to ensure the smooth delivery of the project?","opts":["A.Identify the matter as a risk and check available budget reserves.","B.Ensure that the project sponsor is aware of the current situation.","C.Escalate to functional managers and seek resolution.","D.Facilitate team discussions to achieve the desired results."],"correct":["D"],"explanation":"The project manager must be proactive and facilitate the resolution of any conflict within the multi-disciplinary project team. The project manager should\u00a0work to achieve a consistent view of the project vision and its expected results, and use this to bridge any differences and bring the team together. A common goal that everyone understands and considers meaningful is essential to a smoothly working team. The other answer choices are incorrect. Identifying the matter as a risk or notifying the sponsor does not solve the problem; escalating the matter to functional managers is not correct, as"},{"q":"A developer has completed the deliverable for a feature. The product owner is not sure how to assess the quality of the deliverable. Considering that the project is using an agile approach, what kind of tool or technique should the product owner use?","opts":["A.Expert judgment","B.Decision making","C.Demonstrations/reviews","D.Checklists"],"correct":["C"],"explanation":"Demos or reviews is a part of every agile sprint that helps the product owner or customer to gain visibility on the development progress and provide feedback that facilities the team to make appropriate changes early in the project. Hence this option is the correct answer. Expert judgement, decision making and checklists are techniques that are generally a part of predictive project management approaches and hence is irrelevant in this scenario. As a result, these options are incorrect."},{"q":"During the course of a project, the team has to address unexpected issues that may impact the schedule and budget. Many of the issues require immediate resolution before other interdependent issues can be addressed. The communication management plan indicates that the client and key internal stakeholders only require monthly reports. How should the project manager communicate the impact of these issues?","opts":["A.Update the project issue log to ensure the communication issues are captured internally.","B.Maintain monthly client and internal stakeholder reports as indicated in the communications management plan.","C.Increase communication with the client and stakeholders as necessary to manage the issues and their impact.","D.Revise the communications management plan and request approval of the revised plan."],"correct":["C"],"explanation":"Issues impacting cost and schedule should be communicated as soon as they\u00a0are identified, regardless of the stipulations of the communications plan. The project manager must adjust communications to ensure that the appropriate parties are appraised of the situation and can address the issues as soon as possible. This is especially important in this situation because many of the issues require immediate resolution before other interdependent issues can be addressed. The other options are incorrect. Recording the issue with the communications plan internally is not helpful because it does not re"},{"q":"An experienced project manager joins an ongoing project and wants to estimate the amount of time required to tackle several complex tasks. The team uses a kanban board but is open to new approaches. The project manager suggests using story points. What is the first thing the team should do before implementing this new approach?","opts":["A.Calculate the story points only for new backlog items.","B.Estimate the story points required for the entire task board.","C.Convert all work in progress (WIP) items to story points.","D.Measure and track story points over several sprints."],"correct":["C"],"explanation":"The first thing the team should do before adopting the new approach of using story points is to convert all work in progress limits to story points. A WIP item is any task or activity that is currently being worked on by a team or individual. WIP items can be converted to story points in order to help the team better understand the scale used to quantify effort. By converting WIP items to story points, the team can estimate how many story points they can complete in a sprint and determine how many sprints it will take to complete all work. The other options are incorrect. Calculating story poi"},{"q":"During a retrospective meeting, some team members expressed that they strongly disagree with how the product owner and scrum master handled some issues related to the scope of the last cycle. What should the project manager do first?","opts":["A.Review the backlog with the product owner to ensure the scope is appropriate.","B.Collect all available information from the team and address the problem.","C.Schedule a meeting with the specific team members to discuss the issue.","D.Discuss the team's concerns with the product owner and the scrum master."],"correct":["B"],"explanation":"Project managers realize that conflicts are inevitable, but that good procedures or techniques can help resolve them. Once a conflict occurs, the project manager must first collect all available information from the team, study and address the problem, develop a situational approach or methodology, and set the appropriate atmosphere or climate. The other answer choices are incorrect because they are not the first thing the project manager should do. The project manager needs to first understand the root cause of the conflict before they can start to develop a solution. It is important to inclu"},{"q":"A project manager is overseeing a procurement project for a company that has a dedicated procurement management team that handles all contracts. The quarterly report identifies six contracts that do not align with the company's objectives. What will be the most suitable action for the project manager to take?","opts":["A.Keep the six contracts despite their misalignment.","B.Suggest terminating all contracts that are misaligned.","C.Ask the project sponsor to revise the contracts.","D.Request that the customer revise the contracts."],"correct":["B"],"explanation":"The project manager should recommend terminating all six contracts that do not align with the company's objectives. Keeping these contracts could lead to wasted resources and potentially harm the company's overall goals.\nThe other options are incorrect.\nKeeping all six contracts ignores the misalignment with the company's objectives.\nThe procurement management team handles all contracts, so it would be inappropriate to ask the client or the sponsor to revise contracts. The decision to revise contracts is the responsibility of the procurement management team. Revisions may not be possible or gu"},{"q":"The project manager needs to survey the necessary parties to reach a consensus and build a common vision for the project. To achieve better results, who should be engaged in the development of a common vision strategy?","opts":["A.The client and the delivery team","B.The delivery team and the project sponsor","C.The project team and the stakeholders","D.The project owner and the client"],"correct":["C"],"explanation":"The project manager should engage the project team and the stakeholders when developing a common vision strategy because the team members must carry out the tasks that impact the stakeholders. The project manager must balance the conflicting and competing goals of the project stakeholders in order to achieve consensus. In this context, consensus means that the relevant stakeholders support the project decisions and actions taken by the team members. Also, involving stakeholders during initiation creates a shared understanding of success criteria. It also increases the likelihood of accepting t"},{"q":"A virtual team is midway through a sprint of a complex task and is ahead of schedule. During the daily standup,\u00a0a new team member interrupts and asks everyone to describe what they worked on prior to the current sprint. How should the project manager handle this situation?","opts":["A.Thank the new team member for their interest and direct them to the project documentation.","B.Explain to the new team member that the daily standup is not the best time for this discussion.","C.Request the new team member leave the meeting for interrupting the daily standup.","D.Ask all team members to list their completed tasks prior to the current sprint."],"correct":["B"],"explanation":"To ensure that the daily standup is productive and efficient, the project manager should be polite and understanding and explain to the new team member that\u00a0the daily standup is not the best time for this discussion. After the meeting, the project manager\u00a0can later schedule a time to discuss the new team member's role, all prior work, and help the new team member get up to speed on the project.\n\nThe other answer choices are incorrect.\u00a0Thanking the new team member and directing them to the project documentation is not helpful if they are not familiar with the documentation. Requesting the new t"},{"q":"A project manager is leading a complex software development project. The project team cannot agree on which process to use when solving a specific problem. What approach should the project manager take to help bring the team to consensus?","opts":["A.Exert expert authority and define the path forward for the team.","B.Update the responsible, accountable, consult, and inform (RACI) matrix and assign the work to a different team.","C.Assign a new team lead who has experience in solving similar software development problems.","D.Facilitate a meeting and encourage team members to come up with potential solutions."],"correct":["D"],"explanation":"The best option is to facilitate a meeting with the team to work out the solution. A collaborative approach not only inspires creative problem solving but also fosters team member engagement and participation. The other options are less than ideal as they do not promote team work."},{"q":"A hybrid project is using an iterative design process for product development. However, there are separate teams for design and execution, which is causing concerns. What should the project manager do to address these concerns?","opts":["A.Establish a centralized repository for project documentation and product validation.","B.Request that the design team be made responsible for project execution as well.","C.Communicate to the project management office (PMO) that a hybrid approach is too risky.","D.Enhance team skills by providing training on an adaptive project management framework."],"correct":["A"],"explanation":"The project manager should establish a centralized repository for project documentation and product validation to address concerns caused by separate teams for design and execution. This will allow for knowledge transfer and foster a collaborative working environment. The other options are incorrect. Requesting that one team be responsible for both development and execution may not be feasible and may not improve the chances of success. Enhancing team skills by providing training on an adaptive project management framework may not be necessary if the teams are already skilled in working with h"},{"q":"As part of the project sprint review, stakeholders appear uninformed and are unable to agree on how to move the project forward. What should the project manager do first to ensure stakeholders are able to approve the project deliverables?","opts":["A.Check the communications management plan.","B.Perform a systemic stakeholder analysis.","C.Include the stakeholders in daily standup meetings.","D.Colocate the team to guarantee better teamwork."],"correct":["A"],"explanation":"The stakeholders appear uninformed, indicating that their needs are not being met or are not fully understood. The project manager should review the project communication plan first to determine why the needs of the stakeholders are not being met. Since the communication plan is developed at the beginning of the project and is based on the needs of the stakeholders, during the course of the project it would be important to first review the plan to ensure it is sound and adjust as needed. Colocating the team may not be feasible and does not address the communication gap. Including the stakehold"},{"q":"On an agile project, a team member has been taking smaller, easier user stories from the backlog, not those with the highest priority. How should this be addressed?","opts":["A.Remind the entire project team that the highest priority user stories need to be taken from the backlog first.","B.Instruct the team member to select larger and more challenging user stories in the subsequent iterations.","C.Meet with the team member to understand why they pick easier stories and tailor the workload approach as needed.","D.Retrain the team member on the core technologies used to build the product to address the skill gap."],"correct":["C"],"explanation":"The project manager needs to understand the root cause before taking action. The root cause could be related to workload, skills, or other factors, so the project manager should not take action without first assessing the issue. In agile project management, it's essential to promote open communication, collaboration, and a deeper understanding of team dynamics to address issues effectively. The other answer choices are incorrect because they suggest that the project manager should take action without first assessing the issue."},{"q":"An agile project is in the first of six iterations. The team is located globally, so the meetings are in a virtual environment. After the fifth daily meeting, the project manager realizes that not all members are actively participating. What should the project manager do?","opts":["A.Ask the team members why participation is lacking.","B.Engage and guide the team to encourage all members to participate.","C.Ask each team member individually to participate in future meetings.","D.Allow the team to find their own way to fully participate."],"correct":["B"],"explanation":"The project manager should engage and guide the team to encourage all members to participate. The project manager has to be sure that the environment can accommodate member participation."},{"q":"The leadership team of a company asked a project manager for an ad-hoc status update on the latest iteration of a project. The project manager directed the leadership team to the project folder. The leadership team informed the project manager that some information was missing. What should the project manager have done to avoid this situation?","opts":["A.Told the team to review the folder before sharing it and add\u00a0the missing information.","B.Scheduled a team meeting to discuss the missing information with the leadership team.","C.Inspected the project folder carefully before sharing it with the leadership team.","D.Updated the project folder regularly to ensure project artifacts were always current."],"correct":["D"],"explanation":"The project manager can minimize the risk of missing information when providing status updates to the leadership team by\u00a0consistently\u00a0updating the project folder to ensure that all relevant information is up to date. The other answer choices are less effective or efficient in preventing missing information. Asking the team to add missing information before sharing the folder is not a reliable solution, as the team may not always be able to identify missing information. Scheduling a team meeting to discuss the missing information with the leadership team is reactive and does not directly addres"},{"q":"A project manager has a new project. The work breakdown structure (WBS) and sequence of activities have been defined, but the team has difficulty estimating the duration of each activity. Which approach should the project manager take to ensure the estimates are reliable?","opts":["A.Ask each team member to estimate the duration of each activity.","B.Consider the project schedule constraints and estimate the activities accordingly.","C.Access performance records of similar, past projects and use them as a reference.","D.Consult other project managers for the duration estimate of each activity."],"correct":["C"],"explanation":"Making all your members estimate each activity will not be effective unless all your members are expert. It will not be a reliable approach to do bottom-up estimation as well. The best approach is to check with the PMO records of past similar projects and use them as reference. PMBoK Sixth Edition in Chapter 5 and 6 states: \"5.4.3.1 SCOPE BASELINE The scope baseline is the approved version of a scope statement, WBS, and its associated WBS dictionary, which can be changed only through formal change control procedures and is used as a basis for comparison. It is a component of the project manage"},{"q":"A project manager is assigned to take over an ongoing project. During the quality review, the team discovered that 40% of the deliverables have defects and require rework, with an expected worsening trend. What should the project manager's first step be?","opts":["A.Evaluate the cost of the rework.","B.Review the quality management plan.","C.Review the user stories.","D.Perform a root cause analysis."],"correct":["D"],"explanation":"The first step should be to perform a root cause analysis since the defects identified are expected to increase over time. A root cause analysis is used to determine the underlying cause of variance, defect, or risk. This would allow the project manager to identify the root causes of the defects in the deliverables. The project manager can use the findings of the root cause analysis to identify and implement corrective actions to prevent similar defects from occurring in the future. The other answer choices should not be done until the root cause analysis has been completed. The project manage"},{"q":"A developer is expressing concerns about the time spent on daily standups, updating stories, creating tasks, and reviewing dependencies between stories instead of developing code. Other team members support the comment. What should a servant leader do next?","opts":["A.Ask for suggestions on how to manage their time more effectively.","B.Reduce the interactions among team members to increase development time.","C.Explain the definition of an information radiator to the project team.","D.Acknowledge the developer's frustration and emphasize the benefit of each activity."],"correct":["D"],"explanation":"A key role of a servant leader is to coach the team in agile practices and highlight the benefits of each activity and agile ceremony and how they can help the team complete their tasks faster. This can lead to increased motivation and productivity, as the team sees how their work contributes to the overall success of the project. The other answer choices are incorrect. A servant leader encourages the team to interact to find effective solutions that can reduce the development time. The scrum master is the master of all Scrum practices and asking the team for suggestions is inappropriate. Expl"},{"q":"During the planning phase of a project, the project manager is having trouble identifying stakeholders. Without input from the correct stakeholders, getting user feedback will be challenging. What should the project manager do?","opts":["A.Review the stakeholder engagement plan.","B.Inform the project sponsors.","C.Refer to the project charter to identify stakeholders.","D.Review the project scope document."],"correct":["C"],"explanation":""},{"q":"During product demonstration, a stakeholder suggests that the product does not meet expectations. What artifact should the project manager use to assess the stakeholder's suggestion?","opts":["A.Minimum viable product (MVP) description","B.Definition of done (DoD)","C.Definition of ready (DoR)","D.Acceptance criteria on the user story"],"correct":["D"],"explanation":"The project manager should use the acceptance criteria on the user story to assess the stakeholder's suggestion. The acceptance criteria are the specific requirements that must be met for the product to be considered complete and acceptable to the stakeholder. They are typically defined in the user story, which is a short description of a feature or functionality that the product must have. The other answers are incorrect. The definition of done (DoD) and definition of ready (DoR) are also important artifacts, but they are more general in nature. The DoD defines the criteria that must be met f"},{"q":"In an ongoing project, performance is continuously evaluated to determine benefits. Which two actions should the project manager do at the beginning of the project? (Choose two)","opts":["A.Ensure approval of the performance parameters with the stakeholders.","B.Hold regular meetings with all of the stakeholders.","C.Agree on the requirements for measurement tracking.","D.Review the project administration on a regular basis.","E.Simulate and predict the performance parameters for key stakeholders."],"correct":["A","C"],"explanation":"A. Ensure approval of the performance parameters with the stakeholders. C. Agree on the requirements for measurement tracking. All parties having a stake in the project must agree and sign off on the metrics for measurement of the project performance. The correct answers reinforce this by ensuring approval of the performance parameters with the stakeholders and agreeing on the requirements for measurement tracking.\u00a0These two actions are important because they ensure that everyone is on the same page about how the project's performance will be evaluated. This can help to avoid any disagreements"},{"q":"In the middle of a project, the project manager realizes that a specific set of skills is needed to complete project development. Unfortunately, none of the team members possess the necessary skills. What is the first step the project manager should take to address this issue?","opts":["A.Reorganize the project team to include people with the necessary knowledge and skills.","B.Review the timeline and budget to consider training, outsourcing, or other alternatives.","C.Organize adequate training for the project team to close the knowledge gap.","D.Search for alternative ways to achieve project objectives without the required skills."],"correct":["B"],"explanation":"Reviewing the timeline and budget to address the knowledge gap will help\u00a0to ensure that the project stays on track and meets its objectives. This can help prevent delays, cost overruns, and other issues that may arise due to a lack of necessary knowledge and skills. Reviewing the timeline and budget can help determine the best approach for addressing the knowledge gap, whether it be through training, outsourcing, or other alternatives. The other options are incorrect. Reorganizing the project team to include people with the necessary knowledge and skills may not be feasible or practical Search"},{"q":"During the testing phase of a technical project, the project manager discovers some issues with the final product and subsequently learns that after negotiations, important product features were excluded from the contract's scope in an effort to minimize costs for the client. What should the project manager do to resolve the issue?","opts":["A.Escalate the issue to the sponsor to make a decision to redefine the scope and solve the problem.","B.Work with the client to negotiate and ensure the inclusion of the missing crucial features in the project.","C.Continue with the project as planned and register the contract scope issue in the issue log.","D.Review the lessons learned to find a solution for contract negotiation and scope issues."],"correct":["B"],"explanation":"In this case, the project manager has discovered a deficiency in the scope and needs to remedy it, which includes informing the client and negotiating a strategy for the client to deliver the product with the important features. Negotiating with the client to include the missing features is a proactive and collaborative approach to resolving the problem. The other answer choices are incorrect. Escalating the issue to the sponsor is not the best course of action at this stage, as the project manager should take a more proactive approach before escalating the issue. Adding the issue to the issue"},{"q":"A new project manager is assigned to an ongoing agile project. The project is now starting its second 4-week iteration cycle. The project manager finds there are significant differences of opinion within the project team, leading to major setbacks for the project. What should the project manager do in order to help overcome differences and bring the project back on track?","opts":["A.Promote conversation among team members in upcoming review meetings to help solve the problem.","B.Schedule a team out activity to allow people to know each other better and feel comfortable talking.","C.Allow the team to self-organize before the next iteration to solve the problem.","D.Reach out to their functional managers so they can talk to the team members and solve the problem."],"correct":["A"],"explanation":"Conflict is an inevitable consequence of team interaction. The project manager should take a proactive approach to resolve this conflict. Servant leaders promote collaboration and conversation within the team and between teams. The other answer choices are incorrect because they do not fully address the problem and suggest a project manager is not proactively involved in conflict resolution and promoting cohesion. The project manager needs to ensure that they work with the team to promote\u00a0understanding, facilitate conflict resolution,\u00a0and address the issues to address the project setbacks."},{"q":"A team is transitioning from a predictive to an agile approach. Which two obstacles are\u00a0the team most likely to encounter? (Choose two)","opts":["A.Management provides freedom for the team to decide.","B.Management continues to control the processes of delivery.","C.Management would like the team to learn and adapt.","D.Management support is lacking for team empowerment.","E.Management expects the team to keep their performance level."],"correct":["B","D"],"explanation":"B. Management continues to control the processes of delivery. D. Management support is lacking for team empowerment. During the transformation from a predictive to an agile approach, the common impediments the team will face are the lack of empowerment and the management style of controlling the process of delivery. A significant part of any Agile transformation is enabling an organization to move away from a command and control culture to an environment that is more focused on collaboration and cultivation. Transitioning from predictive development approaches to adaptive approaches and then t"},{"q":"A customer is performing a weekly visit to a project site to inspect the final stage of product development. The quality manager alerts the project manager that the customer has been very unprofessional and reprimanded the team members during previous weekly visits. What should the project manager do to address this incident?","opts":["A.Draft a letter complaining about the behavior of the customer inspector.","B.Allow the week to pass by, then send a complaint to the customer.","C.Discuss the matter with the project manager's senior management team.","D.Understand the situation by speaking with the team members and the customer."],"correct":["D"],"explanation":"The project manager should attempt to resolve the conflict by defining the problem, collecting facts, analyzing the situation, and selecting the most appropriate course of action. The other answer choices are incorrect because they are reactions to an issue that may not be fully understood without the input of the team and the client. Toolbox"},{"q":"During a standup meeting, the project manager discovers that one of the software developers is struggling to complete work because they lack experience with automation testing, potentially affecting the sprint goal. A quality assurance engineer on the team has automation testing experience but is busy preparing a presentation for new employees. What action would increase the chances of achieving the sprint goal?","opts":["A.Reassign the automation work to the engineer as soon as the presentation is finished.","B.Immediately train the software developer on automation testing and then proceed with testing.","C.Ask the quality assurance engineer to assist the software developer as soon as possible.","D.Reschedule the automation testing for when the quality assurance engineer is available."],"correct":["C"],"explanation":"Asking the quality assurance engineer to assist the software developer as soon as possible can increase the chances of the sprint goal being achieved. To address this issue efficiently, it's crucial to provide timely assistance. By asking the quality assurance engineer to assist the software developer, the team can leverage the engineer's expertise in automation testing, leading to more efficient problem-solving and task completion. The other answer choices are incorrect in this context. Reassigning the work or rescheduling the automation testing may introduce delays or may cause possible rese"},{"q":"In the middle of a release, the project manager is replaced. Feedback provided by the team to the new project manager hinted at team friction caused by the previous project manager's constant demands for rapid delivery. What approach should the new project manager adopt to quickly establish credibility with the team?","opts":["A.Do what the team needs to be done, maintain the action log, and provide feedback.","B.Help the team succeed with excellent service, on-time commitments, and an adequate budget.","C.Assess the culture of the team, and observe and interact with them.","D.Have the team explain what is needed,\u00a0create tasks, and report progress on those tasks."],"correct":["C"],"explanation":"To quickly establish credibility, it is important that the new project manager first observe and understand how the team works and how to best serve them. The other answer choices are incorrect. Helping the team succeed with excellent service, on-time commitments, and making sure that there is an adequate budget to cover the project scope is part of the project manager's role and is implicit and these actions will not help the project manager to quickly establish credibility with the team which is the primary objective. Going by the team's needs and wants and creating tasks and reports will no"},{"q":"After emailing a recent project status report, the project manager learns that a number of recipients are no longer involved with the project. The project manager needs to verify the distribution list for future status reports. What should the project manager do?","opts":["A.Review and update the communications management plan.","B.Review and update the schedule management plan.","C.Review and update the responsibility assignment matrix.","D.Review and update the resource management plan."],"correct":["A"],"explanation":"The communications management plan is the document that identifies the stakeholders who need to receive project status reports. Therefore, it is the first document that the project manager should review and update to ensure that the distribution list is accurate. The other answer choices are not as relevant or effective. The schedule management plan does not identify the stakeholders who need to receive project status reports; the responsibility assignment matrix identifies the individuals who are responsible for each task on the project, but it does not identify the stakeholders who need to r"},{"q":"A software delivery team at a large bank is frustrated by the documentation requirements put in place by the governance department in charge of their change control board (CCB). The project manager approaches the governance department and requests that they work together to reduce the amount of paperwork required from the delivery team, explaining that it slows them down and adds overhead costs. This is an example of what kind of leadership?","opts":["A.Servant leadership","B.Transactional leadership","C.Directive leadership","D.Constructive leadership"],"correct":["A"],"explanation":"This is an example of servant leadership because the project manager is offering the service of working with the governance board to resolve an issue for the software delivery team. The project manager has the software delivery team's interest in mind and is willing to work with the governance board to reduce the amount of paperwork."},{"q":"During project execution, a project manager is informed that some resources will soon be removed from the project. What should the project manager do to address this situation?","opts":["A.Schedule a meeting to keep the stakeholders informed.","B.Inform the stakeholders at the next scheduled review meeting.","C.Update the risk register with this risk to project resources.","D.Request resource leveling."],"correct":["D"],"explanation":"Resource leveling is the process of adjusting the project schedule to ensure that resources are available when needed and that resource utilization is optimized. When resources are removed from a project, resource leveling can help the project manager identify alternative resources or adjust the project schedule to minimize the impact on the project. By requesting resource leveling, the project manager can proactively address the situation and ensure that the project stays on track and aligned with the organization's goals. The other answer choices are not as relevant or effective. Scheduling "},{"q":"A stakeholder complains that a product component is not easy to use. What should be the immediate next step for the project manager?","opts":["A.Check if the component meets the design and performance specifications.","B.Collaborate with the stakeholder to confirm the acceptance criteria for the product.","C.Ask a user experience expert to meet with the stakeholder and explain the component design.","D.Raise a change request according to the stakeholder\u2019s requirement concerns."],"correct":["A"],"explanation":"The immediate next step for the project manager is to check if the component meets the design and performance specifications. It is important that the project manager discovers the root cause of the problem before moving forward. This will help the project manager determine if the issue is with the component or a user experience issue.\u00a0\nThe other answer options should not be the next immediate step. Without knowing the root cause of the issue, the project manager can not confidently discern how to address it.\nClarifying the product acceptance criteria or asking a user experience expert to expl"},{"q":"A project is facing a one-month delay, and the project manager realizes that a change request is necessary. The change control board (CCB) will review the change request at their next meeting, which is in two weeks. However, if the implementation of this change is delayed by two weeks, upcoming supply chain disruptions will cause a two-month delay to the project schedule. What should the project manager do?","opts":["A.Implement the change immediately to avoid the upcoming supply chain disruptions and the two-month delay.","B.Revise the change request to incorporate the additional two-month delay due to upcoming supply chain disruptions.","C.Meet with the sponsor and ask them to contact the CCB and request their immediate approval.","D.Request that the CEO approve and implement the change to avoid the potential two-month delay."],"correct":["B"],"explanation":"The project manager should acknowledge the existing delay and recognize the potential for a two-month delay due to supply chain disruptions. This will ensure that the CCB has all of the necessary information to make an informed decision about the change request. This is essential for effective project management, as it ensures that all stakeholders are aware of and prepared for the extended timeline. The project manager should communicate the revised change request to all relevant stakeholders to ensure that everyone is aware of the delay and its impact on the project. The other options are in"},{"q":"An extremely talented and results-oriented team member is suddenly struggling with a personal problem. Due to this, there is a change in the team member's behavior, and it starts to affect the project deliverables as well as the morale of other team members. What should the project manager do?","opts":["A.Assign the team member to an activity that will not substantially impact deliverables.","B.Approach the team member privately and work together to develop a plan to address the issue.","C.Add the team member's problem to the project issue log and inform all key stakeholders.","D.Ask the human resources (HR) manager to handle the issue and continue working as planned."],"correct":["B"],"explanation":"When a team member is struggling with a personal problem that is affecting their behavior and the project deliverables, the project manager should approach the team member privately and work together to develop a plan to address the issue. This approach shows concern for the team member's well-being and allows for a collaborative solution to be developed. It is important for the project manager to balance the needs of the individual team member with the needs of the project and the team as a whole. By addressing the issue in a compassionate and proactive manner, the project manager can help to"},{"q":"A project manager oversees an agile project with an experienced project team. The project manager does not typically attend the daily stand-up meetings, but they sit in on them from time to time. After attending one particular meeting, the project manager noticed that the meeting was not productive. What should the project manager do to improve the situation?","opts":["A.Analyze the dynamics of these meetings, remove impediments, and provide feedback.","B.Ask the team to send meeting minutes to the project manager after each daily meeting.","C.Start attending daily meetings to promote a better collaboration effort with the team.","D.Delegate the responsibility to the product owner to facilitate future daily review meetings."],"correct":["A"],"explanation":"Agile teams run their own standups. They use standups to microcommit to each other, uncover problems, and ensure that work flows smoothly through the team. Agile times thrive with servant leadership. The project manager should act as a servant leader by analyzing the dynamics of the daily stand-up meetings, removing impediments, and providing feedback, to help the team improve the productivity of their meetings. The other answer choices are incorrect because the project manager should first try to understand why the daily stand-up meetings are not productive. It might undermine the team's auto"},{"q":"During sprint planning, an agile team and product owner identified that the team should be able to finish five user stories. However, during the sprint, the team worked on more than five stories but did not complete any stories at all. What should the project manager do?","opts":["A.Clarify priorities with the team.","B.Create smaller stories in the future.","C.Review the definition of done (DoD).","D.Update the product release plan."],"correct":["A"],"explanation":"In this situation, the project manager should clarify priorities with the team. Prioritizing stories is important because it helps the team focus on delivering the most valuable features first. The team expected to have the capacity to complete five user stories, but they took on extra stories and failed to complete any stories at all. There is always some risk that user stories may fail to be completed within a sprint, but this situation indicates a misalignment between the team's understanding of priorities and the true priorities for the sprint. The other options are incorrect. Creating sma"},{"q":"During the first few days of executing a six-week project, an impediment is discovered by the project team. The project manager worked with the team to develop and implement a strategy to resolve the issue. Afterward, the project manager discovers that, as a result, the project can now be completed in only three weeks. What should the project manager do?","opts":["A.Work with stakeholders to determine the best course of action.","B.Change the project scope to include additional deliverables.","C.Maintain the original six-week timeline and milestone schedule.","D.Reallocate the team to other projects to maximize efficiency."],"correct":["A"],"explanation":"It is important to maintain alignment between the project and stakeholders. The project manager should be transparent about this new discovery by informing stakeholders and working with them to determine the best way to proceed. This will provide stakeholders with the information they need to make decisions and determine the best course of action. The other options are incorrect. Changing the project scope or\u00a0reallocating the team may introduce risks and should only be considered after discussing the situation with stakeholders. Maintaining the original schedule fails to acknowledge the potent"},{"q":"A project team is in sprint thirteen of a fourteen-sprint project. The project team placed a game-changing feature on the backlog for the next release. The product owner is informed that a competitor is launching a new product with a feature that closely resembles the feature placed on the backlog. The product owner is demanding this game-changing feature be incorporated in the current release. What should the project manager do?","opts":["A.Organize a review meeting with the development team to get an understanding of the extent of work required.","B.Meet with the product owner and relevant stakeholders to discuss the change and analyze the impact.","C.Perform the required assessments and raise a change request with the Change Control Board (CCB).","D.Inform the product owner that this game-changing feature will be added to the next release of the product."],"correct":["B"],"explanation":"The product owner is demanding a significant change late in the project that can have a substantial impact on scope, schedule, and resources. The project manager should meet with the product owner and relevant stakeholders to discuss the change, analyze the impact, and develop a plan for moving forward. It's crucial to involve key stakeholders in such decisions as they can provide insights into the project's strategic goals and priorities. This collaborative approach is at the heart of agile methodologies. The other options are incorrect because they do not involve all of the key stakeholders "},{"q":"A project manager has been assigned to a project that is currently late and over budget. The project uses a predictive approach integrated with agile iterations for the most critical part of the scope. During the project assessment, the project manager notices that the team is afraid of making mistakes and is seeking individual recognition, while lacking accountability. How should the project manager improve productivity?","opts":["A.Develop a performance management plan for each project team member and share the performance results with the team.","B.Enable collaboration, create common goals, and celebrate group achievements, while providing group rewards.","C.Reinforce and communicate the next milestone, following individual performance and execution on a detailed level.","D.Request approval to replace a few team members so the project team can understand the importance of meeting goals."],"correct":["B"],"explanation":"The project manager needs to create a collaborative environment that focuses on common goals and group rewards, and moving away from working in silos. The other answer choices are incorrect. Developing a performance management plan for each project team member and sharing the performance results with the team or creating milestones at an individual level will only deteriorate the working relationship among the team members. Replacing a few team members may not improve the team morale or productivity unless the team is focused on common goals and working together as a team and focusing on group"},{"q":"A colocated project team is facing communication and collaboration issues. Some team members have roles that require them to work different hours, some arriving early, others leaving later. At a recent weekly meeting, several team members were absent. What is the best way for the project manager to ensure the team can attend all necessary meetings?","opts":["A.Encourage team members to work the same hours.","B.Discuss the meeting with the missing team members.","C.Create an information radiator for public display.","D.Schedule team meetings during overlapping core hours."],"correct":["D"],"explanation":"The project manager should schedule team meetings during overlapping core hours to allow team members to attend and receive the same message. The team is colocated, but some members arrive and leave at different hours, so the best option would be to schedule meetings at a time that works for all team members. The other answer choices are incorrect. Encouraging team members to work the same hours does not ensure that they will be available for the meeting. It may also be impossible for the team members to change their schedules. Creating an information radiator will provide details, but the foc"},{"q":"In order to reduce procurement time during a bidding process, a project manager decided to contract the additional work to a current contractor. The other bidders are complaining about this decision because they think that the process lacked transparency and fairness. What should the project manager have done to prevent this?","opts":["A.Invited all potential bidders to a meeting.","B.Awarded the contract without negotiation.","C.Followed the company's bidding procedure.","D.Shared the project objectives with all bidders."],"correct":["C"],"explanation":"It is very important for the project manager to ensure that there is complete transparency in the bidding process. This is only possible only if the project manager follows the company's bidding procedure. Following the company's bidding procedure ensures that the process is fair and consistent and all parties have an equal opportunity. The other answer choices are incorrect. Inviting all bidders to a meeting or sharing the project objectives with all bidders could perhaps be one of the steps in the bidding process, but this does not address other bidders' unhappiness. Awarding the contract wi"},{"q":"A project can gain downstream marketing benefits if additional equipment is included in the project scope. However, this equipment is still in an early development phase and will not be ready to meet the project timelines. A member of the project steering committee is in favor of its inclusion. How should the project manager proceed?","opts":["A.Prepare a scope change request to include the additional equipment because it is beneficial to the marketing team.","B.Provide a clear rationale for its exclusion based on the business case and its impact on the project timelines.","C.Conduct a survey among steering committee members to assess their individual project requirements for a consensus decision.","D.Request the project sponsor to escalate the issue to the steering committee member to avoid delaying project approval."],"correct":["C"],"explanation":"The project manager should proceed by conducting a survey among steering committee members to assess their individual project requirements for a consensus decision. The steering committee is there to provide direction and support for the project team and make decisions outside the project team\u2019s authority. Since the project is overseen by a steering committee, it is necessary to have a consensus of the committee before proceeding. By surveying the steering committee the project manager can also identify potential conflicts, address concerns, and identify potential impacts associated with intro"}];

function setCount(n) { chosenCount = n; startExam(); }

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function startExam() {
    examQs = shuffle([...ALL_QUESTIONS]).slice(0, chosenCount);
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('examScreen').style.display = 'flex';
    startTime = Date.now();
    timerInterval = setInterval(updateTimer, 1000);
    renderQuestion();
}

function getFormattedTime(diffMs) {
    const totalSecs = Math.floor(diffMs / 1000);
    const h = Math.floor(totalSecs / 3600).toString().padStart(2, '0');
    const m = Math.floor((totalSecs % 3600) / 60).toString().padStart(2, '0');
    const s = (totalSecs % 60).toString().padStart(2, '0');
    return h + ":" + m + ":" + s;
}

function updateTimer() {
    const diff = Date.now() - startTime;
    document.getElementById('timer').textContent = getFormattedTime(diff);
}

function renderQuestion() {
    const q = examQs[currentIdx];
    const isMulti = q.correct.length > 1;
    document.getElementById('qNumber').textContent = "Question " + (currentIdx + 1) + " of " + examQs.length;
    document.getElementById('qText').innerHTML = q.q + (isMulti ? "<br><small style='color:var(--p-blue); font-weight:bold;'>(Choose " + q.correct.length + " options)</small>" : "");
    
    const container = document.getElementById('options');
    container.innerHTML = '';
    
    const currentSelection = userAnswers[currentIdx] || [];

    q.opts.forEach(opt => {
        const letter = opt.charAt(0);
        const text = opt.substring(2);
        const btn = document.createElement('div');
        btn.className = 'option-btn';
        if (currentSelection.includes(letter)) btn.classList.add('selected');
        
        btn.innerHTML = '<span class="opt-letter">' + letter + '</span><span>' + text + '</span>';
        btn.onclick = () => selectOption(letter, isMulti, q.correct.length);
        container.appendChild(btn);
    });
    
    document.getElementById('btnBack').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
    const hasEnoughChoices = isMulti ? (currentSelection.length === q.correct.length) : (currentSelection.length > 0);
    document.getElementById('btnNext').style.display = hasEnoughChoices ? 'block' : 'none';
    document.getElementById('btnNext').textContent = currentIdx === examQs.length - 1 ? 'Finish' : 'Next';
    window.scrollTo(0,0);
}

function selectOption(letter, isMulti, maxChoices) {
    if (!userAnswers[currentIdx]) userAnswers[currentIdx] = [];
    let selections = userAnswers[currentIdx];

    if (!isMulti) {
        userAnswers[currentIdx] = [letter];
    } else {
        const idx = selections.indexOf(letter);
        if (idx > -1) {
            selections.splice(idx, 1);
        } else {
            if (selections.length < maxChoices) {
                selections.push(letter);
            }
        }
    }
    renderQuestion();
}

function nextQ() {
    if (currentIdx < examQs.length - 1) {
        currentIdx++;
        renderQuestion();
    } else {
        finishExam();
    }
}

function prevQ() {
    if (currentIdx > 0) {
        currentIdx--;
        renderQuestion();
    }
}

function finishExam() {
    const endTime = Date.now();
    const timeSpentMs = endTime - startTime;
    clearInterval(timerInterval);
    
    let correct = 0;
    examQs.forEach((q, idx) => {
        const userSelection = userAnswers[idx] || [];
        const correctAnswers = q.correct;
        const isMatch = userSelection.length === correctAnswers.length && userSelection.every(val => correctAnswers.includes(val));
        if (isMatch) correct++;
    });
    
    const score = Math.round((correct / examQs.length) * 100);
    document.getElementById('examScreen').style.display = 'none';
    document.getElementById('scoreScreen').style.display = 'flex';
    document.getElementById('finalScore').textContent = score + "%";
    
    document.getElementById('scoreMeta').innerHTML = 
        "Correct: <strong>" + correct + "</strong> / " + examQs.length + "<br>" +
        "Time Elapsed: <strong>" + getFormattedTime(timeSpentMs) + "</strong><br>" +
        "Result: <strong style='color:" + (score >= 70 ? "#166534" : "#991b1b") + "'>" + (score >= 70 ? "PASS" : "FAIL") + "</strong>";
    
    document.getElementById('scoreScreen').scrollTop = 0;
}

function showReview() {
    const container = document.getElementById('reviewContainer');
    const list = document.getElementById('reviewList');
    const screen = document.getElementById('scoreScreen');
    
    container.style.display = 'block';
    document.getElementById('btnShowReview').style.display = 'none';
    document.getElementById('scoreHeading').textContent = 'Review Mode';
    list.innerHTML = '';
    
    examQs.forEach((q, idx) => {
        const userSelection = userAnswers[idx] || [];
        const correctAnswers = q.correct;
        const isMatch = userSelection.length === correctAnswers.length && userSelection.every(val => correctAnswers.includes(val));
        
        const card = document.createElement('div');
        card.className = 'review-q-card';
        
        let optsHtml = '';
        q.opts.forEach(opt => {
            const letter = opt.charAt(0);
            let stateClass = '';
            if (correctAnswers.includes(letter)) stateClass = 'is-correct';
            else if (userSelection.includes(letter) && !correctAnswers.includes(letter)) stateClass = 'user-wrong';
            optsHtml += '<div class="review-opt ' + stateClass + '"><strong>' + letter + '</strong> ' + opt.substring(2) + '</div>';
        });
        
        card.innerHTML = '<div class="status-tag ' + (isMatch ? 'status-correct' : 'status-wrong') + '">' + (isMatch ? 'Correct' : 'Incorrect') + '</div>' +
            '<div style="font-weight: bold; margin-bottom: 15px;">Question ' + (idx + 1) + ': ' + q.q + '</div>' +
            '<div class="review-opts">' + optsHtml + '</div>' +
            '<div class="review-exp"><strong>Explanation:</strong> ' + (q.explanation || 'No explanation provided.') + '</div>';
        list.appendChild(card);
    });
    
    screen.scrollTop = 0;
}
</script>
