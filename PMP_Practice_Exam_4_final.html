<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PMP Exam Simulator</title>
    <style>
:root {
    --p-blue: #004b8d;
    --p-bg: #f5f5f5;
    --p-light: #f0f7ff;
    --p-selected: #cce0f5;
    --p-footer: #cccccc;
}
body { background: var(--p-bg); color: #333; font-family: Arial, sans-serif; margin:0; padding:0; min-height: 100vh; }
#startScreen, #scoreScreen { position: fixed; inset: 0; background: white; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 40px 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
#examScreen { display: none; flex-direction: column; min-height: 100vh; background: white; }
.exam-header { position: sticky; top: 0; background: var(--p-blue); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
.exam-header h2 { font-size: 0.9rem; margin: 0; text-transform: uppercase; }
.exam-body { flex: 1; padding: 30px 20px 120px; max-width: 900px; margin: 0 auto; width: 100%; box-sizing: border-box; }
.q-number { font-size: 1rem; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
.q-text { font-size: 1.1rem; line-height: 1.5; margin-bottom: 30px; font-weight: 500; }
.option-btn { display: flex; align-items: flex-start; padding: 15px; border: 1px solid transparent; background: white; cursor: pointer; width: 100%; text-align: left; margin-bottom: 2px; }
.option-btn:hover { background: var(--p-light); }
.option-btn.selected { background: var(--p-selected) !important; border: 1px solid var(--p-blue); }
.opt-letter { min-width: 26px; height: 26px; border: 2px solid #555; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 15px; font-weight: bold; font-size: 0.85rem; flex-shrink: 0; }
.option-btn.selected .opt-letter { background: var(--p-blue); color: white; border-color: var(--p-blue); }
.actions { position: fixed; bottom: 0; left: 0; right: 0; background: var(--p-footer); padding: 15px 30px; display: flex; justify-content: space-between; border-top: 1px solid #999; z-index: 500; }
.btn-p { background: linear-gradient(to bottom, #fff, #e5e5e5); border: 1px solid #888; padding: 10px 25px; font-weight: bold; cursor: pointer; border-radius: 3px; font-size: 0.9rem; min-width: 100px; text-transform: uppercase; }
.btn-next { color: var(--p-blue); border-color: var(--p-blue); }
.review-q-card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 20px; margin-bottom: 25px; text-align: left; width: 100%; box-sizing: border-box; }
.review-opt { padding: 10px; margin: 5px 0; border-radius: 4px; border: 1px solid #eee; font-size: 0.95rem; display: flex; align-items: flex-start; gap: 10px; }
.review-opt.is-correct { background: #e8f5e9; border-color: #66bb6a; font-weight: bold; }
.review-opt.user-wrong { background: #ffebee; border-color: #ef5350; }
.review-exp { margin-top: 15px; padding: 15px; background: #f8fafc; border-left: 4px solid var(--p-blue); font-size: 0.9rem; line-height: 1.6; color: #334155; }
.status-tag { display: inline-block; padding: 4px 12px; border-radius: 4px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 12px; }
.status-correct { background: #e8f5e9; color: #166534; }
.status-wrong { background: #ffebee; color: #991b1b; }
.score-big { font-size: 5rem; color: var(--p-blue); font-weight: 800; margin: 20px 0; }


.btn-home:hover { background: rgba(255,255,255,0.3); border-color: white; }
</style>
</head>
<body>

<div id="startScreen">
    <h1 style="margin-bottom:10px">PMP Practice Exam</h1>
    <p style="color:#666; margin-bottom:30px">Choose assessment volume:</p>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:30px; width:100%; max-width:400px;">
        <button class="btn-p" onclick="setCount(10)">10 Questions</button>
        <button class="btn-p" onclick="setCount(25)">25 Questions</button>
        <button class="btn-p" onclick="setCount(50)">50 Questions</button>
        <button class="btn-p" onclick="setCount(175)">Full Exam</button>
    </div>
    <button class="btn-p" style="padding:15px 50px; background:var(--p-blue); color:white; border:none;" onclick="startExam()">Launch Exam</button><br><br><a href="index.html" class="btn-p" style="text-decoration:none; display:inline-flex; align-items:center; justify-content:center; background:none; border:1px solid #ccc; color:#666; font-size:0.8rem;">← Return to Archive</a>
</div>

<div id="examScreen">
    <div class="exam-header">
        <h2>PMP Simulation</h2>
        <div id="timer" style="font-weight:bold">00:00:00</div>
    </div>
    <div class="exam-body">
        <div id="qNumber" class="q-number"></div>
        <div id="qText" class="q-text"></div>
        <div id="options" class="options"></div>
    </div>
    <div class="actions">
        <button class="btn-p" id="btnBack" onclick="prevQ()">Previous</button>
        <button class="btn-p btn-next" id="btnNext" onclick="nextQ()">Next</button>
    </div>
</div>

<div id="scoreScreen" style="display:none">
    <h1 id="scoreHeading">Exam Result</h1>
    <div class="score-big" id="finalScore">0%</div>
    <div id="scoreMeta" style="margin-bottom:30px; text-align:center; font-size:1.1rem; line-height:1.6;"></div>
    
    <div style="display:flex; gap:10px; margin-bottom:40px">
        <button class="btn-p" id="btnShowReview" onclick="showReview()">Review All</button>
        <button class="btn-p" onclick="location.reload()">Restart</button>
    </div>

    <div id="reviewContainer" style="display:none; width:100%; max-width:800px; border-top:1px solid #ddd; padding-top:40px;">
        <div id="reviewList"></div>
        <button class="btn-p" style="width:100%; margin-top:20px" onclick="location.reload()">Start New Session</button>
    </div>
</div>

<script>
const ALL_QUESTIONS = [{"q":"A new system is being developed to replace an existing manual process. During a sprint demo, business stakeholders expressed the concern that they would not gain any value from using this system. What should the project manager do next?","opts":["A.Discuss this with the product manager and identify new user stories to address business concerns.","B.Call a steering committee meeting to determine critical success factors for the project.","C.Create a project benefits management plan and review it with the stakeholders.","D.Review the performance metrics with stakeholders to ensure the system accomplished agreed-upon metrics."],"correct":["D"],"explanation":"The project manager should first review the performance metrics with stakeholders to ensure the system accomplished agreed-upon metrics. This will help the project manager to understand the specific concerns of the stakeholders and to see if the system is actually meeting their needs. The other options are not the best option because they do not address the specific concerns of the stakeholders. Discussing the concerns with the product manager and identifying new user stories should be done after the project manager has reviewed the performance metrics and understands the specific concerns of "},{"q":"A project team in the middle of an incremental delivery project decided they need the help of a subject matter expert (SME) who is working in a different department. The project team asked the SME to join their team and assist in a specific task and they informed the project leader about this action. What should the project manager do?","opts":["A.Check the project budget and assess the impact and feasibility of adding an additional resource","B.Talk with the project sponsor and get approval, explaining that this resource is important and crucial","C.Talk to the functional manager of this needed resource and check their availability and bandwidth","D.Facilitate the coordination of resources with the needed resources based on the teams working agreement"],"correct":["D"],"explanation":"Facilitating the coordination of resources with the needed resources based on the team's working agreement is correct as a team often needs to coordinate with other delivery teams across the organization, using effective coordination strategies, based on the working agreement. The other options are incorrect. Checking the project budget and assessing the impact and feasibility of adding additional resources is not the best choice, even if there is a budget available, as adding an SME in the middle of an incremental delivery process will impact team fabric and there will be a ramp curve for any"},{"q":"A parent company announces an integration project for all of its subsidiary companies. The integration project covers the legal, human resources (HR), and finance departments of the subsidiary companies. Senior management is investing in this as the company's first agile project and a new project manager has been assigned. What should the project manager do first?","opts":["A.Meet with the stakeholders to discuss risks.","B.Develop a team charter.","C.Plan to enhance the team's agile maturity level.","D.Develop a transition strategy."],"correct":["D"],"explanation":"By developing a transition strategy, the project manager can lay the foundation for a successful agile project. The transition strategy will provide the project manager with a roadmap for how to move the organization from its current state to a new desired state, and it will help to ensure that the team is well-prepared to adopt agile practices and deliver the project on time and within budget. The other answer choices are incorrect.\u00a0While it is important to identify and discuss risks early in the project, this is not the first thing that the project manager should do. The project manager need"},{"q":"A new member joined a project during the execution phase. The work requires strong collaboration with other team members. What should the project manager do to foster a collaborative environment?","opts":["A.Send an email to the project team asking them to collaborate with the new team member.","B.Share all information available and allocate time to explain in detail the work in progress.","C.Ask each member to describe their interests and experience in the next team meeting.","D.Organize a one-day workshop with the entire team to bring the new member up to speed."],"correct":["D"],"explanation":"By prioritizing a one-day workshop, the project manager can actively facilitate knowledge transfer, relationship building, and alignment, setting a strong foundation for successful collaboration and project outcomes. The other answer choices are incorrect as they are more passive approaches that may not foster strong connections, overlook\u00a0potential communication barriers, potentially neglect team dynamics, and\u00a0may not directly address knowledge and integration needs."},{"q":"A company has undertaken a large transformation project to prepare itself for the changing economy. During the execution of the transformation project, a new technology emerges that was not foreseen in the risk management plan. What should the project manager do?","opts":["A.Escalate this to the IT department and organize training for the impacted team members.","B.Revisit the procurement management plan and identify the impacted contracts for upcoming purchases.","C.Revisit the risk management plan and apply the project risk planning process.","D.Escalate the issue to the next steering committee and facilitate a brainstorming meeting."],"correct":["C"],"explanation":"The correct answer is to revisit the risk management plan and apply the project risk planning process. In this case, the risk was unforeseen at the start of the project, so it is important to plan for the risk. Project teams endeavor to identify and evaluate known and emergent risks, both internal and external to the project, throughout the life cycle. The integration of different technology systems may cause threats that could impact project outcomes and success. The other options are incorrect. Escalating this to the IT department and organizing training for the impacted team members is inco"},{"q":"The implementation of a business requirement for an IT project impacts several applications. The application owner notices that changes to a function in application X can be started only upon completion of the development of a new feature in application Y. This is an example of what dependency?","opts":["A.Start-to-start (SS)","B.Finish-to-start (FS)","C.Start-to-finish (SF)","D.Finish-to-finish (FF)"],"correct":["B"],"explanation":"Finish to Start(FS) dependency indicates that the predecessor activity has to be completed before the successor activity can get started. Hence the example relates to Finish to Start task dependency. Hence this is the correct answer. While Start to Start(SS) dependency indicates that the predecessor activity has to get started before the successor activity can get started, Start to Finish(SF) dependency indicates the predecessor activity has to be get started before the successor activity can get completed, Finish to Finish(FF) dependency indicates that the predecessor activity has to get comp"},{"q":"In a project, there is a stakeholder who does not see any benefit for the project. Sometimes the stakeholder uses politics to place obstacles to prevent a successful project completion. What is the personality of this kind of stakeholder?","opts":["A.Stoic","B.Neutral","C.Champion","D.Antagonist"],"correct":["D"],"explanation":"Antagonist wont see any benefit of the project. Champion, Neutral and stoic will see the benefit of the project depends on their interest and contribution level This question and rationale were developed in reference to: https://www.pmi.org/learning/library/stakeholder-management-plan-6090\u00a0[Item Champion: A person who sees the merits of the proposed project, strongly supports it, is willing to use his or her political capital to remove obstacles, and to help ensure the successful completion of the project. Neutral: One who currently does not perceive any stake or interest in the project; howev"},{"q":"A project manager new to an organization has been tasked with running the first agile project. The project manager has decided to begin by assessing the organization's ability to adapt to an agile project. Which three characteristics of the organization will help to set up the project for success? (Choose three)","opts":["A.Safe work environment","B.Key performance indicators (KPIs)","C.Willingness to experiment","D.Speed to market","E.Predictability"],"correct":["A","B","C"],"explanation":"It is essential to understand the current performance through KPI metrics; safe work environment to deploy agile; and the willingness of the team to experiment for project success. The other answer choices are incorrect. Speed to market and predictability with slow down the agility of the project."},{"q":"A project team has recently finished a sprint for developing two features for a fleet management system. Although the team delivered the required features, they encountered several issues and conflicts during the sprint. Team members were upset about this experience and are now showing a lack of motivation due to what has occurred. What can the project manager do to help increase the team's motivation and engagement with the project?","opts":["A.Set up one-on-one meetings with the project team members.","B.Review sprint progress with the project team members.","C.Review sprint planning procedures with the project team members.","D.Perform a sprint retrospective with the project team members."],"correct":["D"],"explanation":"Sprint Retrospective is an Agile ceremony that allows the team to discuss openly about their thoughts/opinion about the sprint. This allows them to examine the sprint process and understand what work well, what went wrong and what actions they need to take to improve the process. This ceremony fosters empowerment within the team as they had an opportunity to decide on what works with them to make them more engaged and satisfied in handling the project. Since it is about team, one-on-one meeting is not suggested. Sprint planning and review of sprint progress are not the right Agile ceremonies t"},{"q":"In your project you need some assistance facilitating meetings, following up on action items, introducing new team members, and mediating conflicts. Who would be the most suitable team member type to assist you with those activities?","opts":["A.Power Oriented team member.","B.Affiliate Oriented team member.","C.Achievement Oriented Team member.","D.Delivery Oriented Team member."],"correct":["B"],"explanation":"All the activities mentioned in the stem require good facilitation skills. The PM doesn't need help with decisions or managing the delivery to achieve the desired results. BUT here the Project Manager is looking for assistance during the execution of a project with a large number of team members and/or the team is located in different locations including virtual. PMBoK Sixth Edition states: \"Project managers require the skills to identify, build, maintain, motivate, lead, and inspire project teams to achieve high team performance and to meet the project's objectives. Teamwork is a critical fac"},{"q":"A company's leadership team has decided to invest in a new product using an agile approach. The commercial and product teams have started the planning activity for this new venture. Which three key factors does the project manager need in order to deliver this product? (Choose 3)","opts":["A.Product vision","B.Product roadmap","C.High-level product backlog","D.Key performance indicators (KPIs)","E.Schedule performance indexes (SPIs)"],"correct":["A","B","C"],"explanation":"The goals of product-level planning (which I also refer to as envisioning) are to capture the essence of a potential product and to create a rough plan for the creation of that product. This allows the product team to evaluate and deliver project benefits and value. The output of this activity are: Product Vision Product Roadmap High Level Product backlog"},{"q":"A new customer relations database is being deployed. The schedule calls for migration from the previous system to occur over one weekend. However, some key stakeholders believe it may take more time for the migration. What should the project manager do?","opts":["A.Assess the concerns and risks of not deploying within the scheduled time frame and\u00a0react accordingly.","B.Change the deployment plan such that additional resources are available to perform the weekend deployment.","C.Review and revise as necessary the risk management plan","D.Modify the schedule to increase the time frame of the deployment plan."],"correct":["A"],"explanation":"The project manager should assess the risk in accordance with the risk management plan and react accordingly. Changing the deployment plan by adding resources may not address the stakeholder requirements. Revising the risk management plan will not address stakeholder concerns. It may not be necessary or possible to modify the deployment plan."},{"q":"During a project's execution, a previously unidentified stakeholder within the customer's organization requests a change that could affect the project's scope. The stakeholder's influence within the customer's organization is strong. What should the project manager do first?","opts":["A.Schedule a meeting and, based on the outcome, update the project management plan.","B.Issue a change request to the change control board (CCB).","C.Identify the new stakeholder and update the stakeholder register.","D.Meet with all stakeholders to discuss the change."],"correct":["C"],"explanation":"Since the stakeholder was not previously identified they wouldn't be in the stakeholder register. Updating the register is the first thing the project manager should do. The register records the name, position, role on the project, expectations, potential for influencing project outcomes, etc. This is necessary to properly manage the stakeholder. A change request should not be issued yet as the other stakeholders may not agree. The project management plan cannot be updated without a change request."},{"q":"A project team is actively engaged in the preparation of the last delivery before the final product is live in production. What should the project manager do to make sure that the whole team is in full sync?","opts":["A.Ensure the team is attending the daily meetings and participating actively","B.Ensure that the needed information is available and accessible to each and every member","C.Ensure to visualize the work to be done on a white board visual and accessible to all","D.Ensure there is a room for the team to have regular conversation whenever needed"],"correct":["A"],"explanation":"\"Ensure the team is attending the daily meetings and participating actively\" as daily meetings keep the team on track so that there are no surprises. and eliminate the waste of waiting dependencies of the work to be done between the team Although rest of the options seems to be by providing the additional information, but the right choice is participation in daily meetings"},{"q":"A project is developing a product where the time to market is critical. During the execution phase, the client submits a change request to include the latest technology that will enhance the product features and provide a competitive advantage. The change will impact the project constraints, but the benefits outweigh the cost and effort. What should the project manager do next?","opts":["A.Adopt an incremental delivery approach and release essential features of the product into the market first to counter competition.","B.Start a separate project to adopt the new technology incrementally to enhance the product features as the technology matures.","C.Perform an integrated change control process and review the project constraints to effectively manage the enhanced scope.","D.Close the current project and start a new project with an incremental delivery approach."],"correct":["A"],"explanation":"Adopt an incremental delivery approach: Referencing Effective Project Management, 8th Edition, Hybrid Project management introduces the concept of a check point at the beginning of each phase where a decision to change the PMLC methodology can be made. By adopting the incremental approach during the execution phase, the project team can first develop essential features of the Product to reduce the time to market and get a foot hold in the market to counter competition. New technology can then be incrementally implemented Start a separate project / Perform integrated change control / Closing th"},{"q":"A project manager is leading a remote home office implementation. The project manager is surprised with early signs of resistance from key stakeholders in the organization. The key stakeholders strongly disagree with the change and will require more persuasion than the project manager originally expected. Which two tools and techniques should be used to identify the organizational and project influence of the stakeholders? (Choose two)","opts":["A.Stakeholder matrix","B.RACI chart","C.Stakeholder analysis","D.Stakeholder map","E.Engagement map"],"correct":["A","D"],"explanation":"Stakeholders map involves different techniques to identify stakeholders by power and influence. The stakeholder matrix is one of the techniques that allows you to to identify such power relations in stakeholders. The other answer choices are incorrect. They are used to create the stakeholder matrix and map, which are the best tools for determining organizational and project influence. The RACI chart includes all project roles, not just the key stakeholders."},{"q":"Due to a downturn in the business environment, a customer is only able to make a project's payment in part, rather than the fully committed monthly payment. What should the project manager do?","opts":["A.Discuss it with management and pause the project because of the customer's budget constraint.","B.Deliver the features with the highest business value, based on the available budget.","C.Deliver the features that have small independent components, based on the available budget.","D.Continue with the planned development and deliver only when full payment is made."],"correct":["B"],"explanation":"Since there is change in business environment and the customer is unable to make the committed payment, based on the available budget, option is to continue with the project and deliver the highest business value which will result in win-win situation. The other answer choices are incorrect. Pausing the project may result in a lose-lose situation for the customer and team; continuing with planned development and waiting to deliver when full payment is made is risky."},{"q":"While forming the team to work on a global project with incremental deliveries, the project leader shared the performance measurement plan with the team. Team members did not appreciate the proposed plan, as they expressed it is not realistic. What should the project leader do to ensure the team member's engagement in the implementation of the performance management plan?","opts":["A.Ask the team members to abide by the plan, otherwise, they will not be properly appraised.","B.Include self-assessments at the start, middle, and end of the project to increase the autonomy of the team.","C.Ask the human resources team to deliver a presentation about the company's performance measurements.","D.Talk to the team member on a one-on-one basis to convince them about the benefits of the proposed plan."],"correct":["B"],"explanation":"Self assessment increase accountability and autonomy of the team members and elevate engagement"},{"q":"A team is assembled for a new project that will be using a predictive approach through requirements gathering and an agile approach for development and testing. Not everyone on the team has experience working in agile. The schedule has started slipping due to the unclear structure of the agile development approach. What should the project manager have done to avoid this situation?","opts":["A.Set up weekly status meetings to review team progress and regularly escalate delays.","B.Met with the team, allowed team members to make decisions about what to do, and established performance goals.","C.Established daily standup meetings to track team progress and escalate delays to stakeholders as appropriate.","D.Conducted routine meetings and identified team members who are under performing."],"correct":["C"],"explanation":"The key point is quick to respond! Weekly is not enough and waterfall. Communication of performance goals and understanding of approach are critical."},{"q":"A project's original budget at completion (BAC) was calculated as US$100,000, but the estimate at completion (EAC) is US$120,000. If the schedule performance index (SPI) is equal to 1, what is the cost performance index (CPI)?","opts":["A.Equal to 1.2","B.Less than 1","C.Equal to 1","D.Greater than 1"],"correct":["B"],"explanation":"PMBoK Sixth Edition Chapter 7 Section 7.4.2.2 states: \"Cost performance index. The cost performance index (CPI) is a measure of the cost efficiency of budgeted resources, expressed as a ratio of earned value to actual cost. It is considered the most critical EVA metric and measures the cost efficiency for the work completed. A CPI value of less than 1.0 indicates a cost overrun for work completed. A CPI value greater than 1.0 indicates a cost underrun of performance to date. The CPI is equal to the ratio of the EV to the AC. Equation: CPI = EV/AC\" The correct answer is \"Less than 1\". The distr"},{"q":"A project team discovers an opportunity to enhance software without impacting the budget or schedule. The team makes the enhancement without proper documentation, which later causes production issues. What process should have been conducted to prevent this?","opts":["A.Control Schedule","B.Perform Qualitative Risk Analysis","C.Plan Scope Management","D.Perform Integrated Change Control"],"correct":["D"],"explanation":"As per PMBoK Sixth Edition Chapter 5 states: \" The Monitoring and Controlling Process Group consists of those processes required to track, review, and regulate the progress and performance of the project; identify any areas in which changes to the plan are required; and initiate the corresponding changes. Monitoring is collecting project performance data, producing performance measures, and reporting and disseminating performance information. Controlling is comparing actual performance with planned performance, analyzing variances, assessing trends to effect process improvements, evaluating po"},{"q":"A department store chain is in the implementation stage of a project to replace the payment systems across all of its stores in multiple countries. The project planning followed a predictive approach, and implementation is based on multiple iterations for each country. Implementation in country C is stalled due to new laws regulating the security of the new payment solution implementation. Which two actions should the project manager take to avoid a significant delay on the project? (Choose two)","opts":["A.Monitor compliance with the laws of each country continuously during planning and after implementation in each country.","B.Document the legal compliance risks in the project management plan for country C in the implementation phase and iterations.","C.Deploy alternative systems compatible with the security standards and legal framework for country C.","D.Execute another country's implementation phase after validating the compliance standards while a solution is prepared for country C.","E.Communicate the delay in the project to the steering committee, and place the project on hold until a decision is reached."],"correct":["A","D"],"explanation":"The project will be delayed, but the PM can reduce the impact of the delay by: Reviewing and validating compliance requirements for other countries and; Starting implementation in another country and while a solution is developed/procured."},{"q":"A project manager for a small company is assigned to a project with a scope that is complex and new. The program manager recommends creating a team with individuals that can offer complementary expertise. What are the characteristics of the network that should be built?","opts":["A.Central coordination, team members with internal and external stakeholders, all participants abiding to the work agreement and set of rules","B.Self-organized, team members with internal and external stakeholders, all participants abiding to the work agreement and set of rules","C.Self-organized, team members with internal stakeholders, all participants abiding to the work agreement and set of rules","D.Central coordination, team members with internal stakeholders, all participants abiding to the work agreement and set of rules"],"correct":["B"],"explanation":"A good professional network should not be restricted to internal participants, should be self-organized with a work agreement in place"},{"q":"There is a conflict between two team members regarding a project task. Which conflict resolution method should project manager use to make it win-win situation?","opts":["A.Collaborate/problem solve","B.Force/direct","C.Smooth/accommodate","D.Compromise/reconcile"],"correct":["A"],"explanation":"The collaborate/problem solve approach leads to new solutions and innovation through collaboration."},{"q":"An agile project team is implementing a supporting technology platform across departments. They're planning a readiness review for the delivery. Who should the project manager propose to conduct the readiness review?","opts":["A.The product owner is responsible for product vision and backlog management.","B.The quality control (QC) manager is responsible for ensuring delivery quality and efficiency.","C.The quality assurance (QA) manager is\u00a0responsible\u00a0for proposing measures for delivery improvement.","D.The subject matter expert (SME) is responsible for a deep understanding of the platform and requirements."],"correct":["D"],"explanation":"In an agile readiness review for a new technology platform launch, the primary focus is to assess if the platform functions as intended and meets departmental needs. An SME possesses the ideal skillset for this task because they have a deep understanding of the platform and requirements to deem the platform ready. The other answer choices are incorrect. While the product owner focuses on product vision and backlog prioritization, their role wouldn't necessarily involve deep technical expertise in the platform itself.\u00a0QC managers typically focus on identifying and addressing defects within the "},{"q":"A client requests a major scope change due to a change in the market environment, which will significantly add to the project cost. This change is approved through the change control process. What should the project manager do to put the project on track?","opts":["A.Reevaluate the scope baseline and impact on the project objectives.","B.Use the management reserve to account for the schedule uncertainty.","C.Monitor risks to ensure the effectiveness of the risk management process.","D.Reevaluate the cost management plan to address the impact of the change."],"correct":["B"],"explanation":"Management reserves are a specified amount of the project budget withheld for management control purposes and are reserved for unforeseen work (unknown-unknowns) that is within scope of the project. The project manager should use the management reserve to account for the schedule uncertainty to keep the project on track. The other answer choices are incorrect. The project objectives are not impacted; risks should constantly be monitored, not just when there is a change; the cost management plan is set up for known-unknowns and contingencies."},{"q":"During testing of a project component, a senior tester discovers a functionality that will ensure the future performance of the project's solution. This will create a change in scope. Which type of change request should be made to include this functionality?","opts":["A.Preventive action","B.Corrective action","C.Defect repair","D.Scope update"],"correct":["A"],"explanation":"PMBoK Sixth Edition Chapter 8 Section 8.2.2.5 states: \"AUDITS An audit is a structured, independent process used to determine if project activities comply with organizational and project policies, processes, and procedures. A quality audit is usually conducted by a team external to the project, such as the organization's internal audit department, PMO, or by an auditor external to the organization. Quality audit objectives may include but are not limited to: Identifying all good and best practices being implemented; Identifying all nonconformity, gaps, and shortcomings; Sharing good practices "},{"q":"A project manager is working on a complex project that includes many stakeholders with conflicting priorities. What should the project manager do to reduce conflict?","opts":["A.Document and sign off on all deliverables in the project.","B.Take the lead in all aspects of the negotiations.","C.Negotiate all aspects with help from the project management office (PMO).","D.Negotiate all aspects using agile for easy deliveries."],"correct":["A"],"explanation":"The right thing for the project manager to do is to document all stakeholder requirements clearly and gain sign-off. Further, if there are any changes in the stakeholder requirements, the project manager should evaluate the impact and\u00a0address\u00a0it with the change management process. This will always keep the stakeholders aligned with the project priorities\u00a0and prevent unnecessary conflicts."},{"q":"A project manager is on a project in a highly regulated environment with a very formal governance process. The project manager is developing the resource plan and identified that the project needs to engage many vendors. Which strategies should the project manager\u00a0use to reduce the procurement cycle? (Choose 3).","opts":["A.Vendors that you used in past projects","B.Integrated teams from various departments","C.Vendors recommended by management","D.Regulated vendor list","E.Focused expediting efforts"],"correct":["B","D","E"],"explanation":"By leveraging internal expertise, utilizing pre-approved vendors, and strategically expediting key steps, the project manager can effectively reduce the procurement cycle and contribute to the project's success. Integrating teams from various departments promotes\u00a0internal collaboration, streamlines communication,\u00a0and leverages expertise from different departments.\u00a0Utilizing a regulated list of vendors will lead to quicker decisions and visibility in the procurement process. The project manager can expedite essential steps and efforts, without compromising thoroughness or compliance, by focusin"},{"q":"A project manager is leading a Scrum team. During Business Acceptance Testing (BAT), the client rejects the deliverable due to poor quality, traced back to a lack of collaboration between team members. What should have the project manager done to\u00a0prevent this?","opts":["A.Provided detailed instructions on how and when the work should be done.","B.Requested detailed documentation and sign-offs between project phases.","C.Implemented detailed tracking of project progress, productivity, and costs.","D.Provided a detailed vision and empowered the team making them accountable."],"correct":["D"],"explanation":"Scrum promotes self-organizing teams and fosters accountability and collaboration.\u00a0The project manager should have shared a\u00a0detailed vision, which provides direction, and\u00a0empowered\u00a0the team to collaborate effectively and deliver high-quality results. The other answer choices are incorrect.\u00a0Detailed instructions could lead to micromanagement, which\u00a0stifles creativity and can hinder collaboration. While some detailed documentation is valuable, excessive documentation can distract from collaboration. While detailed tracking is essential, focusing solely on metrics can distract from fostering a co"},{"q":"A project manager working in a global organization decides to use a low-cost\u00a0social media platform to exchange information, knowledge, and experience within the organization. Which three challenges should the project manager be prepared to deal with? (Choose three)","opts":["A.Lack of physical interaction","B.Time differences","C.Competing priorities","D.Lack of funding","E.Cultural differences"],"correct":["A","B","E"],"explanation":"An internal professional network is based on a common desire to exchange information.\u00a0 A low-cost virtual project office provides flexibility and cost benefits, so competing priorities and\u00a0lack of funding are not an issue.\u00a0The main challenges include\u00a0accommodating a geographically diverse workforce and respecting schedules that may vary across time zones and among different nationalities and cultures (Elkins, 2000). Time differences and cultural diversity are challenges amplified by the lack of face-to-face interaction."},{"q":"A project manager recently completed a project in which they resolved numerous sub-standard deliverables rejected by the customer. The project manager noticed that when thirty (30) prioritized defects of the one hundred (100) total identified for the project were resolved, this resulted in the customer satisfaction feedback increasing to 100% and all deliverables being accepted. Which principle does this occurrence demonstrate?","opts":["A.Pareto","B.Monte Carlo","C.Kaizen","D.Voice of customer"],"correct":["A"],"explanation":"The Pareto principle, also known as the 80/20 rule, suggests that roughly 80% of the effects come from 20% of the causes. In this case, resolving 30 prioritized defects out of the total 100 defects resulted in a significant improvement in customer satisfaction and acceptance of all deliverables. This aligns with the idea that addressing a subset of critical issues can have a significant impact on overall project success. The Pareto principle emphasizes focusing efforts on the vital few factors that contribute the most significant results. The other answers are incorrect. In the given scenario,"},{"q":"For virtual teams, the following are the boundaries that teams need to work through for successful project outcomes, except:","opts":["A.Interpersonal interactions and developing relational capital","B.Working practices and routines","C.Knowledge diversity","D.Personal Convenience"],"correct":["D"],"explanation":"There are three boundaries that teams need to work through for successful project outcomes: (1) interpersonal interactions and developing relational capital; (2) working practices and routines; and, (3) knowledge diversity"},{"q":"A project manager leads two highly motivated teams who typically work on 3-4 concurrent short projects with tight deadlines.\u00a0Recently, communication, morale, and project performance have declined across teams and the project manager wants to improve team effectiveness and project success. What should the project manager do first?","opts":["A.Implement a new collaboration tool to facilitate communication between both teams.","B.Conduct individual performance reviews to identify and address performance issues within each team.","C.Organize team-building activities to increase team cohesion and boost morale.","D.Facilitate open communication sessions to identify and address underlying challenges."],"correct":["D"],"explanation":"The project manager should facilitate open communication to engage both teams so they can\u00a0voice concerns, share frustrations, and contribute to identifying root causes. Working together to analyze the factors contributing to the decline in communication, morale, and performance fosters ownership and empowers teams to find solutions. The other answer choices are incorrect. Implementing a new collaboration tool might be helpful, but it doesn't address the root cause of communication issues.\u00a0Focusing solely on individual performance ignores potential broader team or project-level challenges.\u00a0Team"},{"q":"A virtual project team is composed of members from various countries with cultural differences. The project manager is concerned that cultural differences may lead to miscommunication and conflict. What should the project manager do to effectively mitigate against potential conflicts?","opts":["A.Collaboratively define and communicate the project-specific ground rules.","B.Require that all communications within the project team are in written form.","C.Appoint the senior member of one country's team to act as arbitrator if a conflict arises.","D.Make all conflict resolution decisions and then inform the team."],"correct":["A"],"explanation":"Early, collaborative action to identify points of possible miscommunication will prevent conflict by keeping team members on the same page. Requiring written communication may mitigate some communication challenges, but will not address cultural differences that could lead to misunderstanding. Appointing an arbitrator or taking that role on at the PM level provides a resolution mechanism, but does not address the potential for miscommunication and prevention of escalation."},{"q":"A pilot project is ready to close and the project team wants to capture the challenges that were overcome and the opportunities for future work. Where will they document this information?","opts":["A.Organizational process assets updates","B.Work performance report","C.Project management plan","D.Lessons learned register"],"correct":["D"],"explanation":"IT Project Management: Providing Measurable Organizational Value, Fourth Edition by Jack T. Marchewka guide states: \"Learn, Mature, and Improve A central theme of this text has been the application of knowledge management as a tool for team learning and identifying best practices. Monitoring and controlling activities and tools can help point out problem areas, but the project team must solve these problems. Therefore, it is important that the lessons learned from a project team's experiences be documented so that best practices are identified and disseminated to other project teams. Continual"},{"q":"A project manager is not able to complete the list of project objectives due to conflicting directives from two department directors. Which approach would allow the directors to adjust their directives with a win/win outcome?","opts":["A.Collaborate/problem solve","B.Withdraw/avoid","C.Smooth/accommodate","D.Force/direct"],"correct":["A"],"explanation":"Collaborative or Problem Solving is the best conflict management technique which is a win-win to all stakeholders and is the correct answer. Withdraw or avoid is lose-lose situation and hence is an incorrect choice Smooth/accommodate is lose-win situation and hence is an incorrect choice Force/direct is win-lose situation and hence is an incorrect choice"},{"q":"While reviewing project documentation, a project manager discovers that modifications were made without proper approvals. What should the project manager do next?","opts":["A.Escalate the issue to the project management office (PMO).","B.Review the change management plan.","C.Review the requirements management plan.","D.Escalate the issue to the project sponsor."],"correct":["B"],"explanation":"PMBoK Sixth Edition Chapter 4 Section 4.6 states: \"Perform Integrated Change Control Although changes may be initiated verbally, they should be recorded in written form and entered into the change management and/or configuration management system. Change requests may require information on estimated schedule impacts and estimated cost impacts prior to approval. Whenever a change request may impact any of the project baselines, a formal integrated change control process is always required. Every documented change request needs to be either approved, deferred, or rejected by a responsible indivi"},{"q":"The risk register is a document that records details of all identified individual risks to a project. What is the minimal content of this document?","opts":["A.Identified risks, risk categories, and effects on objectives","B.Risks owners, potential risks responses, and risk triggers","C.Identified risks, risk\u00a0owners, and potential risks responses","D.Issues log, metrics & trends, and distribution of risks across risk categories"],"correct":["C"],"explanation":"The correct answer is identified risks, risks owners, and potential risks responses.\nThe risk register is the document containing the results of the qualitative risk analysis, quantitative risk analysis, and risk response planning. The risk register details all identified risks, including description, category, cause, probability of occurring, impact(s) on objectives, proposed responses, owners, and current status. The other options are incorrect because they do not contain those core materials."},{"q":"At the completion of a project, customer agreement cannot be achieved through negotiations. What should the project manager do next?","opts":["A.Inform project team members.","B.Initiate litigation since all work was completed.","C.Start the closing phase.","D.Explore arbitration."],"correct":["D"],"explanation":"If agreement cannot be negotiated, arbitration should be used. This involves having a neutral third party resolve the issue. Litigation is taking legal action, this should not be the first choice as this may harm the organizations reputation and result in a lost customer. The project cannot be closed without customer agreement. Informing the project team will not resolve the issue."},{"q":"Quality management is a vital aspect of any project. Which of the following quality control aspects is a component of a high functioning measurement system?","opts":["A.Accuracy","B.Non-precision","C.Non-repeatability","D.Duration"],"correct":["A"],"explanation":"A good measurement system should take as long as is needed to ensure that the deliverables meet the needs of the project i.e. Duration is not a component of a good measurement system. Accuracy, Precision, and Repeatability are components of a good measurement system."},{"q":"Engagement and motivation can be successfully achieved by the project manager in a virtual team by all the following, except:","opts":["A.Goal Setting","B.Task Structures","C.Inefficient Collaboration","D.Reward Systems"],"correct":["C"],"explanation":"There are studies that prove that engagement and motivation can be successfully accomplished by the project manager and this can be achieved through goal setting, task structures, and reward systems"},{"q":"A new regulation has been approved that will impact the deliverables in the fourth phase of the project. The delivery is following an iterative approach and is currently completing the second phase. What should the project manager do next?","opts":["A.Consult with the project sponsor to discuss a cost increase.","B.Get approval for the additional budget from the steering committee.","C.Meet with subject matter experts (SMEs) to assess the impact to objectives.","D.Acquire approval for an exception to the implementation of the new regulation."],"correct":["C"],"explanation":"\"Meet with subject matter experts (SMEs) to assess the impact to objectives\" is the best choice as impacts in cost and scheduling, resourcing must be assessed to understand the change(s) required as per the new regulation. \"Consult with the project sponsor...\" this could be one of the steps but not the immediate next step. \"Get approval for...\" this could be one of the steps but not the immediate next step. \"Acquire approval...\" this could be one of the steps but not the immediate next step."},{"q":"In a five-year program, many project team members have joined and left the subprojects. Because of this, conflict among team members often occurs. Which technique should the project manager use to resolve the conflicts long term?","opts":["A.Forcing","B.Smoothing","C.Compromise","D.Problem-solving"],"correct":["D"],"explanation":"Smoothing or Accommodating: The project manager is involved in the conflict, tries to avoid areas of disagreement and tough discussions, and focuses on commonalities. Smoothing is a way to avoid tough discussions. Compromising: This is a mid-way approach. Here, everybody gains some but no one gets exactly what they want. This is a lose-lose approach. Forcing: The project manager makes a decision in favor of one party at the expense of the others. This technique risks demoralizing team members and may cause serious conflict in the future. This is a win-lose approach. Problem Solving or Collabor"},{"q":"A key stakeholder's\u00a0input is essential to a project's success.\u00a0However, the stakeholder is\u00a0always late on critical project decisions. What can the project manager do to re-engage this stakeholder?","opts":["A.Meet with the stakeholder to understand the reason for the delay.","B.Remove the stakeholder from the project.","C.Brief\u00a0the steering committee on the stakeholder's delays.","D.Add the stakeholder's delay to the issue log."],"correct":["A"],"explanation":"The best answer is to meet with the stakeholder to understand the reason for the delay. This will help the project manager to understand the stakeholder's perspective and to see if there is anything that can be done to help them meet their deadlines. By taking this step, the project manager can re-engage the stakeholder and ensure that they are able to meet their deadlines. The other answer choices are incorrect. Removing the stakeholder from the project could alienate the stakeholder and could impact the project's success. Briefing the steering committee on the stakeholder's delays may help t"},{"q":"Project managers should wear a leadership face and drive the project team to achieve the expected deliverables. What qualities should a project manager have? (Choose 3).","opts":["A.Lead","B.Ethical","C.Adapt","D.Aggressive","E.Empower"],"correct":["A","B","C"],"explanation":"LEAD: A good project manager must be able to lead his/her team to achieve the agreed deliverables. If a Project is a temporary endeavor to create something new or to deliver a service, then a project manager's job is to ensure he or she leads the project team to achieve success with the approved budget. Leading citizen development in the organization will not only grow the leader but also the project team will equally grow. ETHICAL: Every system has its ethics. These are the rules and standards guiding the system. PMI has ethics guiding the professional conduct of members. So, a project manage"},{"q":"A project team is working on a regulatory application that has a fixed duration for delivery. The team is using a hybrid approach and has divided development into three sprints. The first two sprints have not produced the required results mainly due to delays from functional units. The finance director is agitated due to the imminent sanctions if the application is not completed, and the project team is demoralized. Who is responsible for inspiring the project team?","opts":["A.Product Owner","B.Financial Director","C.Functional Manager","D.Project Manager"],"correct":["D"],"explanation":"The project manager has the responsibility of removing blockers and motivating the project team. The other answer choices are incorrect. The product owner has the responsibility of communicating with stakeholders. The functional manager is responsible for providing team resources. The financial director focuses on finances and budget."},{"q":"During a retrospective meeting, team members show disengagement, stating that they are repeating the same ideas over and over. How can the project manager best handle this situation?","opts":["A.Ask the team members to pay more attention to the session even if they think they know what is coming.","B.Ask the team members to give their feedback, even if it is the same as other team members, to stress their points.","C.Encourage the team members to provide better feedback as they know the questions already.","D.Encourage the team to provide ideas for process improvement and support changes based on the feedback received."],"correct":["D"],"explanation":"It is best to encourage the team to identify and discuss potential process improvements.Retrospective meetings are fundamental in process-focused learning (like Disciplined Agile Delivery -DAD) by promoting the adoption of retrospectives where the team explicitly identifies potential process improvements, a common agile strategy, and continuous tracking of those improvements. Encouraging team members to provide better feedback assumes that their feedback has not been valuable and may discourage future involvement and increase disengagement. Asking the team members to pay more attention implies"},{"q":"An unforeseen issue results in the need to procure a new piece of machinery critical for meeting quality specifications. From where may the necessary funds be obtained?","opts":["A.Key stakeholders","B.Management reserve","C.Contingency reserve","D.Project sponsor"],"correct":["B"],"explanation":"PMBoK Sixth Edition Section 7.3.3.1 states: \" COST BASELINE The cost baseline is the approved version of the time-phased project budget, excluding any management reserves, which can only be changed through formal change control procedures. It is used as a basis for comparison to actual results. The cost baseline is developed as a summation of the approved budgets for the different schedule activities. Cost estimates for the various project activities, along with any contingency reserves (see Section 7.2.2.6) for these activities, are aggregated into their associated work package costs. The wor"},{"q":"Teams A and B are working on two different agile projects for the same customer. They are using the same method to calculate units of work, and each iteration is 2 weeks long. In the first two iterations, team A completed 150 units of work and team B completed 200 units of work. Both teams' tasks are getting completed as planned. The customer reported 5 errors per unit of work for Team A and 10 errors per unit of work for Team B. What conclusion should the project manager have regarding the teams and their performances?","opts":["A.Team B is performing better than Team A as they have completed more units of work in the same duration.","B.Teams A and B have completed their tasks as planned; therefore, they are both performing equally.","C.Team A is performing better than Team B because there are fewer errors per unit of work.","D.The teams have completed just two iterations; therefore, it is too early to assess their performance."],"correct":["C"],"explanation":"Team A is performing better than Team B because Team A has fewer defects per unit of work. Performance is measured by the number of defects found. Also note that, both the teams are progressing as planned so schedule is not a factor to be used for comparison. The other answer choices are incorrect. Team B is not performing better than Team A because Team B completed more units of work; both teams are not performing equally. In agile development, there is a work increment that is produced at the end of each iteration and the increment or product produced is demonstrated to the client. Hence, qu"},{"q":"A project manager has started developing a plan for a new project. During the first planning meeting, the stakeholders ask about the project's value and how it relates to the organization's goals. What should the project manager do next?","opts":["A.Refer the stakeholders to the scope management plan.","B.Refer the stakeholders to the project charter.","C.Invite the project sponsor to join the meeting to address questions.","D.Ask the project management office (PMO) to provide the necessary documentation."],"correct":["B"],"explanation":"The project team uses the project charter as a starting point for initial project planning to align the project's value and organization goals. The other answer choices are incorrect. The project sponsor will provide the same information as the project charter, which contains the needed information for the stakeholders. There is no scope management plan at this time. It is not the responsibility of PMO to provide the specific information about the project, this is the project manager's responsibility."},{"q":"A project manager begins to notice disengaged members arriving late, not delivering on time, not attending meetings, and producing low-quality deliveries. What action should the project manager take?","opts":["A.Investigate the reason for the team members'\u00a0disengaged behavior and boost morale and participation.","B.Ask the team members\u00a0to change the way they are working to match the newest work trends.","C.Encourage the team to double their\u00a0efforts to pick up the slack from the disengaged team members.","D.Request that the team members abandon the process that is slowing their progress."],"correct":["A"],"explanation":"The project manager should investigate the reason for the team members' disengaged behavior and boost morale and participation. The project manager needs to understand why the team members are disengaged and then take steps to address it. This could involve providing more support, giving the team members more autonomy, or changing the way the project is structured. Boosting morale and participation will help to improve the team's performance. When team members feel engaged and motivated, they are more likely to be productive and deliver high-quality work. The other answer choices are incorrect"},{"q":"During project execution, a team member made a mistake resulting in a 1-week delay to the project schedule. What should the project manager do with regard to this error and delay?","opts":["A.Discuss the issue with the team, look for solutions, and offer to help and support the team.","B.Make sure the impact of this mistake is understood by the team member who made the mistake.","C.Escalate the issue to senior management to make sure a similar mistake won't happen again.","D.Find a solution, communicate it to the team, and reinforce that it should be implemented now."],"correct":["A"],"explanation":"Show support is one of the requirements for a good leader. This question and rationale were developed in reference to: Effective PM: Trad, Agile, Extreme (2015) Robert K. Wysocki/Wiley/Chapter 6: How to Launch a TPM Project/Putting It All Together [Item This chapter discussed the team, its membership, the skills needed of the members, and the rules that the team must follow as it goes about the work of the project. Even though you have done your best to put the team together and have set and agreed on the operating rules, much is yet to be done. The team needs to learn how to work together by "},{"q":"Midway through project execution, several stakeholders raise concerns about team performance and delivery. The project manager believes the project is progressing per the approved scope, budget, and schedule. What should the project manager do next?","opts":["A.Email the stakeholders to assure them of action.","B.Consult the communications management plan to manage stakeholders' expectations.","C.Ask the project sponsor to intervene.","D.Ask stakeholders to escalate their concerns to the CEO."],"correct":["B"],"explanation":"In order to understand the stakeholder's concerns on team performance and delivery, the Project Manager will first need to understand stakeholders expectations and means of communication methods for managing them. Hence, the Project Manager will need to check/consult the communication management plan. Therefore this choice is the correct answer. Once the stakeholder concerns are understood, the Project Manager will need to check if it can be resolved. He can then, email the stakeholders to assure them of action. Hence this option is not the best choice. Asking the project sponsor to intervene "},{"q":"A project manager is managing an agile project. In order to make sure there is enough funding available for the project, the project sponsor is asking the project manager for an estimate when the project will be completed. How should the project manager respond to the sponsor?","opts":["A.Inform the sponsor that an estimate is not necessary, as agile supports responding to change over following a plan.","B.Remind the sponsor that agile projects are not judged based on budget and schedule.","C.Provide the estimate to the sponsor, as agile supports estimating.","D.Influence the sponsor to add a contingency buffer to the cost in case of a cost overrun."],"correct":["C"],"explanation":"Provide the estimate to the sponsor, as agile supports estimating. The other answer choices are incorrect. It is a myth that estimation is not necessary in agile, but there are foundational steps to ensure project success."},{"q":"What approach should a project manager employ to encourage collaboration among developers in an agile development model?","opts":["A.Acceptance testing","B.Behavior-driven development","C.Joint application development","D.Rapid application development"],"correct":["B"],"explanation":"Behavior-driven development builds on established test-driven practices including using a shared domain language to encourage closer collaboration and understanding within the team."},{"q":"What should a project manager do first when people are not following the project compliance process?","opts":["A.Escalate the issue to senior management or the sponsor","B.Initiate an audit process","C.Log the non-compliance and watch the progress","D.Understand the reasons for non-compliance"],"correct":["D"],"explanation":"Methods to support compliance"},{"q":"A project leader and a product owner had a side conversation about the status of the next\u00a0delivery. The product owner raised concerns about the way the architecture owner is dealing with the coming delivery. What should the project leader do to address this issue?","opts":["A.Reassure the product owner not to worry and ask them to attend the daily meetings.","B.Share the product owner's\u00a0concerns with the architecture owner and ask for their opinion.","C.Ask the product owner not to get involved and ignore the concerns until after the delivery.","D.Make sure that team members attend daily meetings to discuss and resolve issues."],"correct":["D"],"explanation":"Fostering team discussions and decision-making in resolving issues is essential in agile, effective team growth, and improving the way they work together. Reassuring the owner that all is OK, or that the owner should refrain from comments does not address the issue. Similarly, sharing the input only with the architect does not allow for the differing perspectives of all team members to be considered when addressing the situation. Reassuring the product owner not to worry and asking them to attend the daily meetings is incorrect because the product owner shall do an objective evaluation of the "},{"q":"A project leader noticed that a new team member is demotivated and always arrives late to work, causing a delay in the deliverables. What should the project manager do?","opts":["A.Ask HR to deal with the team member's attendance, advise them to arrive on time, and remind them of the incentives at the end of the project.","B.Ask a senior team member to speak with the team member, share personal experiences, and find out the reasons for the performance issues.","C.During the daily meeting, ask all team members to arrive on time, and plan an event after working hours to celebrate the project progress.","D.Talk with the team member on a one-to-one basis, emphasizing the importance of teamwork and the value of each member's contributions."],"correct":["D"],"explanation":"One on one communication with the team member who is struggling will allow the PM to understand their situation and motivations. Each of the other answers simply pushes the problem to someone else."},{"q":"An organization previously using predictive approaches has recently decided to adopt the Scaled Agile Framework (SAFe\u00ae) approach. A critical project for the organization is in the middle of the execution phase at the time of this decision. Which approach should the project manager use to continue the project delivery?","opts":["A.Scrum","B.Kanban","C.Predictive","D.Large-Scale Scrum (LeSS)"],"correct":["C"],"explanation":"Switching frameworks would pose a substantial risk to the project's delivery, given its critical state. Continuing with the Predictive framework has the lowest risks. On a portfolio level, the SaFE architecture enables the integration of waterfall methodologies."},{"q":"A project manager is assigned to a legacy system modernization project. The project management plan is solidified and the requirements have been handed off to the IT department for development. However, the company's CEO announces the company's new strategic direction and upcoming plans for an enterprise resource planning (ERP) implementation. What should the project manager do?","opts":["A.Ask the project sponsor for recommendations to keep the project on track.","B.Understand and clarify how the existing project aligns with the overall organization vision.","C.Conduct a project team meeting to plan and confirm resource assignments for the new project.","D.Review the project schedule to ensure the project will be completed on time."],"correct":["B"],"explanation":"Individual projects should support the company's strategic direction. The other answer choices are incorrect. They promote continuing the project as-is without taking into account the new vision and strategy."},{"q":"While executing a critical iterative phase of a project, a problem previously identified as a risk just became a confirmed issue, which has halted progress. After entering the new item in the issue log, what should the project manager do next?","opts":["A.Increase communications and involve stakeholders in the resolution whenever necessary.","B.Change the communications management plan and assign ownership to a team member.","C.Escalate the issue within the team during the next project retrospective meeting.","D.Add the issue to the product backlog to bring it into focus during the current sprint."],"correct":["A"],"explanation":"Effective issue management requires increased communication and should include stakeholders whenever necessary. All relevant stakeholders should be made aware of the issue and contribute to its resolution. The other options are incorrect because the project manager should involve stakeholders in the resolution as necessary. Updating the communication plan is incorrect because it may not be necessary once the issue is resolved. If progress is halted, the project manager cannot wait for the next retrospective meeting. In an agile environment, items from the backlog are not added to a current spr"},{"q":"The project manager for a complex project, aimed at improving the company's financial results, decides to use the Expected Monetary Value (EMV) method to select the best strategy. To achieve this, the project team defines three scenarios with the following probabilities of outcome: scenario 1 (25%), scenario 2 (50%), and scenario 3 (25%) for strategy A, with scores $160, $120, and -$20 respectively. The other strategy, strategy B, scored an EMV\u00a0of $75. Which strategy will the project manager prefer?","opts":["A.Strategy A with an EMV score for Strategy A of 65.","B.Strategy B with an EMV score for Strategy B\u00a0of 75.","C.Strategy A with an EMV score for Strategy A of 95.","D.Strategy B with an EMV score for Strategy A of 95."],"correct":["C"],"explanation":"The formula for EMV is: Expected Monetary Value (EMV) = (Probability of Scenario 1)(Payoff for Scenario 1) + (Probability of Scenario 2)(Payoff for Scenario 2) + (Probability of Scenario 3)(Payoff for Scenario 3). EMVa = (0.25)($160) + (0.50)($120) + (0.25)(-$20) = $95. In this situation EMV for strategy A is $95 and we are given that EMV for strategy B is $75.\u00a0Therefore, Strategy A will be preferred by the project manager because it has the highest EMV."},{"q":"While conducting a retrospective meeting, team members were surprised from the performance results of the team shared by the project lead. The team have all expressed their ignorance of the measurements and availability of the different tools in place. What should have the project lead done to avoid this situation?","opts":["A.Ask the HR to explain the different performance measurement tools","B.Inform the team members to fill in feedback on a regular basis","C.Provide Team members with continuous feedback about their performance","D.Planning and define a clear performance measurement framework"],"correct":["D"],"explanation":"\"Planning and define a clear performance measurement framework\" is the best choice for the given context in the stem as the effective project management measurement system constitute a systematic approach to performance improvement through an ongoing process of establishing metrics, leading to the success at the team and the delivery level \"HR explain the different...\" is not the right choice as HR has no role in this context \"Inform the team members to...\" is not the right choice even though getting the feedback may improve the way of working but not going to help in the current situation \"Pr"},{"q":"An agile project is in its last iteration. During the daily standup, the team realizes that they will not be able to complete all the activities that were planned for the sprint. The team members create a contingency plan. What should the project manager do next?","opts":["A.Discuss the contingency plan with the product owner.","B.Discuss the contingency plan with stakeholders.","C.Discuss the contingency plan with the project sponsor.","D.Execute the contingency plan immediately."],"correct":["A"],"explanation":"After the project team creates the contingency plan, the project manager should discuss it with and seek approval from the product owner.\u00a0The project manager should meet with the product owner to discuss the contingency plan and manage expectations around adding scope, the implications to the budget, and the availability of project team members. The product owner prioritizes the project backlog on an ongoing basis so that high-priority items are completed. If the schedule or budget is constrained, the product owner may consider the project done when the highest priority items are delivered. Th"},{"q":"A business environment has become unstable because a stakeholder has altered the project deliverables and outcomes in the middle of the execution phase. Taking the stakeholder into consideration, how should the project manager ensure the project benefits are delivered?","opts":["A.Ensure the project team agrees to the project management plan and provide the stakeholder with constant updates.","B.Combine both agile and predictive approaches and manage changes to the overall scope with minimal deviations.","C.Ensure the project's deliverables and objectives are tailored to the initial requirements.","D.Engage the stakeholder based on level of impact and ensure their requirements are captured adequately according to change management process."],"correct":["D"],"explanation":"The project manager should properly engage the stakeholder based on level of impact and influence on the project. The PM should ensure the stakeholder's requirements are captured adequately according to change management process. The other answer choices are incorrect. They do not reflect the requirements of the stakeholder and don't promote stakeholder engagement."},{"q":"A project manager must make decisions daily, regardless of the decision's level of importance or criticality. What should a project manager do to ensure their decisions are unbiased and rational?","opts":["A.Utilize data without checking for accuracy","B.Understand they cannot achieve everything","C.Make decisions quickly","D.Make decisions only when the results are certain"],"correct":["B"],"explanation":"It is a common flaw to have an optimism bias. Optimism bias is the tendency to be over-optimistic, overestimating favorable and pleasing outcomes. Taking decisions quickly or waiting till the results are certain or utilizing data without checking for accuracy are incorrect options"},{"q":"A project manager is leading a project that entails transitioning to agile. The project will pilot the agile delivery modeled around using four resources from a vendor, working alongside two internal resources with no agile experience. The project manager needs to act as a coach for the project team and help them understand the differences between the functioning of a traditional project team and an agile team. What is the most important thing the project manager needs to do to establish agile team behavior?","opts":["A.Focus on the produced result of the team.","B.Build trust within the team.","C.Encourage collaboration among the team.","D.Hold each team member accountable."],"correct":["B"],"explanation":"The foundation of agile team behavior is trust. Agile teams are self-organizing and self-directed, which means that they rely on trust to function effectively. Team members must trust each other to be able to make decisions, share information, and collaborate effectively. The other answer choices are incorrect. Being results-focused, collaborating, and being held accountable are all\u00a0essential to agile teams, however, trust is the foundation."},{"q":"A project manager is managing a project that has a component using agile. The project sponsor asks the project manager to add a new component to this project which is government regulated with new complex tax-rules with enough time provided to implement these rules. The sponsor suggests implementing this new component using predictive non-agile approach due to its complexity. Which methodology will the project manager use for this new component?","opts":["A.Inform the project sponsor that you will manage the new component using agile methodology as agile supports one-size-fits-all.","B.Use hybrid approach by continuing to manage the existing component using agile, and the new component using predictive.","C.Manage the existing component as well as the new component using predictive plan-based approach.","D.Seek guidance from project sponsor for which methodology will suit best for new component."],"correct":["B"],"explanation":""},{"q":"A project manager is helping their organization transition from utilizing predictive methods to agile methods. One team member asks when high-level requirements definition and solution design activities should be done in an agile methodology.\nHow should the project manager respond?","opts":["A.In agile, these activities must start as soon as the project team is assembled, preferably in sprint one.","B.In agile, the team should plan to perform some of these activities as part of sprint zero before starting development.","C.In agile, the team should avoid waste, so these activities must be done as part of development.","D.In agile, the team follows the last responsible moment strategy and should defer those activities as much as possible."],"correct":["B"],"explanation":"Agile doesn't prescribe lack of design documentation or requirements definition. Because the time to develop them, inclusive the initial Product Backlog, those activities are not timeboxed to the length of a st
