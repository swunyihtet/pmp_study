andard Sprint and are done before in Sprint 0 that can have a different duration than the other Sprints"},{"q":"A project manager is handling virtual teams around the world. What should the project manager do to overcome cross-cultural differences?","opts":["A.Create grapevine communication channels and invite team members to contribute freely","B.Nurture stronger personal boundaries and individual sovereignty","C.Create an environment where team members can openly communicate","D.Create a shared understanding of team goals and objectives"],"correct":["D"],"explanation":"Here are four things you can do to overcome cross-cultural differences: Create a shared understanding of team goals and objectives. Do not assume things \u2014 Communicate, Communicate, and Communicate. Build trust. Have a project manager or coordinator who is receptive and experienced with managing cultural differences in a virtual team."},{"q":"Which statement correctly differentiates management from leadership?","opts":["A.Managers ask how and when; leaders ask what and why.","B.Managers focus on long-term goals; leaders focus on short-term goals.","C.Managers challenge the status quo; leaders accept the status quo.","D.Managers inspire trust; leaders rely on control."],"correct":["A"],"explanation":"Managers usually ask how and when but leaders ask what and why. Managers focus on short-term goals; Leaders focus on long-term goals Managers accept the status quo however leaders challenge the status quo Managers rely on control; Leaders rely on inspiring trust Toolbox"},{"q":"A project manager is assigned to a water treatment investment project. The local government has recently passed a law that requires compliance with clean water according to global standards. This is a new regulation that was initiated in the last month and was quickly passed. What should the project manager do?","opts":["A.Inform the stakeholders and continue with the project according to the original plans since the law was passed after the project started.","B.Meet with the project sponsor and recommend that the project continue because the new legal requirements can be delivered.","C.Conduct an analysis of the impact of the regulation on the project and the business and communicate it to stakeholders.","D.Recommend that all work on the project be stopped immediately until the impact of the regulation is understood."],"correct":["C"],"explanation":"For a project to be delivered successfully, as the first step, any impact on the projects scope by the business environment must be identified and analysed and the impact on triple constraints [scope, time and cost] needs to be communicated to all stakeholders. Hence this option is correct. All Regulatory requirements for the project needs to be met for the project to be completed. Hence the Project Manager cannot state that law was passed after the project got started nor can the Project Manager continue with the new regulatory requirement without conducting an impact analysis nor can the Pro"},{"q":"Which leadership style would help people to connect, even when working remotely and never having met each other?","opts":["A.The participative style","B.The Affiliative style","C.The Pace Setting style","D.The Coaching style"],"correct":["B"],"explanation":"By definition the Affiliate style is the one bringing people together."},{"q":"A project manager is working on a large business transformation project. The project requires a significant change management effort and the project manager has decided to use the Kotter model. The project manager has created a sense of urgency and formed a guiding coalition to implement the change. What else should the project manager do? (Choose 3)","opts":["A.Develop a vision and strategy.","B.Ensure frequent deliveries in short intervals.","C.Communicate the vision constantly.","D.Ensure business people and developers work together.","E.Accomplish short-term\u00a0wins."],"correct":["A","C","E"],"explanation":"The Kotter model involves eight steps: establish a sense of urgency, form a powerful coalition, develop a change vision, communicate the vision, empower action, create quick wins, build on the change, and make it stick. The other answer choices are incorrect. Delivering in short intervals and ensuring business people and developers work together are aligned with agile principles.\u00a0The Kotter model focuses on implementing change in a series of steps, and it does not specifically mention the need for business people and developers to work together, but it does emphasize the importance of communic"},{"q":"A project manager is finishing a project and the sponsor is requesting insights on benefits realization. How can the project manager calculate project outcomes value?","opts":["A.Evaluate qualitative and quantitative project benefits.","B.Price tangible benefits and divide them by expenses.","C.Conduct a retrospective financial assessment.","D.Assess outcomes and compare them to the budget."],"correct":["A"],"explanation":"To calculate project outcomes value, the project manager should evaluate both qualitative and quantitative project benefits. This will help to determine the overall value of the project and provide insights on benefits realization. A project benefit is the outcome of actions, behaviors, products, services, or results that provide value to the sponsoring organization. Metrics are used to show realized benefits, direct and indirect measures, which means they can be obtained by evaluating both qualitative and quantitative outcomes.\u00a0\nThe other options may not effectively capture the full range of "},{"q":"A project manager is assigned to a project and the first task is to assist in creating the Work Breakdown Structure (WBS). Which tool, technique or document is used as starting point for an effective WBS creation?","opts":["A.Scope baseline","B.Activity list","C.Project charter","D.WBS dictionary"],"correct":["C"],"explanation":"The charter contains a high level definition of scope/deliverables that can be used to generate a top down decomposition in support of the development of the WBS. Scope baseline: This will be an output from the planning process, and incorporates the WBS within. Activity List: This will be generated in the planning stage as a component of schedule development. WBS Dictionary: Is a supporting document to the WBS, elaborating on WBS detail"},{"q":"A design project is ready to be transferred to production. What activity is required for phase closure?","opts":["A.Determine summary budget.","B.Manage quality.","C.Ensure preventive actions are completed.","D.Record impacts of tailoring to any process."],"correct":["D"],"explanation":"A summary budget will not help in transitioning the project to production. Quality should be managed throughout the project and quality criteria would be met and preventive actions would be completed before it has been determined that the project is ready for transition and closure. As part of integration management in project closure, the project manager should create the final report to record impacts of transitioning and tailoring the project to another team."},{"q":"A project manager is leading an agile project that is in the execution phase. After a couple of sprints, the project manager realizes that the team's estimates are not realistic. What action should the project manager take to remove this impediment?","opts":["A.Ask the team to address this issue at the next the retrospective to avoid impacting the sprint in progress.","B.Obtain approval from project sponsor to add a contingency buffer to the sprint, and change the end date.","C.Ask the team to address this issue at the next standup, and meet the commitment for the sprint in progress.","D.Organize product backlog refinement sessions to better understand the scope and review estimations."],"correct":["D"],"explanation":"This is not a real impediment but part of the process improvement and a solution should not be imposed to the team. Sprint length can't be changed. Backlog refinement is the best way to improve the estimation process and people's estimation skills."},{"q":"An organization has decided to implement agile and a project manager with Scrum Master has been selected to coach the project team to understand agile delivery. One of the team members asks the project manager\u00a0what servant leadership hierarchy means. How should the project manager respond?","opts":["A.Team members are supposed to serve their manager.","B.Managers are supposed to serve their team members.","C.Clients are supposed to serve the team members.","D.Team Members are supposed to serve their clients."],"correct":["B"],"explanation":"Servant leadership is the inverted hierarchy. In Agile,\u00a0the manager is a leader that serves the team by creating the environment for the team to grow, removing impediments, and facilitating rather than commanding."},{"q":"A project manager notices that the project is behind schedule because materials delivery was delayed. The procurement team informs the project manager that new government-imposed rules for the procurement of these materials caused this delay. In what plan should these new rules be documented?","opts":["A.Procurement management","B.Communications management","C.Stakeholder engagement","D.Schedule management"],"correct":["A"],"explanation":"PMBoK Sixth Edition in Chapter 12 states: \"KEY CONCEPTS FOR PROJECT PROCUREMENT MANAGEMENT More than most other project management processes, there can be significant legal obligations and penalties tied to the procurement process. The project manager does not have to be a trained expert in procurement management laws and regulations but should be familiar enough with the procurement process to make intelligent decisions regarding contracts and contractual relationships. The project manager is typically not authorized to sign legal agreements binding the organization; this is reserved for thos"},{"q":"Due to commitments to another project, an accountant fails to deliver an important report to a project manager on time. The project manager did not expect the delay and didn't realize the accountant had conflicting priorities. What should the project manager have done to avoid this?","opts":["A.Referenced the RACI matrix.","B.Referenced timesheets.","C.Referenced the resource allocation plan.","D.Referenced the resource calendar."],"correct":["C"],"explanation":"The\u00a0project manager should have referenced the resource allocation plan to avoid the accountant failing to deliver the important report. The resource allocation plan is a document that identifies the resources that will be needed for the project and how they will be allocated, such as personnel, equipment, and materials.\u00a0By referencing the resource allocation plan, the project manager can ensure that the resources that are needed for the project, in this case the accountant, are available and that they are allocated in a way that maximizes efficiency. The other answer choices are incorrect.\u00a0A "},{"q":"While forming a team to work on a global project, the project leader calls for an ice breaker meeting between the diverse team members. What should the project manager do to motivate the team to express their expectations?","opts":["A.Ask the team members to write their expectations on post notes","B.Ask direct questions to each team member and wait for their responses","C.Inform the team members about the incentives of the project success","D.Start by doing a team self-assessment to increase team autonomy"],"correct":["D"],"explanation":"Self assessment force team members to think about how they perform and increase accountability"},{"q":"A project manager is working on the development of a business case to secure funding and resources. What is needed to ensure that the right priority is assigned to the project?","opts":["A.Developing the most efficient delivery plan","B.Developing a clear and detailed project schedule","C.Aligning the project with company\u2019s goals and objectives","D.Aligning the project with company\u2019s roadmap"],"correct":["C"],"explanation":"To ensure that the right priority is assigned to the project, it is crucial to align it with the company's goals and objectives. This ensures that the project is directly contributing to the strategic direction and priorities of the organization. By aligning the project with the company's goals, decision-makers can assess its relevance, strategic importance, and potential impact, which can help in securing funding and resources. The other answer choices are incorrect as they\u00a0focus more on the efficiency and scheduling aspects of project delivery, which are important considerations but may not "},{"q":"During a daily meeting, the project team raised an impediment that one of the business subject matter experts is frequently changing the definition of done, and expressed their fear that this is a sign of distrust. What should the project manager do?","opts":["A.Remind the team to focus on their work, and commit to speak with the SME","B.Remind the product owner to support the team and speak with the SME","C.Remind the SME to keep the definition of done that was initially agreed","D.Remind the team that continuous feedback is important for success"],"correct":["D"],"explanation":"It is the project leader's duties to make sure to receive feedback on regular basis, and work on prioritizing changing stakeholder needs, and involve the team and the stakeholder in the accomplishment of the changes. This is part of the team empowerment process. In Agile process, the definition of done can be changed. Remind the team to focus on their work and ignoring the SME is the worst approach"},{"q":"A new Scrum project manager at a company is contracted to build a traffic measurement and control application for a municipality. The project manager is notified that the municipality has just rejected the traffic measurement portion of the application because it does not comply with longstanding national regulations. What should the project manager have done to avoid this situation?","opts":["A.Requested that the product owner handle the regulation compliance.","B.Allocated an experienced\u00a0team member to validate regulatory\u00a0compliance.","C.Made the scrum master solely responsible for regulatory\u00a0compliance.","D.Discussed the importance of regulation compliance with the sponsor."],"correct":["B"],"explanation":"The project manager should allocate a team member who has the expertise and resources to validate compliance with all applicable regulations. This is a proactive approach that helps to ensure that the project is compliant before it is submitted to the municipality for approval. Allocating a team member distributes the workload among the team while ensuring that someone with the necessary expertise is responsible for compliance.\nRequesting that the product owner handle the situation is not the best option because, while the product owner is responsible for defining the product vision and priori"},{"q":"A project manager is working in an agile environment on a project that will span a few years. The end user asks for a pilot in the first quarter of the project. What are the optimal times to conduct a formal readiness review? (Choose two).","opts":["A.Every quarter","B.Every month","C.At major handoff points","D.At the beginning of the pilot","E.At the end of the pilot"],"correct":["C","D"],"explanation":"Validation of objectives should be done at points where the validation is required to confirm that agreements are met. Once the Pilot starts there is no need for addition validations because that will be very likely part of the pilot itself. Having too many reviews is counterproductive and can increase the cost and time. Readiness Review is not a monitoring activity but a validation that the project met the objectives for a major project stage (like a release to external users or other projects)."},{"q":"A new project manager is assigned to lead an agile project. The project manager wants to use motivation to encourage the team to perform well throughout the project. What should the project manager do?","opts":["A.Implement a reward system aimed to keep the team engaged and motivated.","B.Use the management reserves to fund some team-building activities.","C.Inflate project estimates to provide a financial buffer for team activities.","D.Ask project sponsor to fund more for team building activities."],"correct":["A"],"explanation":"as stated on enabler 1.2.5, The PM should inspire and motivate the team and one of the tools available is the use of a reward system. Also as an Agile servant leader, the PM must promote the team motivation and a reward system is a great tool for that."},{"q":"A project manager is tracking an infrastructure project that is dependent on a service provider. The service provider informed the project manager that some of the third-party components will no longer be manufactured or supported. Upon an initial review, this would significantly delay the schedule and increase the budget. What should the project manager do?","opts":["A.Escalate this issue to the project sponsor.","B.Update the risk register.","C.Convene a review with the team.","D.Update the project status to reflect these findings."],"correct":["A"],"explanation":"External threat beyond scope of project manager should be escalated to project sponsor. This would be significant budget and scope"},{"q":"The first version delivered to the quality control team has poor performance, and the testers are complaining that they cannot complete all the test cases as planned. Which is a tool to help to monitor performance?","opts":["A.Run Chart","B.Data Flow Diagram","C.Flow Chart","D.Non-Control Chart"],"correct":["A"],"explanation":"A Flow Chart is is a diagram that depicts a process, system or computer algorithm, it is not used for statistical control. The Data Flow Diagram is not used for statistical control. Non-Control Chart is a made up term. The methods used for statistical control are Run Chart, Pareto Chart, and Control Chart."},{"q":"A project manager is working on a project with internal stakeholders only and was warned by the project sponsor that some stakeholders require special attention.\u00a0The organization is very hierarchical. Which of the following models should be used in this instance?","opts":["A.Power-Interest Grid","B.Power-Influence Grid","C.Interest-Influence Grid","D.Interest-Impact Grid"],"correct":["A"],"explanation":"The project manager should use a power-interest grid.\u00a0This is a simple 2 X 2 matrix\u00a0in which stakeholders are classified according to the power they have, either within the organization or within the project context, and their interest in the project or its outcomes. As a result of this analysis, we can tailor our communications approach for each group. For example, stakeholders with high power and high interest would probably represent our key stakeholder group, and we would want to manage the expectations of this group carefully. This suggests that interactive and push would be two of the ma"},{"q":"During a project governance assessment, and after expending 40% of the approved project budget, management approved the auditor's recommendation to have the project terminated. What should the project manager do next?","opts":["A.Compute the expected monetary value of the project and document it in lessons learned.","B.Engage an independent consultant to justify project continuation.","C.Initiate the project closeout process and document lessons learned for future reference.","D.Prepare a financial report to recognize the actual costs expended as sunk costs."],"correct":["C"],"explanation":"The project manager has to comply with the approved recommendations of the auditors, based on the resolution of the stakeholders. The project manager should initiate the closeout process next. The other answer choices are incorrect. The expected monetary implies that they are starting a new project; an independent consultant cannot be engaged to justify continuing the project when the decision to terminate the project has already been made; and preparing a financial report will be the result of the closeout process."},{"q":"A project manager in an organization selects an agile delivery for a cutting-edge technology project. The project manager develops a professional network and wants the product owner to join this network. Which two benefits will the project manager use to encourage the product owner to join and participate in the network? (Choose two).","opts":["A.Access to global knowledge and workforce","B.Lower risk and cost","C.Opportunity to engage with resources","D.Formal professional network"],"correct":["A","C"],"explanation":"\"Free\" sharing knowledge comes with risk, both positive and negative and although is \"free\" that should not be an argument for it. Building the network creates the opportunity to identify and engage resources in a formal way."},{"q":"A project manager is managing a hybrid project with a fixed time and fixed price agreement. The project manager is having difficulty getting the team to submit their time sheets. The feedback received from the team is that work will be delivered every two weeks, so no time sheets are required. However, the project manager needs the time sheets to complete a cost assessment of the project. What should the project manager do to ensure all team members submit their time sheets as required?","opts":["A.Ask the project management office (PMO) to ensure the team submits their time sheets.","B.Send a weekly reminder to each team member notifying them to submit their time sheets.","C.Explain the impact of not submitting time sheets on the project's cost assessment.","D.Change the submission frequency for the time sheets from biweekly to weekly."],"correct":["C"],"explanation":""},{"q":"A project manager had just started a long-term project when the government implemented new legislation that all engineers working in the state need to be registered. Registration is based on work area, experience, and professional development completed in the last 3 years. Due to budget constraints in the company for the past three years, there were limited opportunities for engineers to gain formal professional development. How should the project manager handle the situation?","opts":["A.Send a request to the change management board to assess the situation.","B.Review the team's skills matrix and update the resource management plan.","C.Send all of the engineers to professional development to meet the requirements.","D.Inform the engineers that they need to be registered to keep working for the company."],"correct":["B"],"explanation":"The first step would be to assess each engineer's status and determine where professional development is warranted. Updating the team skills matrix will allow better planning for the projects as you may be able to stagger the implementation of engineers while others are in training. No change request is needed to assess the situation, and it is premature to send all engineers to professional development, before determining which people need it. Requiring all engineers to be registered to continue employment with the company does not address the situation with this project."},{"q":"The headquarters of a multinational company is in Europe, with many regional offices in other countries around the world. The operations director of a regional office decides to establish a project management office (PMO). A project manager has been selected to manage the project, which is in its initial phase. The project manager needs to align stakeholder expectations with the benefits of the project process and the business strategy.\nWhich document should the project manager develop for this purpose?","opts":["A.Business case","B.Benefits management plan","C.Project charter","D.Project management plan"],"correct":["C"],"explanation":"The project manager should develop a project charter for this purpose. A project charter is a document that formally authorizes a project or a phase and defines the initial requirements and scope of the project. It outlines the project's objectives, stakeholders, risks, assumptions, and constraints. The project charter is a critical document that helps to align stakeholder expectations with the benefits of the project process and the business strategy. The other options are incorrect. A business case is used to determine if the cost of a project is justified. A benefits management plan details"},{"q":"While reviewing a status report, a project manager notices that, over a period of six months, the coding quality for one developer is statistically lower than another developer assigned the same task. Which tool should the project manager use to trace the problem's source back to its actionable root cause?","opts":["A.Histogram","B.Control chart","C.Scatter diagram","D.Ishikawa diagram"],"correct":["D"],"explanation":"An Ishikawa diagram is also known as a fishbone diagram or a cause-and-effect diagram. This will show the project manager the root cause of the problem. A histogram will show the number of defects per deliverable, not the causes. A scatter diagram shows the relationship between two variables. It can be used to determine a problem, not the cause. Control charts are used to show the maximum and minimum values that meet the requirements, again, not the cause."},{"q":"A geographically dispersed team successfully completed a project. The project manager wants to quickly obtain the team's feedback for statistical analysis. What method should the project manager use?","opts":["A.Video conference","B.Focus group","C.Questionnaires","D.Email"],"correct":["C"],"explanation":"An email or video conference would not provide consistent information that could be used for statistical analysis. A focus group typically includes a subset of the team and would not provide information from the entire team. A questionnaire should be sent to all team members, this would allow the project manager to obtain consistent feedback from all team members that could be analyzed statistically."},{"q":"A project manager is leading a project that received a request for additional scope caused by changes in market demand. The change request also seeks a more rapid delivery time frame. Which two actions should the project manager take? (Choose two)","opts":["A.Assess company performance and the scope of other projects to ensure minimal impact.","B.Organize a workshop with the sponsors and ask them to increase the project budget.","C.Collect data and analyze the business environment to validate the business benefits.","D.Assess new technologies and competitors, then benchmark the change against them.","E.Organize a risk workshop, then update the risk management plan and the risk register."],"correct":["C","E"],"explanation":"C and E are correct answers, both are referring to preparing a Change Request (CR) to change the project scope and timeframe. Option C) ensure that the PM knows that that the Change Request (CR) should be validated. Any change introduces risk, therefore an update of the Risk Management Plan and the Risk Register are mandatory. Asking straight for more money or internal and external assessments are not justified. Company performance is not a decision factor in developing a change Request."},{"q":"A project manager is leading a critical project to deliver a new solution. The CEO is highly invested in the project, and the CFO is the product owner. During the testing phase, the CFO requests an additional nonfunctional requirement to shorten the frequency of transaction processing. This new requirement will impact the launch date, and the CFO is insistent on having it implemented. What should the project manager do to minimize the impact of the new requirement on the launch date and manage the expectations of the CEO and CFO?","opts":["A.Meet with the CFO and suggest delaying the implementation of the new requirement to the post-launch phase.","B.Ask the CEO to intervene and stop the implementation of the new requirement, as development is complete.","C.Tell the project team to update the product backlog with the new requirement and adjust the project plans.","D.Assess the scope of the new nonfunctional requirement to determine its specific impact on the planned go-live date."],"correct":["D"],"explanation":"Assessing the scope is a crucial step in managing the situation effectively, making informed decisions aligned with project goals, and ensuring stakeholder expectations are met. It may be clear that there will be an impact of some sort, but the project manager needs to do a more detailed assessment to understand the specific impact on the project timeline, budget, and risk profile. The project manager needs to clearly understand the potential impact of the requirement before making any decisions about implementation. The other options may be considered in subsequent steps, but they should be b"},{"q":"A project manager is managing a project whose sponsor has asked why some of the components of the project were developed in-house. Where can this information be found?","opts":["A.In the Procurement Management Plan, under build vs. buy decisions","B.In the Project Charter, under the assumptions and constraints section","C.In the Technical Architecture Document, under solution boundaries","D.In the Solution Architecture Document, under project purpose and justification"],"correct":["A"],"explanation":"Delivering part if the solution in house is an outcome of the buy vs build analysis and a decision that will be detailed in the procurement management plan"},{"q":"A project is in the testing phase, and the quality control team informs the project manager that the quality of the deliverables from one vendor is poor. Their investigation found that the staff assigned does not have the required certifications. How did this issue arise?","opts":["A.The vendors' proposal did not include the list of people assigned to the project.","B.The project sponsor did not mandate three references from previous customers.","C.The Procurement Management Plan did not include the certifications required","D.The quality control team had too high of standards and tested too thoroughly"],"correct":["C"],"explanation":"The Procurement Management plan must include the certifications and qualifications required. Certifications are at the company level (ISO 900 Quality Management Certified) and/or at the individual staff level ( certified high voltage electrician, forklift license etc)"},{"q":"A project manager takes over a recently approved project. What will play a key role in determining the communication method?","opts":["A.Stakeholder requirements","B.Frequency of distribution","C.Sender-receiver model","D.Meeting management methods"],"correct":["A"],"explanation":"The project manager must first understand the stakeholder requirements to determine the communication method and the frequency of distribution. The frequency is often different for different categories of stakeholders. Not all stakeholders may require meetings to obtain information. The sender-receiver model provides for interaction with the stakeholders, which may not be required for all stakeholders."},{"q":"What are the main outputs of the risk identification process?","opts":["A.Risk report and risk register","B.Risk report, risk register, and project documents updates","C.Risk management plan, risk register, and risk responses","D.Risk report, probability, and impact matrix"],"correct":["B"],"explanation":"The correct risk report, risk register, and project document updates.\nThe process of identifying risk is intended to determine which risks may affect the project and document their characteristics. A risk report is\u00a0a project document that summarizes information on individual project risks and the level of overall project risk. A risk register is a\u00a0repository in which outputs of risk management processes are recorded. Project documents must be updated to include identified risks.\u00a0\nThe other options are incorrect because they contain options that occur after risks are identified. A probability a"},{"q":"A team member suggests using a new product to speed up feature development, but this will increase the project budget. The project team is taking an incremental approach to product development, and the product owner is responsible for prioritizing and managing the product backlog. What should the project manager do first?","opts":["A.Consult the product owner and present the benefits and drawbacks of using the new product.","B.Review and update the cost management plan to accommodate the potential budget impact.","C.Request additional funding for the implementation of the new product from the project sponsor.","D.Revise the acceptance criteria for the user stories to incorporate the new product effectively."],"correct":["A"],"explanation":"The product owner is responsible for prioritizing and managing the product backlog, so they are the best person to decide whether or not to use the new product. Presenting the benefits and drawbacks of using the new product helps ensure that decisions are made based on a shared understanding of potential impacts on the project and product. The other options are incorrect because they should not occur until the product owner has decided whether or not to use the new product. Updating the cost management plan, requesting additional funds, and revising acceptance criteria would only be necessary "},{"q":"During a new technology project, confusion arises due to the lack of a clearly defined and communicated future state of the product. What should the project manager do next?","opts":["A.Create and get approval on a benefits management plan.","B.Ask the project sponsor what the project outcome should be.","C.Discuss the scope and objectives with the functional owner.","D.Review the project's business case to identify alternatives."],"correct":["A"],"explanation":"The project manager should create a benefits management plan defining the processes for creating, maximizing, and sustaining the benefits provided by a project or program. In generating the business management plan, the project manager identifies long-term goals so that the project delivers the intended identified value. The other choices are not the best options at this time because they do not completely address the issues of confusion and lack of clarity. The other options may be useful after the benefits management plan is created, approved, and communicated."},{"q":"A project execution phase overlaps with a holiday in the country where the majority of team members are based. This phase is critical, and all team members are required to work through the holiday. This negatively impacts team morale. What should the project manager have done to avoid this?","opts":["A.Requested help from other teams based in other countries","B.Postponed project activities","C.Prepared the stakeholder engagement plan","D.Better developed the resource management plan"],"correct":["D"],"explanation":"The resource management plan takes into consideration factors that affect resource availability, including normally observed non-working days. Requested help: Transitioning project work is a reactive step and not a practical solution in most cases. Postponing activities further delays critical work and is therefore not an option The stakeholder engagement plan doesn't address the issue of resource availability working on the project."},{"q":"A project manager notices that a project is not running well and deliverables are falling behind. What is the first step the project manager should\u00a0take in order to make a decision on how to progress with the project?","opts":["A.Identify the problem.","B.Brainstorm solutions.","C.Establish a measurement criteria.","D.Set a goal."],"correct":["A"],"explanation":"By identifying the problem, the project manager can then start to brainstorm solutions and develop a plan to address the issue. This is the first step because the project manager needs to understand what is not working well and why before they can make any decisions about how to fix it. The other answer choices are incorrect.\u00a0Brainstorming solutions is\u00a0not the first step because the project manager needs to understand the problem before they can start to brainstorm solutions. Establishing a measurement criteria is not the first step because the project manager needs to know what the problem is"},{"q":"A project manager just completed a project in an organization that values lessons learned. Leadership encourages all the project stakeholders to use the process, tools, and results from the lessons learned repository in future projects. Preparing to update the lessons learned repository, the project manager has gathered relevant project data and feedback. What should the project manager do next?","opts":["A.Store all the comments and recommendations received for future reference.","B.Analyze and organize the findings with the stakeholders to extract insights.","C.Document and share the findings with the stakeholders for review and feedback.","D.Retrieve all of the comments and recommendations received in the past."],"correct":["B"],"explanation":"This option provides an opportunity for the stakeholders to review the way in which it works and to suggest changes to improve processes and efficiency. The organization values lessons learned, so analyzing and organizing the findings with the stakeholders helps to develop an in-depth review and helps to ensure that insights are realized and understood. Analyzing and extracting insights ensures that they can be easily applied and communicated. The other options are incorrect because they are not applicable or would occur after extracting insights. Storing the comments and recommendations does "},{"q":"Due to organizational changes, a key stakeholder is replaced by a new employee. The next status review meeting to update project progress will not take place until next month. What should the project manager do next?","opts":["A.Schedule a separate meeting with the new stakeholder to brief them on project status.","B.Prepare and send a project status report to the new stakeholder for review.","C.Seek advice from the project sponsor on how to obtain support from the new stakeholder.","D.Wait for the next communication window to share information with the new stakeholder."],"correct":["A"],"explanation":"First Step I would like to modify the \"STEM\" of the question to: \"Due to organizational changes, a key stakeholder is replaced. Due to this change the scheduled status review meeting to update project progress is postponed. What should the project manager do next?\" PMBoK Sixth Edition Chapter 5 states: \"5.12 MONITOR STAKEHOLDER ENGAGEMENT Monitor Stakeholder Engagement is the process of monitoring project stakeholder relationships, and tailoring strategies for engaging stakeholders through modification of engagement strategies and plans. The key benefit of this process is that it maintains or "},{"q":"A project manager has been assigned to a project to implement an asset health management system. The executive business sponsor has indicated that the system is expected to improve the quality of operations and extend the life span of the assets. What should the project manager do in order to demonstrate the business value once the system is in production?","opts":["A.Establish critical success criteria, potential cost savings, and ongoing performance metrics for the project.","B.Write test cases to align with the business values and ensure that acceptance criteria are clear during user acceptance testing (UAT).","C.Verify that all requirements and acceptance criteria are in alignment with the business value and expectations.","D.Validate the return on investment (ROI), review the current asset performance, and use it as a benchmark for future measurements."],"correct":["A"],"explanation":"Establishing the critical success criteria, potential cost savings, and ongoing performance metrics for the project is correct because these metrics can be used to measure the actual business value of the system once it is in production. By establishing these metrics, the project manager can track the progress of the project and ensure that it is on track to meet its goals. The metrics can also be used to demonstrate the business value of the system to the executive business sponsor and other stakeholders. The other options are incorrect. Writing test cases is incorrect because it only focuses"},{"q":"An aggressive and low-influence stakeholder disrupts a kick-off meeting by complaining about procedural violations in past projects. The project manager's research reveals that the violations had no significant impact. What should the project manager do?","opts":["A.Apply\u00a0a withdraw/avoid conflict resolution method.","B.Apply a smooth/accommodate conflict resolution method.","C.Apply a force/direct conflict resolution method.","D.Apply a compromise/reconcile resolution method."],"correct":["A"],"explanation":"The project manager should use the withdraw/avoid conflict resolution method. This method is appropriate when the stakeholder is low-influence and the conflict is not significant. The project manager can withdraw from the conflict by avoiding the stakeholder or by changing the subject when the stakeholder brings up procedural violations. The other answer choices are not as effective. The smooth/accommodate method is appropriate when the stakeholder is high-influence and the conflict is significant. The force/direct method is appropriate when the stakeholder is low-influence and the conflict is"},{"q":"A project manager is working on a project that is part of a large business transformation initiative. The project has gained support from the quality department's executives. Even though the scope is not yet finalized, the sponsor was able to obtain a large contingency budget to cover any scope changes and they assured the project manager that money is not an issue. All of these changes\u00a0are expedited due to the strategic importance of the project. What should be the project manager's primary focus in developing the strategy to manage change?","opts":["A.Develop a stakeholder needs assessment","B.Develop a work breakdown structure (WBS)","C.Develop a risk breakdown structure (RBS)","D.Develop an organizational communication plan"],"correct":["A"],"explanation":"The project manager should develop a quality stakeholder\u00a0needs assessment first. From the organization's change management perspective, planning should be based on stakeholders' needs. Recognizing and addressing the needs of stakeholders to embrace change throughout the project life cycle helps to integrate the resulting change in the project work, making a successful outcome more likely. The other choices are not the best options because the project manager is developing a strategy to manage change, and the other options do not capture the full scope of managing change. The WBS and RBS focus "},{"q":"During project execution, an issue arises that requires additional budget and time to resolve the issue. The project team did not identify this issue as a risk during risk management planning. The project sponsor points out that this risk has occurred on past projects. What should the project manager have done to avoid this oversight?","opts":["A.Reviewed the risk management plan.","B.Confirmed organizational risk appetite.","C.Reviewed the lessons learned register.","D.Allocated additional contingency reserves."],"correct":["C"],"explanation":"The project manager should have reviewed the lessons learned register as a resource to help identify threats. A lessons learned register is used to record knowledge gained during a project and identify potential improvements The other options are incorrect because they are not relevant and do not address the issue of overseeing the risk. If the team had reviewed the lessons learned register as part of risk management planning, they would have been able to identify the missing risk and identify an appropriate risk response. The project manager could not have allocated additional contingency res"},{"q":"A critical software development project has been in development for the past six sprints. A demonstration for stakeholders took place two days before the final sprint, in which a new stakeholder voiced that the product would not meet expectations for the market. What should the project manager do next?","opts":["A.Discuss the matter with the project sponsor and new stakeholder and request them to fix the expectation issue.","B.Review the scope and plan of the project with the new stakeholder.","C.Review the list of required tasks with the development team and new stakeholder.","D.Follow the change management plan and revise the scope and plan upon the stakeholders' request."],"correct":["B"],"explanation":"The project manager should approach the new stakeholder to further clarify the project scope. The other answer choices are incorrect. They assume that the new stakeholder is correct and making a change without understanding the project scope and requirements."},{"q":"The team informed the project leader that they are not sure of the stakeholder needs, despite the multiple collection requirements efforts and engagement in status meetings. How should the project manager approach this issue?","opts":["A.Require the team to work with the stakeholders to analyze their detailed requirements and sign off on the specification","B.Discuss with the team the option of canceling the project since the risk is too great to continue","C.Ask the team to write a collection of user stories to capture the needs, prioritize and manage the stories","D.Document what the team believes the stakeholders need, show it to stakeholders, and ask for their feedback to share with the team"],"correct":["D"],"explanation":"The primary determinant of a successful team is how they work together. This is what should the project manager focus on when forming a team. Understanding stakeholders' expectations is also paramount to a project's success. Despite the multiple collection requirements efforts, the team members remain unsure of stakeholder needs. In this case, the best course of action is to document what the team believes, ask for stakeholder feedback, and share with the team is an effective way to ensure that the team and stakeholders are aligned, allowing everyone to work together well. Requiring the team t"},{"q":"A company has decided to form agile teams within the organization to improve project results and take advantage of new opportunities in the market. A project manager with extensive agile experience was recruited to oversee the process. What should the project manager do first?","opts":["A.Recruit, appoint, and evaluate new agile project practitioners.","B.Implement an agile project management office (PMO).","C.Determine the criteria for when to launch agile projects.","D.Perform a retrospective analysis of prior project experiences."],"correct":["C"],"explanation":"The project manager should first determine the criteria for when to launch agile projects. This can include things like an understanding of agile methodologies, appropriate training for team members, proper project selection, and an organizational culture that supports agile principles. Determining the criteria for when to launch agile projects is crucial because it establishes the framework for when and how agile projects will be initiated. This involves conducting an audit to determine the agile maturity of teams and what skills might be missing. The project manager should compile a detailed"},{"q":"A project being run by a project manager is implementing a new technology. The project manager wants to be sure that the project delivers business value. What roles are critical in ensuring that the organization will benefit from the project delivery? (Choose 3).","opts":["A.People and culture manager","B.Project manager","C.Business analyst","D.Customer lead","E.Technical architect"],"correct":["B","C","D"],"explanation":"Although this is a technical project the Business Value should be determined by the people that are responsible for delivering that. The Technical Architect, DevOPS Manager, and the Technical Lead are important players but their responsibility is to deliver what the business needs rather than define what brings value to the Business. The people and culture manager are responsible for human resources, ground rules, and conflict resolution throughout the enterprise, not for business value."},{"q":"During a feedback meeting, the project manager is informed by team members that validating deliverables is difficult due to the fact that technology requirements keep changing before the due dates of their handover causing rework. The project manager suggests a more appropriate project management methodology to be adopted to address this occurrence for upcoming projects. Which project management methodology will work for this team?","opts":["A.Agile","B.Predictive","C.Waterfall","D.Incremental"],"correct":["A"],"explanation":"The uncertainty and technology changes requires a methodology that caters for disruptive environments; agile will work best in this case. It is designed to produce highest utility of output despite rapid change. Predictive is more of a general category than specific methodology, indicating that scope and requirements definition are completed at the beginning of the process. Incremental can adapt to change, but slowly rather than rapidly. Waterfall is a very structured approach which is not as adaptable to change, and can be helpful when requirements are well characterized early in the process."},{"q":"A complex technology project is in the execution phase. New technologies are added to the backlog based on customer requirements, which will involve significant changes to the deliverable. What should the project manager do to satisfy the customer?","opts":["A.Replan the sprints and releases to meet every expectation of the customer.","B.Manage customer expectations based on the organization's business needs.","C.Accept the new requirements, and schedule meetings to plan a new release schedule.","D.Push the project team to increase flexibility and accept the new challenge."],"correct":["B"],"explanation":"To satisfy the customer, the project manager should manage customer expectations based on the organization's business needs; project leaders depend on the organization's requirements to make a choice. The other answer choices are incorrect. Replanning the sprints and releases to meet every customer's expectations is not feasible, as it is impossible to meet every customer's expectations.\u00a0Accepting\u00a0the new requirements and scheduling meetings to plan a new release schedule is not as important as managing the customer's expectations by communicating the potential impact of the new requirements o"},{"q":"A team is working on a new product using a gated approach. After the third sprint they noticed that the market needs may be changing, and the product may not fit the new market needs. What should the project manager do next?","opts":["A.Survey the market for possible impacts on the project.","B.Change the product\u2019s scope to meet the new needs.","C.Finalize the product on time and budget to launch as planned.","D.Review the backlog to see the impact of the new needs."],"correct":["A"],"explanation":"The PM needs to evaluate and address external business environment changes for impact on scope, and continually review external business environment for impacts on project scope/backlog Without surveying the external business environment it is unclear whether the project scope needs to be changed Launching the product as planned may not accomplish project objectives in light of new business requirements Reviewing the backlog is immaterial to the decision that is required."},{"q":"A startup in its early stages has been acquired by a major company. In light of this new scenario, the project manager has been requested to review the project's roadmap. What should the project manager do?","opts":["A.Determine the definition of value with the stakeholders and reprioritize the project's backlog accordingly.","B.Reprioritize the project's backlog by prioritizing those features that maximize the return on investment (ROI).","C.Reprioritize the roadmap by focusing on long-term benefits and reducing the technical debt.","D.Launch a customer survey to better evaluate the key project features prior to reprioritizing the roadmap."],"correct":["A"],"explanation":"The backlog is refined based on priority and value for the customer which are the primary objectives in the new scenario. Hence this option is the correct answer. Backlog items are not prioritized based on Return on Investment [ROI] or long term benefits or reducing the technical debt or launching a customer survey to evaluate the key project features. Hence all the remaining options are incorrect."},{"q":"A project has begun to develop a new software application that will be used by the company's sales team. The project is expected to take six\u00a0months to complete and has a budget of $100,000. The project manager has\u00a0identified software development tools, hardware, and training to be procured. What is the most important thing for\u00a0the project manager to do while developing the procurement plan?","opts":["A.Ensure that all resources will be procured within budget.","B.Ensure that the project is on schedule with no delays.","C.Ensure that all procured resources are of great quality.","D.Ensure that all resources will be procured on schedule."],"correct":["A"],"explanation":"The most important factor to consider when developing the procurement plan is the project's budget. The project manager needs to ensure that the procurement plan does not exceed the project's budget. The other answer choices are incorrect. Factors\u00a0such as the project's schedule, the quality of the resources, and the availability of the resources, are also important, but they are not as important as the project's budget. It is the budget that makes the resources and the project's completion possible."},{"q":"Due to a budget issue, the project team decides to use low-cost equipment with higher testing uncertainty to reduce cost. However, the test results are unstable and are creating discrepancies. One of the team members is aware of the situation and proposes to use high-resolution equipment with lower test uncertainty to increase the testing quality. How should the project manager respond to this proposal?","opts":["A.Reject the proposal due to budget constraints and follow the quality management plan.","B.Accept the proposal because the high-resolution equipment produces precise test results with lower test uncertainty.","C.Evaluate the proposal to determine if the high-resolution equipment produces precise test results with lower test uncertainty.","D.Accept the proposal because budget is not an issue when quality assurance is taken into consideration."],"correct":["C"],"explanation":"The correct answer is to evaluate the proposal to determine if the high-resolution equipment produces precise test results with lower test uncertainty.\nIn order to determine the appropriate course of action, the project manager must evaluate the proposal based on factors such as risk, cost, scope, schedule, and feasibility.\u00a0\nThere is a concern about unstable results and production discrepancies. As a result, the team should look for a resolution to these problems. The manager should review the proposal before deciding to accept or reject it. We do not know if the budget is, or is not an issue "},{"q":"A project for an accounts receivable system that was recently launched into production received a fine from a regulatory body because the system did not comply with local regulations. What should the project manager have done to avoid this situation?","opts":["A.Defined risk control management.","B.Defined a control quality process.","C.Implemented an issue control log.","D.Involved the audit department in project planning."],"correct":["B"],"explanation":"The control quality process includes measuring all steps, attributes, and variables used to verify conformance or compliance to the specifications stated during the planning stage This question and rationale were developed in reference to: PMBOK Guide Sixth Edition (2018) PMI/PMI/8.3/299 [Item] | The Project Management Tool Kit: 100 Tips and Techniques for Getting the Job Done Right (No Date) /Amazon/87/ [Item Collect project information that emerges from the project initiation process. Input data for scope planning includes: Project objective statement Project charter Requirements collection "},{"q":"A project manager received an email from the factory regarding key equipment that will not be delivered as planned. The project manager must make alternative arrangements with other vendors to implement a temporary fix. Who is responsible for confirming the resource availability for the fix?","opts":["A.Service provider","B.Functional manager","C.Product owner","D.Human resources"],"correct":["C"],"explanation":"The product owner is responsible for maximizing the value of the product and ensuring that it meets the needs of the users and stakeholders. This includes ensuring that the product is delivered on time and within budget. When key equipment is not delivered as planned, the product owner is responsible for working with the team to develop a plan to address the issue. This may involve finding alternative vendors for the equipment or implementing a temporary fix. The other answer choices are not responsible for confirming the resource availability for the temporary fix. The service provider may be"},{"q":"A project manager is on a project that has a significant dependence on market changes. The PMO recommended to use an agile approach and the project manager scheduled reference checks to select the implementation partner. To be successful, agile needs a high level of trust between the client and vendor. Which of the following aspects should the project manager look for to build trust that the vendor can deliver? (Choose 2).","opts":["A.Processes and tools - to ensure that the vendor used an efficient and repeatable delivery approach","B.Technical excellence - to ensure that the deliverables were completed as soon as possible and of a high quality","C.Perseverance - to ensure that the vendor overcome the challenges inherent to frequent scope change","D.Planning skills - to ensure that the vendor met the costs and milestones agreed in the contract"],"correct":["B","C"],"explanation":"Process and tools: The Agile Manifesto values individuals and interactions over processes and tools. Hence this is an incorrect option. Technical excellence : Quality is an integral component in software development, more so in agile software development, where teams should strive to deliver a fully functional, high quality potentially shippable product. Hence this option is correct. Perseverance: Since the Project has a significant dependence on market changes, it is imperative that the vendor overcome the challenges that are inherent to frequent scope change because Agile embraces change and"},{"q":"A project manager works in a matrix organization and manages an internal software development project to improve the company's tracking system. The project is scheduled to be completed in one month. Some benefits will be realized once the system is online, however, full benefits will not be realized for a while. Although the project manager will track benefits through project closure, they are\u00a0concerned about tracking the benefits of post-project activities. What should the project manager do?","opts":["A.Request that a new project be initiated to monitor and report the achievement of benefits.","B.Revise the benefits management plan to extend the project until all benefits are realized.","C.Update the work breakdown structure (WBS) and project schedule with tasks to track benefits realization.","D.Coordinate with the benefits owner to monitor the achievement of benefits after the project closes."],"correct":["D"],"explanation":"The project manager should coordinate with the benefits owner to monitor the achievement of benefits after the project closes. This is the most appropriate option because it is the most efficient and effective way to track the benefits after the project closes. The benefits owner is the person who is responsible for ensuring that the benefits of the project are realized. The project manager can work with the benefits owner to develop a plan to track the benefits and to report on the progress of the benefits realization. The other options are incorrect because they are not as efficient or effec"},{"q":"During the execution phase of your project, a Resource Manager informed you that one of the experts allocated to your project had to be motivated in order to perform very well. What would be the recommended actions to address this issue?","opts":["A.Remind the functional manager that is his duty to motivate his team","B.Remind the team member that there are penalties for bad behaviours.","C.Remind the team member that there are financial incentives for the team.","D.Remind the team member their important role and how it will be rewarded."],"correct":["D"],"explanation":"This situation is normal for highly skilled individuals that can be motivated easier by recognizing their important contribution to the project. This responsibility can't be delegated to the resource manager or to the functional manager. These individuals are hard to be motivated by force or using financial incentives for the entire team. It is important to explain the importance of their role for the project so you get their buy in."},{"q":"While performing a qualitative project risk analysis process the project manager finds that the product is missing the \"Definition of Done\". What type of risk is this?","opts":["A.Commercial risk","B.External Risk","C.Management Risk","D.Technical Risk"],"correct":["D"],"explanation":"The correct answer is a technical risk.\nDefinition of Done (DoD) is a checklist of all the criteria required to be met so that a deliverable can be considered ready for customer use. A missing DoD is an example of technical risk. A technical risk would be centered around scope, requirements, technical processes, etc.\nAn external risk would be centered around factors outside of the organization; competition, legislation, regulation, environmental factors, etc. A management risk would be centered around managerial duties and processes; operations, resourcing, organization, communication, etc. A "},{"q":"A project is under scrutiny for its amount of water usage. The government's water licensing branch is changing its policy to be more restrictive. What should the project manager do?","opts":["A.Align project resources to oppose the new water license standard.","B.Cancel the project because of the uncertainty introduced with the policy change.","C.Assess the impact of the policy change on the project scope.","D.Create a new project schedule based on potential changes to the water policy."],"correct":["C"],"explanation":"The external business environment for the project has changed, the project manager must reassess the impact on the requirements or scope of the project."},{"q":"A project manager is involved in an e-commerce development project. The project has been completed successfully using the hybrid model and initiated operations handover. The project manager notices that the development team is relaxed and not spending time on the handover process, which is impacting application support. How should the project manager handle this situation?","opts":["A.Confront the development team and demand their immediate attention to the handover process.","B.Meet with the development team to discuss the importance of the handover process and its impact on application support.","C.Delegate the responsibility of the handover process to another team member to ensure it gets done properly.","D.Disregard the issue and expect that the development team will address and resolve the issue on their own."],"correct":["B"],"explanation":"Meeting with the development team to discuss the importance of the handover process and its impact on application support is the most effective and constructive approach in this situation. This will give the development team a chance to understand the issue and come up with a plan to address it. It allows for communication, understanding, and collaboration to find a solution to the problem. The other options are incorrect because they could potentially lead to negative outcomes and should be avoided. Confronting the development team is not the best solution because it could make them defensive"},{"q":"An agile practitioner has been assigned to lead a software development project in a relatively new industry where the external compliance standards are not clearly defined. What should the agile practitioner do to ensure that the project succeeds?","opts":["A.Speak to agile managers in other organizations with the same challenges to learn how they address issues.","B.Develop a set of standards that work for the role and support the team in implementing them.","C.Use global best practices as a guide for project implementation incorporating the new technology trends and monitoring compliance standards.","D.Refer to other previous data that exists from related industries."],"correct":["C"],"explanation":"Using global standards or best practices will be the best solution as there is a new industry without previous experience and lessons learned as a guide for project implementation, incorporating the new technology trends, using business intelligence, and monitoring compliance standards. The other answer choice are incorrect. Discussing with agile managers from other organizations does not add value; a project manager must abide by industry and entity standards; and referring to past data is not applicable to a new industry with undefined compliance standards."},{"q":"A complex project has multiple participants. The\u00a0project manager agrees with the team that they need to better understand the perspective of all project participants for the\u00a0optimal success of the project. What should the project manager do?","opts":["A.Review\u00a0the stakeholder analysis.","B.Create a communication plan.","C.Conduct a SWOT analysis.","D.Perform a risk analysis."],"correct":["A"],"explanation":"By reviewing the stakeholder analysis, the project manager can identify any stakeholders who may have been overlooked or whose needs have changed. The project manager can then develop strategies for engaging with these stakeholders and ensuring that their perspectives are understood and considered. The other answer choices are not as relevant or effective.\u00a0A communication plan is important for keeping stakeholders informed about the project, but it is not sufficient for understanding their perspectives. A SWOT analysis is a tool for assessing the project's strengths, weaknesses, opportunities,"},{"q":"A project manager has asked every team member involved in a conflict to make a sacrifice to resolve the situation. This approach corresponds to which conflict resolution technique?","opts":["A.Compromise/reconcile","B.Collaborate/problem solve","C.Smooth/accommodate","D.Withdraw/avoid"],"correct":["A"],"explanation":"Compromise/reconcile is an approach that results in a lose/lose outcome, each sacrifice representing a loss for each member. Sources of conflict include scarce resources, scheduling priorities, and personal work styles The success of project managers in managing their project teams often depends on their ability to resolve conflict. Different project managers may use different conflict resolution methods Searching for solutions that bring some degree of satisfaction to all parties in order to temporarily or partially resolve the conflict As discussed above the correct answer is: \"Compromise/Re"},{"q":"A project manager is working on a project that will deliver a solution in country A. Due to the potential for a security breach, country A's government is banning the technology that will be used in the project's solution, adversely affecting the project. The project manager is close to completing the installation for the project after already procuring the materials and the banned technology. What should the project manager do?","opts":["A.Review the project management plan and follow the process for change control.","B.Request that the legal team review the change and determine the appropriate response.","C.Meet with the project sponsor about the issue and request direction for next steps.","D.Inform the customer that the project cannot deliver the defined scope."],"correct":["A"],"explanation":"Review the Project Management Plan: As a Project manager, you must follow the process defined in the project management plan to manage the change. Legal Team Review: Your legal team can review this but without performing the change request, you wouldn't know the impact of the change in legislation. This policy from government may affect the wider business of your organization. Meeting with project sponsor / informing the customer: Informing your project sponsor about this will occur at some point, and would potentially take place only after a review of the change control process. Similarly, yo"},{"q":"A project team completes the identification of project and product requirements. Which of the following were used to accomplish this?","opts":["A.Benchmarking, network diagram, and trend analysis","B.Work breakdown structure (WBS), trend analysis, and observation/conversation","C.Brainstorming, affinity diagrams, and mind mapping","D.Affinity diagrams, benchmarking, and observation/conversation"],"correct":["C"],"explanation":"PMBoK Sixth Edition Chapter 4 states: \"EXECUTING PROCESS GROUP The Executing Process Group consists of those processes performed to complete the work defined in the project management plan to satisfy the project requirements. This Process Group involves coordinating resources, managing stakeholder engagement, and integrating and performing the activities of the project in accordance with the project management plan. The key benefit of this Process Group is that the work needed to meet the project requirements and objectives is performed according to plan. A large portion of the project budget,"},{"q":"During final inspection of a deliverable, the quality team observes that there is a deviation on a particular component. The customer, however, has not indicated anything with regard to this in its specifications. What should the project manager do?","opts":["A.Raise the matter to a technical expert.","B.Conduct a quality assurance audit.","C.Approve the deliverable as it does not deviate from any customer specifications.","D.Reject the deliverable, citing deviation from the project specifications."],"correct":["B"],"explanation":"To confirm the state of the deliverable, the quality audit is performed by a QA inspector qualified to evaluate a specific component of project work activity deliverable, compare it with an established quality standard, and make an assessment as to a pass or fail condition of compliance The other answer choices are incorrect. Referring the matter to technical expert will only produce insights for the particular problem. However, the far bigger issue is related to quality assurance and as such an assessment of deviations in other deliverable or the process cannot be denied. Clearing or rejectin"},{"q":"A delivery milestone for a project is fast approaching, but an item that is planned to be completed is at risk. A team member begins\u00a0to act defensively and is blaming others for this issue. How should the project manager have acted to avoid this?","opts":["A.Established ground rules for interaction that the whole team must follow.","B.Established and maintained meaningful relationships between team members.","C.Established\u00a0formal patterns of authority, responsibility, and accountability.","D.Established clear delegation and accountability-sharing principles."],"correct":["A"],"explanation":"By establishing clear ground rules, the project manager would be creating a positive and productive team environment, where everyone feels comfortable speaking up and contributing. This would help to prevent finger-pointing and blaming, as everyone would know how to interact with each other in a respectful and productive way. The other answer choices are incorrect because they are important, but don't necessarily do much to prevent disrespectful behaviors."},{"q":"A project manager is leading a wastewater treatment project for a factory. During project execution, the government unexpectedly releases new environmental protection standards that are stricter than the previous standards. To ensure compliance with these updated regulations, what should the project manager's\u00a0initial course of action be?","opts":["A.Meet with the project team to assess the implications of the new government regulations on the project requirements.","B.Review the project's risk register to determine if this change was previously documented as a potential risk to the project.","C.Draft a formal change request detailing the adjustments and submit it to the change control board (CCB) for evaluation.","D.\u00a0Initiate discussions with the government agency to negotiate a revised timeline for adopting the new environmental standards."],"correct":["A"],"explanation":"The project manager should prioritize understanding the full scope of the impact on the project. The project manager should meet with the team to gather insights to fully understand how these regulations will impact the project before making decisions on how to address them. The project team, including subject matter experts, can provide valuable input on the scope, schedule, budget, and technical requirements that may need to be adjusted to ensure compliance. The other options are incorrect because assessing the impact of the new regulations on the project's scope, requirements, and constrain"},{"q":"A project manager is working on a complex project with many stakeholders and conflicting priorities. Senior management asked the project manager to avoid \"noise\" specifically for political projects. Although it is difficult to find resources for the project, what should the project manager do to ensure smooth progress of the project?","opts":["A.Apply \"If you do something nice for me I'll do something nice for you.\"","B.Be consistent with words and actions to avoid conflicts with the stakeholders.","C.Utilize compliments to obtain resources, and cooperate toward mutual goals.","D.Allocate the scarce resources efficiently to meet the needs of the project."],"correct":["D"],"explanation":"In projects, constraints are time, money, and resources. Resources are considered to be the top criteria for conflict management. Allocating the scarce resources to meet the project needs should be the top priority for the Project Manager. Hence this option is the correct answer. Negotiation with stakeholders are always performed in the interest of the project and not on personal goals or ambitions. Hence all the remaining options are incorrect."},{"q":"In the middle of project execution, the\u00a0project sponsor leaves, and a new sponsor is assigned. The new sponsor is requesting major revisions to the deliverables. What should the project manager do?","opts":["A.Implement all the changes to the deliverables.","B.Request additional resources to adjust the deliverables.","C.Evaluate the possible impacts of the changes.","D.Extend the project timeline to include the changes."],"correct":["C"],"explanation":"The project manager should evaluate the potential impacts of the changes requested by the new sponsor. This includes assessing the impact on the project schedule, budget, scope, and quality. The project manager should also communicate the potential impacts to the new sponsor and other stakeholders, and work with them to determine the best course of action. It is important for project managers to be prepared for changes in project sponsorship, as this can have a significant impact on the project. Project managers should establish clear communication channels with sponsors and stakeholders, and "},{"q":"A senior business stakeholder with many years of experience is pressuring an agile team to deliver most of the promised functionality to the customer 18 months in the future as opposed to multiple, incremental deliveries over the course of the 18 months. What should the project lead do next?","opts":["A.Work with the agile team to schedule the incremental deliveries to enable delivery of business value sooner to the customer.","B.Schedule meetings with the customer to determine their ability to support multiple incremental deliveries.","C.Provide details of the concern to the agile team and adjust their goals and release plans to conform to the stakeholder's request.","D.Work with the stakeholder to understand what the concerns are while, at the same time, conveying the benefits of incremental deliveries."],"correct":["D"],"explanation":"The project lead will need to understand the reasons why one of the senior business stakeholder is pressuring for delivery 18 months in the future . At the same time, the Project lead will need to impress upon on the benefits of incremental delivery and also stress that incremental delivery is a fundamental aspect of agile delivery.. Hence this option is correct. The project lead should not proceed with scheduling incremental deliveries especially when there is resistance from one of the senior stakeholder. Hence this option is incorrect. Scheduling meetings with customer is also detrimental w"},{"q":"An international company is implementing an innovative technology at one of its production plants. The technology has already demonstrated positive returns at another site. What should the project manager consider as a key aspect of the successful implementation of this technology?","opts":["A.Assess the business case to ensure the return on investment (ROI) meets or exceeds the performance indicators of the first site.","B.Consult with the technology manager to ensure the technology can fit in the new site.","C.Conduct an information-sharing workshop to present the new technology and its benefits to the new site's stakeholders.","D.Develop the project charter for implementation at the new site using the lessons learned from the first site."],"correct":["C"],"explanation":"Global companies must consider the impact of change (organizational culture) at a local level. This is critical for the success of any change management initiatives. The local organizational culture may derail expectations of strategies set by external stakeholders.\u00a0Learning and sharing activities inform strategic and business objectives while improving activities that strengthen future project delivery. Effective organizational change management builds and sustains alignment with process updates, capability enhancements, and new skills that support project management. Communicating the vision"},{"q":"A project management team is developing a project m
