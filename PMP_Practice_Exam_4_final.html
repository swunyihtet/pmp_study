anagement information system (PMIS) as a collaboration tool for internal and external stakeholders. The\u00a0project manager wants to develop a dashboard component within the system that will be updated with information on projects' performance. What should the project manager do first?","opts":["A.Identify the data that will be displayed.","B.Select the appropriate visualization tools.","C.Determine the frequency of dashboard updates.","D.Define the communication needs of the\u00a0stakeholders."],"correct":["D"],"explanation":"The project manager should first define the communication needs of the project and its stakeholders. The dashboard should be tailored to the specific needs of the stakeholders who will be using it.\u00a0Once the project manager understands the communication needs of the stakeholders, they can identify the appropriate data to display, select the appropriate visualization tools, and determine the frequency of dashboard updates. The other answer choices are incorrect. They are important tasks for the project manager to consider as the project continue, but the initial step is to ensure they build a da"},{"q":"A\u00a0large-scale, multiyear transformation project was completed as per the defined requirements and within the approved budget and schedule. The requirements were also validated and confirmed by the business. However, the post-delivery analysis of the project revealed that the project did not provide benefits as expected. What should the project manager have done to avoid this?","opts":["A.Ensured the requirements were properly captured in the product backlog.","B.Created a business strategy to assist with organizational change management.","C.Improved the status reporting processes to highlight specific project results.","D.Measured and demonstrated business value throughout the project lifecycle."],"correct":["D"],"explanation":"To avoid the situation, the project manager should have measured and demonstrated business value throughout the project. This involves periodically validating the project and its business case during a phase-gate review to ensure that the project is still in alignment with the organization's strategic objectives. Measuring and demonstrating business value throughout the project is critical to ensuring that the project delivers the expected benefits and remains aligned with organizational objectives.\nThe other options might not directly or comprehensively address the issue of benefits realizati"},{"q":"The local government regulator has issued a notification to all companies regarding a new project aimed at facilitating information reporting to an international regulator. However, due to the dynamic nature of the project, there is a possibility of changing requirements while the delivery date remains fixed. The project manager assigned to this initiative is concerned about the uncertainty and the short timeline for delivery. How should the project manager best prepare to address this situation?","opts":["A.Implement iterative and incremental approaches in relevant areas of the project to adapt to changing requirements.","B.Meet with the sponsor to determine a detailed project schedule to ensure that the project is completed on time.","C.Develop a detailed contingency plan using the crashing technique to expedite project activities as needed.","D.Enhance communication strategies and engagement with the local government to ensure alignment and timely updates."],"correct":["A"],"explanation":"Iterative and incremental methodologies allow the project team to adapt to changing requirements as they emerge. This accommodates evolving needs without causing significant disruptions to the project schedule and helps mitigate the risks associated with unpredictable changes. The other options are incorrect because they do not directly address the core issue of accommodating changing requirements within a fixed timeline. Meeting with the sponsor to determine a detailed project schedule does not address the issue because the fixed delivery date remains a constraint. Developing a contingency pl"},{"q":"During a product backlog refinement meeting, a stakeholder from the legal department and the product owner disagree on the prioritization of a particular item. The product owner states that the current prioritization is adding maximum value to the project, and the stakeholder states that the item should be prioritized because it is a governmental compliance requirement. What should the project manager do in this situation?","opts":["A.Yield to the product owner's prioritization authority and remind the stakeholder that it is not their responsibility.","B.Examine previous situations in the lessons learned register to find a solution and prioritize the backlog accordingly.","C.Use negotiation techniques to convince the product owner to prioritize the backlog as suggested by the stakeholder.","D.Facilitate a discussion between the product owner and the stakeholder to discuss their perspectives and concerns."],"correct":["D"],"explanation":""},{"q":"During the execution phase of a project, a new project manager is assigned to replace the previous project manager. As the project manager starts managing the project, they discover that team performance is significantly decreasing, which is impacting the project's key performance indicators (KPIs). This team has delivered good performance on similar projects in the past. What should the project manager do next to improve this situation?","opts":["A.Review the resource management plan and organizational assets.","B.Implement compression techniques to bring the project back on track.","C.Call for a team meeting to identify the root cause for the declining performance.","D.Estimate the baseline impacts and submit a change request."],"correct":["C"],"explanation":"An inexperience PM will reject that he is the cause of a decreasing performance, investing or wasting time to find the root cause in another factor. If the team is used to work together with performing level the cause would be the change of the previous PM with the new one, so you as a new team member needs to build trust Without identifying the root cause, reviewing the resource management or implementing any technique to resolve the issue will not be the right approach"},{"q":"During the development of a project, the project manager noticed that results are not as good as expected. Which tool or document shows which elements are impacting the key metrics?","opts":["A.Pareto chart","B.Run chart","C.Project charter","D.Risk register"],"correct":["A"],"explanation":"A Pareto Chart indicates the frequency of defects, as well as their cumulative impact and can be useful to find the defects to prioritize in order to achieve the greatest overall improvement."},{"q":"A project manager has been on a complex project that began eight months ago. The project manager has a quality team that has been working hard, is motivated, and successful. What type of management and leadership should the project manager use at this stage?","opts":["A.Empower them to improve results","B.Support with periodic iterations and feedback","C.Help with conflict resolution","D.Feedback, coaching, or help only when they ask for it"],"correct":["A"],"explanation":"By empowering the team, the project manager can create a positive and productive work environment where the team can thrive. The other answer choices are incorrect.\u00a0Support with periodic iterations and feedback is a good idea, but it is not as important as empowering the team. Help with conflict resolution is important, but it is not as important as empowering the team. Feedback, coaching or help only when they ask for it is not an effective way to manage a team. The project manager should be proactive in providing feedback and coaching, even if the team does not ask for it."},{"q":"A majority portion of a local company was recently sold to an international company. The new parent company is mandating the use of health, safety, and environmental (HSE) regulations for all projects in the local company. What should the project managers do to remain compliant?","opts":["A.Wait for the functional department responsible for HSE regulations to communicate the process change.","B.Ask the functional department responsible for HSE regulations to assign a new team member.","C.Speak with the project sponsor to get clarification about the new HSE regulations.","D.Meet with the HSE team to understand the impact of the new regulations on the projects."],"correct":["D"],"explanation":"To remain compliant with the new HSE regulations mandated by the new parent company, project managers should meet with the HSE team to understand the impact of the new regulations on the projects. This will help them to identify any changes that need to be made to their project plans and ensure that their projects are in compliance with the new regulations.\nThe other options are incorrect.\nThe project should be proactive. Waiting for the functional department for the HSE to communicate the changes could cause confusion or delays.\nRequesting a new team member is premature and may not be necessa"},{"q":"A project manager is leading a project that requires approval from a government agency. The agency is currently drafting legislation that will impact the project's approval process, but it is unclear when the legislation will become law. The project manager is concerned that the legislation may delay the project's key milestones or limit the project's development options. What should the project manager do?","opts":["A.Apply for an additional contingency to prepare for the anticipated delay in project milestones.","B.Review the project scope and submit a request to exclude activities associated with the legislation.","C.Continuously evaluate exposure to the risk to minimize negative impacts on the project and its outcomes.","D.Proceed with the project with the understanding that the pending legislation will pass without delay."],"correct":["C"],"explanation":"Continuously evaluating exposure to risk allows the project manager to stay informed about developments in the legislation and their potential impact on the project. The project manager should monitor the legislative process closely to identify any potential delays or changes and develop mitigation strategies to minimize the negative effects of legislative changes when they occur. The other options are incorrect because they make assumptions about the legislation that may not be accurate and do not consider the potential risks and uncertainties associated with it. Applying for an additional co"},{"q":"A project manager is managing a project with a very aggressive delivery schedule and a firm completion date. The project requires expensive and fragile components that are prone to rework and rejections. The project manager is developing the vendor selection criteria. What should be the strategy for vendor selection?","opts":["A.Lowest price regardless of the vendor's warehouse location.","B.Acceptable price if the vendor is closer to the project site.","C.Project sponsor's recommendation based on past experience.","D.Team members' recommendations based on past experience."],"correct":["B"],"explanation":"The material's fragility and high probability of rework introduce the risk of delay in the project while waiting for replacements. The distance between the project site and the vendor's warehouse is important when the delivery time is tight. When vendors are \u201csupplying materials of a high value and large size that are susceptible to rework and rejections,\u201d they should be located as close to the project site as possible, Buch says. \u201cThe supplier\u2019s vicinity is given preference over the price.\u201d Toolbox"},{"q":"During a business status meeting, the project manager acknowledges that several market conditions have recently changed dramatically. As a result, the expected value of the project in progress may be threatened. What should the project manager do next?","opts":["A.Stop the project immediately due to uncertainty that the project will deliver the expected value.","B.Continue with the project since the project manager has not been formally informed of any change in market conditions.","C.Ask the project team to investigate the evolution of market conditions during the last 6 months.","D.Meet with the project sponsor to discuss the information and ask if the organization still supports delivery of the project."],"correct":["D"],"explanation":"Conditions and assumptions from which prospected project valued was calculated can change at any time. So, to be sure that developing a project will still deliver value when finished, the mentioned conditions and assumptions need to be revised on a regular basis to be sure that they had not changed in a negative way."},{"q":"A project manager for a US$15 million construction project must meet a specific project milestone earlier than planned because a season-long pattern of extreme weather is expected soon. The project is already over budget, and the project sponsor is not prepared to provide additional funding. Which tool or technique should the project manager use to achieve the milestone before the extreme weather begins?","opts":["A.Simulation","B.Fast tracking","C.Resource smoothing","D.Crashing"],"correct":["B"],"explanation":"PMBoK Sixth Edition Chapter 6 Section 6.5.2.6 states: \"Fast tracking\" A schedule compression technique in which activities or phases normally done in sequence are performed in parallel for at least a portion of their duration. An example is constructing the foundation for a building before completing all of the architectural drawings. Fast tracking may result in rework and increased risk. Fast tracking only works when activities can be overlapped to shorten the project duration on the critical path. Using leads in case of schedule acceleration usually increases coordination efforts between the"},{"q":"A project manager is leading\u00a0a large business transformation project with the\u00a0goal of\u00a0creating a new organizational structure and aligning the IT systems with the new business structure. In which phase of integrated change management should the project manager manage resistance? Phase 1 - Prepare for the change. Phase 2 - Plan the change. Phase 3 - Manage the change. Phase 4 - Reinforce and sustain the change. Solution:\u00a0C.\u00a0Phase 3 - Manage the change. Resistance is natural and does not necessarily mean that there is a problem. Good change management practices not only reduce resistance but can turn some of the most resistant employees into some of the biggest supporters.\nThe project manager should manage resistance in phase 3 by providing\u00a0clear, honest, and open two-way communications; managing\u00a0expectations and clarifying the personal impact (what specifically will change and what is expected); involving\u00a0end-users (those directly impacted) early and throughout the project; and engaging managers and supervisors early and establishing their role as coaches and change agents. Toolbox 159 of 175 Question After several interviews with key stakeholders and checking the project charter, a project manager found that the current project organizational structure is no longer appropriate for the project's strategic goals. What should the project manager do next?","opts":["A.Assess the lessons learned documents and validate which organizational structure was used in the past for similar projects.","B.Ask the team to document the risk in the project risk register and develop a risk response plan accordingly.","C.Evaluate the gaps between the current organizational structure and the expected project benefits to determine required actions.","D.Ask the team to review the project charter and evaluate the project objectives for relevance."],"correct":["C"],"explanation":"Organizational structure should be flexible to accommodate the project goal, and may evolve in the project life cycle. If the current structure is not appropriate, the project manager should first evaluate the deficiencies against what the project needs to accomplish to determine a more fitting organizational structure. Assessing lessons learned from prior projects may give some direction, but gaps on the current project should be evaluated first. There is nothing in the question that suggests that project objectives are incorrect, so evaluating the objectives for relevance is not warranted. T"},{"q":"A project manager complains that three engineers from\u00a0different cultural backgrounds\u00a0leave project meetings twice a day and assumes that they are \"gossiping and smoking\" for 15 minutes. The engineering\u00a0manager replies that their absence is due to prayer time. What should the project manager do first to rectify their assumption?","opts":["A.Apologize for the unconscious bias.","B.Develop a plan to improve work ethic.","C.Set up a meeting to raise cultural awareness.","D.Follow and watch\u00a0to make an informed observation."],"correct":["A"],"explanation":"The project manager can rectify their assumption of the engineers by apologizing\u00a0for any offense their unconscious bias may have caused. The project manager should acknowledge that they made an assumption based on their own biases and that they were wrong. They should also explain that they are committed to creating a more inclusive work environment and that they will be working to educate themselves about different cultures. The other answer choices are incorrect because they are not the first step the project manager should take. After apologizing,\u00a0the project manager can set up a meeting wi"},{"q":"A project manager is asked to manage a project that will allow the company to comply with a new, upcoming regulation. Just after project kick-off, the scope is modified to have the project team now work on specific tasks, while a global team will manage the program for several countries in parallel. The project management plan has not yet been shared, and the deadline to complete the project is fixed. What should the project manager do to handle the scope and changes?","opts":["A.Create a risk entry in the risk management plan due to the lack of a global project management plan.","B.Formalize the change in the scope with the project sponsor to limit accountability for the specific tasks.","C.Review the organizational process assets (OPAs) from similar situations and the approaches that were implemented.","D.Define an initial backlog and start working on the clearest tasks, then incrementally refine the scope."],"correct":["D"],"explanation":"When external factors or business decisions are not certain but there is a fixed deadline, the agile approach allows the formality and the flexibility to take care of the project under a \"controlled situation\". In order to handle the scope and changes, the project manager should define an initial backlog and start working on the clearest tasks, then incrementally refine the scope."},{"q":"A company is going through an organizational change. Most of the senior management has changed, including the project manager's direct supervisor. The supervisor has an aggressive working style, and has made critical comments to the project manager regarding the ongoing project, without really understanding the situation. The project manager feels uncomfortable working with the new supervisor. What should the project manager do next?","opts":["A.Hold a project review meeting to explain the key points of the project to the new supervisor.","B.Apply the new supervisor's recommendations to the project.","C.Evaluate the impact of the organizational change to the project.","D.Communicate to the project team that they need to be ready to embrace change."],"correct":["C"],"explanation":"The project manager needs to deal with the change objectively, and first should understand the impact of organizations changes to the project. With that knowledge, the PM and team can engage the supervisor. The project manager should not blindly execute changes dictated by the supervisor. Changes will always affect the project, so simply communicating to the team that they should be ready for change does not accomplish much."},{"q":"A project team is working on determining dependencies for approximately 350 activities for an ongoing project. Which actions should the project team take to manage dependencies successfully? (Choose 2).","opts":["A.Communicate the dependencies to the sponsor.","B.Assess and document the dependencies.","C.Communicate the dependencies to the customer.","D.Ensure that the dependencies are monitored.","E.Ensure you use only finish-to-start dependencies."],"correct":["B","D"],"explanation":"Review and update your dependencies list throughout the project."},{"q":"A company begins to implement\u00a0Scrum. About halfway through the first sprint, communication issues develop. Some project team members are not in sync with other team members. What should the project manager do next?","opts":["A.Educate the team on the importance of communication in Scrum.","B.Establish clear communication\u00a0guidelines.","C.Identify the root cause of the communication issues.","D.Monitor the team's communication and provide feedback."],"correct":["C"],"explanation":"The project manager should identify the root cause of the communication issues. It could be that the\u00a0team is not familiar with Scrum, there is conflict within team members, or team members are not using the correct communication channels and tools. The other answer choices are incorrect because the project manager should identify the root cause of communication issues first. Once the project manager identifies the root cause of the communication issues, they can develop a plan to address them. This may involve educating the team on the importance of communication in Scrum, establishing clear c"},{"q":"A project manager oversees a complex project in which a vendor is responsible for delivering several essential components. The project manager and the vendor team are located in different time zones, and this time zone difference has become a significant challenge, leading to productivity issues within the project. Team members from both sides often struggle to coordinate meetings, share updates, and communicate effectively due to the time zone disparities. What should the project manager do to solve this issue?","opts":["A.Closely monitor the project schedule and take action if milestones are missed.","B.Ask both teams to change their working hours to a common time zone.","C.Find a common space and relocate the vendor team with the project team.","D.Terminate the engagement and find a new vendor in the local time zone."],"correct":["B"],"explanation":"Asking both teams to change their working hours to a common time zone is the most direct way to address the productivity issues caused by the time zone difference. This would allow for more synchronous communication and collaboration, which can be essential for complex projects. It is a practical and cost-effective solution that promotes collaboration and communication without major disruptions. The other options are incorrect because they are not the most appropriate and effective responses to the problem. Closely monitoring the project schedule and taking action if milestones are missed does"},{"q":"What is the main goal of a Visionary leadership style?","opts":["A.To support the team to self organise and decide a common vision.","B.To champion the adoption of the latest technologies and practices.","C.To provide long-term direction and engage the team to deliver it.","D.To prioritise and assign the tasks that are aligned with the vision."],"correct":["C"],"explanation":"The leader should communicate and explain the vision to the team members to get them engaged and feel accountable.."},{"q":"Following the start of a sprint, a key stakeholder constructed an email to a project team voicing displeasure of the work that just commenced, despite being inexperienced in agile. The stakeholder is insistent about changing the internal and external deliverables. What next step should the project manager take?","opts":["A.Request the team\u2019s assessment of the matter at the next standup meeting.","B.Change the backlog and comply with the stakeholder\u2019s request.","C.Facilitate a meeting with the product owner and the key stakeholder to align on deliverables.","D.Encourage the stakeholder to participate in a discussion regarding backlog clarification."],"correct":["C"],"explanation":"The project manager should facilitate a meeting with the product owner and key stakeholders to align on deliverables. The product owner should have been working with this stakeholder to understand the backlog. The other answer choices are incorrect as they promote premature action, but may occur after the meeting and all stakeholders agree on the deliverables."},{"q":"Good communication etiquettes of a Project Manager include the following when sending emails, except:","opts":["A.Always responding immediately to emotional messages","B.Knowing your audience","C.Always being courteous","D.Using proper grammar, spelling, and punctuation"],"correct":["A"],"explanation":"E-mail communication (the most common and used tool in virtual settings), the following recommendations apply: Know your audience Use proper grammar, spelling, and punctuation Consult specific e-mail etiquette instructions when electronically communicating under certain circumstances Always be courteous Keep in mind the importance of face-to-face communication"},{"q":"A key project stakeholder showed interest in the beginning of a complex agile project but has become less involved as the sprint has progressed due to additional responsibilities. A few sprints later, the key stakeholder rejected a feature deliverable. The team is reworking the rejected deliverable for the next sprint. What should the project manager have done to avoid this situation?","opts":["A.Documented the project vision and objectives.","B.Analyzed the changes in stakeholder attributes.","C.Involved the key stakeholders in the decision-making process.","D.Customized stakeholder communications based on the stakeholders' needs."],"correct":["C"],"explanation":"By involving key stakeholders in the decision-making process, the project manager can ensure that their needs and expectations are understood and considered. This can help to avoid situations where stakeholders reject deliverables because they were not involved in the development process. The other answer choices are not as relevant or effective.\u00a0Documenting the project vision and objectives is important, but it is not sufficient to avoid the situation described in the question. Customizing stakeholder communications is important, but it is not sufficient to avoid the situation described in th"},{"q":"During the last iteration of planning in an agile project, the team discovers that mandatory regulations were not included in the minimum viable product (MVP). What should the project manager do?","opts":["A.Ask the team to include this regulatory requirement in the iteration backlog.","B.Ask the product owner to review the priority of this regulatory requirement.","C.Ask the stakeholders to review the priority of this regulatory requirement.","D.Ask the sponsor for approval to include this regulatory requirement in the iteration backlog."],"correct":["B"],"explanation":"The product owner has the responsibility to align the product backlog with the business needs order by value, even if there are regulatory requirements"},{"q":"A\u00a0project manager must ensure stakeholder responsibilities are clear, concise, and promote successful completion while maintaining stakeholder engagement. What should the project manager\u00a0do?","opts":["A.Collaborate with the stakeholder to define their manageable workload.","B.Assign new responsibilities only after prior deadlines have been met.","C.Assign as many responsibilities as they believe the stakeholder can handle.","D.Add\u00a0at least two new responsibilities after prior deadlines are met."],"correct":["A"],"explanation":"The project manager should prioritize collaboration to ensure stakeholder responsibilities are clear and engaging.\u00a0This approach fosters clear communication and understanding of expectations. Working together, the project manager and stakeholders can define achievable tasks and contribute to project success. The other answer choices are incorrect.\u00a0Assigning responsibilities shouldn't solely depend on past deadlines.\nAssigning as many responsibilities as they believe the stakeholder can handle can overwhelm stakeholders and lead to missed deadlines or poor work.\u00a0Adding at least two new responsi"},{"q":"What should a project manager do to obtain stakeholder agreement?","opts":["A.Update Resource Management Plan","B.Manage Stakeholder Engagement","C.Monitor and Control Project Work","D.Schedule a meeting between sponsor and stakeholders"],"correct":["B"],"explanation":"The steps to obtain stakeholder agreement should already be included in how stakeholder engagement is managed, and already exist in the stakeholder engagement plan. Project sponsors and stakeholders do not generally meet to seek agreement. Monitor and control project work will not allow for obtaining stakeholder agreement. Toolbox"},{"q":"A project manager is assigned to a project that will ensure that the organization meets regulatory compliance with new legislation. In which phase of the project should the project manager document\u00a0compliance objectives?","opts":["A.Initiation phase","B.Planning phase","C.Execution\u00a0phase","D.Closing phase"],"correct":["A"],"explanation":"is the most important phase for documenting the compliance requirements because the project charter is created in this phase.\u00a0By documenting the compliance requirements in the project charter, the project manager ensures that everyone involved in the project is aware of them and that they are taken into account when making decisions about the project. The other answer choices are incorrect.\u00a0The compliance objectives should be documented in the project charter which is the first document that is created. The planning, execution, monitoring and control phases all come after the initiation phase."},{"q":"A project manager is currently overseeing a project from its inception and is aware that there are several assumptions and dependencies integral to the project's success. What action should the project manager take in this situation?","opts":["A.Seek support from the project sponsor to allocate a dedicated resource to monitor and track benefits realization.","B.Instruct the project team to record all the assumptions and track all the changes.","C.Facilitate a brainstorming session with the project team to formulate a comprehensive risk mitigation plan.","D.Ask the project management office (PMO) to implement a benefits measurement system to verify benefit metrics and associated risks."],"correct":["B"],"explanation":""},{"q":"A project manager is working on a hybrid (predictive-agile) project. During a standup meeting, a team member mentions that because of experience on a previous project, they think that one of the upcoming deliverables may need to comply with government regulations. What should the project manager do next?","opts":["A.Escalate the issue with the project management office (PMO) so they can determine if any compliance is required.","B.Stop the project until it is confirmed that the deliverable is subject to any regulations.","C.Review lessons learned from the previous project to determine if any compliance is required.","D.Remove the task from the critical path and assign the resource to work on another requirement."],"correct":["C"],"explanation":"At this point, a team member only has stated an opinion that a deliverable MAY need to comply with regulations; nothing has been confirmed. Therefore, some research is required, such as reviewing lessons learned from a previous similar project. As seen on page 480 of the PMBOK (v6), lessons learned should include the lessons learned regarding compliance and regulations and that information will serve to the PM as a guide for his current project. The project manager should not stop the project just because something may happen (that is just a risk), and a task should not be removed from the cri"}];
let examQs = [];
let currentIdx = 0;
let userAnswers = {};
let chosenCount = 175;
let startTime;
let timerInterval;

function setCount(n) { chosenCount = n; startExam(); }

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function startExam() {
    examQs = shuffle([...ALL_QUESTIONS]).slice(0, chosenCount);
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('examScreen').style.display = 'flex';
    startTime = Date.now();
    timerInterval = setInterval(updateTimer, 1000);
    renderQuestion();
}

function getFormattedTime(diffMs) {
    const totalSecs = Math.floor(diffMs / 1000);
    const h = Math.floor(totalSecs / 3600).toString().padStart(2, '0');
    const m = Math.floor((totalSecs % 3600) / 60).toString().padStart(2, '0');
    const s = (totalSecs % 60).toString().padStart(2, '0');
    return h + ":" + m + ":" + s;
}

function updateTimer() {
    const diff = Date.now() - startTime;
    document.getElementById('timer').textContent = getFormattedTime(diff);
}

function renderQuestion() {
    const q = examQs[currentIdx];
    const isMulti = q.correct.length > 1;
    document.getElementById('qNumber').textContent = "Question " + (currentIdx + 1) + " of " + examQs.length;
    document.getElementById('qText').innerHTML = q.q + (isMulti ? "<br><small style='color:var(--p-blue); font-weight:bold;'>(Choose " + q.correct.length + " options)</small>" : "");
    
    const container = document.getElementById('options');
    container.innerHTML = '';
    
    const currentSelection = userAnswers[currentIdx] || [];

    q.opts.forEach(opt => {
        const letter = opt.charAt(0);
        const text = opt.substring(2);
        const btn = document.createElement('div');
        btn.className = 'option-btn';
        if (currentSelection.includes(letter)) btn.classList.add('selected');
        
        btn.innerHTML = '<span class="opt-letter">' + letter + '</span><span>' + text + '</span>';
        btn.onclick = () => selectOption(letter, isMulti, q.correct.length);
        container.appendChild(btn);
    });
    
    document.getElementById('btnBack').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
    const hasEnoughChoices = isMulti ? (currentSelection.length === q.correct.length) : (currentSelection.length > 0);
    document.getElementById('btnNext').style.display = hasEnoughChoices ? 'block' : 'none';
    document.getElementById('btnNext').textContent = currentIdx === examQs.length - 1 ? 'Finish' : 'Next';
    window.scrollTo(0,0);
}

function selectOption(letter, isMulti, maxChoices) {
    if (!userAnswers[currentIdx]) userAnswers[currentIdx] = [];
    let selections = userAnswers[currentIdx];

    if (!isMulti) {
        userAnswers[currentIdx] = [letter];
    } else {
        const idx = selections.indexOf(letter);
        if (idx > -1) {
            selections.splice(idx, 1);
        } else {
            if (selections.length < maxChoices) {
                selections.push(letter);
            }
        }
    }
    renderQuestion();
}

function nextQ() {
    if (currentIdx < examQs.length - 1) {
        currentIdx++;
        renderQuestion();
    } else {
        finishExam();
    }
}

function prevQ() {
    if (currentIdx > 0) {
        currentIdx--;
        renderQuestion();
    }
}

function finishExam() {
    const endTime = Date.now();
    const timeSpentMs = endTime - startTime;
    clearInterval(timerInterval);
    
    let correct = 0;
    examQs.forEach((q, idx) => {
        const userSelection = userAnswers[idx] || [];
        const correctAnswers = q.correct;
        const isMatch = userSelection.length === correctAnswers.length && userSelection.every(val => correctAnswers.includes(val));
        if (isMatch) correct++;
    });
    
    const score = Math.round((correct / examQs.length) * 100);
    document.getElementById('examScreen').style.display = 'none';
    document.getElementById('scoreScreen').style.display = 'flex';
    document.getElementById('finalScore').textContent = score + "%";
    
    document.getElementById('scoreMeta').innerHTML = 
        "Correct: <strong>" + correct + "</strong> / " + examQs.length + "<br>" +
        "Time Elapsed: <strong>" + getFormattedTime(timeSpentMs) + "</strong><br>" +
        "Result: <strong style='color:" + (score >= 70 ? "#166534" : "#991b1b") + "'>" + (score >= 70 ? "PASS" : "FAIL") + "</strong>";
    
    document.getElementById('scoreScreen').scrollTop = 0;
}

function showReview() {
    const container = document.getElementById('reviewContainer');
    const list = document.getElementById('reviewList');
    const screen = document.getElementById('scoreScreen');
    
    container.style.display = 'block';
    document.getElementById('btnShowReview').style.display = 'none';
    document.getElementById('scoreHeading').textContent = 'Review Mode';
    list.innerHTML = '';
    
    examQs.forEach((q, idx) => {
        const userSelection = userAnswers[idx] || [];
        const correctAnswers = q.correct;
        const isMatch = userSelection.length === correctAnswers.length && userSelection.every(val => correctAnswers.includes(val));
        
        const card = document.createElement('div');
        card.className = 'review-q-card';
        
        let optsHtml = '';
        q.opts.forEach(opt => {
            const letter = opt.charAt(0);
            let stateClass = '';
            if (correctAnswers.includes(letter)) stateClass = 'is-correct';
            else if (userSelection.includes(letter) && !correctAnswers.includes(letter)) stateClass = 'user-wrong';
            optsHtml += '<div class="review-opt ' + stateClass + '"><strong>' + letter + '</strong> ' + opt.substring(2) + '</div>';
        });
        
        card.innerHTML = '<div class="status-tag ' + (isMatch ? 'status-correct' : 'status-wrong') + '">' + (isMatch ? 'Correct' : 'Incorrect') + '</div>' +
            '<div style="font-weight: bold; margin-bottom: 15px;">Question ' + (idx + 1) + ': ' + q.q + '</div>' +
            '<div class="review-opts">' + optsHtml + '</div>' +
            '<div class="review-exp"><strong>Explanation:</strong> ' + (q.explanation || 'No explanation provided.') + '</div>';
        list.appendChild(card);
    });
    
    screen.scrollTop = 0;
}
</script>
</body>
</html>
