<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PMP Exam Simulator</title>
    <style>
:root {
    --p-blue: #004b8d;
    --p-bg: #f5f5f5;
    --p-light: #f0f7ff;
    --p-selected: #cce0f5;
    --p-footer: #cccccc;
}
body { background: var(--p-bg); color: #333; font-family: Arial, sans-serif; margin:0; padding:0; min-height: 100vh; }
#startScreen, #scoreScreen { position: fixed; inset: 0; background: white; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 40px 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
#examScreen { display: none; flex-direction: column; min-height: 100vh; background: white; }
.exam-header { position: sticky; top: 0; background: var(--p-blue); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
.exam-header h2 { font-size: 0.9rem; margin: 0; text-transform: uppercase; }
.exam-body { flex: 1; padding: 30px 20px 120px; max-width: 900px; margin: 0 auto; width: 100%; box-sizing: border-box; }
.q-number { font-size: 1rem; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
.q-text { font-size: 1.1rem; line-height: 1.5; margin-bottom: 30px; font-weight: 500; }
.option-btn { display: flex; align-items: flex-start; padding: 15px; border: 1px solid transparent; background: white; cursor: pointer; width: 100%; text-align: left; margin-bottom: 2px; }
.option-btn:hover { background: var(--p-light); }
.option-btn.selected { background: var(--p-selected) !important; border: 1px solid var(--p-blue); }
.opt-letter { min-width: 26px; height: 26px; border: 2px solid #555; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 15px; font-weight: bold; font-size: 0.85rem; flex-shrink: 0; }
.option-btn.selected .opt-letter { background: var(--p-blue); color: white; border-color: var(--p-blue); }
.actions { position: fixed; bottom: 0; left: 0; right: 0; background: var(--p-footer); padding: 15px 30px; display: flex; justify-content: space-between; border-top: 1px solid #999; z-index: 500; }
.btn-p { background: linear-gradient(to bottom, #fff, #e5e5e5); border: 1px solid #888; padding: 10px 25px; font-weight: bold; cursor: pointer; border-radius: 3px; font-size: 0.9rem; min-width: 100px; text-transform: uppercase; }
.btn-next { color: var(--p-blue); border-color: var(--p-blue); }
.review-q-card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 20px; margin-bottom: 25px; text-align: left; width: 100%; box-sizing: border-box; }
.review-opt { padding: 10px; margin: 5px 0; border-radius: 4px; border: 1px solid #eee; font-size: 0.95rem; display: flex; align-items: flex-start; gap: 10px; }
.review-opt.is-correct { background: #e8f5e9; border-color: #66bb6a; font-weight: bold; }
.review-opt.user-wrong { background: #ffebee; border-color: #ef5350; }
.review-exp { margin-top: 15px; padding: 15px; background: #f8fafc; border-left: 4px solid var(--p-blue); font-size: 0.9rem; line-height: 1.6; color: #334155; }
.status-tag { display: inline-block; padding: 4px 12px; border-radius: 4px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 12px; }
.status-correct { background: #e8f5e9; color: #166534; }
.status-wrong { background: #ffebee; color: #991b1b; }
.score-big { font-size: 5rem; color: var(--p-blue); font-weight: 800; margin: 20px 0; }
</style>
</head>
<body>

<div id="startScreen">
    <h1 style="margin-bottom:10px">PMP Practice Exam</h1>
    <p style="color:#666; margin-bottom:30px">Choose assessment volume:</p>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:30px; width:100%; max-width:400px;">
        <button class="btn-p" onclick="setCount(10)">10 Questions</button>
        <button class="btn-p" onclick="setCount(25)">25 Questions</button>
        <button class="btn-p" onclick="setCount(50)">50 Questions</button>
        <button class="btn-p" onclick="setCount(175)">Full Exam</button>
    </div>
    <button class="btn-p" style="padding:15px 50px; background:var(--p-blue); color:white; border:none;" onclick="startExam()">Launch Exam</button>
</div>

<div id="examScreen">
    <div class="exam-header">
        <h2>PMP Simulation</h2>
        <div id="timer" style="font-weight:bold">00:00:00</div>
    </div>
    <div class="exam-body">
        <div id="qNumber" class="q-number"></div>
        <div id="qText" class="q-text"></div>
        <div id="options" class="options"></div>
    </div>
    <div class="actions">
        <button class="btn-p" id="btnBack" onclick="prevQ()">Previous</button>
        <button class="btn-p btn-next" id="btnNext" onclick="nextQ()">Next</button>
    </div>
</div>

<div id="scoreScreen" style="display:none">
    <h1 id="scoreHeading">Exam Result</h1>
    <div class="score-big" id="finalScore">0%</div>
    <div id="scoreMeta" style="margin-bottom:30px; text-align:center; font-size:1.1rem; line-height:1.6;"></div>
    
    <div style="display:flex; gap:10px; margin-bottom:40px">
        <button class="btn-p" id="btnShowReview" onclick="showReview()">Review All</button>
        <button class="btn-p" onclick="location.reload()">Restart</button>
    </div>

    <div id="reviewContainer" style="display:none; width:100%; max-width:800px; border-top:1px solid #ddd; padding-top:40px;">
        <div id="reviewList"></div>
        <button class="btn-p" style="width:100%; margin-top:20px" onclick="location.reload()">Start New Session</button>
    </div>
</div>

<script>
const ALL_QUESTIONS = [{"q":"A project manager is leading a major product development project. The project is currently in the middle of the fifth sprint, and the product release is scheduled for next quarter. The project manager receives unexpected news that the company has just been formally acquired by a major competitor. This competitor already has a similar product in their portfolio. What immediate action should the project manager take to address the situation effectively?","opts":["A.Perform a comparative product analysis to identify similarities between the products.","B.Collaborate with the project manager overseeing the competitor's product to align project activities.","C.Seek support from the project sponsor and initiate the appropriate change management procedures.","D.Prepare a project termination report and document the lessons learned from the ongoing project."],"correct":["C"],"explanation":"The project manager should seek support from the project sponsor because the sponsor links the project team with the strategy and big-picture view at the executive level of the organization. Initiating the appropriate change management procedures ensures effective transformation to the new organizational landscape and that adjustments are made with structured processes. Change management procedures can help to minimize disruption and ensure that the transition is successful. The other options are incorrect because they are not immediate priorities and may not be practical until the project man"},{"q":"A project manager has completed the project deliverable and has passed the acceptance criteria. Which statement confirms that project benefits have been achieved?","opts":["A.The deliverable has been approved and the value has been confirmed.","B.The deliverable solved all of the issues specified by the project sponsors.","C.The project has seen some improvements in the ability to make decisions.","D.The project was completed on schedule, without any complaints from end users."],"correct":["A"],"explanation":"When the deliverable has been approved and the value has been confirmed, this confirms that\u00a0the project has met its objective and that benefits have been achieved. The other answer choices are incorrect. There is no formal validation. They mention that the deliverable solved the issues, but there is no confirmation of the benefits."},{"q":"A project manager has created the stakeholder list and is deciding how to distribute information effectively to the customer. What should the project manager do next?","opts":["A.Meet with all the stakeholders face-to-face on a weekly basis.","B.Send updates to all stakeholders, including the customer.","C.Perform a stakeholder analysis and prepare a communications management plan.","D.Review historical data sent to other customers and follow the same practices."],"correct":["C"],"explanation":"The project manager should perform stakeholder analysis, identify all the stakeholders as well as their communication requirements, and prepare the communications management plan. The other answer choices are incorrect. Meeting with all stakeholders face-to-face on a weekly basis is potentially a good idea, but it may not be practical. Also, that may not be the appropriate method and frequency for all stakeholders. Reviewing historical data is good practice and can guide the project manager, however, the project manager will still need to identify all stakeholders of this project and\u00a0each stak"},{"q":"A large transformation project that requires cross-functional effort from various business teams is in progress. Which two actions should the project manager take first to complete the stakeholder register? (Choose two)","opts":["A.Hold a workshop with key project team members to brainstorm and identify potential stakeholders.","B.Ask for referrals from the business sponsor or senior leadership.","C.Analyze the interest, influence, and impact of potential stakeholders from each business team.","D.Discuss the project with team members and put together the register at a team meeting.","E.Contact each potential stakeholder directly and ask if they are interested in joining the project."],"correct":["A","C"],"explanation":"The project manager should engage key team members to leverage their knowledge and experiences in identifying stakeholders from various parts of the business. This inclusivity prevents oversights and leads to a more comprehensive register.\u00a0Understanding each stakeholder's interest (awareness and concern), influence (power to affect the project), and impact (potential consequences of their involvement) is crucial for prioritizing engagement strategies and tailoring communication for different groups. The other answer choices are incorrect.\u00a0While discussing with team members is valuable, finaliz"},{"q":"A Scrum team is halfway to its release. During the sprint demo, new software is selected by one of the developers and presented to the team. The new software was not planned work but meets the date for the release. Several prioritized features for the next two sprints are disrupted. What actions should the team do to minimize the disruption?","opts":["A.Work with the product owner on the backlog to introduce the new software.","B.The scrum team makes the decisions themselves as a self-organized team and presents the change during the demo .","C.The developers reach out to the scrum master regarding the change to determine where and when the change can be discussed.","D.The scrum team evaluates the new software and informs the client about the impact to the release plan"],"correct":["A"],"explanation":"The project manager should work with the product owner on the backlog. The backlog is the only source of input for a scrum team to perform work. Only the product owner has the right to reprioritize work in the backlog. The product owner works with the scrum team as required to prioritize the backlog. The other answer choices are incorrect. While the scrum team is a self-organized team they do not have the right to unilaterally introduce product changes. Product changes must be introduced via the backlog as decided by the product owner. While the scrum team will reach out to the Scrum Master, t"},{"q":"The project manager is responsible for a major project that involves working with many vendors. A key project concern is related to the quality and timely delivery of procured products and services as committed by the vendors. What should the project manager do to ensure that the products meet the quality requirements and are delivered on time?","opts":["A.Raise an item in the risk register to capture potential impacts related to delays in the procurement of products and services, mitigating the risk of suboptimal quality.","B.Conduct procurement performance reviews on a regular basis with all contracted vendors to ensure that products and services are all delivered or will be delivered on time and as per the agreed-upon contract.","C.Delegate the management of the procurement process and the interaction with all vendors to the organization's procurement department as they have the tools and means to deal with a large number of vendors.","D.Review vendor management plan with all vendors to ensure they are in agreeance with the plan, mitigating the risk of undelivered and low quality products."],"correct":["B"],"explanation":"By conducting procurement performance reviews on a regular basis, the project manager can proactively identify and address any potential issues with vendor performance. This will help to ensure that the project meets its procurement objectives and that the products are delivered on time and meet the quality requirements. The other answer choices are incorrect because they are not enough to ensure that the products meet the quality requirements and are delivered on time, and the project manager needs to monitor vendor performance to identify and address any potential problems."},{"q":"Early in a project, the project manager realizes that one of the key team members is not prepared to perform the assigned task. How should the project manager address this issue?","opts":["A.Ensure training is built into the resource management plan.","B.Review the training requirements with the team member.","C.Review each required task with the team member when it starts.","D.Escalate the issue to the resource's functional manager for resolution."],"correct":["B"],"explanation":"By reviewing the specific skills and knowledge needed for the assigned tasks, the project manager can identify any gaps and develop a plan to address them. This could involve providing additional training, mentoring, or shadowing opportunities. The other answer choices are not as effective. Review each required task with the team member when it starts: While this approach could provide the team member with some initial guidance, it does not address the underlying lack of preparation. Without proper training or support, the team member may struggle to perform the tasks efficiently and effective"},{"q":"A functional manager involved in a project complains about the latest quality metrics reports associated with all previous iterations. The team does not think this is a valid complaint. What should the project manager do first?","opts":["A.Fix the reports to accommodate the functional manager's complaints.","B.Speak to the functional manager to understand their specific concerns.","C.Review the RACI matrix to identify who is responsible for quality metrics.","D.Perform a quality audit to validate the applied quality metrics."],"correct":["B"],"explanation":"The first thing a project manager should do in this situation is speak to the functional manager to understand their specific concerns. This will help the project manager determine whether the concerns are valid and, if so, what steps need to be taken to address them. The other answer choices are incorrect. Fixing the reports to accommodate the functional manager's complaints should only be done once the project manager has a good understanding of the functional manager's specific concerns and has determined that they are valid.\u00a0Reviewing the RACI matrix to identify who is responsible for qual"},{"q":"One of the project vendors is late in providing a related product solution, which is affecting the release due dates. What should the project manager do to help the agile team manage this impediment?","opts":["A.Work with the vendor to understand the alternatives.","B.Review and update the release date with the team.","C.Have the technical lead escalate the issue to the functional manager.","D.Have the team members and experts work together on a solution."],"correct":["A"],"explanation":"The project manager should take ownership of the impediment and work with the vendor to find solutions or alternatives. The project manager can work with the vendor to identify potential alternatives that could mitigate the delay. The project manager also needs to understand the full scope and impact of the delay.\nThe other answer choices are incorrect because before taking action, the project manager should have a thorough understanding of the issue and possible paths forward. Reviewing and updating a release date without assessing the delay and having an accurate release date is not good pra"},{"q":"Organizations face different challenges within their operational areas due to external factors. This has required companies to develop formal engagement documents to guide their various operations. How should a project manager make their team members and stakeholders aware of the uniqueness of the organizational standards?","opts":["A.The various external factors of the project will be an input to the project management plan and will form part of the briefing at the kick-off meeting.","B.The various external factors should already be understood by team members and stakeholders and including them is optional.","C.Anyone who is involved in the project must understand these various external factors and make an effort to research them.","D.The team members and stakeholders will be informed about these various external factors through the official organizational communications channel."],"correct":["A"],"explanation":"Project environment is one of the ground rules that needs to be communicated to all stakeholders at the beginning. It has to do with the organization, the government, and other external factors from the project itself. The other answer choices are incorrect. We cannot assume that the team has prior knowledge of the standards and the project has to explicitly ensure awareness."},{"q":"An agile project to implement a new automation process in a factory is underway. The project manager needs a vendor to help with the installation. What should the project manager do before the vendor comes to work with the team?","opts":["A.Delegate all key decisions to the vendor's team so the project manager does not take any risks.","B.Hold an orientation to ensure both parties share the same understanding of project goals and requirements.","C.Submit the communication matrix so that all team members and vendors are known.","D.Remind the team that the vendor works for them and that the team can make final decisions."],"correct":["B"],"explanation":"The best option is to hold an orientation or kick-off meeting where all parties have the same understanding of the work goals, requirements, taxonomy and the general approach, including timelines. It is important to integrate such key partners in your team by providing information, criteria, expectations, critical items, responsibilities to avoid future issues or impasses. The other options to delegate or retain key decisions are both subjective on the specific scenario and may not be correct in all scenarios. The option to submit the communication matrix to have all parties known is not alway"},{"q":"An IT contract for a project states that all team members must be certified in IT security. The project manager discovers that one team member presented a fake certificate. What should the project manager do first to handle this situation?","opts":["A.Update the project management plan to include resources to get the team member certified.","B.Update the issue log and remove the team member from the project.","C.Ensure the remaining team members have valid certificates.","D.Investigate why this situation was not discovered earlier."],"correct":["B"],"explanation":"Fake documentation is unethical and may damage the reputation of the team and relationship with the client. It is important for the project manager to firstly log the issue and remove the team member from the project. The project manager may also report it to the reporting manager. The other answer choice are incorrect. They are steps that can be taken after the issue is logged and the team member is removed. The project manager should verify that all other team members are truly certified and investigate how to prevent this issue from happening again. This question and rationale were develope"},{"q":"A project to develop a new software program has been delivered. The software has been put into production, but members of the project team are continuously contacted by users asking how to use or report problems, even though the project received administrative closure. What should the project manager have done to prevent this situation?","opts":["A.Included an activity in the project scope that allows the project to support the tool after production release.","B.Communicated the project's conclusion with the rest of the organization formally, as per the communications management plan.","C.Ensured the final product is transitioned to a different group or organization to take care of the software during its life cycle.","D.Asked the team members to stop answering or addressing questions from users and encouraged the users to read the documentation instead."],"correct":["C"],"explanation":"As the project received administrative closure, the project manager should have ensured that all deliverables, including the new software program, be handed over to a different group or organization that will operate, maintain, and support it throughout its life cycle. The other answer choices are incorrect. Asking the team members to stop answering or addressing questions or including the activity to support the tool after production release are not a part of the project closure activities. Communicating to the rest of the organization formally is done only after the project closure is obtain"},{"q":"A project manager has been asked to manage an existing complex project. Some goals have already been delivered by the previous project manager. While reviewing the project management plan, the project manager realizes that one of the key deliverables is missing from the project goal. What should the project manager do next to ensure the expected project value is delivered?","opts":["A.Escalate the issue about the deliverable to the project sponsor.","B.Confirm the expected deliverables and rebaseline the project.","C.Track the deliverable by reviewing\u00a0the requirements traceability matrix.","D.Use the contingency fund for more resources to complete the missing deliverable."],"correct":["B"],"explanation":"By confirming the expected deliverables and rebasing the project, the project manager can proactively address the missing deliverable and ensure that the project is on track to deliver the expected value. This will help to build trust and confidence with the stakeholders and increase the chances of project success. The other answer choices are incorrect. Escalation\u00a0should be a last resort, as it can create unnecessary tension and conflict. The project manager should first try to resolve the issue with the project team and other stakeholders. While the requirements traceability matrix can be a "},{"q":"A geographically distributed project team has development issues between the colocated and virtual teams, causing productivity to decrease. What should the project manager do to address these issues?","opts":["A.Force the team members to work from one location.","B.Obtain special expertise to advise the team members.","C.Develop protocols for resolving conflicts between team members.","D.Set up face-to-face meetings with project team members."],"correct":["C"],"explanation":"When a project team is made up of colocated and virtual team members, communication management is critical. The Project manager should first understand the reasons for the issues between the teams and then set up protocols for effective team communication and conflict resolution. The other options are incorrect. Due to the distributed nature of the team, it might not be possible to force anyone to work in one location nor have face-to-face meetings. Having a special expertise could add value only after having the basic protocols in place."},{"q":"A major change in a government policy may cause a project's completion date to be delayed. The project is 90% complete. What should the project manager do next?","opts":["A.Suspend the project until the issue with the government policy is resolved.","B.Engage the change control board (CCB) to assess possible impacts to the project.","C.Move forward with the project since it is near completion.","D.Assign a new completion date for the project and inform stakeholders."],"correct":["B"],"explanation":"The project manager should engage the change control board (CCB) to assess possible impacts to the project. The CCB is responsible for evaluating and approving changes to the project. By engaging the CCB, the project manager can ensure that the impact of the government policy change is assessed and that a plan is developed to mitigate any negative impacts. The other answer choices are not as effective. Suspending the project until the issue with the government policy is resolved may not be necessary, as the government policy change may not have a significant impact on the project. Additionally"},{"q":"A project team adopted agile practices to meet the business need to develop an application. One of the senior team members inconsistently attends the team meetings, even the daily standup meetings. This senior team member then asks other team members to provide status updates on the senior team member's behalf. What should the project manager do to handle this situation?","opts":["A.Request the removal of the senior team member due to the participation issues.","B.Remind the senior team member to adhere to the team's working agreement.","C.Escalate the senior team member's participation to upper management.","D.Ask the other team members to cover the tasks assigned to the senior team member."],"correct":["B"],"explanation":"The project manager should remind the senior team member of the team's working agreement and ensure they stick to it. The other answer choices are incorrect. The project manager should first try to resolve this situation with the senior team member. Having other team members cover is also not sustainable and affects team dynamics. Removal requests are a form of escalation, and is done only if the Project Manager is unable to resolve the current issue."},{"q":"A vendor for a large and complex project has been performing more work than what was originally anticipated in the time and material contract. This type of contract caused the project to be behind schedule and over budget. The contract is about to expire.\nWhat should the project manager do?","opts":["A.Create a request for quotation (RFQ) to formulate a list of new vendors.","B.Shift to a master services agreement with appendices for the additional work as required.","C.Consult the lessons learned repository to formulate a list of potential new vendors.","D.Try to negotiate a fixed-price contract with the current vendor."],"correct":["B"],"explanation":"The project manager should shift to a master services agreement with appendices for the additional work as required. This will allow for additional work to be added to the contract without having to renegotiate the entire contract. A master services agreement covers a wide range of services, simplifies modifications to the contract, and emphasizes value delivery.\u00a0\nThe other options are incorrect.\u00a0\nCreating a request for quotation would only be helpful if the project manager is considering replacing the current vendor. This can disrupt the project and lead to additional delays.\nConsulting the l"},{"q":"A project manager is managing a construction project that is 40% through the execution phase. The project sponsor has asked the project manager to ensure that all key stakeholders are still committed to the project. How should the project manager assess the stakeholders' current engagement levels?","opts":["A.By reviewing and updating the communications management plan","B.By analyzing the most updated issue log","C.By asking key stakeholders to submit a signed declaration","D.By reviewing the stakeholder engagement assessment matrix"],"correct":["D"],"explanation":"Stakeholder engagement assessment matrix supports comparison between the current engagement levels of stakeholders and the desired engagement levels required for successful project delivery and will be the best tool to assess the stakeholders' current engagement levels. The other answer choices are incorrect. Communications management plan establishes how, when and by whom information of about the project will be administered and disseminated, and doesn't help in assessing the stakeholder engagement level. Issue log is where all the issues are recorded and tracked. It doesn't have stakeholder "},{"q":"In an agile project initiation phase, a senior team member suggests using\u00a0a new documentation tool based on experience on a previous project. What should the project manager do first?","opts":["A.Discourage the use of the new documentation tool.","B.Request\u00a0the sponsor's\u00a0approval of the new documentation tool.","C.Ask the team for feedback regarding the new documentation tool.","D.Arrange a team training session on how to use the new documentation tool."],"correct":["C"],"explanation":"By prioritizing team feedback and collaboration, the project manager demonstrates leadership, adherence to agile principles, and a commitment to continuous improvement. Implementing a new documentation\u00a0tool without team buy-in can lead to resistance,\u00a0decreased productivity,\u00a0and potential failure.\u00a0Openly discussing the proposal gives the team a chance to raise concerns and collaborate on finding the best solution. The other answer choices are incorrect.\u00a0While sponsors provide guidance, seeking approval for every tool choice can slow down agility and weaken team autonomy. Discouraging\u00a0a suggesti"},{"q":"A project manager is leading a project where a low-level stakeholder has just been promoted to a new position and has now become a high-level stakeholder. What should the project manager update to ensure the proper involvement of this stakeholder to the project?","opts":["A.Communications management plan","B.Stakeholder engagement plan","C.Resource management plan","D.Risk management plan"],"correct":["B"],"explanation":"The project manager should update the stakeholder engagement plan to ensure proper involvement and reflect changes to the stakeholder community when there are changes to the organization structure or within the industry; when new individuals or groups become stakeholders, current stakeholders are no longer part of the stakeholder community; or the importance of particular stakeholders to the project\u2019s success changes. The other answer choices are incorrect. Communication management plan, risk management plan, and resource management plan do not benefit this scenario."},{"q":"In the middle of executing an IT project, two project team members discover a new feature that will change the appearance of the product and make it more aesthetically appealing. Excited about the opportunity to add this feature, they approach the project manager to approve this addition to the deliverables, which will increase client satisfaction and possibly increase the company's chances of receiving additional project contracts from the client. How should the project manager respond?","opts":["A.Approve the idea in order to achieve the projected expectations of the team members.","B.Remind team members that, without an approved change request, the focus should be on the agreed scope.","C.Get the buy-in of the remaining team members and implement the feature once the team members give their consent.","D.Implement the change as soon as possible to improve the possibility for future revenue."],"correct":["B"],"explanation":"Any changes to already approved project plans must go through the change management process first. Gold plating is not acceptable by PMI standards. The other answer choices are incorrect. Although the project manager is excited about the great opportunity, they cannot approve and implement the change without following the correct procedures to meet the contract requirements."},{"q":"A project manager working with a culturally diverse team discovers major intra-team conflicts during project execution. What should the project manager do?","opts":["A.Schedule a project team meeting to understand the conflicts.","B.Advise the team members to work harmoniously.","C.Update the resource management plan.","D.Engage members in team-building activities."],"correct":["A"],"explanation":"The project manager needs to understand the conflicts and should engage the team in identifying them and developing solutions. The other answer choices are incorrect. Advising the team to work harmoniously, updating the resource management plan, and team building activities does not get to the root of the conflicts nor do they address the issue."},{"q":"A team member is unable to work for one week because of sick leave. The team member is currently assigned to a task on the critical path. What is the next step the project manager should take?","opts":["A.Choose another team member to take over the task immediately.","B.Evaluate the possible impacts of a project delay.","C.Refer to the risk response plan to mitigate this issue.","D.Convince the team member to proceed with completing the task."],"correct":["B"],"explanation":"Evaluating the possible impacts of this change on the project should be the first action the project manager takes to determine its effect on cost, time, and other constraints. Choosing another team member to take over or proceed with the task could be detrimental if no proper handover is provided. The issue cannot be mitigated before it is evaluated. This question and rationale were developed in reference to:"},{"q":"A key member of an agile team was replaced with a less experienced member. One of the stakeholders is concerned that the project will not be delivered on time because of the new team member. What should the project manager do to ensure successful project delivery?","opts":["A.Add this concern as a risk in the risk log and escalate it to the project management office (PMO).","B.Meet with their functional manager to assess the situation, and obtain guidance on how to proceed.","C.Reverse the decision for replacement and bring the former key member back onto the team.","D.Assess the impact of the replacement and make further resource adjustments where necessary."],"correct":["D"],"explanation":"The project manager should be prepared to make informed decisions based on an assessment of the impact of the replacement. Assessing the impact of the replacement and making resource adjustments will help ensure that the project is delivered successfully despite the change in team members. Additionally, the project manager should work with the new team member to ensure they are properly onboarded and trained, and provide support and guidance as needed. The other answer choices are incorrect. Adding the concern to the risk log and escalating the concern to the PMO might be premature and the pro"},{"q":"A project manager provided video-based training for new software\u00a0but several team members reported feeling unprepared to use it. What should the project manager have done to ensure effective training?","opts":["A.Tested the team members's understanding\u00a0after they\u00a0completed the training.","B.Requested that the training department find more appropriate courses.","C.Asked the team members to learn the required skills from the accompanying software manual.","D.Conducted individual and team assessments on their preferred learning method."],"correct":["D"],"explanation":"The project manager should conduct individual and team assessments on their preferred learning methods as different project team members will need different training. By proactively understanding the team's preferred learning styles and adapting the training approach accordingly, the project manager can create a more engaging and effective experience, ensuring everyone feels prepared to use the new software. The other answer choices are incorrect.\u00a0While assessing knowledge is important, it doesn't guarantee effective training. If the video format doesn't resonate with team members, testing won"},{"q":"A project manager is reviewing the project status with the team and identifies that a vendor resource can be released earlier than planned. The project manager reviews the schedule, confirms this change, and informs the vendor. The vendor argues that the resource must stay for a certain period of time. What should the project manager do?","opts":["A.Leave the schedule as is since the resource has to stay on.","B.Confirm the schedule changes and review them with stakeholders.","C.Make preparations to release the resource to the vendor.","D.Consult the terms and conditions in the vendor contract."],"correct":["D"],"explanation":"Since there is a contractual disagreement, the project manager should check the contract documentation to confirm the terms and conditions."},{"q":"A compliance issue was found during the course of a project. This caused an inspection of the product by the internal audit team. As a result, the project fell behind schedule. What should the project manager have done initially to avoid this issue?","opts":["A.Ensured that compliance requirements were documented.","B.Created templates to document compliance.","C.Hired a compliance consultant.","D.Engaged stakeholders at the beginning of the project."],"correct":["A"],"explanation":"It is important that the project manager consider all potential compliance, regulatory and safety requirements at the beginning of the project to ensure the project stays on track, even if the project does not appear to have any. Maintaining these requirements will minimize rework and keep the project on schedule. The other answer choices are incorrect. Engaging stakeholders and hiring a compliance consultant will still require the project manager to ensure that the compliance requirements are captured; creating templates to document compliance is after the fact and does not prevent noncomplia"},{"q":"A project is in the execution phase when new team members are onboarded. Before onboarding the new team members, what should the project manager do to reduce the impact of this action on project performance?","opts":["A.Conduct a session to update the existing social agreement on how the team will work collaboratively.","B.Schedule a session to let the existing team members explain to the new ones about the current social contract.","C.Organize a meeting with all of the team members to communicate the current social agreement.","D.Plan a meeting with the new team members to explain the rules included in the social contract."],"correct":["A"],"explanation":"When new team members join an existing team, a new team is created. The project manager should conduct a session to update the existing social agreement on how the new team will work collaboratively. Setting the ground rules of the new team is a key factor and the role of the project manger in facilitating the participation of everybody to reach an agreement. The other answer choices are incorrect because they do not suggest updating the current social agreement to accommodate the new team members."},{"q":"A project manager is assigned to a project in a country where the company has not previously done business. At the beginning of the project, the project manager realizes that there are certain regulatory requirements for which the project team has no experience. What should the project manager do next?","opts":["A.Assign sufficient budget in case such requirements have to be met.","B.Consult with a subject matter expert on how to avoid such requirements.","C.Engage a subject matter expert to check if the requirements are relevant to the project.","D.Escalate concerns about the requirements to the project sponsor."],"correct":["C"],"explanation":"The project manager should engage subject matter experts to provide expert judgment to check if the requirements are relevant to the project. The other answer choices are incorrect. Assigning sufficient budget is premature; regulatory requirements cannot be avoided and the project must comply; escalating concerns to the sponsor without first trying to resolve the issue is not good practice."},{"q":"A team member is scheduled to visit an overseas client site next week. However, the project manager overheard the team member tell a project coordinator that their functional manager denied the team member's request for time off as compensation for the client visit. The project manager needs to ensure that the team member will visit the client site next week. What should the project manager do?","opts":["A.Meet with the team member directly to tell them about what they overheard.","B.Confirm with the team member that the client visit can take place.","C.Confront the functional manager about the team member's time off.","D.Log the issue as a risk in the risk log and assign another team member."],"correct":["B"],"explanation":"The most appropriate course of action for the project manager is to confirm with the team member that the client visit can take place. This approach prioritizes open communication and understanding, allowing the project manager to directly address the potential issue without escalating it unnecessarily. The other answer choices are incorrect. Meet with the team member directly to tell them about what they overheard: While transparency is important, informing the team member about the overheard conversation might raise concerns or create unnecessary tension. It's more effective to focus on the "},{"q":"An agile project is in its first of ten iterations. After the iteration review, the team receives stakeholder feedback that the first deliverable is not aligned with the project objectives. What should the project manager do?","opts":["A.Ask the team to meet with stakeholders to understand their needs.","B.Ask the product owner to review the product backlog and its priorities.","C.Ask stakeholders to prioritize their needs.","D.Ask the sponsor to define the stakeholders' priorities."],"correct":["B"],"explanation":"The product owner is responsible for the product backlog and its priorities. If the first deliverable is not aligned with the project objectives, the product owner needs to review the product backlog and ensure that it is still aligned with the project objectives. The product owner may need to prioritize or remove items from the product backlog in order to ensure that the project is meeting the needs of the stakeholders. The other answer choices are not the best course of action. Asking the team to meet with stakeholders to understand their needs is important, but it is not the first step that"},{"q":"An entrepreneur has initiated a software development project. The project charter has been approved, and a project manager has been assigned to oversee the project's execution. During development, unforeseen political risks arise, causing an urgent need to expedite the project. The project's sponsor has requested a report on any anticipated delays. Which tool should the project manager use to prepare the report on expected delays?","opts":["A.Trend analysis","B.Root cause analysis","C.Quality reports","D.Milestone list"],"correct":["A"],"explanation":"Trend analysis is a forecasting technique used in project management to evaluate project performance over time and predict future performance based on historical results. It's used for tracking schedules, costs, and other performance measures. In this scenario, where the sponsor wants to see a report on potential delays, trend analysis can help predict schedule delays based on the current rate of progress. The other options are incorrect. Root cause analysis is used to identify the underlying reason for a problem or issue in a project. In this case, the issue at hand isn't about identifying ca"},{"q":"A project manager observed that a team member is becoming increasingly disengaged from an ongoing project. What should the project manager do to help ensure participation from this team member?","opts":["A.Speak to the team member, understand the problem, and ask the team member to work on corrective actions.","B.Ask another team member to mentor the disengaged team member.","C.Call a team meeting to discuss team engagement expectations.","D.Ask the team member to undergo additional training to improve their communication skills."],"correct":["A"],"explanation":"Understanding and showing empathy for a disengaged team member is very important for a project manager. The project manager should speak to the team member, understand the problem, and ask them to work on corrective actions to ensure engagement. The other answer choices are incorrect. These options suggest the project manager should take action without first understanding the issue the team member is experiencing."},{"q":"The project manager discovers that a stakeholder\u00a0provides inaccurate\u00a0status reports to the steering committee.\u00a0Moreover, the stakeholder does not have accurate information on the project. What should the project manager do first?","opts":["A.Update the communications management plan to ensure that the stakeholder receives the necessary information.","B.Schedule a meeting with the stakeholder to discuss the inaccurate reporting and provide accurate information.","C.Send regular updates to the steering committee to keep them informed about the project.","D.Escalate the issue and request that all reports be preapproved before they are sent to the steering committee."],"correct":["B"],"explanation":"By scheduling a meeting with the stakeholder, the project manager can take a proactive approach to addressing the issue of inaccurate reporting. The meeting will provide an opportunity to identify the root cause of the problem, discuss potential solutions, and develop a plan to improve the accuracy of the stakeholder's reporting. This will help to ensure that the steering committee has the information it needs to make informed decisions and that the project is able to stay on track. The other answer choices are not as effective. Update the communications management plan to ensure that the stak"},{"q":"A key stakeholder is upset about the new features in the current iteration for the product. The key stakeholder was unavailable during the last review and did not have the opportunity to provide input. What should the project manager have done to prevent the stakeholder from being upset?","opts":["A.Waited until all stakeholders approved the change before implementing","B.Ensured that updated project information is always accessible to all stakeholders","C.Met individually with every stakeholder to avoid disagreement","D.Scheduled meetings only when all stakeholders could be present"],"correct":["B"],"explanation":"It is imperative that stakeholders have updated project information that is accessible. This transparency is necessary to ensure all involved are well aligned about the product outcome. The other answer choices are incorrect. Waiting for the stakeholders to be present or to approve, or meeting with them individually does not avoid disagreement and may cause unnecessary delays."},{"q":"A project is close to completion when an unidentified and influential stakeholder appears and threatens to put the project in jeopardy by not approving the closing documents. Which two actions should the project manager have done to avoid this? (Choose two)","opts":["A.The project manager should have carried out stakeholder identification during the initiation stage of the project.","B.The project owner should have informed the project manager about the stakeholders of the project.","C.Identifying and analyzing stakeholders should have been performed as an ongoing task throughout the project duration.","D.The stakeholder should have come forward for proper identification at the beginning of the project.","E.Creating awareness of the stakeholders' concerns should have been continuously occurring throughout the project."],"correct":["A","C"],"explanation":"The project is put in jeopardy by this unidentified stakeholder where 'unidentified' is the keyword. To avoid this, the project manager should have identified and analyzed stakeholders at the initiation stage as well as throughout the length of the project."},{"q":"A customer is upset because a critical issue for a project deliverable has not been resolved by the agile team, even though troubleshooting has been running for several weeks. During the daily meetings, the team complains about the technical challenge and their lack of knowledge to resolve the issue. Which two actions should the project manager take to resolve this situation? (Choose two)","opts":["A.Escalate the case to a functional manager to bring a technical expert to the team.","B.Explain the situation to the customer and include an action plan.","C.Keep the team working on the sprint backlog in order to accomplish the next release milestone.","D.Update the issue and risk logs, including the action plan to resolve the issue.","E.Set up a new release date for this deliverable with the product owner."],"correct":["A","B"],"explanation":"Considering that the customer is already upset and that the team has not been able to solve the situation, the way to solve this will be to get help from outside the team and explaining the plan to the customer. The other answer choices are incorrect. Continuing to work without a solution is not the best approach as the issue is still looming; updating the issue and risk logs would have already happened since the beginning of the issue a few weeks ago; unless they know how to solve the issue, they will be unable to forecast an accurate release date."},{"q":"A company has launched a new strategic project. The goal and scope of the project were loosely defined at the executive committee meeting, and the stakeholders have been appointed. The project manager needs to hold the kickoff meeting. However, most of the stakeholders are in different locations and some are on vacation. What should the project manager do?","opts":["A.Hold the kickoff meeting with the available stakeholders and update others later.","B.Postpone the kickoff meeting until the stakeholders have returned.","C.Schedule one-on-one sessions with the stakeholders before they leave.","D.Arrange a virtual team kickoff meeting with the stakeholders."],"correct":["D"],"explanation":"A virtual team kickoff meeting allows the project manager to engage with all stakeholders, regardless of their location or vacation schedule. This ensures that all stakeholders receive the same information and have an opportunity to ask questions. Additionally, virtual team kickoff meetings can be recorded and shared with stakeholders who are unable to attend live. The other answer choices are incorrect. Holding the kickoff meeting with only some stakeholders present can lead to a lack of alignment and understanding among stakeholders. Additionally, updating stakeholders who were not present c"},{"q":"A project manager is working on an agile project that is currently in its third iteration. During the ongoing iteration, the customer contacts the project manager requesting additional features. These additional features are considered important and can be accommodated without requiring significant additional resources. The customer requests immediate changes to the current iteration to incorporate the additional features. How should the project manager respond?","opts":["A.Remind the customer that no changes are allowed per the contract.","B.Change the current iteration to include the additional features.","C.Prioritize the additional features for the start of the next iteration.","D.Tell the customer that new features will be added at a later stage."],"correct":["C"],"explanation":"In this case, the project manager should inform the customer that their request has been received and will be prioritized for the next iteration. This will allow the team to complete the work that is currently in progress without disruption, and it will also give the team time to estimate the effort required for the new features and to plan how they will be implemented.\u00a0This approach is the best way to balance the customer's needs with the team's ability to deliver the product on time and to a high standard of quality. It also allows the team to be flexible and to respond to changes in the cus"},{"q":"An urban hotel design project has an international, multidisciplinary, and cross-cultural team. The project manager is in the process of developing the first version of the project management plan. What should the project manager do?","opts":["A.Use a waterfall approach to project management.","B.Delegate most tasks to team members based in their same timezone.","C.Use a single communication channel for the entire project team.","D.Incorporate cultural considerations into the project management plan."],"correct":["D"],"explanation":"The project manager should incorporate cultural and communication considerations into the project management plan because it will help to ensure that the project plan is understood and followed by all team members, regardless of their cultural background or communication style. The other answer choices are incorrect. Using\u00a0a waterfall approach\u00a0is not well-suited for projects with complex dependencies or cross-functional teams. Delegating more\u00a0tasks to team members based on their similar timezone is not fair\u00a0or practical, as the project manager needs to consider the skills and expertise of the "},{"q":"During the execution phase of a healthcare IT project, the customer's project manager resigns and has not been replaced. The internal project manager finds out that, as a result, key stakeholders are no longer getting updated information in a timely manner.\nWhat should the project manager do?","opts":["A.Update the communications management plan.","B.Immediately inform the key stakeholders directly.","C.Inform the project sponsors of the recent changes.","D.Keep sending the information until a reply is received."],"correct":["A"],"explanation":"In this situation, the customer's project manager has resigned, and the flow of communication has been disrupted. If there is a change in project stakeholders, the communication plan must be updated immediately. This will help ensure that key stakeholders are receiving updated information in a timely manner.\u00a0\nThe other options are incorrect because they do not adequately and effectively address the issue. While they may be necessary actions, that would be determined after updating the communication management plan.\nInforming the key stakeholders directly is incorrect because the first thing th"},{"q":"During a predictive project, the project manager is in the process of finalizing the exit criteria for a significant system development project. At this stage, a stakeholder responsible for risk and compliance informs the project manager that an additional deliverable must be completed due to recently passed legislation by the local government. This requested change is expected to have an impact on the scheduled release date of the project. What should the project manager do?","opts":["A.Meet with the stakeholders and advise them that the request was not part of the exit criteria.","B.Collaborate with the stakeholder and submit a change request to the Change Control Board (CCB).","C.Escalate the issue to the sponsor to avoid delaying the project release date.","D.Add this new risk to the risk register and monitor because changes are outside the project scope"],"correct":["B"],"explanation":"When a stakeholder requests a change that impacts the project's scope and schedule, it's essential to collaborate with the stakeholder to fully understand the nature and implications of the change. Following that, submitting a formal change request to the Change Control Board (CCB) is the proper approach. The CCB is responsible for evaluating changes and making informed decisions about their approval or rejection. By submitting a change request, the project manager can ensure that the impact of the change is assessed and that the stakeholders are informed of the potential consequences. The oth"},{"q":"Close to the end of a large project, some of the technical reports related to the delivered service were not ready. The project manager asked the team members for the missing documents, but the team claimed they had already fulfilled their assigned tasks. How should the project manager address this concern?","opts":["A.Review the hierarchical chart to confirm positions and relationships.","B.Refer to the RACI chart to validate the assigned roles and responsibilities.","C.Discuss the activity list and ensure that the team understands what work is required.","D.Input all assumptions and constraints into the assumption log."],"correct":["B"],"explanation":"A RACI chart is a useful tool to validate assigned roles, documents, and to ensure clear assignment of roles and responsibilities. The project manager should refer to the RACI chart to address the concern of the missing documents and determine who is responsible."},{"q":"A project is following a strategic plan that includes key milestones that have been aligned with stakeholders. As the work is being executed, new tasks arise along with important dependencies that prevent the work from progressing as planned. The team is unable to determine who should make decisions and take action on the new tasks and dependencies. What should the project manager do?","opts":["A.Use a RACI chart to facilitate team task accountability.","B.Use a Gantt chart to ensure milestones are accomplished.","C.Ask the sponsors who have responsibility.","D.Use a work breakdown structure (WBS) to ensure requirements are covered."],"correct":["A"],"explanation":"A RACI (responsible, accountable, consult, and inform) chart shows the project resources assigned to each work package. It is used to illustrate the connections between work packages, or activities, and project team members. The other answer choices are incorrect. A Gantt chart shows schedules without assigning responsibility; the sponsors should not need to be consulted if a RACI is in place and agreed; and the WBS does not include the decision-making authority."},{"q":"A project manager is overseeing an agile project that has finalized scope and compliance requirements. During a regular project review, a stakeholder informs the project manager that proposed changes to the country's safety legislation could impact the project's scope. What should the project manager do?","opts":["A.Focus on completing the activities per the product backlog.","B.Analyze the impact of the legislative changes on the project plan.","C.Incorporate the changes in the next sprint based on the proposal.","D.Ask the sponsor to approve the additional budget for the change."],"correct":["B"],"explanation":"Changes in the external environment will impact value delivery within the organization. Legislative changes can have a significant impact on a project's scope, compliance requirements, timeline, and budget. Analyzing this impact is crucial to understanding how the project may need to adapt. The other options are incorrect because the most important step for the project manager to take is to analyze the impact of the proposed change. Focusing on completing backlog activities does not address the potential impact of the legislative changes on the project. This also assumes that the project can p"},{"q":"A team member raises a concern that some deliverables may not be compliant with certain regulations. What should the project manager do?","opts":["A.Set up a meeting with the key stakeholders and subject matter experts (SME) to get clarification about the regulations that may impact the project deliverables.","B.Request an official letter from the client to confirm if the regulations apply to the project deliverables.","C.Ask the project management office (PMO) if the project deliverables are subject to the regulations and, if so, how to proceed in order to be compliant.","D.Contact the manager of the team member that raised the concern to determine which tasks are needed to stay compliant."],"correct":["A"],"explanation":"Key stakeholders and SMEs provide information about regulations that will affect the project. The project manager should set up a meeting with the key stakeholders and SMEs to get clarification about the regulations that may impact the project deliverables. The other answer choices are incorrect as they deflect responsibility from the project manager. Typically, the PMO provides information on compliance regarding the overall project lifecycle but may not cover regulations that impact the deliverables."},{"q":"A conflict about how to proceed has developed between two team members prior to a release. The team needs to work together to complete the product release. What should the project manager do first to defuse the situation?","opts":["A.Hire an agile coach to instruct the team members on how to manage their conflict without harming the project.","B.Observe the team members' interactions and talk with them about their complaints before applying a conflict resolution technique.","C.Set up meetings with both team members and human resource management to remind them of the importance of the next delivery of the product.","D.Explain to the team members that they are wasting time engaging in a conflict and not delivering the product functionality."],"correct":["B"],"explanation":"The project manager must first analyze the conflict between the team member before implementing conflict resolution techniques. The other answer choices are incorrect because they promote hiring external resources (agile coach), escalating the issue, and taking action without first assessing the situation."},{"q":"A project manager works at a construction company. The current project is a three year, multimillion-dollar initiative to rebuild a stadium. The first phase of the project has been completed within the three month timeframe and within budget. What should the project manager do next?","opts":["A.Move on to the next phase.","B.Secure approval from the program manager.","C.Proceed with the contractual closure of the phase.","D.Begin the administrative closure process."],"correct":["C"],"explanation":"The project manager should proceed with the contractual closure of the phase. The contractual closure of the phase is the process of finalizing all activities for the project, phase, or contract. Upon receiving closure, next phase can be started as per plan and budget. The other answer choices are incorrect. Moving on to the next phase without closing the previous phase is not good practice; approval does not come from the program manager; and the administrative closure process occurs as part of final project closure activity, not phase completion."},{"q":"As a project is nearing completion, a struggle between the product owner and the project sponsor regarding who owns the benefits derived from the deliverable becomes a matter of litigation. What should the project manager have done to prevent this conflict from occurring?","opts":["A.Identified the project sponsor as a stakeholder at the beginning of the project.","B.Developed and approved the business case jointly with the product owner and the project sponsor.","C.Identified and captured any potential issues in the issue log and monitored them frequently.","D.Created a detailed work breakdown structure (WBS) and implemented systematic tracking."],"correct":["B"],"explanation":"Developing and approving the business case jointly with both the product owner and the project sponsor is a crucial step in project management. It is important for the product owner and the project sponsor to agree on the benefits of the project before it begins so that there is no confusion about who owns those benefits once the project is completed. This promotes transparency and helps prevent disputes later on. The other options are incorrect they do not address the source of the conflict. Identifying the project sponsor as a stakeholder at the beginning of the project is not the correct an"},{"q":"An agile project is in its first of 12 iterations, and each iteration lasts two weeks. In the first iteration review, the stakeholders ask for\u00a0monthly reports moving forward. What should the project manager do?","opts":["A.Tell the team members to create monthly iteration reports.","B.Create monthly reports and send them to the stakeholders.","C.Coach and mentor\u00a0the stakeholders on agile methodologies.","D.Ask the stakeholders to participate in monthly\u00a0iteration reviews."],"correct":["C"],"explanation":"The stakeholders do not have a thorough understanding of agile practices, so the project manager should take time to coach and mentor them to increase understanding and awareness. This will enable stakeholders to provide feedback and make informed decisions within the agile framework. In an agile environment, there is an emphasis on frequent and iterative feedback loops which would be every two weeks in this case. Being that the iterations are two weeks long, a monthly report would not be appropriately aligned with agile practices. The other options are incorrect because they do not align with"},{"q":"Production of a specific machine in a factory was contracted through a foreign supplier. Prior to delivery of the final two components, the supplier informs the project manager that they need to renegotiate prices or the components will not be delivered. What should the project manager do first?","opts":["A.Raise a legal case with the company for breaching the contract.","B.Approach alternative suppliers for the remaining two components.","C.Initiate the response plan for this risk entry based upon the trigger.","D.Work with the supplier to agree on new prices to minimize cost impact."],"correct":["D"],"explanation":"The project manager should first work with the supplier to agree on new prices to minimize cost impact. This is the most pragmatic and likely solution to the problem. It is important to maintain a good relationship with the supplier, as they will be responsible for delivering the final two components. The other answer choices are not as relevant or effective. Raising\u00a0a legal case with the company for breaching the contract should be a last resort, as it could damage the relationship with the supplier and delay the project even further. Approaching alternative suppliers for the remaining two co"},{"q":"A project manager is contracted to manage a project for a startup with grants from a foreign source. Midway into this project, the project manager is informed that there is a government regulatory requirement that might affect the project because the customer has foreign funding sources. What should the project manager do since all the necessary approvals for this project have been received?","opts":["A.Determine the ownership of this project based on the previously approved project charter and continue with the project.","B.Consult the risk register to determine the likelihood that the project will be accepted by the customer and meet regulatory requirements.","C.Confirm that the project is in compliance with all regulations and keep abreast of all legal implications.","D.Stop the project, ask for additional funds to obtain work permits, and continue the project without further delays."],"correct":["C"],"explanation":"The project manager should confirm that the project is in compliance with all regulations and keep abreast of all legal implications as local laws and regulations may have changed. The other answer choices are incorrect. Determining the ownership does not solve the issue and continuing with the project as-is not acceptable; consulting the risk register to determine if the customer will accept it disregards the regulatory requirement; if the project manager realizes that the project no longer complies with government regulatory requirements, they must inform the client and must behave ethically"},{"q":"A project manager is working on a project that has been ongoing for some time and is currently at the 70% completion mark. The development team has been diligently following the project management plan and scope defined in the project charter. During a product review meeting, a stakeholder complains that additional features should be included. These features were not initially part of the project scope but have now become a pressing concern for the stakeholder. What should the project manager do next?","opts":["A.Analyze changes with the team and go through the formal change control process.","B.Inform the stakeholder that the changes will be applied later as product fixes.","C.Update the project management plan with the requested changes and inform relevant stakeholders.","D.Submit a change request to the change control board and inform the sponsor about the changes."],"correct":["A"],"explanation":"When a stakeholder requests additional features during the project, especially when it's already 70% complete, it's crucial to analyze these changes with the project team. Analyzing changes with the team first allows for a more thorough understanding of the implications and feasibility of the requested features. Going through the formal change control process is essential because it helps ensure that any requested changes are evaluated for their impact on the project schedule, budget, and scope. This process also involves assessing risks and obtaining necessary approvals. The other answer choi"},{"q":"A director is acting as the product owner for a government software project. The director is repeatedly unable to engage with the team and provide regular and important feedback on project artifacts. What should the project manager do to resolve this?","opts":["A.Determine communication preferences and review responsibilities.","B.Obtain alternative feedback from the customer.","C.Recommend an open-door policy for the project.","D.Adopt a collaborative approach."],"correct":["A"],"explanation":"Communication is the key success factor to predict effective project delivery. Engaging stakeholders and developing a communication channel is the responsibility of the project manager. The other answer choices are incorrect. Alternative feedback from the customer cannot replace input from the product owner; an open-door policy does not address specific communication issues with the product owner; it cannot be assumed is not already using a collaborative approach with the stakeholder."},{"q":"A project manager is managing an upgrade from an older system to a new version. Halfway through the upgrade, the older system failed to upgrade and could not be restored. What should the project manager do to manage this situation?","opts":["A.Abandon the old system and tell the team to speed up work on other deliverables.","B.Ask for more time to restore the old system while continuing with the project.","C.Assess the impacts of the failure and communicate them with relevant stakeholders.","D.Tell the team to continue working as they are not responsible for the old system."],"correct":["C"],"explanation":"The project manager should assess the impact of the system failure and communicate it with key stakeholders. Before moving on to any other actions, the project manager needs to gain a better understanding of the impacts and work with stakeholders to identify mitigation plans. Without assessing the impact, the project manager and the stakeholders will have a lack of understanding and awareness of the issue and the resulting impacts. The other options are incorrect because they are not appropriate ways of addressing the issue.\u00a0Abandoning or restoring the old system may not be possible and may in"},{"q":"A project manager is working in the fifth month of an implementation for a construction project. The planner reported that the current schedule performance index (SPI) and cost performance index (CPI) are 0.8 and 0.9, respectively. Which two options will help to accelerate the project? (Choose two)","opts":["A.Adjust the working procedures to streamline and improve efficiency with the current resources.","B.Change the critical path by replacing some critical path activities with activities that have float.","C.Increase the number of resources to get more people involved and get activities done faster.","D.Rearrange the schedule so that some activities on the critical path can be done concurrently to reduce the project duration.","E.Ask the resources to work overtime to accelerate the project and achieve better results."],"correct":["A","D"],"explanation":"By adjusting the working procedures to streamline and improve efficiency with the current resources and rearranging the schedule so that some activities on the critical path can be done concurrently to reduce the project duration, the project manager can accelerate the project without having to add additional resources or ask the team to work overtime. The other answer choices are not the best way to accelerate the project.\u00a0Changing the critical path by replacing some critical path activities with activities that have float will not accelerate the project, as it will simply move the bottleneck"},{"q":"During a steering committee meeting, a senior executive raised a concern that although the key cost parameters are reported to be on track, the project might not be delivering the work that was originally scheduled. What measurement should the project manager use to address this concern?","opts":["A.Cost Variance (CV)","B.Earned Value (EV)","C.Schedule Variance (SV)","D.Planned Value (PV)"],"correct":["C"],"explanation":"The project manager should compare the earned value and planned value, resulting in the schedule variance. That will bring light to the difference between the project's expected results and the\u00a0project possibly not\u00a0delivering the results originally scheduled. The other answer choices are incorrect as they do not\u00a0address the concern about project scope."},{"q":"During a project team meeting, team members have identified a list of risks that may occur during the project. The project sponsor would like to meet with the project manager to evaluate the importance of each risk. What type of analysis should the project manager perform in preparation for a meeting with the sponsor?","opts":["A.Qualitative risk analysis","B.Quantitative risk analysis","C.Monte Carlo risk analysis","D.Expert judgment analysis"],"correct":["A"],"explanation":"The other options are incorrect because they are not the best way to evaluate the importance of each risk identified by the team.\nQuantitative risk analysis is incorrect because it examines the combined effect of identified risks on the desired outcome.\nA Monte Carlo risk analysis is a technique that computes or iterates the project cost or project schedule many times using input values, selected at random from probability distributions of possible costs or durations, to calculate a distribution of possible total project cost or completion dates.\nExpert judgment may be used for risk analysis, "},{"q":"One of the retrospective action items that has recurred for the past two iterations is related to the verification and validation of the delivered functionality before production readiness. Which two solutions should the project manager use? (Choose two)","opts":["A.Adjust velocity for the project team to address additional testing.","B.Incorporate unit and integration test criteria as part of the validation.","C.Modify the methodology of delivery to test-driven development.","D.Review the working agreement for acceptance criteria with the project team.","E.Include a product backlog item to build an integration test suite."],"correct":["B","D"],"explanation":"The project manager should incorporate unit and integration test criteria as part of the validation and review the working agreement for acceptance criteria with the project team. Working agreements help define what \u201cready\u201d means (so the team can take in work)\u00a0and what \u201cdone\u201d means (so the team can judge completeness consistently). The other answer choices are incorrect because they do not meet the criteria for validation. They either suggest masking\u00a0the problem without addressing the root cause or do not introduce\u00a0specific testing measures."},{"q":"A company is developing a new product that needs to implement nonfunctional security requirements. The product owner is concerned about how the team can ensure the implementation of these nonfunctional requirements.\nWhat should the project manager do?","opts":["A.Appoint a security expert as part of the team to review the acceptance criteria.","B.Send the security requirements to the security department to be implemented.","C.Discuss the security requirements during\u00a0the next sprint meeting.","D.Include the security requirements in the definition of done (DoD)."],"correct":["D"],"explanation":"To ensure compliance with security requirements, the project manager should include the security requirements in the definition of done (DoD). This will help ensure that the team is aware of the security requirements and that they are implemented throughout the project. Additionally, the project manager should consider conducting regular security audits and creating a governance plan to ensure compliance requirements are met and user access is strictly controlled.\u00a0\nThe other answer choices are incorrect.\u00a0\nAppointing a security expert as part of the team to review the acceptance criteria is not"},{"q":"A lengthy upgrade project is being delivered in a series of phased outputs. The end users will face some level of disruption during each phase prior to the outputs being achieved. What should the project manager do to ensure that the intended value is being delivered at each phase?","opts":["A.Gather feedback using surveys of the end user experience and analyze the results.","B.Review the actual costs incurred to ensure that the project remains on budget.","C.Validate the scope to ensure that the required quality of outputs is being met.","D.Track progress toward each benefit, based on the benefits management plan."],"correct":["D"],"explanation":"In order to ensure that the intended value is being delivered or on track to be delivered, the project manager should track progress to
