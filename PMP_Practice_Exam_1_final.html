ward each benefit, based on the benefits management plan. The other answer choices are incorrect because they do not mention the benefits management plan. The benefits must be identified and measurements put in place to track progress towards the benefits."},{"q":"A project manager wants to ensure that virtual team meetings are effective. What should the project manager do?","opts":["A.Record all the meetings\u00a0for participants who cannot attend.","B.Determine the best communication methods based on location.","C.Prioritize the agenda with items that require more discussion.","D.Schedule meetings at convenient times for the majority of attendees."],"correct":["B"],"explanation":"The most effective approach for the project manager to ensure that virtual team meetings are successful is to determine the best communication methods based on location. This action addresses the unique challenges that virtual teams face, such as time zone differences, language barriers, and cultural differences. By tailoring communication methods to the specific needs of the team members, the project manager can foster a more inclusive and productive meeting environment. The other answer choices are less\u00a0effective. Recording all the meetings for participants who cannot attend: While recording"},{"q":"A team member is unhappy with their workload and feels\u00a0they are not being supported enough. The project manager wants to meet with the team member to discuss their concerns and apply a compromise/reconcile\u00a0conflict management approach. What should the project manager do first?","opts":["A.Explain the project's constraints and priorities to the team member.","B.Listen to the team member's concerns and try to understand their perspective.","C.Suggest a revised workload that is more manageable for the team member.","D.Offer to provide additional support to the team member."],"correct":["B"],"explanation":"The first step in using the compromise/reconcile conflict management approach is to listen to the team member's concerns and try to understand their perspective. This will help the project manager identify the underlying issues and develop a solution that meets the needs of both the team member and the project. The other answer choices are also important, but they should not be done before listening to the team member's concerns and trying to understand their perspective and reconcile the situation with a meaningful compromise."},{"q":"A project manager is managing a long-term project that is behind schedule. The client is concerned that the project will be delayed. Which two actions should the project manager take to address the client's concerns? (Choose two)","opts":["A.Create a new baseline schedule.","B.Review the change control process.","C.Add more resources to critical path tasks.","D.Perform a risk reserve analysis.","E.Run some activities concurrently."],"correct":["C","E"],"explanation":"The project manager should add more resources to critical path tasks (crashing) and run some activities concurrently (fast tracking). The other answer choices are incorrect. Creating a new baseline schedule hides the problem or changes the timeline; reviewing the change control process and performing a risk reserve analysis do not address the client's concerns immediately."},{"q":"At daily collaboration meetings, several team members complain that they cannot concentrate due to a noisy work environment. Who is responsible for solving this problem by creating a more conducive work environment?","opts":["A.The project sponsor.","B.The team members.","C.The product owner.","D.The project manager."],"correct":["D"],"explanation":"The project manager is responsible for removing impediments and creating a conducive work environment.\u00a0A critical role for the project manager is to maximize delivery by removing impediments to their progress. This includes solving problems and removing obstacles that may be hampering the project team\u2019s work. By solving or easing these impediments, the project team can deliver value to the business faster.\nProjects can be challenging from the perspectives of technical challenges, environmental influences, and interpersonal interactions. Supporting project team members through problem solving a"},{"q":"A new project manager joins an existing team. The project manager is made aware that there are strong personalities on the team, which has resulted in management becoming involved to resolve team performance issues. What should the new project manager do when first joining this team?","opts":["A.Implement the plan that senior management has developed to resolve conflicts on the team.","B.Review the team velocity records and observe the team and interactions between the team members.","C.Follow the advice of the most vocal team member on how to improve team dynamics.","D.Observe the team and determine who should be removed from the team."],"correct":["B"],"explanation":"As the new project manager joins the existing team , they should simply observe to understand the dynamics and nature of the existing team. If there is dysfunction, all the more important to observe, and then take action once there is a better understanding of the team. The other answer choices are incorrect. Implementing plans that the project manager is not fully aware of before getting to know the team may have adverse effects; listening to the most vocal team member does not take into account the thoughts of the entire team; and observing the team to remove a member is not the primary goal"},{"q":"During project execution, the audit team determined that critical regulatory requirements are not being met. What should the project manager have done first to avoid this problem?","opts":["A.Updated the issue log with regulatory requirements.","B.Assessed the internal and external regulatory environments.","C.Had the audit team review the project management plan.","D.Included a member of the audit team on the project."],"correct":["B"],"explanation":"At the beginning of the project, understand the regulatory requirements based on the type of project and the industry will allow the team to include tasks in the plan geared to meeting the requirements, ensure enough resources are allocated to addressing the requirements and reducing the amount of rework that would result from not doing the assessment."},{"q":"A project manager is building a project team. All of the project team members have worked together on previous projects. One of the team members is known for challenging most organizational procedures and processes. What should the project manager do first to ensure a smooth project initiation?","opts":["A.Review the organizational process assets (OPAs) with all team members and establish ground rules.","B.Ask the project sponsor to define the ground rules and share them with the team members.","C.Ask the project sponsor to replace or remove the troubled team member.","D.Set up a meeting with the team members to review the project management plan."],"correct":["A"],"explanation":"Organizational process assets (OPAs) are the plans, processes, policies, procedures, and knowledge bases specific to and used by the performing organization. These assets influence the management of the project. The OPAs also include the organization's lessons learned from previous projects and historical information. The project manager should first review the OPAs with all team members and establish ground rules. The other answer choices are incorrect because they either deflect responsibility or happen after ground rules are established."},{"q":"A newly appointed product owner is not sure how to prioritize product specifications and mentions this challenge to the project manager. What should the project manager do to assist the product owner?","opts":["A.Prioritize product backlog for the product owner.","B.Coach the product owner on how to prioritize product specifications.","C.Request that the product owner becomes trained in agile methods.","D.Ask project team to prioritize product backlog."],"correct":["B"],"explanation":"The project manager should coach the product owner on how to prioritize product specifications. Project managers should act as a facilitator, becoming impartial bridge-builders and coaches, rather than making decisions for which others should be responsible. The other answer choices are incorrect. They do not support the idea that the project manager should coach the product owner to fill in missing knowledge gaps."},{"q":"A team is working in a highly regulated industry and the compliance department keeps pushing documentation and process steps that interfere with the team\u2019s desired way of working. Team frustration increases with the compliance department, and the team asks the project manager to intervene.\nWhat approach should the project manager take?","opts":["A.Help the team understand that compliance is an important part of the overall success of the project and value creation.","B.Push back on the compliance department and reduce the number of documents so the team can focus on value creation.","C.Conduct a daily workshop to assess the compliance, and complete as much compliance work as possible in that timebox.","D.Invite the compliance team to attend the daily standup meetings to avoid interference and resentment between the two teams."],"correct":["A"],"explanation":""},{"q":"A company is expanding, and the project manager is contemplating whether to hire new resources or outsource resources from an approved vendor team. What should the project manager focus on regarding this decision?","opts":["A.The procurement strategy and standards of the organization.","B.The cost of hiring new resources versus outsourcing resources.","C.The organizational resource strengths versus those of the vendor.","D.The cost of internal resources versus the cost of vendor resources."],"correct":["B"],"explanation":"The cost of hiring new resources and outsourcing resources can vary significantly depending on a number of factors, such as the skills and experience required, the location of the resources, and the vendor's pricing structure. The cost of human resources, including salary, benefits, training, and overhead, can significantly impact the project's budget. Comparing these costs to the expenses associated with outsourcing is a fundamental aspect of resource allocation and budget planning. The other options are incorrect because they are not as critical as assessing the cost of hiring new resources "},{"q":"The product owner has asked the project manager and the agile team to demonstrate the completed functionality to key project stakeholders. The project is in its early days and has only completed three iterations of functionality. This is the first time the stakeholders will be exposed to an agile project. What should the project manager do?","opts":["A.Reinforce with the product owner that it is their role to communicate and manage the stakeholder groups directly.","B.Set expectations with the stakeholders regarding what agile is, the approach, and that they will be seeing a small amount of functionality.","C.Demonstrate the completed functionality to the stakeholders, along with the user requirements and solution prototypes available.","D.Protect the team from distractions by providing a link to the user acceptance test (UAT) environment so the stakeholders can view the functionality directly."],"correct":["B"],"explanation":"Since it is the stakeholder's first time with agile, the project manager should set the stakeholders' expectations on what agile is, the approach (which is that you will deliver the project in small increments that build on all the rest) in the context to what is done."},{"q":"A Scrum team noticed a trend of work spilling over for the last several sprints. The root cause of this has been identified as the code review task. This bottleneck appears to occur because the team is dependent on an external expert. What should the project manager do first?","opts":["A.Assess the bottleneck, highlight it, and increase the sprint length.","B.Assess the team's capability and identify the required internal training to remove the bottlenecks.","C.Arrange an alternative option to have a backup expert to avoid spillover.","D.Work with the team, start reviewing the code,\u00a0and stop reviews from the expert to avoid spillover."],"correct":["B"],"explanation":"The first thing the project manager should do is assess the team's capability and provide internal training to reduce the dependency on the external expert. By assessing the team's capability and identifying the required internal training, the project manager can effectively address the bottleneck, reduce the team's reliance on external resources, and improve the overall efficiency of the Scrum team. This proactive approach will contribute to the team's self-sufficiency and overall project success. When the team members are able to do the work, they won't need to wait for the expert, diminishi"},{"q":"A project team is in the planning phase of a complex project. The project has an end-date constraint to launch a new product\u00a0with which they have no previous experience. The project sponsor is requesting a detailed schedule, but the team is unable to predict when tasks will occur throughout the project lifecycle, especially because some of them are dependent on deliverables by other business units. What life cycle methodology should the project manager use in this situation?","opts":["A.A hybrid life cycle including a prioritized product backlog approved by the sponsor","B.A predictive life cycle including a schedule in agreement with all business units","C.An agile life cycle including a detailed schedule in agreement with all business units","D.An iterative life cycle including task durations and a budget approved by the sponsor"],"correct":["A"],"explanation":"A hybrid development approach is a combination of adaptive and predictive approaches. This means that some elements from a predictive approach are used and some from an adaptive approach are used. This development approach is useful when there is uncertainty or risk around the requirements. Considering that the project is complex and will need to go through multiple stages, the team is unable to predict when tasks will occur, or their duration, but the project needs to be completed by a fixed due date, the project manager would best be advised to choose a hybrid approach that would include wor"},{"q":"At the beginning of a project, a stakeholder is concerned that the initiative may not deliver value to the organization. What should the project manager do first to increase the chances of project success?","opts":["A.Review the business case and benefits management plan with the stakeholder.","B.Provide continual communication of the project status to stakeholders.","C.Schedule training for everyone on the use of the new product.","D.Perform an audit to make sure the benefits are realized."],"correct":["A"],"explanation":"Understanding the business case at the beginning of the project will help the project manager focus on developing a plan that will focus on ensuring that project benefits can be met.\u00a0By reviewing the business case and benefits management plan with the stakeholder,\u00a0the project manager can demonstrate to the stakeholder that the project has a clear purpose, defined goals, and a plan for measuring and realizing the expected benefits. This proactive approach will help to address the stakeholder's concerns early on, build trust and confidence, and increase the chances of project success. The other "},{"q":"A project team member continues to change a colleague's deliverable during every sprint. The colleague has asked the project manager to intervene. What action should the project manager take to address the concern?","opts":["A.Speak with the team member to determine the reason for the changes.","B.Discuss any lack of quality in the deliverable with the colleague.","C.Review the performance of both team members with their functional managers.","D.Control the execution and delivery to ensure that the deliverables are not changed."],"correct":["A"],"explanation":"Understanding the reason for constant changes is the first step the project manager should take in addressing the concerns. Then, the project manager can determine the actions necessary to resolve the conflict. The other answer choices are incorrect. These choices suggest that the project manager should attempt to implement solutions or take action before having an understanding of the issue they are dealing with."},{"q":"A project manager has recently been assigned to an existing multinational project and is not familiar with the key stakeholders. What should the project manager do?","opts":["A.Request a meeting with the resource manager.","B.Review and update the stakeholder register.","C.Ask for the opinion or expert judgment of the sponsor.","D.Identify the communications tool and update the plan."],"correct":["B"],"explanation":"The stakeholder register contains details of the project's stakeholders and provides an overview of their project roles and their attitude toward risk on the project. The project manager should review and update the stakeholder register and begin to build rapport. The other answer choices are incorrect. The resource manager is an individual with management authority over one or more resources, and will not know all project stakeholders; asking for expert judgment of the sponsor will not help the project manager learn about the project stakeholders; updating the communication plan will not allo"},{"q":"A project manager is planning for a complex project that must deliver a high-quality product within the agreed-upon budget. The project stakeholders are eager to see the product launched and are pressuring the team to deliver the product as soon as possible. The project manager must determine the project's estimated duration and address stakeholder expectations. How should the project manager determine a realistic project duration estimate?","opts":["A.Confirm stakeholder delivery expectations.","B.Estimate the duration of each project task.","C.Analyze industry benchmarks and standards.","D.Tell the team to create a detailed release plan."],"correct":["B"],"explanation":"Estimating task duration helps ensure the project is completed on time, within budget, and to the satisfaction of stakeholders. By estimating task durations accurately, project managers can provide stakeholders with a realistic timeline for project completion. This helps manage stakeholder expectations and reduces the likelihood of disappointment or frustration. It also helps to identify potential roadblocks and dependencies. The other answer choices are incorrect. Confirming stakeholder delivery expectations is not an effective or reliable way to estimate project duration. An industry benchma"},{"q":"A company is implementing a new computerized system. During project execution, the leader of a\u00a0department that is critical to project completion raises a concern that the department's requirements are completely missing from\u00a0the approved project management plan. What should the project manager have done to avoid this issue?","opts":["A.Managed the expectations of all relevant stakeholders.","B.Sought expert judgment in the project scope design.","C.Involved all relevant stakeholders in the project planning.","D.Developed a change management plan to approve changes."],"correct":["C"],"explanation":"The project manager should involve the relevant stakeholders in the project planning. The leader of the department is concerned that requirements are\u00a0completely missing from the approved project management plan. The leader of the department is a stakeholder and\u00a0they\u00a0should have been included in project planning activities. If the approved project management plan does not include all stakeholder requirements, then the project manager did not adequately involve all relevant stakeholders in the project planning process. Had the leader of the department been involved during the project planning pr"},{"q":"Due to market changes, a company decided to speed up its product release schedule, moving from yearly cycles to quarterly cycles. The project manager views this as an excellent opportunity to use an agile life cycle, but upper management is not sold on the idea. What should the project manager do to increase the chances of success by using this approach?","opts":["A.Seek the project sponsor's approval for additional budget and resources.","B.Review the product backlog to identify some quick wins to present to stakeholders.","C.Invite upper management to attend a digital transformation\u00a0workshop.","D.Have the project team work virtually and use the cost savings to speed up delivery."],"correct":["B"],"explanation":"Reviewing the product backlog to identify some quick wins is the best choice as ensuring early benefit realization is one of the major benefits of an agile approach and a great way to address stakeholder concerns. Quick wins are the best way to sell agile as the methodology to use. Effective change management uses a motivational strategy rather than a forceful one. Project team members and project managers can work with relevant stakeholders to address resistance, fatigue, and change absorption to increase the probability that change will be adopted or assimilated successfully. This includes c"},{"q":"A project manager is managing multidisciplinary teams. During the last project review meeting, the project manager realized that there is friction between some of the team members. What should the project manager do next?","opts":["A.Identify the team members and review their project performance.","B.Consult with the sponsor to find replacements for the team members.","C.Evaluate the issue and apply conflict resolution techniques.","D.Report the issue in the monthly project executive summary."],"correct":["C"],"explanation":"The project manager's priority should be to address the underlying cause of the conflict. Once the project manager has a better understanding of the issue, they can then apply appropriate conflict resolution techniques to help the team members resolve their differences. The other answer choices are incorrect because they do not address the root cause of the problem. Identifying the team members and reviewing their project performance may help to identify potential sources of conflict, but it will not resolve the conflict itself. Consulting with the sponsor to find replacements for the team mem"},{"q":"An innovative project is leveraging artificial intelligence (AI) to identify chemical compounds for the development of new products. The AI processing phase can vary in duration, ranging from three days to two weeks, and the outcomes are unpredictable. The project's primary objective is to deliver at least one product specification within a fixed two-month timeframe while adhering to a strict budget that cannot be increased. What action should the project manager take to optimize the use of the fixed budget and deliver the highest possible business value?","opts":["A.Ensure that the specification iterations are limited to 50% of the overall project duration.","B.Ensure that the AI processing is limited to 25% of the overall project budget.","C.Plan an iteration directly after AI processing to analyze and prioritize the development goals.","D.Plan the specification work as a predictive task with a fixed duration to guarantee value."],"correct":["C"],"explanation":"By planning an iteration immediately following the AI processing, the project team can analyze the results, prioritize the development goals based on the findings, and focus the remaining budget on the most valuable tasks. The other options are incorrect. Limiting the specification iterations to 50% of the overall project duration does not directly address the issue of maximizing the business value within the remaining budget. Additionally, it might not be feasible given the unpredictable nature of AI processing times. Limiting the AI processing to 25% of the overall project budget might not b"},{"q":"During a Scrum board review for a hybrid project, a team member suggests adding a task that is outside of the baseline scope. This task could reduce risk to the project. The team member raises it in the review. What should the project manager do?","opts":["A.Assess the feasibility and impact of including the task and incorporate it into future sprints if appropriate.","B.Instruct the product owner to assess the benefit of the activity toward meeting the project's initial requirements.","C.Direct the team toward the critical path activity and include the task in the backlog column for later review.","D.Document the task in the project documentation, noting may reduce risk but it is outside of the baseline scope."],"correct":["A"],"explanation":"When a team member suggests adding a task that falls outside the baseline scope, the project manager should analyze the impact of including this task. If it is determined that adding the task is feasible and beneficial to the project, it should be incorporated into future sprints.\u00a0This approach aligns with Scrum's principles of flexibility and adaptability to changing circumstances and requirements. The other options are incorrect because they do not adequately address the potential scope change and risk reduction associated with the suggested task. The project manager should not necessarily i"},{"q":"A country implements new labor laws with specific requirements for labor health and safety. The company's existing procedures haven't been updated yet, but management informed all project managers of the regulations. What should the project managers do first?","opts":["A.Review the possible impacts of the updated regulations on their projects.","B.Update their project risk register for emerging risks.","C.Request that the human resources department\u00a0update the procedures.","D.Ask the corporate office for advice on how to define the best course of action."],"correct":["A"],"explanation":"By prioritizing a thorough review of the regulations' impact, the project manager takes a proactive and informed approach to ensuring project success under the new legal landscape. This demonstrates critical thinking, risk management, and leadership skills. The other answer choices are not as effective.\u00a0While risk identification is important, updating the register should be based on a comprehensive understanding of the regulations' impact. While HR will eventually update procedures, the project manager needs to identify the specific impacts first to ensure efficient resource allocation and avo"},{"q":"A project advisory team is working remotely from the core project team. There is a constant flow of information between these two teams, and both teams approve project documents. Any delays in approvals will result in additional expense. Which practice would assure the project manager that all of the documents are on hand, updated, and approved properly?","opts":["A.Let the advisory and core teams develop and maintain their own document categorization and naming systems.","B.Require each member of the advisory and project teams to maintain updated records.","C.Have the sponsor maintain and approve changes within a single document registry.","D.Oversee a single document registry and change control system that both teams use."],"correct":["D"],"explanation":"Document control is an important part of project change control. A single document registry will ensure that there is version control and all the documents are accessible to all the stakeholders from a single repository. The project manager should oversee a single document registry and change control system that both teams use. The other answer choices are incorrect. Multiple document registry systems will cause inconsistency, confusion, and delays. It is not the sponsor's role to maintain a document registry."},{"q":"A project manager for a new project is tasked with applying agile practices to improve team performance. Which approach should the project manager take?","opts":["A.Utilize active listening techniques to address the needs of the team.","B.Request a budget from finance for training the team members.","C.Assign a budget for team activities during the planning phase of the project.","D.Ensure team retrospectives are done regularly."],"correct":["D"],"explanation":"Retrospectives are a key component of agile practices and involve the team reflecting on their performance and identifying areas for improvement. The project manager should ensure that team retrospectives are done regularly to improve team performance using agile practices. Other approaches may be beneficial, but retrospectives are a key component of agile practices. The other answer choices are incorrect. While active listening is an important skill for a project manager, it may not directly improve team performance in an agile environment. Training may be beneficial, but it may not directly "},{"q":"A project manager decided that using an agile approach for a new project will deliver the best outcomes. Some of the team members were resistant to using agile techniques and decided to use predictive approaches to carry out their work. What should the project manager have done at the beginning of the project?","opts":["A.Performed a skills assessment of the team","B.Advocated the use of agile techniques","C.Engaged only the resources who were comfortable using agile","D.Hired agile consultants to lead the team"],"correct":["B"],"explanation":"When adopting new processes and techniques, it is an important part of change management that team members are armed with the proper information to understand the benefits of the change and the tools that will ensure their success. The project manager should have advocated for the use of agile techniques at the beginning of the project. The other answer choices are incorrect. Performing a skills assessment usually helps determine necessary technical skills not process skills; being comfortable with agile is not a relevant criteria to contribute on the project team; in terms of agile roles, the"},{"q":"The project manager of a new hybrid project is trying to put together the project team. The best candidates for team members are geographically dispersed, so there is a risk that this situation will interfere with the performance of the project. Colocation would increase costs dramatically; and due to severe competition, the company is struggling financially to survive. What should the project manager do?","opts":["A.Make sure the right tools for virtual collaboration are available for the team.","B.Insist on bringing the team together by cutting the budget somewhere else.","C.Ask the product owner for additional funds to support colocation.","D.Organize the work according to the locations of the team members."],"correct":["A"],"explanation":"The project manager Ensure virtual team collaboration tools are available is the best way and more economical to make sure the needed collaboration takes place. The other answer choices are incorrect because they suggest colocation or adjusting schedules, both of which may not be feasible moneywise and timewise."},{"q":"A project manager is assigned to an ongoing project with virtual team members from different countries who are working remotely in different time zones. The project manager notices that team members are not completing project activities on time and are unable to produce the expected deliverables due to irregular communications. How should the project manager resolve this?","opts":["A.Provide the team with the deliverable list to guide them.","B.Engage with the team members to understand their challenges.","C.Organize time management training for the team.","D.Take steps to colocate the team in the same office."],"correct":["B"],"explanation":"Engagement with virtual team members is critical to know the issues and challenges team members are dealing with. The project manager can assist to resolve these issues once they are aware of them. The other answer choices are incorrect. They do not assess the problem initially. These steps can be taken after the project manager understands the underlying issues."},{"q":"A project manager receives an email shortly after the beginning of a sprint. It is from a key stakeholder who is unfamiliar with agile methodologies and has a serious complaint about the work that was just started. The stakeholder insists that one deliverable should be changed. What should the project manager do?","opts":["A.Address the request at the daily scrum meeting and ask for the project team's opinion.","B.Modify the backlog to accommodate the change, and tell the team to start the requested deliverable immediately.","C.Schedule a meeting with the stakeholder and product owner to discuss the request.","D.Cancel the current sprint, schedule a priority retrospective, and invite the stakeholder to discuss the request."],"correct":["C"],"explanation":"The project manager should schedule a meeting with the stakeholder and the product owner so that the concern can be discussed and addressed.\nThe other answer choices are incorrect.\u00a0\nThe daily scrum meeting is for checking the progress of the sprint and addressing the team members' issues/challenges and is not an appropriate course of action in this situation. \u00a0\nThe backlog is owned by the product owner and only the product owner is authorized to make changes to it.\u00a0\nCanceling the current sprint would be a drastic action and should be a last resort."},{"q":"A project manager is planning for a project team that will soon start work on a critical subsystem. There are two technical alternatives identified for the subsystem, but it is not clear if either alternative will perform satisfactorily. The project will be compromised if the performance of the critical subsystem falls short. What should the project manager do first?","opts":["A.Direct the team to assess and evaluate the alternatives for the subsystem.","B.Add subsystem performance to the issue log and assign an owner for that issue.","C.Schedule work for the most promising alternative and add management reserve for the other alternative.","D.Advise stakeholders of the major risk to the project posed by the subsystem's performance."],"correct":["A"],"explanation":"The project manager should direct the team to assess and evaluate the alternatives for the subsystem before scheduling the work. The data to support the decision of the alternative to implement must be generated and evaluated before the implementation is planned. Swarming is an appropriate way to do this. The other options are all incorrect as they suggest taking action before proper analysis."},{"q":"A project manager is currently overseeing a hybrid project that has specific scope and quality requirements. However, due to recent changes in a competitor's product, there is a growing concern that the project's deliverables may become obsolete by the time the project is completed. What should the project manager do to address the potential obsolescence of deliverables?","opts":["A.Conduct a comprehensive business impact analysis and explore options for using alternative materials or resources.","B.Assess the impact of the competitor's product changes and seek approval from the change control board (CCB) to address them.","C.Continue the project as planned, adhering to the existing project schedule and avoiding any scope or quality changes.","D.Close the current project and initiate a new project that is better aligned with the changing competitive landscape."],"correct":["B"],"explanation":"The project manager should assess the impact of external changes and involve the change control board for necessary approvals. Assessing the impact of the competitor's changes allows the project manager to make informed decisions and develop appropriate mitigation strategies to address the potential obsolescence of deliverables. Seeking approval from the CCB ensures that any alterations are made with the appropriate authority and in a structured manner. The other options are incorrect because they either overlook the need for formal approvals or do not adequately address the potential obsolesc"},{"q":"During the final sprint review, the product owner stated that the product does not deliver any value. The project manager believes that the product meets all the provided specifications. The team is confused by the product owner's statement. What should the project manager do when using a hybrid approach?","opts":["A.Review the project's benefits management plan with the product owner.","B.Escalate the matter to the executive board so they can decide on next steps.","C.Prioritize the project backlog and ask the development team to fix the issues.","D.Ask the product owner to terminate the project as it is no longer aligned to the expected benefits."],"correct":["A"],"explanation":"\"Review the project's benefits management plan with the product owner\" is the best choice as a benefits management plan describes how and when the benefits of the project will be delivered and how they will be measured. \"Escalate the matter...\" is not the best action without looking into the benefits management plan. \"Prioritize the project backlog...\" This is not an option as it is the final sprint and does not help in the given situation. \"Ask the product owner to terminate...\" Product Owner alone can't decide to terminate the project, but this action is not the correct option for the given "},{"q":"A project manager in Location A works with a local team, while developers are in another remote location, and a quality assessor is in yet another remote location. The project manager is aware that these distances mean that the team could struggle with lag when needing to communicate. What could the project manager do to mitigate this issue?","opts":["A.Increase the number of standup sessions per day.","B.Source new team members locally.","C.Create a fishbowl window.","D.Decrease the need for team communications through backlog grooming."],"correct":["C"],"explanation":"There are a myriad of tools that project managers can employ to facilitate working with virtual and remote teams. Geographically distributed teams need virtual workspaces. A fishbowl window alleviates lag by providing a long-lived video link that remains open during the workday for a dispersed team. In this way, people can see and engage spontaneously with each other, reducing the collaboration lag otherwise inherent in the geographical separation. The other answer choices are incorrect because they either do not solve the issue of communication lag or they are not feasible."},{"q":"Before a project evaluation meeting, a key stakeholder complains that the project does not deliver the expected business benefits. The project manager needs to prepare for the meeting to effectively address the\u00a0complaint. What should the project manager do first?","opts":["A.Review the change control log for approved variances in the project deliverable.","B.Review the communications management plan and stakeholder engagement plan.","C.Review the project performance metrics and acceptance test results.","D.Review the project objectives and success criteria."],"correct":["D"],"explanation":"Project success is measured by the achievement of project objectives and success criteria. The project manager should review these two to understand the key stakeholder's complaints before taking action. The other answer choices are incorrect while the change control log may provide insights into changes that have been made to the project deliverables, it does not directly address the issue of whether the project has delivered the expected business benefits. The communications management plan and stakeholder engagement plan may provide information on how stakeholders have been engaged througho"},{"q":"A company must launch a global product to respond to a competition threat. As part of an agile approach, the team chooses Region X as the baseline to test the first iteration. While the product meets standards and requirements in Region X, it does not comply with two of the other regions' standards. What should the project manager do?","opts":["A.Ensure that the product meets the standards and requirements in Region X and plan future iterations to address the noncompliance with the standards in the other regions.","B.Document this as a noncompliance in the quality management plan and correct it in the next iteration.","C.Re-plan all of the iterations to meet all three regions' standards within the scope of the work.","D.Connect with customers from each region to reach an agreement on the existing design."],"correct":["A"],"explanation":"An agile approach refines work items and delivers them frequently. It also assures controlling quality to comply with the requirements throughout the project. In the case of non-compliance, the project manager should plan iterations to implement other requirements and standards. The project manager should prioritize ensuring that the product meets the standards and requirements of the region where it will be launched first. Once the product is launched in Region X, the project manager can then plan future iterations to meet the standards and requirements of the other regions. This approach all"},{"q":"A team has recently adopted agile and is following a scrum model. There is a conflict between a lead developer and a quality assurance team member regarding their approaches, which is impacting the sprint goals. What should the project manager do to resolve these conflicts?","opts":["A.Call separate meetings with each team member and suggest that the team members resolve it at their level.","B.Analyze the situation and help the team members understand the impact of the conflict.","C.Help the team members collaborate and resolve their problem together.","D.Discuss the situation in the retrospective session and create an action item."],"correct":["C"],"explanation":"Conflict between team members should be dealt with among themselves. The opinions of the team members should be valued and made transparent in the process. The project manager should encourage them to collaborate to solve their issue and should intervene if the conflict cannot be resolved. The other answer choices are incorrect because they do not directly help resolve the conflict. Calling for separate meetings, understanding the impact of the conflict, and discussing in a retrospective meeting delay resolution and don't encourage the team members to unite."},{"q":"A company that has traditionally used predictive approaches has been experimenting with the use of agile in portions of a project. Because the company has been pleased with the results, the project sponsor now requests that the entire project be converted to agile. What should the project manager do?","opts":["A.Propose that the approach change to agile take effect for new projects.","B.Submit a change request to the change control board (CCB).","C.Consult the product owner as they may have reasons to continue using a predictive approach.","D.Convert the project deliverables to user stories and inform the team."],"correct":["B"],"explanation":"As the project is changed from predictive approach to agile, it needs to be submitted as a change request to the CCB. The project manager has to get approval from the CCB before changes are incorporated into the project. Consulting the product owner will not be necessary in this situation."},{"q":"A project was undertaken to set up a new business function in the company. Several months after completion, the project manager is still handling business operations for the project while working on another project. What should the project manager have done at the beginning of the project to prevent this?","opts":["A.Ensured that the revision to the organizational structure was a deliverable.","B.Included the transition plan as a deliverable in the project closing process.","C.Clarified the RACI chart with the project sponsor at the project's onset.","D.Ensured that the recruitment process was included in the project management plan."],"correct":["B"],"explanation":"By including the transition plan as a deliverable in the project closing process, the project manager can proactively prevent the issue of ongoing business operations and ensure that the project is successfully handed over to the business operations team. This will help to free up the project manager's time so that they can focus on other projects. The other answer choices are not as effective.\u00a0While a revision to the organizational structure may be a necessary step in setting up a new business function, it is not a deliverable in the project management sense. The project manager should focus "},{"q":"A project manager leads a project team on a project. This project's goal is to enhance a product's capability in the market. What should be the top consideration when defining the team's key performance indicators (KPIs)?","opts":["A.Alignment with an individual's growth and development","B.Alignment with the customer's needs","C.Alignment with the project manager's goals","D.Alignment with the sponsor's business goals"],"correct":["B"],"explanation":"Project teams must balance work in support of individual, sponsor, team, and customer goals to achieve project outcomes. Across the options, the highest goal or top consideration should be to satisfy the customer or client benefiting in its business by enhancing product range or capability. Alignment to the customer needs would be the most appropriate top consideration when developing the metrics to measure their performance. The other answer choices are incorrect because they would be secondary considerations."},{"q":"On an agile project, a team member raises concerns about health and safety issues related to the project deliverable. How should the project manager handle health and safety issues on projects?","opts":["A.Provide the customer with adequate documentation on health and safety information.","B.Send the issue to the health and safety department.","C.Design a health and safety policy for the organization.","D.Ensure that the necessary health and safety requirements are met in the definition of done (DoD)."],"correct":["D"],"explanation":"It is important for the project manager to ensure that the necessary health and safety requirements are included in the DoD and that the project deliverable meets these requirements. The other answer choices are incorrect. Providing the customer with adequate documentation, sending the issue, and designing policies do not specifically ensure that health and safety requirements will be met."},{"q":"A project manager is assigned to a project that is transitioning the organization to adopt agile principles. The project scope definition is in progress, but the project team wants to have a less formal definition. What should the project manager do first?","opts":["A.Review the scope and identify the desired deliverables and create contingency plans for identified risks.","B.Organize a workshop with the product owner and project team to create a product backlog and acceptance criteria.","C.Create a communications website to share scope definition and product backlog with the project team.","D.Meet with the project team to identify the mandatory requirements."],"correct":["B"],"explanation":"The first step the project manager should take is organizing a workshop with the product owner and project team to create a product backlog and acceptance criteria. The other answer choices are incorrect because they are inappropriate practices according to agile.\u00a0Reviewing the scope and identifying deliverables/risks might work for traditional waterfall projects, but it contradicts the desire for a less formal definition in agile. Creating a communications website before defining the backlog is premature. Meeting to identify mandatory requirements leans towards a waterfall approach and might "},{"q":"Due to budgetary constraints, the program manager has requested that project managers prioritize resources over schedule milestones. A project manager reviews the resource histogram and finds that 80% of the project's resources will be used in the last month of the project. What should the project manager do?","opts":["A.Request that activities be fast-tracked to make better use of available resources.","B.Allow some of the current resources to be available for other projects.","C.Suggest the program manager\u00a0perform an integrated resource leveling among the projects.","D.Continue the project execution according to the original plan."],"correct":["C"],"explanation":"Suggesting the program manager\u00a0perform an integrated resource leveling among the projects is the best option. Integrated resource leveling is a technique used to balance resource demand across multiple projects. This can be done by adjusting activities' start and end dates across projects. In this case, the project manager would need to work with the program manager to identify other projects that have resources that could be used to support the project during the first few months. This would help to spread out the resource demand throughout the project and make it more likely that the project"},{"q":"A project manager is implementing a phase of an IT project in a location that is prone to security issues. A team member, working at a remote site, notifies the project manager that a permit fee was not received by the local regulatory agency involved; however, the project manager is certain that the fee was paid. The team member reminds the project manager that a test on the critical path is scheduled for that location on the same day. What should the project manager do?","opts":["A.Request the team member to provide the payment evidence from the project management office (PMO) and ensure that the hard copy payment receipt is subsequently delivered to the regulatory agency and wait for the feedback.","B.Request a meeting with the agency officer to present the payment evidence and verify the consequences of a delayed payment to ensure that the test proceeds as planned.","C.Instruct the team member to proceed with the test because the penalty for non-compliance with the permit has a negligible cost impact and the test process cannot be altered.","D.Instruct the team member to proceed with the test so as not to allow a lag in the critical path because the test cannot be delayed further and the fee was most certainly paid."],"correct":["B"],"explanation":"The project manager should proactively present the payment evidence/receipt in order to not delay the test. The other answer choices are incorrect. The test needs to proceed, but in the correct manner. Directly engaging with the agency officer can help eliminate communication delay, miscommunication, and possible legal consequences for noncompliance."},{"q":"A project team has just reached a project milestone successfully. The project manager noticed that the team performed extremely well. Which approach should the project manager use to communicate with the team about their performance?","opts":["A.Avoid communicating anything about their performance as the team is expected to deliver milestones successfully.","B.Wait until the end of the project and report to the team what was done well and poorly in each stage.","C.Give feedback to the project team regarding their good performance in the next project meeting.","D.Disregard what was already done on the project and ask the project team to focus on what is left to be done."],"correct":["C"],"explanation":"The project manager should give performance feedback to project team as often as possible, so good work can be enhanced and unacceptable work can be corrected. By providing feedback in the next meeting, the project manager will not delay or withhold feedback like the other answer choices suggest."},{"q":"A project manager is managing a project using an agile approach. The project is nearing its final stages, and the team is reviewing the project deliverables. During this review, it becomes evident that a crucial feature is missing from the project's artifacts. This feature is necessary for the system to comply with a new government regulation. How should the project manager resolve this issue?","opts":["A.Ask the product owner to create a user story for the next sprint.","B.Meet with the project team to reevaluate the product roadmap.","C.Draft a project termination report and record the lessons learned.","D.Continue with the delivery and update the definition of done (DoD)."],"correct":["A"],"explanation":"A crucial feature is missing, so the appropriate action is to work with the product owner to capture it as a user story and prioritize it for inclusion in the next sprint. By creating a user story for the missing feature, the product owner can prioritize it in the backlog and ensure that it is developed and delivered quickly and efficiently. The other options are incorrect because they are not as effective. Meeting with the project team to reevaluate the product roadmap may not be necessary and should not be the most immediate action to address the missing feature. The product roadmap is typic"},{"q":"An agile project team is struggling to keep track of the changes being applied to the product, because its process is cumbersome and error-prone. What should the project manager do to address the issue?","opts":["A.Clearly assign the responsibility for the process to a single person to ensure accountability in case of failure.","B.Use the next retrospective to evaluate the process's effectiveness, and determine if changes are needed.","C.Seek the sponsor's approval to stop following this process and assume the risk of eliminating it.","D.Secure funds to acquire a software-based solution that can speed up the process and reduce the errors."],"correct":["B"],"explanation":"The first step for the project manager is to understand the nature and cause of the problem. Using project retrospectives to evaluate project process with the team and come up with better solutions is a good way to implement continuous improvement, as well as keep the team motivated and engaged. The other answer choices are incorrect because they describe action taken to implement solutions, which are premature."},{"q":"At project initiation, a quote for the required services was requested from a vendor, and the work was estimated at US$100,000. As the project progressed, requirements were updated following the company's procurement process, and a modified quote was received for more than US$250,000. The allocated contingency funds are not sufficient to cover the difference. What should the project manager do?","opts":["A.Restart the procurement process and select a new vendor.","B.Review the contract type that will be awarded to the vendor.","C.Proceed with the best offer as per the procurement process.","D.Engage the steering committee and escalate the issue."],"correct":["D"],"explanation":"The project manager should engage the steering committee and escalate the issue. This is the best way to ensure that the project can\u00a0proceed without being delayed or derailed by the increased cost of the services.\u00a0The steering committee may be able to provide additional funding for the project or may be able to help the project manager find ways to reduce the cost of the services. The other answer choices are not as effective. Restarting the procurement process and selecting a new vendor is a drastic measure that should only be taken as a last resort. It is likely to delay the project and may "},{"q":"A hybrid project involving many stakeholders is underway. As requested by the project management office (PMO), the project status reports, as well as other project documents, are being stored in a central repository. When reviewing the documents stored in the repository, the project manager discovered that documents were either not updated or were missing. What should the project manager do in this situation?","opts":["A.Discuss the situation with the project sponsor to reduce the level of documentation.","B.Work with the team leaders to update the required project reports.","C.Stop all project activities until the project documents are updated and uploaded.","D.Schedule a knowledge transfer session at the final stage of the project."],"correct":["B"],"explanation":"The first step to address missing or poor documentation would be to correct the deficiency. Then, the project manager should work with the team to ensure that documentation procedures are followed and required project reports are updated. The other answer choices are incorrect. Discussing the problem with the sponsor is not correct, as it is within the project manager's authority to remedy. The project manager does not need to stop all other project activities to address this issue. Project documentation should be updated and knowledge should be transferred throughout the project, not just at "},{"q":"A company used to deliver technical services to customers using external labor. When a new project manager arrived, the team hired specialized personnel to reduce costs by delivering an in-house service. Some of the stakeholders are frustrated that the resources are taking too much time to deliver the service.\nWhat should the project manager do to address the concern?","opts":["A.Review the communication plan with the frustrated stakeholders.","B.Increase stakeholders' understanding of the project approach.","C.Rehire the external contractor who provided the service previously.","D.Develop a glide path and communicate the ramp-up plan to stakeholders"],"correct":["B"],"explanation":"The project manager should interact with the stakeholders and explain the project approach and plan to address their concerns and reduce frustration. The other answer choices are incorrect. \u00a0Reviewing the communication plan doesn't clarify the project timeline with the stakeholders; \u00a0rehiring the external contractor that provided the service previously may cause the same issues of delay that frustrated the stakeholders; and developing a glide path does not address stakeholder concerns about the delay."},{"q":"A team member in a hybrid organization informs the project manager of a new way to execute an activity with a shorter duration. The project manager has not used the new process before, but a trusted team member explains that their previous experience with the process validates the efficacy of the new process.\nWhich two actions should the project manager take? (Choose two).","opts":["A.Involve the team member's functional manager.","B.Postpone the decision until the next sprint.","C.Update the work breakdown structure (WBS).","D.Assess the impact of adopting the new process.","E.Communicate the impact with key stakeholders."],"correct":["D","E"],"explanation":"The project manager should assess the impacts of implementing the new process and communicate the findings with key stakeholders. Assessment will help identify the opportunities and threats of implementing the new process. It is necessary that the project manager communicates the results of the analysis with key stakeholders. The other answer choices are incorrect. They may occur after the impact is assessed and the stakeholders are made aware. Involving the functional manager may not be necessary at this stage. Postponing the decision is not efficient, the project manager should assess the im"},{"q":"A project manager has been assigned to a multimillion-dollar project already in execution. During a project status meeting, one of the team members mentions that there are some delays because a senior executive is not responding to communications. What should the project manager do?","opts":["A.Establish a process to send daily reminders to the senior executive.","B.Remove the task from the critical path so it will not affect the project schedule.","C.Use networking to contact the senior executive to get a response.","D.Escalate the concern to the senior executive's manager."],"correct":["C"],"explanation":"The project manager should contact the senior executive directly to get a response. Stakeholder engagement is important in this scenario. The other answer choices are incorrect because they do not offer a direct solution for the communication issue. The senior executive may ignore the daily reminders; removing the task may impact the project as a whole; and escalating the concern to the senior executive's manager without first trying to contact the senior executive is not good for rapport."},{"q":"In the midst of an ongoing agile construction project, the project manager receives notification that the local government has recently approved stricter sustainability legislation applying to all construction projects in the region. These new regulations will have an impact on the project's materials and processes related to sustainability. What should the project manager do first to adapt to these newly instituted environmental parameters?","opts":["A.Meet with the product owner to update the project plan to incorporate the new sustainability requirements.","B.Organize a team workshop to identify and evaluate solutions for meeting the new sustainability requirements.","C.Continue the project as planned and meet with stakeholders to describe the new regulations and solicit their feedback.","D.Request a timeline extension from the project client to allow for additional time needed to meet the new requirements."],"correct":["A"],"explanation":"The project manager should work with the product owner to adapt the project plan to incorporate the new sustainability requirements and ensure that the project aligns with the updated legislation. The project manager and the product owner should work together to identify the specific requirements that apply to the project and to develop a plan for meeting those requirements. Organizing a workshop is not the first step that the project manager should take. Before organizing a workshop, it's essential to have a clear understanding of the new requirements and how they impact the project. Continui"},{"q":"An agile project was scaled from the feasibility study phase to the implementation phase. Due to time constraints, the same team is assigned to the project, except for one team member who was replaced with a new team member. Many of the team members do not get along with the new team member and are unwilling to work in the next phase. How should the project manager ensure that the team is ready for the next phase?","opts":["A.Perform an incremental delivery assessment.","B.Force the team to stay together.","C.Request a formal team commitment.","D.Remove the new team member."],"correct":["C"],"explanation":"The most helpful option is for the project manager to request a formal team commitment. An intra-team commitment mechanism is useful to review team norms and refresh the team's commitment to the project and the new phase. Most of the projects fail to team fatigue and reluctance to change management during scale-up phases. The option to perform an incremental delivery assessment and forcing the team to stay together do not address the concerns that the members have where their inability to get along take priority over delivering the work. The other option to remove the new team member may not a"},{"q":"An organization is halfway through a five year project and everything has progressed as scheduled. The latest project assessment indicates that the project will not be in compliance with a recently introduced international regulation. What should the project manager do?","opts":["A.Proceed with the project because the new regulation is not part of the initial project requirements.","B.Conduct a workshop with the project steering committee to review the new regulation and find a resolution.","C.Leverage the contingency reserve to fund the additional tasks required for the new regulation.","D.Ask for funds from the management reserve because the new regulation is an unknown risk."],"correct":["B"],"explanation":"The project manager needs to work with the project steering committee to find a resolution and ensure compliance with the new regulation The other answer choices are incorrect. Proceeding without addressing the new regulation will result in non-compliance upon project completion. The project manager should not ask for new funds or leverage the contingency reserve without getting the approval of the change control board."},{"q":"An organization is trying to adopt agile approaches to execute projects for their customers. During project planning, the product owner proposed that any release to the customer should be approved by the legal department before it is shipped. The development team is disappointed as it may potentially delay releases and the delivery schedule. Since other departments in the organization do not use agile, what should the project manager's role be as a servant leader?","opts":["A.Advise senior management to introduce agile techniques to all departments to ensure seamless services to customers.","B.Continue with standardized organizational procedures to ensure compliance with policies and avoid creating problems.","C.Inform the customer about the organizational procedures and ask them to discuss this with the organization's leadership.","D.Work with the legal department and other applicable departments to review the processes that support the project delivery."],"correct":["D"],"explanation":"As a servant leader, the project manager should work with the legal department and other applicable departments to review the processes that support the project delivery. This will help ensure that the legal requirements are met while also minimizing delays to the delivery schedule. The project manager's role as a servant leader is to facilitate collaboration and communication between different departments and stakeholders to ensure project success. The other answer choices are incorrect. Advising senior management would be a time-consuming and complex initiative that may not directly solve th"},{"q":"An agile project is midway through its ten iteration cycles. During the last iteration, the team had to work overtime to accomplish the goal. In the iteration retrospective, the team agreed that they took more time than planned because they did not have the required experience when they executed the assigned tasks for the first time. What should the project manager do?","opts":["A.Ask the project sponsor for additional team training.","B.Ask the sponsor to approve a change request for more time in future iterations.","C.Ask the team to re-assess their effort estimates in the iteration planning session.","D.Ask the product owner to reprioritize the product backlog."],"correct":["C"],"explanation":"The team learns from previous iterations how to do things better. The actions to address any shortcomings are taken as part of the next planning session. The next action should be to assess whether the team now has sufficient experience to perform the tasks within the planned timeframe for the next iteration. The other answer choices are incorrect. The options to seek additional training and reprioritize the product backlog may not affect the team's ability to complete in the next iteration. The option to ask the sponsor to approve delayed timelines is also unnecessary if the team assesses tha"},{"q":"A project is about to begin and a new regulation has\u00a0imposed a deadline that will adversely impact the project. Failing to comply with the regulation will result in hefty fines for the organization. The project is key to meeting the organization's annual goals. What should the project manager do first?","opts":["A.Analyze the critical path and prioritize resources toward essential tasks.","B.\u00a0Delegate tasks associated with higher risk levels to a third party.","C.Obtain additional funding to mitigate the need for outside services.","D.Build prototypes and simulations to identify potential issues early."],"correct":["A"],"explanation":"The project manager should analyze the impact of not initiating the project and\u00a0share the findings with stakeholders, who can identify the most time-sensitive activities, enabling focused resource allocation and potential schedule compression. The other answer choices are incorrect. Delegating tasks to third parties introduces new risks related to quality, communication, and control and doesn't guarantee faster completion within the deadline. Securing funds is time-consuming, potentially delaying progress, and doesn't directly address the core time constraint. Building prototypes and simulatio"},{"q":"At the start of a project, the team chose to leverage an agile approach to deliver the project, using user stories to capture requirements. As part of the organization's control framework, the internal compliance department will request a copy of the approved requirements document. What should be done to meet this compliance request?","opts":["A.Review the project approach with compliance, ensuring they understand how it will meet the control objective.","B.Print and assemble all user stories into one package at the end of the project and have the product owner approve them.","C.Assign the compliance requirement as a task on the project's Kanban board for the product owner.","D.Review the project approach with compliance, indicating that the control objective is not required because the project is using agile."],"correct":["A"],"explanation":"In order to meet the compliance request, the project manager should review the project approach. This encapsulates onboarding of compliance to ensure that there is understanding of the agile development approach, and how using the agile approach will ensure compliance with the control objective. The other answer choices are incorrect. \"Print and assemble...\"This option is related to the waterfall development approach. Besides there action of onboarding compliance to the agile approach and satisfying the requirement is missing in this answer. \"Assign the compliance requirement...\"This option do"},{"q":"An agile project team member is working on a user story that is overdue. This delay is causing the team to miss sprint goals for a specific functionality. The reasons for this delay are unknown to the project manager. What should be\u00a0project manager do first?","opts":["A.Discuss the delay with the team member.","B.Request additional resources from the sponsor.","C.Exclude this functionality in the final product.","D.Replace the project team member with a new developer."],"correct":["A"],"explanation":"The first thing a project manager should do when an agile project team member is working on an overdue user story is to discuss the delay with the team member. This is because it is important to understand the root cause of the delay in order to find an effective solution. The other answer choices are incorrect.\u00a0By discussing the delay with the team member, the project manager can better understand the reasons for the delay and develop an effective plan to address and request additional resources if necessary. Excluding the functionality and replacing\u00a0the project team member with a new develop"},{"q":"A project is nearing completion and a stakeholder wants to know how the project outcomes will impact the organization. What should the project manager review with the stakeholder?","opts":["A.Business case","B.Benefits management plan","C.Project charter","D.Assumption log"],"correct":["B"],"explanation":"The project manager should review the benefits management plan with the stakeholder as it is the best document to describe how and when the benefits will be delivered and the outcome's impact on the organization."},{"q":"A new solution is being deployed in several countries. Country A asked for a change in the solution in order to comply with its own customer market. The project manager for the deployment in country A accepted the change. When the project manager for the deployment in country B received the new version of the solution, the tests performed failed because this version is not consistent with country B's regulations. What should have been done to avoid this situation?","opts":["A.Prevent the changes from being authorized.","B.Ensure that all countries aligned their requirements with country A.","C.Analyze all change requests raised during each country's deployment at a global level prior to implementation.","D.Ensure that any country that requested a change pays for any required changes."],"correct":["C"],"explanation":"Analyzing all change requests raised during each country's deployment at a global level prior to implementation would have helped avoid this situation. The other answer choices are incorrect. Several countries are deploying the same solution, any impact analysis must take into account all the countries and not only the one which raises the request. Changes are acceptable within the project, but they must be managed appropriately. Getting the country to pay for any change request is not the appropriate action."},{"q":"A project manager has been assigned to lead a cross-functional project team. During a brainstorming session, the project manager realizes that some team members do not see the need for a\u00a0change, and this is affecting the team's output. What should the project manager do?","opts":["A.Restate the objectives of the project to the team.","B.Ask the project sponsor to review the project charter.","C.Engage team members to understand their doubts and get their buy-in.","D.End the brainstorming session and adopt interview methods."],"correct":["C"],"explanation":"By engaging team members to understand their doubts and get their buy-in, the project manager can address team members' concerns and get them on board with the project. This will help to improve the team's output and increase the chances of the project being successful. The other answer choices are not as effective.\u00a0Restating the objectives of the project to the team may not be enough to convince team members who do not see the need for change.\u00a0Asking the project sponsor to review the project charter may not be helpful, as the project charter may not address the specific reasons why some team "},{"q":"In order to determine a new hybrid approach for a project, the project manager decides that an assessment of the organizational culture is needed. The project manager should consider a balance between which two elements?","opts":["A.Exploration and stability","B.Speed and traditional models","C.Flexibility and predictability","D.Disruption and conformity"],"correct":["C"],"explanation":"Flexibility and predictability are the most important things in the organization's culture for the project manager to determine the appropriate hybrid approach.\u00a0When assessing organizational culture to determine a new hybrid approach for a project, the project manager should consider balancing flexibility and predictability. The other answer choices are incorrect.\u00a0Exploration and stability may be helpful, but it does not directly address the need for balancing flexibility and predictability. Speed and traditional models may be helpful, but it does not directly address the need for balancing fl"},{"q":"Project team A is launching a complex program in collaboration with project teams B, C, and D. What should be the priority for project team A's project manager during the early stages of the project?","opts":["A.Host a team-building event with members from project teams A, B, C, and D.","B.Include a metrics dashboard for project teams B, C, and D.","C.Establish the same priorities as those of project teams B, C, and D.","D.Ask project teams A, B, C, and D to identify critical dependencies, risks, and major milestones."],"correct":["D"],"explanation":"Identifying risks early in a project is a critical success factor. With multiple project teams working together, it's important for the project manager to identify dependencies, risks, and milestones and their impact on different projects' critical paths. The other answer choices are incorrect. Hosting a team-building event and having a metrics dashboard are good to have activities, but they are not a priority compared to identifying critical dependencies. Projects would be expected to have different priorities, but project teams should collaborate toward a common outcome for the program."},{"q":"The development phase of a new product has concluded. The validation test is about to start, but the test lead disagrees with the criteria for the test. What should the project manager do?","opts":["A.Understand the reason for the disagreement and submit a change request to the change control board if appropriate.","B.Implement a plan to change the test criteria so that the validation test can be started as scheduled.","C.Keep the validation test criteria unchanged because such changes will impact the project schedule.","D.Explain how changes may impact the project and convince the test lead to go along with the original test criteria."],"correct":["A"],"explanation":"Test criteria should be aligned and agreed upon by stakeholders, and change request should be made if necessary. It is important for the project manager to understand the reason for the disagreement and submit a change request to the change control board if appropriate. The other answer choices are incorrect. Making a plan to change the test criteria needs to be approved by the change control board before it can be implemented. Keeping the validation test criteria unchanged or going ahead with the original test criteria may affect the quality of the new product."},{"q":"A project manager is planning the next release for the software development team. The team has completed two releases to date, and the product backlog for the next release has been confirmed. Which of the following tools should the project manager use to plan the duration for the next release?","opts":["A.Product roadmap","B.Resource calendar","C.Work breakdown structure (WBS)","D.Burndown chart"],"correct":["C"],"explanation":"The WBS is a hierarchical decomposition of the work to be done in a project. It is used to estimate the total effort required to complete the project. By breaking down the work into smaller tasks, the project manager can get a better understanding of the time and resources required to complete each task. This information can then be used to estimate the overall duration of the project. The other answer choices are incorrect. The product roadmap is a high-level plan for the development of the product but it does not provide any information about the time required to complete each release. The r"},{"q":"A project manager is meeting with a critical third-party supplier that provides discounted services. During the meeting, the supplier complains that they are dissatisfied with their return on investment (ROI). What should the project manager do to resolve this situation and avoid putting the project at risk?","opts":["A.Negotiate with the supplier to offer more money until the project until completed.","B.Remind the supplier that the contract is legally binding and they must adhere to the terms.","C.Research other third-party suppliers that provide similar services at discounted prices.",
