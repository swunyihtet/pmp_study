"D.Discuss the issue with stakeholders and come to an agreement on a remediation plan."],"correct":["D"],"explanation":"The project manager should not take any action before meeting with the stakeholders and working with them to develop a plan. As projects unfold, internal and external conditions are continuously changing. A single change can create several impacts such as project cost, schedule, scope, and performance. Subsequently, these changes could invoke a change control protocol for obtaining approvals from entities in external systems and government authorities. In most organizations, project managers do not have contracting authority. Rather, they work with contracting officers or other people with exp"},{"q":"A team is working on an innovation project using an incremental approach. After every status meeting, some key stakeholders complain that they have not been briefed to prepare for the meeting. What should the project manager do to prevent this from occurring again?","opts":["A.Send the updated information to key stakeholders one day prior to the meeting.","B.Determine the meeting agenda with the key stakeholders, and share it in advance.","C.Meet with the key stakeholders separately in advance before every status meeting.","D.Ask the sponsor to align key stakeholders to the project\u2019s current meeting cadence."],"correct":["B"],"explanation":"In order to manage communications, the project manager needs to determine communications methods, channels, frequency, and level of detail for all stakeholders, as part of the project's communication plan. The agenda should be determined with the stakeholders ensuring they are well-informed and engaged in advance. The other answer choices are incorrect. Sending updates one day in advance may not be enough time for the stakeholders to review; meeting separately before every status meeting is time consuming; and asking the sponsor to align stakeholders deflect responsibility."},{"q":"During a retrospective meeting, project team members complain that open issues that were not fixed during the iteration are impacting their velocity. What should the project manager do to improve productivity?","opts":["A.Ensure team members attend daily standup meetings to discuss the impediments.","B.Document the issues in the issue log and wait to solve them at another time.","C.Extend the daily standup meetings to discuss the issues in more detail.","D.Escalate the issues to the project sponsor to get them solved immediately."],"correct":["A"],"explanation":"The project manager should ensure team members attend daily standup meetings to discuss the impediments. Project managers should build their servant leadership skills of facilitation, coaching, and impediment removal. The other answer choices are incorrect. These options suggest documenting the issue and taking action later; extending daily standups which is time-consuming; and escalating the issue and deflecting responsibility to the sponsor."},{"q":"A company has been using predictive methods for a very long time and is trying to implement a few iterative initiatives within its project framework. A project manager has been appointed to lead the first project in this hybrid environment. How should the project manager build awareness of the hybrid approach within the organization?","opts":["A.Meet with the project team in order to define roles and responsibilities.","B.Build the project schedule with iterative sessions and communicate this to stakeholders.","C.Invite key stakeholders to the daily stand-ups and project review meetings.","D.Recommend iterative methodology training for senior managers."],"correct":["D"],"explanation":"The best way for the project manager to build awareness of the hybrid approach within the organization is to recommend iterative methodology training for senior managers. This will help to ensure that the senior managers understand the benefits of the hybrid approach and how it can be used to improve the overall project delivery process. The other answer choices are also important, but they are not as effective at building awareness of the hybrid approach at the senior management level."},{"q":"A company is transitioning from using a predictive approach to a hybrid predictive-agile project implementation. The leadership team is concerned about benefits realization and is closely following up on one of the project iterations with the project manager. What should the project manager do in this situation?","opts":["A.Update the leadership team with a quantifiable value report for each iteration.","B.Demonstrate the business value to the leadership team and get their buy-in.","C.Keep delivering iterations of the solution and show the benefit increments to the leadership team.","D.Wait for the leadership team to share the benefits realization updates for each iteration with management."],"correct":["C"],"explanation":"As the team is transitioning to a hybrid predictive-agile environment, the project team will use new metrics that matter to the management team. Metrics for agile projects often provide a historical track record so project teams can use such data for improved forecasts and decision making. In the agile environment delivering business value is the responsibility of the project team, who will collaboratively produce the benefit incrementally."},{"q":"In a multidisciplinary project, a project manager is delegating some project management activities to several team members. What should the project manager do first?","opts":["A.Develop a project communications management plan and distribute it to the stakeholders.","B.Develop a mentoring plan and include it in the project status report.","C.Develop an organizational breakdown structure (OBS) and a work breakdown structure (WBS).","D.Develop a responsible, accountable, consult, and inform (RACI) chart."],"correct":["D"],"explanation":"The project manager's priority should be to clearly define the roles and responsibilities of each team member for the project management activities. The RACI chart is a tool that can be used to do this effectively. The other answer choices are incorrect because they are not the first step the project manager should take. Developing a project communications management plan is important, but it should not be done until the roles and responsibilities have been defined. Developing a mentoring plan is a good idea for long-term team development, but it is not relevant to the immediate need of delega"},{"q":"An inexperienced project manager requires HR\u00a0support for a project. The HR manager hired interns and sent them for training. However, the training did not deliver on the competency-based outcomes. The HR manager is not willing to accept the training costs because the training budget is exhausted. What should the project manager do to resolve the situation?","opts":["A.Prepare clear training requirements for full-time staff and interns.","B.Identify the competency gaps and collaborate with the HR manager for options.","C.Communicate training and hiring requirements to the HR manager.","D.Analyze the risk, update the risk register, and inform the HR manager."],"correct":["B"],"explanation":"The best option to resolve the situation is to work with the HR manager to identify the gaps and relevant solutions. All the other options are important but do not work towards a solution for the current situation."},{"q":"A project manager in a quickly growing hybrid organization is becoming increasingly frustrated at the rapid amount of change in daily operations. Several newer team members have already left the team or have been promoted to other roles in the organization. What should the project manager do to ensure the project governance remains stable?","opts":["A.Work with leadership to update the organizational process assets (OPAs).","B.Develop a new social contract to empower the team.","C.Update the team charter with new team members.","D.Update the project management plan on a regular basis."],"correct":["A"],"explanation":"By working with senior leadership to update the OPAs, the project manager can help to ensure that the organization has a clear and consistent understanding of how work should be done. This will help to reduce confusion and frustration among employees, and it will also help to ensure that project governance remains stable in the face of rapid change. The other answer choices are not as effective. Develop a new social contract to empower the team: A social contract is an agreement between the project manager and the team that outlines the expectations for behavior and performance. While a social"},{"q":"In a large organization, a project is experiencing communication difficulties. Team members and functional leaders are expressing that they are informed too late or not included in project discussions, or are simply unaware of important project delivery information. How should the project manager address this situation?","opts":["A.Ensure adherence to the agreed process as stated in the communications plan.","B.Send a regular email update to each functional manager regarding the project's status and next steps.","C.Coordinate a meeting with the team leaders to find a solution.","D.Refer to the RACI chart on who needs to know what and when and ensure compliance."],"correct":["A"],"explanation":"The project manager should review the communications plan and ensure adherence to the agreed process as stated within. The project manager should develop an appropriate approach and plan for project communication activities based on the information needs of each stakeholder or group, available organizational assets, and the needs of the project. This plan needs to be reviewed and updated. If there is any communication gaps during the project, it is never too late to include key stakeholders and improve communication. The other answer choices are incorrect because they do not mention the import"},{"q":"During project closure, the project sponsor requests that a deliverable, developed by a contractor, be transferred to a nonprofit organization at no cost. The procurement documentation states that ownership of the deliverable reverts\u00a0to the contractor once the procurement contract is finished. What should the project manager do?","opts":["A.Add \"avoid out-of-scope agreements during the closure process\" to the lessons learned register.","B.Initiate a change request and execute the integrated change control process.","C.Consider this transfer as an open issue for the contract department and continue closing the project.","D.Review the contract agreement with the contractor to modify the property of the deliverable"],"correct":["D"],"explanation":"By reviewing the contract agreement with the contractor in order to modify the property of the deliverable, the project manager can meet the request of the project sponsor without violating the terms of the procurement contract and closing the project successfully. The other answer choices are incorrect. Adding \"avoid out-of-scope agreements during the closure process\" to the lessons learned register is a good idea, but it does not address the immediate issue of how to transfer the deliverable to the nonprofit organization. Change requests are typically initiated during the planning or executi"},{"q":"A project team is working on backlog items within a four-week sprint. Suddenly, a critical team member announces that they will unexpectedly be absent for one week, leaving ongoing tasks incomplete. What would be the most appropriate action for the project manager to take in this situation?","opts":["A.Support a knowledge transfer between the team member who will be away and the other project team members.","B.Add a temporary resource to the team to help increase velocity and complete the items for this sprint.","C.Remove a few items from the current sprint after getting the approval of the product owner.","D.Increase the sprint duration so the team can complete all the planned items and present them to the product owner."],"correct":["C"],"explanation":"Removing a few items from the current sprint, with the approval of the product owner, is the most appropriate action in this situation. It allows the team to focus on completing the most critical and valuable tasks within the sprint's original time frame. The other options are incorrect because they are not as suitable for this scenario. Knowledge transfer takes time and may not be feasible given the sudden and unexpected nature of the team member's absence. Knowledge transfer is a good practice in general, but it may not be the most appropriate action for this specific situation. Adding a tem"},{"q":"A project team is installing a fiscal metering system for a crude oil terminal. The project manager has\u00a0requested a metering system, conducted a factory acceptance test, and delivered meters to the terminal for installation. While onsite, local regulators participated in the factory acceptance tests and declined approvals for the meters due to a breach of statutory procedures.\u00a0This\u00a0led to delays in completing testing and had an overall impact on the project cost and schedule. How could the project manager have prevented this situation?","opts":["A.Referred to lessons learned from previous projects.","B.Notified stakeholders of the factory acceptance tests for meters.","C.Ensured compliance with the stakeholder requirements.","D.Revised the stakeholder engagement plan."],"correct":["C"],"explanation":"Compliance with critical stakeholders' needs, the regulators in this case, would have prevented the declined approvals and project delay\u00a0from occurring. The other answer choices are incorrect. Referring to lessons learned, notifying stakeholders, and ensuring implementation of stakeholders' engagement plan are valid but ensuring compliance to critical stakeholders' needs is the best option to prevent delays in this situation."},{"q":"A new product development project has been launched. The project sponsor has reviewed the results of the risk analysis as documented in the risk register and is confident the project will be successful. However, key investors are not as confident and want more information about the project and risks before investing. What should the project manager do?","opts":["A.Present a detailed analysis of the market, business plan, and risk management plan to investors.","B.Prepare and present a cost-benefit analysis to investors.","C.Assess and describe all the risks associated with the product development and launch\u00a0to the stakeholders.","D.Plan development activities to engage stakeholders in various phases of the project."],"correct":["A"],"explanation":"The project manager should present a detailed analysis of the market, business plan, and risk management plan to investors will provide the information necessary for investors to make a choice in whether to invest. The other answer choices are incorrect. Cost-benefit analysis is only part of the information needed to make an educated decision on whether to invest. Presenting a risk analysis and management plan is only part of the information needed to make an educated decision on whether to invest. Stakeholder involvement may or may not ensure continued investment in the product."},{"q":"During the final stage of a project, one of the key stakeholders asks the project manager to brief the executive board about the return on investment (ROI) and any relevant new commercial value identified during project implementation. What should the project manager do next?","opts":["A.Present the cost-benefit analysis.","B.Present the achieved benefits.","C.Present the cost management plan.","D.Present the financial success factors."],"correct":["B"],"explanation":"The best course of action for the project manager is to present the achieved benefits. This is the most relevant information for the executive board, as it shows how the project has delivered value to the organization. The project manager should focus on the benefits that are most important to the executive board, such as increased revenue, reduced costs, or improved customer satisfaction. The other answer choices are not the best course of action. Presenting the cost-benefit analysis is important, but it is not the most relevant information for the executive board at this stage of the project"},{"q":"A project manager walked into a project office and found a team member and a supplier representative engaged in a disagreement over a clause in the supply agreement. The project manager invites the supplier for a negotiation with the project team to resolve the conflict. Applying the principles of negotiation, for what should the project manager and team aim?","opts":["A.Give up the project objective for a win-lose outcome.","B.Achieve the project objective for a win-lose outcome.","C.Achieve the project objective for a win-win outcome.","D.Achieve the project objective no matter what the outcome."],"correct":["C"],"explanation":"The ultimate goal of a project is to achieve project objective and for a negotiation with a supplier should be a win-win, which makes achieving project goal for a win-win outcome the key."},{"q":"A project manager has been informed that the first of several major deliveries from another country will be delayed. These deliveries are on the critical path, and the delay will result in a missed milestone. What should the project manager do first?","opts":["A.Update the project's lessons learned register and project management plan.","B.Revise the project schedule and notify the stakeholders of the delay.","C.Register the delay in the issue log and develop an immediate action plan.","D.Identify the parties responsible for the delay to issue back charges for their portion."],"correct":["C"],"explanation":"The issue log is a central repository for all project issues. By registering the delay in the issue log, the project manager will ensure that the delay is tracked and that everyone is aware of it. An immediate action plan will help to mitigate the impact of the delay. The project manager should identify the root cause of the delay and develop a plan to address it. This may involve re-prioritizing tasks, adjusting the project schedule, or communicating with stakeholders. The other answers are incorrect.\u00a0Updating the project's lessons learned register and project management plan is important, bu"},{"q":"An agile team created a risk register for a project. All initial risks were identified using stakeholder interviews, workshops, and information from the project charter. What should the project manager do to manage the risk register and the associated risks for the remaining project duration?","opts":["A.Assess and prioritize the risks during each sprint retrospective meeting.","B.Include the risks as an agenda topic in daily scrum meetings.","C.Update the risk register and review risks with the team on a regular basis.","D.Eliminate all project risks using iterative risk management."],"correct":["C"],"explanation":"Risk management is an ongoing process, and the risk register should be updated regularly to reflect new risks and changes to existing risks. The project manager should also review the risk register with the team on a regular basis to ensure that risks are being managed effectively. The other answer choices are not the best course of action for managing the risk register and the associated risks for the remaining project duration. Assessing and prioritizing the risks during each sprint retrospective meeting is important, but it is not enough. The risk register should be updated regularly to ref"},{"q":"A junior project manager approaches a senior project manager and asks for assistance in initiating the final closeout process for a project. Before offering guidance, the senior project manager requires additional information.\nWhat should the senior project manager do first?","opts":["A.Ask if the acceptance criteria for all deliverables have been met.","B.Ask if the deliverables were completed within budget and on time.","C.Ask if the customer has paid for all product development expenses.","D.Ask if quality assurance activities were conducted."],"correct":["A"],"explanation":"The senior project manager should first ask if the acceptance criteria for all deliverables have been met. This is the most important information to know before initiating the final closeout process, as it ensures that the project is truly complete and that the customer is satisfied with the product. The other answer choices are important, but they are not as essential for making the decision of whether or not to initiate the final closeout process. Whether the deliverables were completed within budget and on time or not is not the most important factor in determining whether or not the projec"},{"q":"A project manager was assigned to deliver new software for university students. In this project, the software is being delivered to a specific niche of people. To better understand this niche, the project manager needs to develop an archetype user. How should the project manager do that?","opts":["A.Create a persona character.","B.Contract with an architecture firm.","C.Submit a public questionnaire.","D.Publish a marketing plan."],"correct":["A"],"explanation":"The project manager should create a persona to develop an archetype user representing a set of similar end users, described with their goals. The other answer choices are incorrect because they will not help the project manager learn about the niche group and develop archetype users in a timely manner."},{"q":"A project manager is managing an integrated project involving both hardware and software development, with a customer-approved Gantt chart and customer involvement expectations. The software development team proposes agile methodologies for development. What should the project manager do?","opts":["A.Assess the best project methodologies for continued business value.","B.Adopt agile sprints to develop the project within the timeframe.","C.Advise the team to strictly follow the customer-approved Gantt chart.","D.Evaluate customer roles with the project management office (PMO)."],"correct":["A"],"explanation":"The project manager should assess the best project methodologies for continued business value.\u00a0By analyzing these factors and potential hybrid approaches, the project manager can make an informed decision about the best project management methodology for maximizing business value and achieving project success. The other answer choices are not as effective. Adopt agile sprints to develop the project within the timeframe: While agile could be beneficial, adopting it solely to meet the timeframe without considering other factors like customer expectations or hardware integration might not be the "},{"q":"At a review meeting, the project manager learns about unclear requirements that may impact the project\u2019s scheduled completion. The project sponsor still wants to meet the original deadline. How should the project manager approach the issue using agile practices?","opts":["A.Use iterative delivery\u00a0and prioritize the requirements based on their importance and impact.","B.Inform the sponsor that a change request for scope will be added to the next iteration.","C.Log unclear scope as an issue and escalate it to the product owner for a decision on unclear requirements.","D.Request that the scrum master clarify the scope before continuing the project."],"correct":["A"],"explanation":"In this scenario, the project manager should use iterative delivery, meaning that they should continue with the project but prioritize requirements based on their importance and impact. This approach allows for the project to progress while addressing the unclear requirements in a way that aligns with the project sponsor's desire to meet the original deadline. It also allows for flexibility to adapt as more clarity emerges. The other options are incorrect. Informing the sponsor that a change request for scope will be added for the next iteration is incorrect because it does not address the iss"},{"q":"An organization using a predictive approach has decided to switch to an agile approach. The organization believes it will deliver more value to its customers and has decided that all projects will adopt the agile approach. What should the project manager do to ensure benefits realization?","opts":["A.Evaluate the realization of benefits during team standup meetings.","B.Align the benefits management plan with the product backlog.","C.Evaluate the benefits management plan at the end of the sprints.","D.Ask the scrum master to provide daily updates about the benefits realization."],"correct":["B"],"explanation":"Aligning the benefits management plan with the product backlog ensures that the project is driven by the most valuable features and objectives that align with organizational goals. The benefits management plan should identify the specific benefits that the project aims to achieve\u00a0and the product backlog should be prioritized based on those benefits. This will ensure that the team focuses on delivering the most valuable features first and that each sprint contributes to benefits realization. The other options are incorrect. Evaluating the realization of benefits during team standup meetings is "},{"q":"A project is challenged by a multitude of problems resulting in defects and stakeholder complaints. The project manager has been contemplating a quick and effective approach to address the problems. Which two actions should the project manager take? (Choose two)","opts":["A.Gather the project team members and have a brainstorming session.","B.Refer to the organizational process assets (OPAs) to assess lessons learned.","C.Use a trend analysis to engage some of the project team members.","D.Use an Ishikawa diagram to help identify the problems.","E.Use a Pareto chart to identify how the challenges of the project should be addressed."],"correct":["D","E"],"explanation":"The Ishikawa/fish-bone diagram can be used in a systematic identification of problems as well as their origins. The output of this exercise could be used to develop the Pareto chart to indicate the 20% of the cause problems which when addressed would eliminate 80% of current challenges. This question and rationale were developed in reference to: Mastering Project Time Management, Cost Control, and Quality Management (No Date) Randal Wilson//Chapter 14/ [Item Cause-and-Effect Diagram Also known as a fishbone diagram or Ishikawa diagram, this diagram evaluates a noncompliance condition for poten"},{"q":"A project manager is in the initiation phase of a new project and is preparing to develop a project team charter. The project team consists of members from different departments within the organization, and collaboration is vital for project success. What should the project manager do to create an effective project team charter?","opts":["A.Create the project team charter independently, outlining their expectations and goals for the team.","B.Hold a kick-off meeting with the team to collaboratively define the team's purpose, roles, responsibilities, and objectives.","C.Delegate the task of drafting the charter to a senior team member with experience in project management.","D.Share a template of a generic project team charter with the team and invite them to modify it as needed to fit the project."],"correct":["B"],"explanation":"A project team charter records the project team values, agreements, and operating guidelines, and establishes clear expectations regarding acceptable behavior by project team members. Holding a kick-off meeting involves the active participation of team members from different departments. This collaborative approach ensures that team members have an opportunity to provide input, ask questions, and contribute to the charter's development. Collaboratively defining roles and responsibilities ensures that each team member understands their specific duties and contributions to the project. This clar"},{"q":"A project manager has just finished a project charter and received approval from the project sponsor. The project manager then presented the project charter to the stakeholders and noticed a lack of participation from some of them during this meeting. What should the project manager do?","opts":["A.Include this in the risk register because the Project Manager is uncertain that the stakeholders understood their responsibilities in this project.","B.Hold one-on-one meetings with these stakeholders to ensure their understanding of key deliverables and their responsibilities.","C.Report the concerns about the stakeholders' lack of involvement to the project sponsor.","D.Ask the project team to monitor these stakeholders and their involvement."],"correct":["B"],"explanation":"Every stakeholder needs to understand the deliverables and their responsibilities towards the project. The project manager should address this immediately. The other answer choices are incorrect. This is not a risk to be recorded in the risk register, but an issue for the project manager to resolve. It is the responsibility of the project manager to ensure that the stakeholders are involved in the project. Reporting the concern to the project sponsor will not resolve the problem of stakeholder engagement. It is not the responsibility of the project team to monitor the stakeholders. It needs to"},{"q":"In order to function optimally, a project team should have a project charter that states the vision or purpose of the project and a clear set of working agreements. To achieve this, which question should the project charter answer?","opts":["A.Why is this project being done?","B.Why did the organization prioritize this project?","C.What are the key risks and their mitigation?","D.Who will be doing the work?"],"correct":["A"],"explanation":"Answering why the project is being done would explain the purpose of the project. The other options are less of a priority for addressing the project vision and purpose."},{"q":"A member of the project team who was hired for six months to complete a specific task has decided to leave the project in the fifth month to pursue another job\u00a0opportunity. What should the project manager's immediate action be?","opts":["A.Modify the contract to ensure the team member will complete the packages in the fifth month.","B.Determine what remaining packages might be affected and ensure that adequate resources are available.","C.Confirm the terms of the team member's contract to close their participation appropriately.","D.Check the contingency reserve for extra resources to hire a new member to finish these packages."],"correct":["C"],"explanation":"The first step the project manager should take to ensure a smooth transition and minimize any disruption to the project. It is important to understand the terms of the contract, such as the notice period and any outstanding deliverables, to determine the appropriate course of action. The other answer choices are incorrect because they are not the first step the project manager should take. Modifying the contract at this point is not practical and may not be legally viable. Determining the affected packages and ensuring resources is important, but it should come after understanding the contract"},{"q":"Even though the customer is receiving sprint velocity and results reports from the project manager by email, escalations to the project sponsor complaining about project performance are common. What should the project manager do in this situation?","opts":["A.Involve the customer in the sprint planning and review sessions to agree on release dates.","B.Schedule regular sessions with the customer to explain the reports and address feedback.","C.Send a document detailing the team capacity and role assignments to the customer.","D.Have the technical leader call the customer to explain the technical details about the project issues."],"correct":["B"],"explanation":"The project manager needs to understand why the customer is escalating even though he is receiving the reports. The best way to address this situation is to schedule regular sessions with the customer to receive feedback and provide more details. The other answer choices are incorrect. These options do not address understanding the main issue the customer is having with project performance, but instead promote agreeing on release dates, sending documents, and involving the technical leader."},{"q":"A complex, multimillion-dollar, multi-year product development project requiring unique knowledge is 70% complete. Contract termination is a possibility due to project deliverables and execution being not acceptable. Despite the strained relationship, the vendor is ready for rework at no penalty. What should the project manager do to manage this situation?","opts":["A.Ask the customer to permit rework as the vendor has unique knowledge of the product.","B.Finalize the new definition of done (DoD) with the customer and make the vendor bear the cost of rework.","C.Facilitate the negotiation of the acceptance criteria between the customer and vendor.","D.Direct the vendor to rework the deliverable since they did not meet the requirements."],"correct":["C"],"explanation":"The best course of action for the project manager in this situation is to facilitate the negotiation of the acceptance criteria between the customer and vendor. This is because it is the most collaborative and consensus-building approach. It also allows the project manager to ensure that the rework is done in a way that meets the needs of both the customer and the vendor. The other answer choices are incorrect and\u00a0are less effective.\u00a0Asking the customer to permit rework as the vendor has unique knowledge of the product is a good idea, but it is important to get the customer's agreement before "},{"q":"A client's interactions with the project team have been somewhat negative. Project team members don't want to be part of the project any longer.\nWhat should the project manager do?","opts":["A.Schedule a meeting with the client to discuss the team's concerns.","B.Adhere to the client's expectations and sentiments without waiver.","C.Negotiate with the client and the project team to settle differences.","D.Involve all team members in stakeholder engagement activities."],"correct":["C"],"explanation":""},{"q":"A project manager works in an organization where the culture encourages virtual teams. New challenges arise periodically in this environment, and the project manager currently is in the early stages of a new agile project. What should the project manager do to help the team overcome these challenges?","opts":["A.Perform a strengths, weaknesses, opportunities, and threats (SWOT) analysis to quickly identify the team's status and take appropriate action.","B.Place a hold on all activities and gather the team for a meeting to discuss the new challenges identified so they can be immediately addressed.","C.Wait until the next daily scrum meeting to address the challenges so that the entire team knows what is going on and the issues can be discussed.","D.Work with the product owner to determine the best course of action for the team to remove any impediments."],"correct":["A"],"explanation":"The project manager must first understand the team's problems and gaps, which a SWOT analysis enables them to do. The other answer choices are incorrect. There is no need to stop the project, and the project manager should conduct analysis before involving the team. The product owner does not need to be involved, as the challenges described here are internal to the project."},{"q":"A project manager is appointed to design and develop a strategy for a government organization. The project manager recognizes that the project has a limited amount of detailed information to prepare project estimates. However, several other government organizations have already successfully adopted the same strategy. In this scenario, which type of estimating method should the project manager select?","opts":["A.Parametric modeling","B.Analogous estimation","C.Three-point estimating","D.Expert judgment"],"correct":["B"],"explanation":"In this scenario, the project manager has limited information about the project, but they know that several other government organizations have already successfully adopted the same strategy. This suggests that there is sufficient historical data available to use analogous estimation. Analogous estimation is a project management technique that uses historical data from similar projects to estimate the cost, time, and resources required for a new project. It is a good choice for projects with limited information, such as the one described in the question. The other answer choices are incorrect."},{"q":"A project manager recently took over a project from a project manager who left the company. The new project manager is aware that the previous project manager had a very authoritarian style of management and made all the decisions regarding the project. The new project manager notices that a senior supervisor's morale is low. What should the new project manager do?","opts":["A.Increase the supervisor's level of authority.","B.Identify the cause of the morale issue.","C.Modify the role of the supervisor in the project.","D.Speak with the supervisor and update the project issue log."],"correct":["B"],"explanation":"The new project manager should first gather additional information to identify the root cause of the low morale issue. Hence this option is the correct answer. The other answer choices are incorrect. Increasing the supervisor's level of authority or modifying the role of the supervisor in the project or speaking with the supervisor and updating the project issue log will not improve the senior supervisor's morale."},{"q":"An agile project team is building a website for a client. The client informs the product owner that their company has decided to release the website one month ahead of schedule, in order to take advantage of a business opportunity. What should the project manager have the team do?","opts":["A.Commit additional resources to complete work a month in advance.","B.Meet as a group to assess what is possible to complete by the new timelines.","C.Tell the client it is not possible to release the website this early.","D.Conduct a retrospective meeting to understand how they could have worked faster."],"correct":["B"],"explanation":"The project manager should have the team assess the situation to determine whether the project can be delivered earlier. The other answer choices are incorrect. Committing additional resources depends on the team's risk and action assessments; telling the client it is not possible without assessment of the new timeline is not the best strategy; and conducting a retrospective meeting does not help with the current client request."},{"q":"A stakeholder is concerned that the project is falling behind schedule, based on unofficial information from the project team. Although some tasks have slipped, these tasks have free floats; otherwise, the project is on track. The project manager immediately contacted the stakeholder to show and explain the latest project status reports. What should the project manager do next?","opts":["A.Issue a memo stating that the project status can only be shared through authorized channels.","B.Include the stakeholder in the project status mailing list.","C.Review the project's communications management plan with the project team and update as necessary.","D.Revise the status reports to clearly identify delays that should be acted on."],"correct":["C"],"explanation":"The stakeholder was acting on unofficial information. The communication management plan, if created properly, will avoid this situation and ensure that the correct messages are sent to different stakeholders. After addressing the short-term issue, the project manager should address it long-term by reviewing and updating the communication management plan. The other answer choices are incorrect. Issuing the memo and including the stakeholder in the project status mailing list will not solve the incorrect unofficial information from being sent out. Revising the status report is not an appropriate"},{"q":"A project manager works in an organization using a hybrid project delivery approach. The scope of the project is to implement a new human resources system. The infrastructure will be delivered by another project, and both projects are part of a business transformation program aimed to improve human resources processes. The project schedule needs to be finalized, but the project manager of the other project is unable to provide delivery dates for the infrastructure. What should the project manager do?","opts":["A.Wait for the infrastructure project to have a schedule and then develop the human resources system project's schedule.","B.Discuss the situation with the other project manager, agree on a few milestones, and then continue working on the human resources system project's schedule.","C.Develop a schedule based on the information available from the program management team and then progressively align the milestones with the infrastructure project.","D.Develop a schedule based on the information available and ask the other project manager to align the infrastructure milestones with the human resources project's delivery dates."],"correct":["C"],"explanation":"Program milestones are established and must be followed. In this case, the project schedules should be aligned with those milestones. They should know the dependencies between projects in the program and adjust their schedules accordingly. The other answer choices are incorrect. They do not take into account the entire program management principles and are not aligned with the program manager as a key stakeholder in this case."},{"q":"In a company that recently adopted hybrid practices, a project is struggling to perform as expected. Neither the project manager nor the team members have previous experience with this new approach to project management. The project manager wants to ensure the transition to hybrid practices is producing the desired results. What should the project manager do?","opts":["A.Take an active role in assigning tasks to team members and follow up with their results.","B.Arrange for basic hybrid training for team members and ensure the team performs coordination meetings.","C.Issue performance reports to all team members so they can review and act on them.","D.Build a WBS and RACI chart to ensure all aspects of the project are owned and tasks are clear."],"correct":["B"],"explanation":"For the hybrid transition to be successful, the project manager should ensure team members receive basic training in the hybrid methods being used to strengthen commitment and improve the flow of work.\u00a0\u00a0By providing training and establishing regular coordination meetings,\u00a0the project manager can empower the team to adapt to hybrid work and achieve project success. The other answer choices are incorrect because they do not address the lack of experience with the new hybrid approach. Training team members is the best way to resolve the issue. This question and rationale were developed in referen"},{"q":"A project manager has a newly formed team that includes junior members who have not worked on agile projects before. The product owner wants to ensure that the team performs as expected in the sprint. What should the project manager do?","opts":["A.Allocate time to mentor team members on agile processes.","B.Emphasize the importance of sprint backlog prioritization.","C.Improve productivity through the use of Scrum techniques.","D.Communicate project information and updates effectively."],"correct":["A"],"explanation":"The project manager must develop the project team's capabilities by taking the time to them on the agile process. This will ensure the junior members are well-informed about the project expectations and the right items to work on for the sprint. Agile methods require a servant leadership style. Servant leadership is a style of leadership that focuses on understanding and addressing the needs and development of project team members in order to enable the highest possible project team performance. The other answer choices are incorrect because they do not fully address the product owner's concer"},{"q":"For quality assurance, a quality audit was conducted on the processes being used in the project execution plan. One of the nonconformance issues raised by the auditor was that attendance lists for the project risk review meetings were unavailable. Why is an attendance list important?","opts":["A.It is a document that is registered within the lessons learned register.","B.It is a record that shows the number of attendees at the meeting.","C.It is standard practice on projects to conduct optional risk review meetings.","D.It is evidence that risk review meetings were held with the appropriate project team members."],"correct":["D"],"explanation":"Risk review meetings should be held regularly and be attended by appropriate team members as they can contribute adequately to risk identification, assessment, and mitigation. The attendance list is important and reveals evidence of appropriate attendees. The other answer choices are incorrect. Lesson learned register documents a complete phase or project; the number of attendees does not specify that the appropriate members were in attendance; meeting attendance is not optional for key attendees."},{"q":"At what point in an agile project should a project manager engage stakeholders?","opts":["A.At the start of the project","B.At the end of the project","C.When challenges are encountered in the project","D.Throughout the project life cycle"],"correct":["D"],"explanation":"Project managers should actively engage stakeholders throughout the agile project lifecycle. Stakeholders should be engaged at the start and end of a project, and should be aware of issues and challenges encountered during the project. The other answer choices are incorrect. These options suggest stakeholders should only be involved during a certain part of the project instead of throughout the project lifecycle."},{"q":"A project manager noticed that one team member is frequently absent from project team meetings. Instead of working on the current project, the team member has been working on a task assigned by their functional manager. What should the project manager do to resolve this issue?","opts":["A.Discuss the resource allocation with the team member's functional manager.","B.Remove the team member from the project team due to their continued absences.","C.Record the absences in the team member's performance appraisal.","D.Ask another team member for input regarding the issue."],"correct":["A"],"explanation":"The project manager should identify the issues and collaborate with relevant stakeholders to resolve them. The functional manager would be the appropriate stakeholder to discuss resource allocation. The other answer choices are incorrect because they do not focus on the project manager seeking a resolution for the issue, but rather suggest team member removal and responsibility deflection."},{"q":"A team is working on a new technology deployment project. This product has never been implemented before so there is no past data or historical records. The team is challenged to provide an initial timeline, budget, and other critical estimations to the client.\nHow should the project manager handle this situation?","opts":["A.Develop up-front project management plans with a detailed budget.","B.Provide guidance on project cost, time, and quality.","C.Develop estimations with the team and explain the assumptions to the client.","D.Encourage the team to perform retrospectives at intervals."],"correct":["C"],"explanation":""},{"q":"During a one-on-one session, a new team member shared their frustration regarding their inability to successfully complete an assigned task, even after the team member put forth their best effort. What should the project manager do first to address the team member's concerns?","opts":["A.Encourage the team member to keep working hard on their assignments.","B.Identify the root cause for why the team member cannot complete the assigned work and remediate.","C.Authorize additional training for the team member during the next month's educational series opportunities.","D.Adapt their leadership style based upon the team member's needs."],"correct":["B"],"explanation":"Interpersonal and team building skills would need to be applied on this scenario based on the fact the team member is new and the project manager should determine why the team member cannot complete the tasks. The project manager should identify the root cause for why the team member cannot complete the assigned work and remediate. The other answer choices are incorrect. These options suggest the project manager take other actions before understanding the root cause of the issue."},{"q":"During an iteration, the team spent twice as much time as expected because one of the product backlog items was complex and could not be split into smaller items. What should the project manager do?","opts":["A.Incorporate an adaptive approach for the rest of the project.","B.Incorporate a predictive approach for the rest of the project.","C.Develop a risk management plan for this sprint.","D.Have the product owner reprioritize the product backlog."],"correct":["D"],"explanation":"By having the product owner reprioritize the product backlog, the project manager can effectively address the complexity issue, optimize the team's efforts, and increase the likelihood of project success. This proactive approach demonstrates a focus on continuous improvement and adaptability. The other answer choices are incorrect.\u00a0While an adaptive approach is generally beneficial for agile projects, it doesn't directly address the immediate concern of the complex product backlog item. The project manager needs to address the specific issue at hand before adopting a broader approach. A predic"},{"q":"There are concerns that a scheduled-for-release product may not meet the agreed-upon end user requirements. How should a project manager avoid this situation in the future?","opts":["A.Discuss the benefits with the client.","B.Ensure there is a product backlog.","C.Provide examples of other similar projects.","D.Hold a session to review the deliverable in detail."],"correct":["D"],"explanation":"In order to prevent this situation in the future, the project manager should hold a session to review the deliverable in detail. It is important to clarify the scope and have stakeholder buy-in. The other answer choices are incorrect. Discussing the benefits with the client occurs in the initial stages; ensuring there is a product backlog does not address the misalignment in requirements; and providing examples of other similar projects does not prevent an issue because each project's deliverables are unique."},{"q":"A two-year project was awarded to a company six months ago, but the procurement process has not yet been initiated. What should the project manager do to get the project moving forward?","opts":["A.Prepare the procurement management plan for the project.","B.Bring the teams together to draft a procurement management plan.","C.Track the procurement according to an existing procurement management plan.","D.Escalate the situation to upper-level management."],"correct":["B"],"explanation":"At the beginning of the project, the procurement plan is to be drafted to show when the procurement process is to commence and when deliverable(s) would be ordered and delivered. The project manager notices a lag and ensures the teams collaborate to help draft the plan. The other answer choices are incorrect. There is a lack of collaboration; an existing plan may not work for this project; and escalating issues to upper-level management is not appropriate in this situation."},{"q":"A company has started doing agile projects. The project sponsor is frustrated and does not understand the new requirements gathering process, which seems to be incomplete and moving too fast. What should the project manager do?","opts":["A.Help the project sponsor understand the different tools and techniques available and why this one was selected.","B.Update the stakeholder register to identify the project sponsor as a potential impediment.","C.Let the team know that the sponsor is unhappy and switch from iterative planning to predictive planning.","D.Pause the project work until the scrum master has a chance to review the complete backlog with the sponsor."],"correct":["A"],"explanation":"Each agile practitioner is empowered to train and mentor stakeholders in the organization to help them understand the process and participate effectively. The other answer choices are incorrect. A project sponsor cannot be thought of as an impediment on an agile project. This would break the fundamental trust model. It is against the agile principles of self-organization and servant leadership to dictate process without any buy-in from the teams doing the work. Pausing the project is incorrect because it breaks the agile process and implies that the entire backlog of work has to be approved ah"}];
let examQs = [];
let currentIdx = 0;
let userAnswers = {};
let chosenCount = 175;
let startTime;
let timerInterval;

function setCount(n) { chosenCount = n; startExam(); }

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function startExam() {
    examQs = shuffle([...ALL_QUESTIONS]).slice(0, chosenCount);
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('examScreen').style.display = 'flex';
    startTime = Date.now();
    timerInterval = setInterval(updateTimer, 1000);
    renderQuestion();
}

function getFormattedTime(diffMs) {
    const totalSecs = Math.floor(diffMs / 1000);
    const h = Math.floor(totalSecs / 3600).toString().padStart(2, '0');
    const m = Math.floor((totalSecs % 3600) / 60).toString().padStart(2, '0');
    const s = (totalSecs % 60).toString().padStart(2, '0');
    return h + ":" + m + ":" + s;
}

function updateTimer() {
    const diff = Date.now() - startTime;
    document.getElementById('timer').textContent = getFormattedTime(diff);
}

function renderQuestion() {
    const q = examQs[currentIdx];
    const isMulti = q.correct.length > 1;
    document.getElementById('qNumber').textContent = "Question " + (currentIdx + 1) + " of " + examQs.length;
    document.getElementById('qText').innerHTML = q.q + (isMulti ? "<br><small style='color:var(--p-blue); font-weight:bold;'>(Choose " + q.correct.length + " options)</small>" : "");
    
    const container = document.getElementById('options');
    container.innerHTML = '';
    
    const currentSelection = userAnswers[currentIdx] || [];

    q.opts.forEach(opt => {
        const letter = opt.charAt(0);
        const text = opt.substring(2);
        const btn = document.createElement('div');
        btn.className = 'option-btn';
        if (currentSelection.includes(letter)) btn.classList.add('selected');
        
        btn.innerHTML = '<span class="opt-letter">' + letter + '</span><span>' + text + '</span>';
        btn.onclick = () => selectOption(letter, isMulti, q.correct.length);
        container.appendChild(btn);
    });
    
    document.getElementById('btnBack').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
    const hasEnoughChoices = isMulti ? (currentSelection.length === q.correct.length) : (currentSelection.length > 0);
    document.getElementById('btnNext').style.display = hasEnoughChoices ? 'block' : 'none';
    document.getElementById('btnNext').textContent = currentIdx === examQs.length - 1 ? 'Finish' : 'Next';
    window.scrollTo(0,0);
}

function selectOption(letter, isMulti, maxChoices) {
    if (!userAnswers[currentIdx]) userAnswers[currentIdx] = [];
    let selections = userAnswers[currentIdx];

    if (!isMulti) {
        userAnswers[currentIdx] = [letter];
    } else {
        const idx = selections.indexOf(letter);
        if (idx > -1) {
            selections.splice(idx, 1);
        } else {
            if (selections.length < maxChoices) {
                selections.push(letter);
            }
        }
    }
    renderQuestion();
}

function nextQ() {
    if (currentIdx < examQs.length - 1) {
        currentIdx++;
        renderQuestion();
    } else {
        finishExam();
    }
}

function prevQ() {
    if (currentIdx > 0) {
        currentIdx--;
        renderQuestion();
    }
}

function finishExam() {
    const endTime = Date.now();
    const timeSpentMs = endTime - startTime;
    clearInterval(timerInterval);
    
    let correct = 0;
    examQs.forEach((q, idx) => {
        const userSelection = userAnswers[idx] || [];
        const correctAnswers = q.correct;
        const isMatch = userSelection.length === correctAnswers.length && userSelection.every(val => correctAnswers.includes(val));
        if (isMatch) correct++;
    });
    
    const score = Math.round((correct / examQs.length) * 100);
    document.getElementById('examScreen').style.display = 'none';
    document.getElementById('scoreScreen').style.display = 'flex';
    document.getElementById('finalScore').textContent = score + "%";
    
    document.getElementById('scoreMeta').innerHTML = 
        "Correct: <strong>" + correct + "</strong> / " + examQs.length + "<br>" +
        "Time Elapsed: <strong>" + getFormattedTime(timeSpentMs) + "</strong><br>" +
        "Result: <strong style='color:" + (score >= 70 ? "#166534" : "#991b1b") + "'>" + (score >= 70 ? "PASS" : "FAIL") + "</strong>";
    
    document.getElementById('scoreScreen').scrollTop = 0;
}

function showReview() {
    const container = document.getElementById('reviewContainer');
    const list = document.getElementById('reviewList');
    const screen = document.getElementById('scoreScreen');
    
    container.style.display = 'block';
    document.getElementById('btnShowReview').style.display = 'none';
    document.getElementById('scoreHeading').textContent = 'Review Mode';
    list.innerHTML = '';
    
    examQs.forEach((q, idx) => {
        const userSelection = userAnswers[idx] || [];
        const correctAnswers = q.correct;
        const isMatch = userSelection.length === correctAnswers.length && userSelection.every(val => correctAnswers.includes(val));
        
        const card = document.createElement('div');
        card.className = 'review-q-card';
        
        let optsHtml = '';
        q.opts.forEach(opt => {
            const letter = opt.charAt(0);
            let stateClass = '';
            if (correctAnswers.includes(letter)) stateClass = 'is-correct';
            else if (userSelection.includes(letter) && !correctAnswers.includes(letter)) stateClass = 'user-wrong';
            optsHtml += '<div class="review-opt ' + stateClass + '"><strong>' + letter + '</strong> ' + opt.substring(2) + '</div>';
        });
        
        card.innerHTML = '<div class="status-tag ' + (isMatch ? 'status-correct' : 'status-wrong') + '">' + (isMatch ? 'Correct' : 'Incorrect') + '</div>' +
            '<div style="font-weight: bold; margin-bottom: 15px;">Question ' + (idx + 1) + ': ' + q.q + '</div>' +
            '<div class="review-opts">' + optsHtml + '</div>' +
            '<div class="review-exp"><strong>Explanation:</strong> ' + (q.explanation || 'No explanation provided.') + '</div>';
        list.appendChild(card);
    });
    
    screen.scrollTop = 0;
}
