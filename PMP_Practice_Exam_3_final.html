 substitute experienced team members.","C.Identify the risks associated with team members' inexperience.","D.Develop status reports to monitor the team's skills and competencies."],"correct":["A"],"explanation":"The project manager should ask functional managers to act as mentors or coaches for the team. This will help the team members gain the necessary knowledge and skills to successfully complete the project. It is important to make sure team members understand and can fulfill their roles and responsibilities. The project manager should focus on building a strong team by providing the necessary support and resources to address knowledge gaps through mentoring or coaching. By engaging the functional managers, the project manager can help ensure knowledge transfer and learning throughout the project."},{"q":"A project manager is working on an agile project with a cross-functional team. The project manager is informed that some team members typically raise additional requirements that are not in the approved scope. What should the project manager do to address this expected behavior?","opts":["A.Coach the team to manage scope using the appropriate framework.","B.Escalate to the sponsor and request replacement team members.","C.Conduct daily standup meetings with the team and stakeholders.","D.Explain that requirements cannot be changed without approval."],"correct":["A"],"explanation":"Coaching the team to manage scope by using the standard agile methodology is the best option. By teaching the team how to manage scope effectively, the project manager can help them avoid scope creep in the future. The other options are incorrect, Escalation and team replacement should only be considered for severe instances that threaten the success of the project. Agile teams are meant to be self-organizing and daily standup meetings are typically run by the team. By personally conducting daily standups, the project manager could confuse and disempower the team."},{"q":"A new project manager takes over a construction project. Upon reviewing the project management plan, the project manager realizes that the health and safety requirements have not been adequately addressed. The project manager has serious concerns and wants to address this inadequacy. What is the primary concern in this situation?","opts":["A.Failing to address health and safety issues could damage the client's trust and reputation.","B.The project must comply with all legal and regulatory requirements and responsibilities.","C.The project timeline may be jeopardized by implementing additional safety measures.","D.The project manager knows that it is crucial to meet the established performance metrics."],"correct":["B"],"explanation":"The immediate concern in this scenario is regulatory compliance and the ethical responsibility for worker safety. Legal and regulatory compliance is important because it helps to ensure that a project is completed safely, efficiently, and effectively. Compliance helps to ensure that a project is completed safely, efficiently, and effectively, and can help to mitigate risks and ensure that the project meets its objectives. Health and safety management is a critical aspect of construction project management, and inadequate attention to it can lead to serious consequences. The project manager sho"},{"q":"In an innovative project, the sponsor wants to deliver a creative and large data processing platform to better serve the customers. However, the functionality of the platform cannot be described clearly in the project's requirements. In order to obtain continuous investment, every project output that shows progress will be demonstrated to management. What kind of project approach should the project manager recommend?","opts":["A.Predictive","B.Waterfall","C.Agile","D.Hybrid"],"correct":["C"],"explanation":"An agile (iterative and incremental) approach is applied to projects with dynamic requirements and multiple iterations. Agile focuses on frequent deliveries and regular feedback, so the project manager can show continuous progress to management to obtain continuous investment. Agile is the best option because there is an emphasis on delivering value on a regular basis.\nThe other answer choices are incorrect.\nA predictive approach is incorrect because it is a development approach in which the project scope, time, and cost are determined in the early phases of the life cycle.\u00a0A predictive approa"},{"q":"A strategic project has been launched and a project manager has been assigned. The project is progressing, and the team is delivering successfully, but a key stakeholder calls the project manager and complains about not receiving progress updates. What should the project manager do?","opts":["A.Ensure the stakeholder is copied on the weekly status emails.","B.Review and update the project communications management plan.","C.Send the stakeholder a copy of the latest project status report.","D.Invite the key stakeholder to attend the next project meeting."],"correct":["B"],"explanation":"The stakeholder expressed that communications are inadequate indicating that further stakeholder engagement may be necessary to ensure stakeholder information requirements are met. The communications management plan describes how, when, and by whom information about the project will be administered and disseminated. If the communication planning is not sufficient, or if the stakeholder's needs have changed, the communications management plan should be updated to reflect the current needs of the stakeholder.\nThe other options are shortsighted and do not address the root cause of the problem. Co"},{"q":"Two project managers are working on resourcing their respective projects. Both project managers identified the same subject matter expert (SME) as being beneficial to their project. Project A is using a predictive approach and Project B is using an agile approach. To which project should the SME be allocated?","opts":["A.The SME should be assigned to Project A because project planning was based on the support of the SME.","B.The SME should be assigned to Project B because success in an agile project is determined by technical excellence.","C.The SME should be assigned to the project with the less experienced project manager to improve the likelihood of success.","D.The SME should be assigned to Project B because agile approaches prioritize flexibility and adaptability."],"correct":["D"],"explanation":"In this scenario, the SME should be allocated to Project B, which is using an agile approach. This is because agile approaches prioritize flexibility and adaptability, which means that having a critical SME on the team can help the team respond to changing requirements and adjust their approach as needed. In contrast, predictive approaches rely on detailed planning and may not be as well-suited to incorporating new information or adapting to changes. It's important to note that this decision may also depend on other factors, such as the specific skills and expertise of the SME and the needs of"},{"q":"A new team is formed for an agile project, in which members are located in three different countries and five time zones. What should the project manager do first to ensure effective communication among team members?","opts":["A.Schedule a virtual meeting and introduce the team members.","B.Establish guidelines for team communications.","C.Set up recurring meetings until all team members are familiar with each other.","D.Colocate the team members for a short duration to enhance communications."],"correct":["B"],"explanation":"The first step is to set guidelines for team communication, so that all team members understand at least initial expectations for communication. The other choices could be done after guidelines are established."},{"q":"A project manager is developing a project budget. After estimating the cost of each activity, the manager adds a contingency reserve by increasing the estimated cost of all activities by the same percentage. However, this resulted in the total cost exceeding the allocated budget even before adding the management reserve. What should the project manager do?","opts":["A.Request additional budget to ensure that all cost estimations are appropriately funded.","B.Reduce the percentage increase to reduce the total cost of the project.","C.Recalculate the contingency reserve based on identified risks and response strategies.","D.Allocate a portion of the contingency reserve to the management reserve."],"correct":["C"],"explanation":"Increasing the estimated cost of all project activities by the same percentage is not a sensible way to estimate a contingency reserve. Contingency reserves are typically calculated based on identified risks, not directly on individual activity costs. The project manager should recalculate the contingency reserve to ensure that it is accurate and appropriately calculated. The other answer choices are incorrect. Requesting an additional budget may not be necessary or feasible. The project manager should first attempt to optimize the contingency reserve based on identified risks. Reducing the pe"},{"q":"An agile project manager based in country A is working with a development team and business analyst in country B, and a quality assurance team in country C. During the second sprint, it becomes apparent that all of the test cases have failed. The agile facilitator ascertains that the business analyst changed the acceptance criteria of the stories and only communicated these changes to their local team. What should the agile project manager implement going forward to prevent this from recurring?","opts":["A.Password protection on the user stories","B.Signed change control documentation","C.Automated change notifications from the user story tool","D.Backlog grooming"],"correct":["D"],"explanation":"Backlog grooming is a regular session where backlog items are discussed, reviewed, and prioritized by product managers, product owners, and the rest of the team. The primary goal of backlog grooming is to keep the backlog up-to-date and ensure that backlog items are prepared for upcoming sprints. This will help with preventing uncommunicated actions and changes."},{"q":"A senior stakeholder was invited to a sprint review meeting and asked a project team member to describe the final product that the project will deliver. The team member was unable to respond and deferred the question to a more senior member of the team. What should have been done differently in this situation?","opts":["A.The team member should have advised the stakeholder to ask the scrum master.","B.The team member should have advised the stakeholder to ask the product owner.","C.The stakeholder should have held their questions until the next sprint review meeting.","D.The stakeholder should have directed their questions to the project manager."],"correct":["B"],"explanation":"The product owner is responsible for the product and can describe the final product that the project will deliver to the senior stakeholder.\u00a0The product owner is responsible for maximizing the value of the product and is accountable for the end product and is the best person to describe the final product that the project will deliver. The stakeholder should discuss with the product owner after the meeting for accurate details. The other answer choices are incorrect. The Scrum master and project manager may be involved in scope definition or management, but the product owner has overall respons"},{"q":"During a project planning session, the project manager is trying to define a release plan to achieve consistent value delivery and customer buy-in. A senior stakeholder suggests having a release at the end of the project to make sure the customer sees all of the product features at once. What should the project manager do?","opts":["A.Ask the project team to propose a release schedule based on the complexity of specific product features.","B.Recommend three releases with one at the beginning, one in the middle, and one at the end of the project.","C.Create release plans for each time a product feature is delivered to conduct quality testing and reviews.","D.Propose that the product be delivered over the course of multiple iterations to gather customer feedback."],"correct":["D"],"explanation":""},{"q":"Discussions during weekly project team meetings are frequently dominated by a senior team member who has a tendency to talk over other team members and openly criticize their point of view. This is causing demoralization of the other team members and resulting in lack of engagement during the meetings. What should the project manager do to address this issue?","opts":["A.Remove the senior team member from the weekly meeting.","B.Organize a team-building activity that encourages finding solutions together.","C.Enforce the existing ground rules for team behavior.","D.Escalate the behavior of the senior team member to the functional manager."],"correct":["C"],"explanation":"Ground rules, if they exist, are not being followed during the team meetings resulting in the problems described in the stem. The project manager must therefore act to establish them and ensure they are adhered to."},{"q":"During the project kick-off meeting, the project manager announces that a hybrid approach will be used to deliver the project. Many of the team members raise a concern because they are used to working on predictive projects. What should the project manager do?","opts":["A.Escalate the issue to the project sponsor to ensure the team is aligned with the project delivery approach.","B.Engage the project management office (PMO) since they identify the approach to delivering projects.","C.Educate the team members on agile and the benefits associated with the use of agile principles.","D.Change to a predictive approach to be aligned with the skills of the team members."],"correct":["C"],"explanation":"Before changing the delivery approach the project manager needs to work with the team to ensure an understanding of the benefits of agile Escalating to the sponsor or PMO or changing to the predictive approach are not the first steps a project manager would take in this situation"},{"q":"A project manager is assigned to redesign a store's point-of-sale system. The team is currently testing the new functionality when a key stakeholder proposes a change. The change can bring a significant benefit and increase customer satisfaction, but it also requires more resources. What actions should the project manager take?","opts":["A.Stop the testing and schedule a meeting to review the proposed changes with the resources.","B.Complete testing while the project manager meets with the key stakeholder to review the proposed changes.","C.Document the proposed changes and assess any impact on time, cost, and resources.","D.Postpone the proposed changes and allow the team to complete the testing and implementation activities."],"correct":["C"],"explanation":""},{"q":"During a project schedule review meeting, the project team identified that one of the critical path activities has slipped due to external dependencies. The project schedule is now at risk. What should the project manager prioritize as the initial response to address the issue?","opts":["A.Issue a change request and meet with the customer.","B.Rebaseline the schedule and notify the project sponsor.","C.Update the documentation and identify corrective actions.","D.Notify the customer and request that the timeline be extended."],"correct":["C"],"explanation":"The first step for the project manager in this situation should be to update the documentation and identify corrective actions. It is important to update project documents as soon as issues are discovered. This allows for a detailed analysis of the situation and helps ensure that all team members and stakeholders have access to the most up-to-date information and can make informed decisions.\u00a0\nThe other options are incorrect.\u00a0\nInvolving customers or making significant changes to the project baseline should only be considered after the project manager assesses and documents the issue and takes s"},{"q":"The lead sales manager and team are unable to submit a project status report on time for the new sales report integration project. Additionally, the report does not meet the expectations highlighted in the group review meetings. What should the project manager do first?","opts":["A.Evaluate the team's understanding of the action plan by requesting their feedback.","B.Confirm the plan is documented and shared among the team and stakeholders.","C.Increase the frequency of the team meetings for the status report submission.","D.Ensure that team members are provided with more time to deliberate and plan."],"correct":["A"],"explanation":"The project manager should consider evaluating the team's understanding of the action plan by requesting their feedback first. This will help the project manager identify any gaps in the team's understanding of the plan and address them before moving forward. It will also help to ensure that the team is aligned with the project goals and expectations. Once the team's understanding is evaluated, the project manager can then confirm that the plan is documented and shared among the team and stakeholders, increase the frequency of team meetings, and provide additional time for deliberation and pla"},{"q":"A dispersed project team has been working together on a long-term development project. The team just finished an iteration when a new team member was onboarded and added to the project team. During their first virtual retrospective meeting, the newly onboarded team member interrupts and asks everyone to reiterate their roles and past work in previous iterations. What should the project manager do?","opts":["A.Direct the new team member to review the project management plan after the meeting.","B.Inform the team member that this question would be best addressed in another meeting.","C.Ask each team member to explain their role and what they worked on in past iterations.","D.Ask the functional manager of the new team member to review the onboarding process."],"correct":["B"],"explanation":"The project manager should politely tell the new team member that a retrospective meeting is not the best time to discuss this. This helps maintain the effectiveness and efficiency of the retrospective meeting and ensures that the team's time is used wisely. It would be more efficient to have a separate meeting where the new team member can ask their questions and get a more detailed explanation. It is important to ensure that the retrospective meeting stays focused on its intended purpose, which is to review the completed iteration and identify improvements for the future. The other answer ch"},{"q":"A project manager is managing several interconnected projects. Some of these projects rely on specific deliverables from other projects. To avoid bottlenecks and facilitate project success, the project manager must assess the consolidated project plans for dependencies.\nWhat is the most appropriate action for the project manager to take in this situation?","opts":["A.Identify and document all inter-project dependencies.","B.Adjust project timelines to remove dependencies.","C.Eliminate all potential inter-project dependencies.","D.Ensure that all projects can proceed independently."],"correct":["A"],"explanation":""},{"q":"An agile team consistently delivers features on time but recently identified a significant architecture gap leading to rework. Which agile practice should the project manager use to\u00a0address this issue?","opts":["A.Increment planning","B.Team retrospective","C.Demonstration to stakeholders","D.Daily standup"],"correct":["B"],"explanation":"In this scenario, the team needs to collectively analyze and address the root cause of the architecture gap to prevent future rework and ensure sustainable delivery. There will be\u00a0open discussion, reflection on recent practices, and identification of areas for improvement, making it ideal for addressing the identified architecture gap. The other answer choices are incorrect. The daily standup wouldn't provide enough time and depth for a thorough analysis. Demonstration to stakeholders\u00a0doesn't directly address the team's internal issues. Increment planning focuses on defining work for the next "},{"q":"A project manager notices that conflicts between team members are occurring in every sprint. After an investigation, the project manager discovers that the team needs to be trained in agile techniques in order to address these conflicts. What should the project manager do first?","opts":["A.Develop a training plan for the team.","B.Schedule training sessions for the team.","C.Conduct a training needs assessment for the team.","D.Instruct the team to begin using agile techniques."],"correct":["C"],"explanation":"The first step that the project manager should take is to conduct a training needs assessment to identify the specific agile techniques that the team needs to be trained on. This will help to ensure that the training is tailored to the team's needs and that it is effective in addressing the root causes of the conflicts. The other answer choices are not as effective as conducting a training needs assessment first. Developing a training plan without first conducting a training needs assessment may result in the team being trained on agile techniques that they do not need or that are not relevant"},{"q":"In the planning stage of an upgrade project, a project manager benchmarked other recent projects that use the same technology. The project manager discovered that longer-than-planned outages occurred in most cases due to frequent maintenance activities. What will be the project manager's next step?","opts":["A.Benchmark projects using other technologies to establish a more objective baseline.","B.Compare other similar technologies and recommend the implementation of another technology.","C.Create a risk item in the risk register and incorporate the thresholds according to the benchmarks.","D.Discuss the probable downtime with the sponsor and obtain approval for outages."],"correct":["C"],"explanation":"The project manager should create a risk item in the risk register and incorporate the thresholds according to the benchmarks. Risk register updates are the most critical; the other actions listed are less useful for risk mitigation."},{"q":"A project manager assigned to an existing project finds that the deliverable quality has been inconsistent. The project manager finds that the team is not adhering to the development standards. What practice should the project manager employ to ensure higher quality?","opts":["A.Perform a full inspection since there is no margin for error.","B.Introduce sampling as a cost-effective and time-efficient way to ensure quality.","C.Implement a continuous improvement process to ensure consistent outcomes.","D.Add a unit of work for a specific period of time to prove the solution is viable."],"correct":["C"],"explanation":"The project manager should implement a continuous improvement process to ensure adherence to processes and improve quality over time. The other answer choices are incorrect. Doing a full inspection will be costly and it does not help to ensure higher quality; sampling may help ensure quality, but continuous improvement will be more effective; adding a unit of work for a specific period of time may help in resolving the issue, it does not help ensure higher quality moving forward."},{"q":"A stakeholder has suggested using an off-the-shelf, open-source product to speed up development. The team has analyzed the product and found it feasible and desirable, but it needs to be piloted and requires additional user skills. What should the project manager do?","opts":["A.Initiate a formal change request.","B.Request training for the project team.","C.Review the cost management plan.","D.Consult the product manager."],"correct":["A"],"explanation":"Consulting the product manager may be useful for gathering information, but it is not a substitute for the formal change request process, which ensures that changes are managed systematically and transparently within the project."},{"q":"A project is in a key phase of execution and everyone is dedicated to achieving success. A functional manager suddenly takes away one of the key team members to respond to an emergency without communicating with\u00a0the project manager. What should the project manager do first?","opts":["A.Check the resource calendar to find another team member.","B.Report the situation to the project sponsor and executive management.","C.Communicate with the functional manager and request the return of the key member.","D.Review the impact to the project and schedule a meeting with the functional manager."],"correct":["C"],"explanation":"The first step that the project manager should take is to communicate with the functional manager and request the return of the key team member. This is the most direct and effective way to resolve the situation. The project manager should explain to the functional manager the importance of the key team member to the project and the impact that their absence is having. The project manager should also offer to work with the functional manager to find a solution that meets both the project's and the functional area's needs. The other answer choices are incorrect.\u00a0Reporting the situation to the p"},{"q":"A project manager is responsible for leading a product release that has aggressive go-to-market timelines. A total of 600 story points is estimated with a velocity of 60 points per iteration. A team of up to 12 members has been assigned to this project. Which statement about this scenario is true?","opts":["A.A velocity of 60 points per iteration represents the minimum work to be done, and 12 team members represent the maximum size of the team.","B.A velocity of 60 points per iteration means the project is under control, and 12 team members mean that the project is out of control.","C.A velocity of 60 points per iteration means the project is under control, and 12 team members represent the maximum size of the team.","D.A velocity of 60 points per iteration represents the minimum work to be done, and 12 team members means the project is under control."],"correct":["A"],"explanation":"In this scenario, a velocity of 60 points per iteration/sprint\u00a0represents the minimum work to be done, and 12 team members represent the maximum size of the team. This information can be used by the project manager to plan and manage the project effectively, ensuring that the team is working efficiently and that the project is completed within the aggressive go-to-market timelines. The other options are incorrect. Velocity and team size do not automatically provide input on project control. Velocity represents a minimum expectation, not a guarantee, and team size has a maximum limit but doesn'"},{"q":"A scrum team is using a hybrid approach with 2-week sprints. The minimum viable product (MVP) release is at the end of the current sprint, and the team has completed the must have and should have features; however, some of the other priority features are still in development. The project manager is preparing the monthly report for the steering committee. What should the project manager recommend?","opts":["A.Reschedule the MVP release review until all the agreed-on features have been completed.","B.Update the project management plan to include in the release only the features completed.","C.Complete the sprint review and release the MVP with the completed features.","D.Estimate the effort required and submit a change request to add more resources to the team."],"correct":["C"],"explanation":"The goal of an MVP is to release a product with the core features that are needed to validate the product concept and get feedback from users. The team has completed the must and should features, which are the most important features for the MVP.\u00a0Must and Should requirements refer to the MoSCoW (Must Have,\u00a0Should Have,\u00a0Could Have,\u00a0Won\u2019t Have this time) practice of prioritizing requirements. If all the \"must have\" and \"should have\" requirements are met, the other requirements are not mandatory.\u00a0Releasing the MVP with the completed features will allow the team to get feedback from users on the c"},{"q":"During a hybrid project, a project manager reviews the project team's performance and realizes that the team's velocity is not fast enough to meet the next review gate goal. What should the project manager do?","opts":["A.Prioritize the contents of the backlog and remove some stories.","B.Increase the sprint duration to allow the team more time.","C.Use the standup meeting to assess impediments and problems.","D.Create a change request to modify the review gate goals."],"correct":["C"],"explanation":"The project is being executed in a hybrid environment, and it is important for the project manager to effectively apply agile techniques. A standup is a brief collaboration meeting during which the project team reviews its progress from the previous day, declares intentions for the current day, and highlights any obstacles encountered or anticipated. In this scenario, the project manager is concerned about the team's velocity and should use the standup meeting to identify the specific issues and collaborate with the team to resolve them. The other answer choices are incorrect. The project mana"},{"q":"A company is working on a hybrid project in which the deliverables have quality issues at the end of one of the sprints. Which action should the project manager take?","opts":["A.Review the definition of done (DoD).","B.Look for a clear set of working agreements.","C.Apply value stream mapping.","D.Use a plan-driven approach."],"correct":["A"],"explanation":"The definition of done (DoD) is a set of criteria that must be met before a deliverable is considered complete. By reviewing the DoD, the project manager can identify the specific quality issues that need to be addressed\u00a0and develop a plan to fix them. This will help to ensure that the deliverables meet the project's quality standards. The other answer choices are not as relevant or effective. Working agreements are important for setting expectations and managing conflict, but they are not directly related to addressing quality issues. Value stream mapping is a tool for identifying and elimina"},{"q":"A gas pipeline construction project was planned for completion in 36 months. After 24 months, the project was suspended by the local government authorities, citing a breach of social impact procedures. What should the project manager have done to avoid this?","opts":["A.Developed a contingency plan in case of suspension by the local government.","B.Reviewed local regulations and procedures and planned for them accordingly.","C.Requested additional resources to expedite the construction after the suspension.","D.Established a regular communication channel with the local government."],"correct":["B"],"explanation":"Regulations imposed by a governmental body should be reviewed and considered when planning for a project. This includes applicable regulations and procedures that have government-mandated compliance. The project manager could have avoided project suspension if they had evaluated the social impact procedures and planned accordingly prior to starting the project. The other options are incorrect. Developing a contingency reserve, requesting additional resources, or establishing a regular communication channel with the local government does not ensure that the project will be compliant and does no"},{"q":"During an iteration, a key project team member announces their resignation. The project manager realizes that one of the product features will be impacted by the resignation. What should the project manager do to address this situation?","opts":["A.Submit a change request to modify the delivery date based on this unexpected situation.","B.Request that human resources (HR) retain the team member until the end of the project.","C.Accelerate knowledge sharing with the cross-functional team to ensure that this situation is understood.","D.Discuss the situation with the product owner and determine if resources should be added to the team."],"correct":["D"],"explanation":"The team member's resignation could impact the project schedule, budget, and scope. The project manager should meet with the product owner to discuss the situation and plan a path forward. Submitting a change request to extend the delivery date may be necessary, but the project manager should first try to mitigate the impact of the resignation without delaying the project. Asking HR to retain the team member\u00a0is not realistic or ethical. Accelerating knowledge sharing is important, but it is not enough to address the underlying issue of the team's lack of capacity."},{"q":"During a product acceptance test for a software project, the project sponsor tells the project manager that the software will only pass if the theme color is changed from red to blue. The project manager reviewed the planning documents and confirmed that the theme color should be red. The sponsor insists that the color be changed to blue. What should the project manager do next?","opts":["A.Suggest that the project sponsor submit a formal change request to change the requirement for the theme.","B.Tell the project sponsor to accept the theme because the contract clearly states it should be red.","C.Agree with the project sponsor and change the theme color as requested to avoid potential conflict.","D.Request that procurement change the theme color to blue to align with the project sponsor's expectations."],"correct":["A"],"explanation":"The project manager should follow established procedures and suggest that the sponsor submit a change request. The color change will likely have widespread impacts that must be identified and analyzed. A formal change request is important in this situation because it will document any changes to the agreed parameters of the project, such as scope, requirements, schedule, cost, or quality. It will ensure that any changes are approved by all key stakeholders before they become part of the project. It will also assess the impact of any change on the project and its stakeholders, estimate the cost"},{"q":"The sponsor for a multimillion-dollar project has just called the project manager for a crisis meeting. The client submitted a formal request to drastically compress the schedule in order to meet a legal deadline. What should the project manager do to prepare for the meeting?","opts":["A.Initiate procedures to fast-track the project.","B.Implement the required changes to the project schedule.","C.Analyze tools to crash the project activities.","D.Prepare a change impact assessment report for review."],"correct":["D"],"explanation":""},{"q":"As part of a project deliverable, a project manager demonstrates how to use one of the products to a subset of a client's employees through a 30-minute virtual conference call. The client's employees complain that a two-day workshop would have been more effective for training. What should the project manager have done to prevent this complaint?","opts":["A.Assessed the training needs of the client's employees.","B.Included this risk in the risk management plan.","C.Provided a contingency reserve for additional training.","D.Developed an asynchronous training plan."],"correct":["A"],"explanation":"The best way to prevent a complaint about the training method is to assess the training needs of the client employees and develop a training plan that meets their needs. This includes considering the level of knowledge and experience of the employees, the complexity of the product, and the desired outcomes of the training.\u00a0If the project manager had assessed the training needs of the client employees, they may have realized that a two-day workshop would have been more effective. The other answer choices are not directly related to preventing complaints about the training method. Including this"},{"q":"During a design workshop for a new robot, the engineers ask the project manager about safety and environmental protocols for its operating procedures. What should the project manager do?","opts":["A.Hire a specialized engineer to support the design team.","B.Provide the team with the organizational process assets and the project charter.","C.Look into lessons learned documentation for similar projects.","D.Run a benchmark with similar plants to capture their compliance constraints."],"correct":["B"],"explanation":""},{"q":"While attending a governance meeting with upper management, a project manager is verbally informed about an impending external audit of selected projects. The audit will enable the organization to maintain its quality certification. What should the project manager do first to prepare for the audit?","opts":["A.Update all relevant project documentation with the current status of the project.","B.Put the project on hold to ensure full compliance with the auditing process.","C.Contact the auditors to understand the scope and requirements of the audit.","D.Meet with the team and inform them of the scope and requirements of the audit."],"correct":["C"],"explanation":"The first thing the project manager should do to prepare for the audit is to contact the auditors to understand the scope and requirements of the audit. The project manager needs to understand the audit process and prepare properly to ensure that the audit is successful. With proper planning, a project manager can continue to focus on the project and use the audit results to address any identified issues. The other answer choices are not the most appropriate initial steps. It is crucial to first understand the specific requirements of the audit to ensure that the effort is focused on areas cri"},{"q":"A project manager has been assigned to a new project with multiple high-level stakeholders. Each stakeholder has provided their expectations for the project, and the project manager realizes some expectations conflict. What should the project manager do?","opts":["A.Facilitate a meeting to address and resolve conflicting expectations.","B.Prioritize the expectations of stakeholders with the highest authority.","C.Update the stakeholder register with the stakeholders' expectations.","D.Create a project hierarchy to manage the stakeholders' expectations."],"correct":["A"],"explanation":"How conflict is handled can either lead to more conflict or to better decision making and stronger solutions. When there is conflict over priorities, neutral facilitation helps more than detailed recommendations. The project manager should work collaboratively with stakeholders to discuss their requirements, manage expectations, resolve issues, problem solve, and make decisions. The other options are incorrect. Prioritizing the expectations of stakeholders with the highest level of authority is not the best option at this stage. The project manager should seek to understand and resolve the con"},{"q":"An ongoing project has a high degree of change. In order to evaluate how the IT security team will influence the performance of the project, what should the project manager do?","opts":["A.Update the stakeholder engagement assessment matrix.","B.Analyze corporate political and power structures.","C.Create a project communications management plan.","D.Manage stakeholders' expectations."],"correct":["D"],"explanation":"In a project with a high degree of change and uncertainty, it is important to keep stakeholders informed of the potential impact of the new IT security team. This includes understanding the team's goals and objectives, communicating their impact on the project schedule, budget, and scope, and working with them to develop a plan to mitigate any risks. The other answer choices are not as relevant or effective. The stakeholder engagement assessment matrix\u00a0can be helpful for identifying and managing stakeholders, but it is not specifically designed to assess the impact of the new IT security team."},{"q":"The construction of a building is well-defined through plans and written specifications. The service is to be delivered in two years in a high-inflation environment. What contract type should the project manager use?","opts":["A.Cost plus incentive fee (CPIF) contract","B.Firm fixed price (FFP) contract","C.Fixed price with economic price adjustment (FPEPA) contract","D.Time and materials (T&M) contract"],"correct":["C"],"explanation":"The project manager should use the Fixed price with economic price adjustments (FPEPA) contract. This type is used whenever the seller's performance period spans a considerable period of years, or if the payments are made in a different currency. It is a fixed-price contract, but with a special provision allowing for predefined final adjustments to the contract price due to changed conditions, such as inflation changes or cost increases (or decreases) for specific commodities."}];
let examQs = [];
let currentIdx = 0;
let userAnswers = {};
let chosenCount = 175;
let startTime;
let timerInterval;

function setCount(el, n) {
    chosenCount = n;
    document.querySelectorAll('.start-option').forEach(opt => opt.classList.remove('selected'));
    el.classList.add('selected');
}

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function startExam() {
    examQs = shuffle([...ALL_QUESTIONS]).slice(0, chosenCount);
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('examScreen').style.display = 'flex';
    startTime = Date.now();
    timerInterval = setInterval(updateTimer, 1000);
    renderQuestion();
}

function updateTimer() {
    const diff = Math.floor((Date.now() - startTime) / 1000);
    const h = Math.floor(diff / 3600).toString().padStart(2, '0');
    const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
    const s = (diff % 60).toString().padStart(2, '0');
    document.getElementById('timer').textContent = `${h}:${m}:${s}`;
}

function renderQuestion() {
    const q = examQs[currentIdx];
    document.getElementById('qNumber').textContent = `Question ${currentIdx + 1} of ${examQs.length}`;
    document.getElementById('qText').textContent = q.q;
    
    const container = document.getElementById('options');
    container.innerHTML = '';
    
    q.opts.forEach(opt => {
        const letter = opt.charAt(0);
        const text = opt.substring(2);
        const btn = document.createElement('div');
        btn.className = 'option-btn';
        if (userAnswers[currentIdx] === letter) btn.classList.add('selected');
        
        btn.innerHTML = `<span class="opt-letter">${letter}</span><span>${text}</span>`;
        btn.onclick = () => selectOption(letter, btn);
        container.appendChild(btn);
    });
    
    document.getElementById('btnBack').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
    document.getElementById('btnNext').style.display = userAnswers[currentIdx] ? 'block' : 'none';
    document.getElementById('btnNext').textContent = currentIdx === examQs.length - 1 ? 'Finish' : 'Next';
}

function selectOption(letter, btn) {
    userAnswers[currentIdx] = letter;
    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById('btnNext').style.display = 'block';
}

function nextQ() {
    if (currentIdx < examQs.length - 1) {
        currentIdx++;
        renderQuestion();
    } else {
        finishExam();
    }
}

function prevQ() {
    if (currentIdx > 0) {
        currentIdx--;
        renderQuestion();
    }
}

function finishExam() {
    clearInterval(timerInterval);
    let correct = 0;
    examQs.forEach((q, idx) => {
        if (userAnswers[idx] === q.correct[0]) correct++;
    });
    
    const score = Math.round((correct / examQs.length) * 100);
    document.getElementById('examScreen').style.display = 'none';
    document.getElementById('scoreScreen').style.display = 'flex';
    document.getElementById('finalScore').textContent = `${score}%`;
    document.getElementById('scoreMeta').innerHTML = `
        Correct: ${correct} / ${examQs.length}<br>
        Result: <span style="color:${score >= 70 ? 'green' : 'red'}">${score >= 70 ? 'PASS' : 'FAIL'}</span>
    `;
}

function showReview() {
    const container = document.getElementById('reviewContainer');
    const list = document.getElementById('reviewList');
    const btn = document.getElementById('btnShowReview');
    
    container.style.display = 'block';
    btn.style.display = 'none';
    list.innerHTML = '';
    
    examQs.forEach((q, idx) => {
        const userAns = userAnswers[idx];
        const correctAns = q.correct[0];
        const isCorrect = userAns === correctAns;
        
        const card = document.createElement('div');
        card.className = 'review-q-card';
        
        let optsHtml = '';
        q.opts.forEach(opt => {
            const letter = opt.charAt(0);
            let stateClass = '';
            if (letter === correctAns) stateClass = 'is-correct';
            else if (letter === userAns && !isCorrect) stateClass = 'user-wrong';
            
            optsHtml += `<div class="review-opt ${stateClass}"><strong>${letter}</strong> ${opt.substring(2)}</div>`;
        });
        
        card.innerHTML = `
            <div class="status-tag ${isCorrect ? 'status-correct' : 'status-wrong'}">${isCorrect ? 'Correct' : 'Incorrect'}</div>
            <div style="font-weight: bold; margin-bottom: 15px;">Question ${idx + 1}: ${q.q}</div>
            <div class="review-opts">${optsHtml}</div>
            <div class="review-exp"><strong>Explanation:</strong> ${q.explanation || 'No explanation provided.'}</div>
        `;
        list.appendChild(card);
    });
    
    // Scroll to review
    container.scrollIntoView({ behavior: 'smooth' });
}
