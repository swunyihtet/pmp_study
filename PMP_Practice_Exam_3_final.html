am members to estimate the number of story points and observe team velocity."],"correct":["D"],"explanation":"When a new team starts working, it is best they estimate with story points and as they make progress through the user stories of a project, their velocity becomes apparent over the first few iterations. The beauty of a points-based approach to estimating is that planning errors are self-correcting because of the application of velocity. The other answer choices are incorrect. They are not consistent with the agile approach of estimating story point velocity and completion time. They also do not address the synergy within the new team."},{"q":"A project manager is working on launching a minimum viable product (MVP) for a new-to-market product. The team has successfully progressed to the third iteration out of a planned total of six. During the upcoming iteration planning meeting, the customer notifies the team that a competitor intends to beat them to market and release a similar product in the next quarter. How should the project manager address this competitive challenge?","opts":["A.Acknowledge the issue and include comprehensive details in the project's next status report.","B.Increase the size of the team to expedite product delivery and launch the product before the competitor.","C.Meet with the customer to discuss reducing the project backlog to help accelerate product delivery.","D.Work with the team to prioritize core features and redefine the MVP to beat the competitor to the market."],"correct":["D"],"explanation":""},{"q":"A project manager in the execution phase of a project discovers several stakeholders identified at project initiation are no longer involved. These removed stakeholders are frustrated with unnecessary communication and express concern that the remaining stakeholders may not be receiving all of the information they require. What should the project manager have done to prevent this situation?","opts":["A.Identified and documented all stakeholder requirements at the start of the project.","B.Reported all project information to every stakeholder throughout the project lifecycle.","C.Updated the stakeholder engagement plan through the change control process.","D.Relied on existing stakeholders to inform the project manager about missing stakeholders."],"correct":["C"],"explanation":"The stakeholder engagement plan identifies the strategies and actions required to promote the productive involvement of stakeholders in decision making and execution. The existing plan should have been monitored and updated when stakeholders were removed from the project. These changes can cause negative impacts on scope, quality, schedule, budget, and stakeholder satisfaction. The change control process will ensure that any changes to stakeholders are managed and stakeholder engagement plan is updated accordingly. The other options are incorrect because they do not resolve the issue. Stakehol"},{"q":"An agile team is doing an excellent job of focusing on high-priority items and completing them in less time than required. Which key performance indicator (KPI) would best demonstrate this information to the project manager?","opts":["A.The number of defects or missed requirements identified by the product owner.","B.The number of action items coming out of the end-of-iteration retrospective.","C.The number of user stories from the backlog that are completed per iteration.","D.The team consistently remains within the kanban board work in process limits."],"correct":["C"],"explanation":"The KPI that should demonstrate this information to the project manager is the number of user stories from the backlog completed per iteration. This KPI shows how many high-priority items the team is completing in a given iteration, which can help the project manager track progress and identify areas for improvement. By focusing on completing user stories from the backlog, the team can ensure that they are delivering value to the customer and meeting project goals. The other options are not the most relevant KPIs to indicate that the team is focusing on high-priority items and completing them "},{"q":"A company in the financial industry is kicking off a new hybrid project to be in compliance with new government regulations. The team has established a reliable velocity of 65 story points per iteration. Every iteration lasts 2 weeks. The sponsor wants to know when the project will be done if there are 1,040 story points remaining. How many months will it take to complete the project?","opts":["A.2 months","B.4 months","C.8 months","D.16 months"],"correct":["C"],"explanation":"There are 1040 story points remaining, velocity = 65 points per iteration. # of iterations remaining = 1040 / 65 = 16. Every iteration lasts 2 weeks, then the team will need 8 months to complete the project."},{"q":"A project manager has just taken over a 5-year project that is at the midpoint. At the steering committee meeting, the CEO asked if the project was on track to deliver the target of a 40% increase in production. The project manager responded that since they only worked on the project for one month, they did not know the status of the project. What should the project manager have done to avoid this situation?","opts":["A.Reviewed the last status report to understand the project status.","B.Validated the project status with the lead developer.","C.Reviewed the last project status with the project sponsor.","D.Checked the project schedule to understand the project status."],"correct":["C"],"explanation":"When a new project manager takes over an ongoing project, one of the first steps is to review the project's history and current status with the project sponsor. The project sponsor is typically the individual with the most significant stake in the project's success and is responsible for oversight. By discussing the project's status with the sponsor, the new project manager can gain critical insights into the project's progress, goals, and expectations. This ensures that they have a clear understanding of the project's status, objectives, and any specific targets such as the 40% increase in pr"},{"q":"A project manager has been working on an internal project for the organization's project management office (PMO). The project was initially sponsored by a PMO leader who has since been replaced. The new leader does not see much value in the project. What should the project manager do?","opts":["A.Organize a second project kick-off meeting with the new PMO leader and the project team.","B.Use the previous data to obtain sponsorship from the new PMO leader because the project was effective.","C.Use the benefits that the project manager has been tracking throughout the project to prove the project's value.","D.Continue the project as planned because it has already been approved and is in progress."],"correct":["C"],"explanation":"The project manager should use the benefits that they have been tracking throughout the project to prove the project's value to the new PMO leader. It is important to demonstrate the value of the project and how it aligns with the organization's goals. The project manager should also be open to feedback and suggestions from the new PMO leader and work collaboratively to ensure the project's success. It may also be helpful to set up a meeting with the new PMO leader and the project team to discuss the project's progress and address any concerns.\nThe other options are incorrect.\nOrganizing a sec"},{"q":"A project manager received a complaint that the project team did not respond correctly to a client's request. However, the project manager understands that the team has received multiple out-of-scope requests from the client. Which action should the project manager take?","opts":["A.Encourage the team members to ask the \"five whys\" during their communications with the client.","B.Ask the client to better explain the requests and issues they shared with the team.","C.Review the scope with the client so that additional requests can be documented and processed as change requests.","D.Request to be included in all future communications between the project team members and the client."],"correct":["C"],"explanation":"By reviewing the scope with the client, the project manager can ensure that the project scope is clear and that all requests are processed correctly. This will help to avoid future complaints from the client and ensure that the project is successful. The other answer choices are incorrect.\u00a0Encouraging the team members to ask the \"five whys\" during their communications and asking the client to better explain the request\u00a0does not solve this issue and the project manager needs to take the lead in resolving the issue with the client. Also, the project manager can still resolve the issue with the c"},{"q":"A project is estimated to have a total of 250 story points. The team planned 40 story points for each iteration and delivered 40, 10, 20, and 15 story points in the first four iterations. What should the project manager do?","opts":["A.Reassign undelivered tasks to team members to complete during the next iteration.","B.Work with team members to adjust the planned story points for the next iterations.","C.Remove the features that cannot be delivered from the product backlog and update the customer.","D.Negotiate with the customer for an extension of the deliverables due to holiday schedules."],"correct":["B"],"explanation":"The project manager should work with team members to adjust the planned story points for the next iterations. Based on the four iterations the team's average is 21 story points per iteration but the team planned 40 story points for each iteration. There is an inconsistency between initial estimations and actual performance. Hence, the project manager needs to be practical in planning the story points per iteration.\nThe other answer choices are incorrect. Reassigning undelivered tasks to team members to complete during the next iteration is wrong because the project manager does not assign task"},{"q":"During the execution phase of a project, a new director joined the management team and introduced a mandatory compliance requirement impacting all project tasks. What should the project manager do first?","opts":["A.Notify the team of the new requirement and proceed with the project as planned.","B.Update the project schedule and budget to reflect the demands of the new requirement.","C.Review the new requirement and assess the impact on project tasks and deliverables.","D.Update the risk register to reflect the potential risks associated with the new requirement."],"correct":["C"],"explanation":"The project manager should first review the new compliance requirement and assess its impact on project tasks and deliverables. This will help the project manager understand the changes that need to be made to ensure compliance and make effective decisions and plans. The other options are incorrect. It is important to evaluate the impact before making any decisions or updates to the project schedule, budget, or risk register. Proceeding with the project without a thorough evaluation could lead to negative consequences and project failure."},{"q":"A project is close to completion, and the customer wants to celebrate the success by sharing a business case about the benefits created by the project. The project manager and team feel apprehensive about sharing a business case at this stage. What is the most appropriate action for the project manager to take?","opts":["A.Collaborate with the customer to create a business case highlighting project benefits.","B.Acknowledge the request but emphasize the limitations of a business case at this stage.","C.Refer the customer to the project team for details on the benefits created by the project.","D.Inform the customer that a business case would require additional work and resources."],"correct":["B"],"explanation":""},{"q":"A remote project team consists of members from two countries. One of the teams is expecting to have three days off to celebrate a national holiday. The project manager tells the team that they must work during the holiday to achieve a key deliverable of the current iteration. The team is disgruntled and does not understand why they have to work if it is a national holiday. What should the project manager have clearly defined and communicated at the beginning of the project to avoid this?","opts":["A.Team agreements","B.Milestones","C.Individual roles","D.Team hierarchy"],"correct":["A"],"explanation":"Team agreements represent a set of behavioral parameters and working norms established by the project team and upheld through individual and project team commitment. Team agreements can include norms around holidays and time off, as well as other expectations for how the team will work together. By establishing team agreements, the project manager can set expectations and avoid misunderstandings. This can help ensure that everyone is on the same page and working towards the same goals. The other answer choices do not directly address the issue of holidays and time off. In this scenario, the is"},{"q":"A project manager has just taken over an ongoing project. The previous project manager resigned from the organization. During a review of the project documentation, the project manager realizes there are major deviations in the procurement process used by the previous project manager to engage service providers currently working on the project. What should the project manager do next?","opts":["A.Call the previous project manager to understand the rationale for the abnormal procurement process.","B.Contact the service providers to discuss the deviation and demand that they resolve the issue.","C.Report the service providers and the previous project manager to the ethics committee of the organization.","D.Flag the abnormal procurement process as a critical issue for the attention of senior management."],"correct":["D"],"explanation":"The project manager should bring this issue to the attention of senior management because there are major process deviations that could have significant impacts. Organizations usually have rigorous policies and procedures associated with procurements. The discrepancy could have serious legal or regulatory consequences that must be addressed immediately. Before taking action the project manager should first notify senior management and allow them to determine an appropriate course of action. Calling the previous project manager is not the best option because it does not address the core issue. "},{"q":"A project manager is leading a hybrid project. Several team members recently exited the project, including the only individual with a specific critical skill. At the beginning of a new sprint, the project manager identifies a task requiring this missing skill. What should the project manager do next?","opts":["A.Rescope the project to remove the task requiring the missing skill.","B.Assess the impact of the missing skill on the project.","C.Postpone the task until a replacement is recruited.","D.Reassign the task to another project team with the necessary skills."],"correct":["B"],"explanation":"The project manager should assess the impact of the missing skill on the project and take appropriate action to address the issue. This may include determining if the skill can be obtained from another team member, bringing in an external resource, negotiating for a short-term engagement, or conducting succession planning to prevent similar issues in the future. It is important for the project manager to act quickly and decisively to minimize the impact on the project. The other options are incorrect. Rescoping the project, postponing the task, or reassigning the task to another project team m"},{"q":"In a software development project, a stakeholder wants to add a major requirement, which they feel will be a great benefit to the project. However, this requirement is not aligned to the project objectives that the business owner has documented. What should the project manager do next?","opts":["A.Ensure the stakeholder understands the purpose of the project.","B.Encourage the stakeholder to follow the written business requirements.","C.Include the additional requirement into the project and inform the business owner.","D.Fast-track the project and suggest the new requirement to the business owner."],"correct":["A"],"explanation":"The project manager needs to ensure the optimal alignment between stakeholder needs, expectations, and project objectives. The other answer choices are incorrect. They are steps the project manager may take after, but the first thing the project manager should do is ensure that the stakeholder understands the project objectives."},{"q":"Due to the complex nature of a predictive project, an organization decides to use an agile approach for a project phase. A team member does not really understand the agile approach and keeps allocating tasks to the rest of the team members. After a while, the team is not able to adjust by itself and conflicts arise, delaying the deliverables. What should the project manager do?","opts":["A.Replace the team member with someone who has agile experience.","B.Wait until the team is finally able to solve the conflict by itself and reorganize.","C.Reaffirm the principles and roles of agile to create structures that the team can use.","D.Take control of the sprint backlog and assign tasks to the team members."],"correct":["C"],"explanation":"The project manager should reaffirm the principles and roles of agile to create structures that the team can use. When agile values and ground rules are understood and applied, The other answer choices are incorrect. The project manager should try to adjust behaviors and align on values, roles and responsibilities before considering replacing a team member. Waiting for the team is wrong because some time already passed and the team is still on the same page and some delays are occurring. The project manager does not own the backlog and most likely does not understands all user stories and task"},{"q":"A project manager is working in a regulated industry, and the team is working on a project where the requirements are prioritized in a backlog. The minimum viable product (MVP) for the launch has been defined. The project manager learns the regulatory body for the project requires a prototype for inspection before that product can be launched. The prototype is not part of the MVP definition. What should the project manager do next?","opts":["A.Speak with the product owner to prioritize compliance activities in the backlog to submit a prototype to the regulatory body.","B.Identify the missing requirements, prioritize the missing regulatory work directly into the backlog, and assign the work to the team.","C.Reschedule the launch of the product until the team can produce a prototype for inspection, as required by the regulatory body.","D.Create a new MVP definition that contains the scope requirements for the required prototype and prioritize that scope with the team."],"correct":["A"],"explanation":"In a regulated industry project where the requirements are prioritized in a backlog and the regulatory body requires a prototype for inspection before the product can be launched, the project manager should speak with the product owner to prioritize compliance-related activities. This will help ensure that the project meets regulatory requirements and can be launched successfully. The product owner is typically responsible for backlog prioritization. It is important for project managers to work closely with the product owner to ensure that all necessary requirements are met and that the projec"},{"q":"A new project manager has taken over an ongoing project. Progress reports show that the project is within the allocated budget and schedule. However, a key supplier has indicated that they will not be able to supply critical materials as scheduled. What should the project manager do first to address this situation?","opts":["A.Submit a change request to the change control board (CCB).","B.Review the performance against the project baseline.","C.Initiate legal action against the defaulting supplier.","D.Immediately terminate the contract with the supplier."],"correct":["B"],"explanation":"Integrated scope, schedule, and cost baselines are used for comparison to manage, measure, and control project execution. The project manager should first review these baselines and identify the specific tasks that will be impacted by the delay. This assessment provides the necessary information to make informed decisions about how to address the situation effectively. The other answer choices should only be considered after a proper assessment of the situation. A change request should not be raised until the project manager has a better understanding of the impact of the supplier delay and th"},{"q":"During the execution phase of a project, a project team identifies a previously unforeseen risk that could delay the project for several months. What should the project manager do first?","opts":["A.Update the risk register.","B.Perform qualitative risk analysis.","C.Update the project sponsors.","D.Plan for additional budget."],"correct":["A"],"explanation":"The project manager should first update the risk register when a previously unforeseen risk is identified during the execution phase of a project. This will help ensure that the risk is properly documented and tracked, and that appropriate risk response strategies can be developed and implemented. The other options are incorrect because the risk register should be updated first. Performing qualitative risk analysis, updating the project sponsors, and planning for additional budget may also be necessary depending on the specific circumstances of the risk, but updating the risk register should b"},{"q":"A chief technology officer (CTO) is enthusiastic about an organization's recent adoption of servant leadership practices. The CTO requests that all project managers apply servant leadership practices, but seems to be unsure of the practical applications. Which statement below best represents how the project manager should respond to the CTO's request?","opts":["A.Explain that servant leadership can be adapted and applied to any project situation.","B.Remind the CTO that servant leadership is more suited for projects using agile methods.","C.Clarify that servant leadership practices typically focus on the client's preferences.","D.Affirm that servant leadership only works for projects with substantial resources."],"correct":["A"],"explanation":"Servant leadership is the practice of leading the team by focusing on understanding and addressing the needs and development of team members to enable the highest possible team performance. While some approaches may rely on servant leadership more than others, servant leadership principles can be applied to any situation. The other options are incorrect because servant leadership is not an exclusively agile practice, focuses on serving and supporting team members, and can be applied to projects of any size or budget."},{"q":"During sign-off for a strategic project that resulted in additional costs, a project manager was unable to justify the additional expense in relation to the business value realized with the successful implementation. What should the project manager have done to avoid this situation?","opts":["A.Presented an evaluation of the potential benefits identified in the initial business case as enough to justify additional expense costs.","B.Measured and tracked the project benefits identified in the business case throughout the project life cycle.","C.Performed a reassessment of the current state of the organization after project implementation to show the benefits realized.","D.Shared nonfinancial or intangible benefits such as customer satisfaction and good reputation as indicators for showing the value realized."],"correct":["B"],"explanation":"It is not enough to evaluate the potential benefits of the project in the business case in the beginning; you have to measure and track the benefits throughout the life cycle. The PMO can chart the benefits realization management (BRM) process, provide benefit mapping templates, and educate project teams as well. The other answer choices are incorrect. The scenarios are evolving; there is an initial benefit plan, but as the project evolves, unforeseen changes will be revealed by measuring and tracking the benefits identified in the business case throughout the project life cycle."},{"q":"During a standup meeting, some of the team members strongly disagreed about how tasks were distributed. They feel tired and frustrated because task distribution has been a frequent complaint throughout the project. What should the project manager do?","opts":["A.Review the project management plan to determine how to manage this situation.","B.Discuss with other project managers if they had to address similar complaints.","C.Organize a team-building workshop to improve collaboration and communication.","D.Work with the team to develop a plan for addressing the task distribution concerns."],"correct":["D"],"explanation":"The project manager should work with the team to develop a plan for addressing the task distribution concerns. It's important for the project manager to address the team's concerns and work towards a solution that is fair and equitable for all team members. Doing so will help to resolve the issue, improve team morale, and promote a more productive and successful project. The other options are incorrect. Reviewing the project management plan may provide insight into the general guidelines for managing task distribution, but it does not address the specific concerns raised by the team. Discussin"},{"q":"During the planning phase, a project manager is creating the project schedule. The designated project team is finishing\u00a0an unrelated project, so temporary resources are assigned to assist with planning and task duration estimation. The project team will replace the temporary resources prior to starting the project. What should the project manager do before the project schedule is finalized?","opts":["A.Review the estimates with the designated team.","B.Check the task durations of previous projects.","C.Update duration estimation in the risk register.","D.Request approval from the project sponsor."],"correct":["A"],"explanation":"It's crucial to ensure that task duration estimates are as accurate as possible. The project manager should review the estimates with the designated project team to align expectations, identify discrepancies, and allow necessary adjustments before the project schedule is finalized. By reviewing the estimates with the actual team, the project manager can ensure that the project schedule is realistic and achievable. The other options are not as effective. Checking task durations for previous projects may not be helpful because every project is different and may have different challenges and cons"},{"q":"A project manager is assigned a complex project with significant legal, regulatory, and contractual requirements. However, these requirements have not yet been defined or finalized.\u00a0Concerns exist regarding a delay in completing these\u00a0requirements. What should the project manager do?","opts":["A.Focus on the project deliverables instead as it is not the project manager's responsibility to fulfill these requirements.","B.Contact the product owner and highlight the project risks related to the delay in fulfilling these requirements on time.","C.Meet with the product owner and the legal department to review the project status and the progress in defining these\u00a0requirements.","D.Delay the finalization of the legal, regulatory, and contractual requirements\u00a0until the end of the project, and before the go-live date."],"correct":["C"],"explanation":"Meeting with the product owner and the company's legal department\u00a0is the best choice because it allows the project manager to emphasize the importance of finalizing these requirements and ensures that all parties understand the impacts the delay has on the project.\u00a0Regulatory agencies or statutes may require specific planning documents before granting authorization to proceed or to secure approval to release the project deliverable into the market. Focusing on project deliverables is incorrect because ignoring legal and regulatory requirements can lead to significant risks and potential failur"},{"q":"A project manager is handling multiple projects in five different countries and is issued a new directive on workplace attire and office arrangements. This has been met with resistance in three countries, resulting in a series of misunderstandings, resentment, and potential legal issues. What should the project manager have done to better handle this situation?","opts":["A.Asked senior management for clarity and exceptions before issuing a general directive to all countries.","B.Evaluated the cultural and personal traits in the various countries before issuing a general directive.","C.Determined the socioeconomic status of the team members before issuing a widespread directive.","D.Obtained a list of personal preferences from the team members before issuing a broad directive."],"correct":["B"],"explanation":"Cultural norms and values vary widely across different countries and regions, and what may be considered appropriate attire in one culture may be seen as inappropriate or even offensive in another. Evaluating the cultural norms and values of the various countries before issuing a general directive would have helped the project manager to better understand the potential impact of the directive on each country and to tailor it accordingly. It's important for project managers to be aware of cultural differences and to take them into account when managing projects in different countries. By taking"},{"q":"A team is working on a new product development project using a hybrid approach. After the fourth sprint, they learn that the exchange rate for imported goods will increase significantly. What should the project manager do in order to make sure the final product gets launched on time and as defined?","opts":["A.Work with the stakeholders to develop incremental budgeting approaches.","B.Reduce the product\u2019s specifications to use less imported material.","C.Spend the extra money and plan to compensate for it in the next sprint.","D.Review the backlog to see the impact of a budget increase."],"correct":["A"],"explanation":"Work with internal stakeholders to develop flexible budgeting approaches that provide sufficient rigor to satisfy key business requirements but recognize the project team will need autonomy over funds to explore solutions that will emerge from working with customers."},{"q":"An agile\u00a0project team has been successfully releasing updated deliverables each sprint that consistently provide an increased value to users. However, the project is running over the initially allocated budget, and there are still many items in the project backlog. Stakeholders have expressed increasing concerns, and the project manager needs to decide on the best course of action to address the situation and manage stakeholder expectations. What should the project manager do?","opts":["A.Measure user satisfaction and present the results to the steering committee.","B.Remove the deliverables from the backlog that were not part of the project charter.","C.Request additional budget based on an updated estimation of the remaining backlog items.","D.Emphasize the expectation that the committed work must be finished on time."],"correct":["A"],"explanation":"The project manager should measure user satisfaction and present the results to the steering committee. This will help to demonstrate the value that the project is delivering to users, even if it is running over budget and has items in the backlog. It is important for the project manager to communicate the progress and value of the project to stakeholders in order to maintain their support and ensure that the project can continue. This approach also aligns with the agile process, which emphasizes delivering value to users in an iterative and incremental manner. By measuring user satisfaction, "},{"q":"A multi-year project is underway when a key resource announces that they are retiring. The project manager is concerned about the impact on the project and has identified that several critical tasks will be affected. What should the project manager do?","opts":["A.Require the remaining team members to work additional hours to complete the impacted tasks.","B.Advise the stakeholders that the resource's tasks will not be completed on time.","C.Collaborate with the resource manager to identify and train an appropriate replacement.","D.Encourage the retiring team member to postpone retirement to avoid disrupting the project."],"correct":["C"],"explanation":""},{"q":"In a hybrid project, the need for customer involvement throughout the project is not understood by the customer. As a consequence, rework is beyond acceptable levels. What should the project manager do to address this issue?","opts":["A.Submit a change request to obtain the required involvement from the customer.","B.Add this customer issue to the backlog for prioritization and review.","C.Meet with the customer to highlight the importance of their engagement for project success.","D.Instruct senior management to make the customer work closely with the team."],"correct":["C"],"explanation":"The first action would be to directly engage the customer to gain commitment for their involvement, which is key for success of a hybrid project. Such involvement does not require a change request, and it is premature to approach senior management. Adding the issue to the backlog does not solve the problem."},{"q":"Halfway through a year-long project, a hardware supplier sends a project manager notice of an intent to increase prices due to fluctuating rates of exchange. The project manager is unsure of their negotiating authority. Which document should the project manager reference?","opts":["A.Risk register","B.Procurement management plan","C.Project charter","D.Communication strategy"],"correct":["B"],"explanation":"The procurement management plan is a component of the project or program management plan that describes how a project team will acquire goods and services from outside of the performing organization. In most organizations, project managers do not have contracting authority. Rather, they work with contracting officers or other people with expertise in contracts, laws, and regulations. Organizations usually have rigorous policies and procedures associated with procurements. The policies identify who has the authority to enter into a contract, the limits of authority, and the processes and proced"},{"q":"A team is working on a new project and the sponsor refuses to approve a budget increase needed for the current iteration. What should the project manager do to address this situation?","opts":["A.Submit a change request to get formal approval for a budget increase.","B.Work with the stakeholders to develop flexible budgeting approaches.","C.Explain to the sponsor the risk of not having the budget approval.","D.Spend the extra money and plan to compensate in the next sprint."],"correct":["B"],"explanation":"The project sponsor refused to approve the budget, so the project manager should work with the stakeholders to develop flexible budgeting approaches for this iteration. This allows the project manager to explore budgeting strategies to accommodate specific project needs without requiring a budget increase. Submitting a change request is incorrect because it may not be feasible or effective because the sponsor has already decided not to approve the budget increase. Explaining the risk of denying the increase may or may not be helpful, but it does not provide a solution to the problem. The incre"},{"q":"A project manager notices that team members are not interacting with each other and believes that the lack of interaction is negatively impacting project performance. The project manager attempts to increase team interaction by hosting an after-work event, but only a few team members attend. What should the project manager do?","opts":["A.Send a team survey to collect ideas for after-work activities from team members.","B.Continue to invite team members to events and improve morale incrementally.","C.Provide periodic incentives and bonuses to the highest-performing team members.","D.Confidentially poll the team to identify the root cause of the lack of interaction."],"correct":["D"],"explanation":"The project manager should confidentially poll the team to identify the cause of the lack of interaction in order to gather honest input on the core issues and discrepancies. This will help the project manager understand the root cause of the issue and take appropriate action to address it. By ensuring confidentiality, team members will feel more comfortable sharing their thoughts and concerns, which can help the project manager identify the root cause of the lack of interaction and take appropriate action to address it. The other options are not as effective in addressing the root cause of th"},{"q":"A project manager is leading a hybrid project. The organization uses an agile approach and a\u00a0risk register, but the development team prefers a Scrum approach and views\u00a0risk management as a predictive process. What should the project manager prioritize?","opts":["A.Personally manage and own the risk register because this is an organizational requirement.","B.Delegate the responsibility of updating the risk register to the development team lead.","C.Ask the developers to use the risk register because this is an organizational requirement.","D.Consider a hybrid approach and integrate elements from the risk register and Scrum processes."],"correct":["D"],"explanation":"In a hybrid project, finding common ground is essential. A rigid adherence to either method could hinder the project's success. The project manager should use a hybrid approach to leverage the risk register for monitoring and use Scrum\u00a0practices like daily stand-ups and backlog refinement to identify and address potential risks iteratively. The other answer choices are incorrect.\u00a0While the project manager is responsible for risk management, delegating and adapting can be more efficient. While the team can contribute, the project manager ultimately owns risk management. Forceful implementation "},{"q":"During project execution, a customer asks to replace a piece of planned hardware with one that has more features and a lower price. What should the project manager do first?","opts":["A.Evaluate the new features to ensure they align with the customer's business needs.","B.Incorporate the hardware immediately as it will reduce the overall project cost.","C.Meet with the team to plan the implementation of the new hardware as requested.","D.Seek approval from the procurement manager and develop a prototype."],"correct":["A"],"explanation":"Scope changes can add to uncertainty; therefore, any change requests should be evaluated. By evaluating the new features first, the project manager can make an informed decision about whether or not to approve the change. Implementing a change without proper evaluation can lead to unintended consequences, risks, and conflicts. It's important to ensure that the new hardware aligns with the project's goals before making any changes. The other options are incorrect because they ignore the potential impact of the change. Incorporating the hardware immediately could lead to problems if the new hard"},{"q":"A company in a heavily regulated industry is planning to release a new product not previously available in the market. The CEO has asked the project manager to propose a way to ensure that competitors in the industry do not enter the market of this product before this company. Which project delivery approach should the project manager use?","opts":["A.Use a predictive approach as the company has previous experience with it.","B.Include adequate resources in the budget to fast track the project.","C.Implement iterations early in the product development processes, and schedule predictive tasks to be performed just before the rollout phase.","D.Request an agile coach be included on the agile team to increase the speed of the releases."],"correct":["C"],"explanation":"This approach will allow the company to get the product to market quickly, while still ensuring that it meets all regulatory requirements. By using iterations, the company can get feedback from stakeholders early and often, which will help to identify and address any problems before they become major issues.\u00a0By implementing iterations early in the product development process, the company can get the product to market quickly, while still ensuring that it meets all regulatory requirements. This is the best way to ensure that the company is first to market with this new product. The other answer"},{"q":"A project manager is assembling a team with a mix of new and experienced team members. The project manager finds out that there are issues with team cohesion. The experienced team members believe new team members lack the technical skills required to perform the necessary work and expect that they will have to compensate for their inexperience. What should the project manager do?","opts":["A.Offer bonuses or other incentives to experienced team members to mentor the new team members.","B.Analyze the skills of all team members, identify gaps, and develop plans to address them.","C.Reassign new team members to projects that better align with their skills and experience.","D.Explain that professional project team members are expected to resolve issues without intervention."],"correct":["B"],"explanation":""},{"q":"A project team using a hybrid approach is producing both predictive and incremental deliverables simultaneously. The communications management plan states that written communications are preferred over other types. Problems arise daily regarding the incremental tasks; however, the email backlog is becoming increasingly and unnecessarily complex. What should the project manager do?","opts":["A.Adopt face-to-face conversations during sprints.","B.Adopt judicial communications during sprints.","C.Adopt disruptive communications during sprints.","D.Adopt formal conversations during sprints."],"correct":["A"],"explanation":"One of the principles of Agile is to prioritize \"face-to-face conversations\". The other answer choices are incorrect. Although the project has a waterfall component and the Communications plan states written communications are preferred, in what concerns to the Agile part, the PM as a servant leader must eliminate organizational hurdles and unnecessary complexity, at least to the Agile portion."},{"q":"As part of a temporary assignment, a project manager is leading a business project. During a daily status meeting, it was discovered that the development team had not completed a critical task. This issue is delaying the current iteration. The ability to take the actions needed to address this issue is beyond the authority of the project team. What should the project manager do?","opts":["A.Delay the current iteration and inform the stakeholders of the issue.","B.Invite the project team to a swarming session to define a solution.","C.Adjust the project timeline to accommodate the development delay.","D.Escalate the issue to the project sponsor to define the next steps."],"correct":["D"],"explanation":"For decisions that are beyond the authority of the project team to decide, the project team can investigate alternatives and escalate the decision to the project sponsor. The project sponsor provides decision leadership that is outside of the authority and position power of the project manager and project team. The other options may not be appropriate or effective if the project manager does not have the authority to take the necessary actions. Delaying the current iteration, hosting a swarming session, or adjusting the project timeline may not be feasible and do not address the issue of autho"},{"q":"A project manager for a delivery project has engaged a vendor to provide testing services. Which items should the project manager be sure to provide to the vendor before the testing starts?","opts":["A.Test plan and requirements traceability matrix.","B.Test plan and quality risk assessment.","C.Defect reports and test scripts.","D.Requirements traceability matrix and defect reports."],"correct":["A"],"explanation":"The project manager should be sure to provide the vendor with a test plan and requirements traceability matrix before the testing starts. The test plan outlines the testing approach, scope, objectives, and schedule, while the requirements traceability matrix maps the requirements to the test cases to ensure that all requirements are tested. Providing these items to the vendor helps to ensure that the testing is conducted in a structured and organized manner and that all requirements are tested. The other options are incorrect as they do not provide the necessary information for the vendor to c"},{"q":"During a meeting, a team member on a construction project presents a proposal to the project manager. The proposal states that dividing the project into two phases will mitigate the risk of delays. The first phase would result in a minimum viable product (MVP) that would provide the client with early benefits. This would limit the extent of the damages and other cost overruns by 90%. What should the project manager do next?","opts":["A.Conduct a feasibility study to assess the risks and benefits of the proposal.","B.Reject the proposal and continue with the project as initially planned.","C.Instruct the team to implement the proposed changes without further review.","D.Discuss the proposal with the client and other stakeholders to get their input."],"correct":["D"],"explanation":"After receiving the proposal from the team member, the project manager should discuss the proposal with the client and other stakeholders to get their input. It is important to involve the client and stakeholders in the decision-making process to ensure that their needs and expectations are met. By discussing the proposal with the client and other stakeholders, the project manager can get their feedback, identify any potential risks or challenges, and make a decision that is supported by the stakeholders.\nThe other answer choices are incorrect.\u00a0\nImplementing or rejecting the proposal without f"},{"q":"Company A is moving from a predictive approach to an agile one. After the second incremental release of project X, the product owner expresses disappointment with the prototype results and wants to escalate the project to upper management and request a new team. Because of this, the team members start blaming each other and the new agile approach for the product owner's perception of the project. How should the project manager resolve the team's differences?","opts":["A.Follow the conflict resolution process documented in the project charter.","B.Use retrospective sessions to allow the team to determine the cause of the dispute.","C.Revisit the project vision with the team to ensure that the project goal is understood.","D.Review the definition of done (DoD) with the product owner and determine the cause of the gap."],"correct":["B"],"explanation":"In a retrospective, the team reviews what happened during the iteration and determines improvements for moving forward. The other answer choices are incorrect. Conflict resolution is not defined in the project charter. Revisiting the project vision will not help resolve the differences with the product owner. Reviewing only the \"definition of done\" with the product owner may be helpful, but may be too narrow to encompass their concerns."},{"q":"A highly skilled subject matter expert (SME) is engaged in a government project where approximately 30% of the deliverables will follow an agile approach. The project manager invites the SME to join the agile team to contribute to these iterations. The SME is reluctant because they think that working on a team is demotivating and slows them down, and they want to achieve the highest-quality output possible.\nWhat should the project manager do to address the SME's concerns and encourage them to join the agile team?","opts":["A.Recommend that the SME develop emotional intelligence by integrating with the team.","B.Explain that teamwork fosters continuous improvement and early feedback loops.","C.Request that the SME conduct the retrospective meetings as an objective observer.","D.Ask the sponsor to meet with the SME and help improve their attitude towards teamwork."],"correct":["B"],"explanation":"The project manager should explain that teamwork fosters continuous improvement and early feedback loops, which ultimately leads to higher-quality output. Agile teamwork provides high-quality outputs by focusing on collaboration, adaptability, and continuous improvement to deliver high-quality results. Additionally, the project manager should consider providing training and support, assigning tasks that align with the SME's strengths, and providing feedback to help the SME stay motivated and engaged. By working closely with the SME, the project manager can ensure that they are motivated and al"},{"q":"Due to a lack of locally skilled resources, a company employs an internationally dispersed project team that will work virtually. The project manager has never worked with a virtual team and is concerned about engagement. What should the project manager do to ensure this virtual team remains engaged?","opts":["A.Ensure the entire virtual team attends the project kickoff meeting.","B.Adopt the communications management plan of a past virtual team.","C.Rely on asynchronous communication for all major status reports.","D.Conduct recurring check-ins and meetings at scheduled intervals."],"correct":["D"],"explanation":"Regular check-ins and meetings can help keep the team engaged and on track. These meetings can be conducted virtually and should be scheduled at periodic intervals. This can help keep the team on track and ensure that everyone is engaged and working towards the same goals. Regular communication is key for building trust and ensuring that everyone remains focused. Meetings and check-ins can also help ensure that everyone is accountable for their responsibilities and commitments and help to identify issues early on. The other options are incorrect. Ensuring the team attends the kickoff meeting a"},{"q":"An agile team is receiving multiple unplanned requests for product enhancements in an iteration. This impediment is causing the team to miss scheduled tasks. How should the project manager address this?","opts":["A.Tell the team to increase their efforts to accommodate the requests.","B.Ask the product owner to include requested enhancements in the current iteration.","C.Request that the project team reprioritizes all of the committed activities.","D.Ask the product owner to add the enhancement requests to the product backlog."],"correct":["D"],"explanation":"Unplanned requests for product enhancements are a common challenge in agile development. In agile projects, the backlog is progressively elaborated and reprioritized to identify the work that can be accomplished in an upcoming iteration. Unplanned requests for enhancements should be properly evaluated and prioritized by the product owner. This ensures that the team can focus on the committed work for the current iteration and reduces the risk of missing scheduled tasks. The other options are incorrect. Telling the team to increase their efforts would be asking them to take on too much work, wh"},{"q":"A risk was identified at the beginning of an agile project and a mitigation plan was established. The risk event occurs but the impact is much higher than anticipated and the originally planned response will be ineffective. The project team developed a more effective response, but it is drastically different from the original mitigation plan and must be implemented as soon as possible.\nWhat should the project manager do?","opts":["A.Implement only the initial response as outlined in the risk management plan.","B.Update the risk management plan and implement the newly created response.","C.Defer risk response until the next progress meeting to inform stakeholders.","D.Implement a contingency response and inform the stakeholders afterward."],"correct":["B"],"explanation":""},{"q":"In a review meeting, a project manager detects a misunderstanding about one critical deliverable. What should the project manager do first?","opts":["A.Ask the team members to clarify the deliverable.","B.Ask the customer to clarify the deliverable.","C.Ask the product owner to clarify the deliverable.","D.Ask the sponsor to clarify the deliverable."],"correct":["A"],"explanation":"The team members are the ones who will be working on the deliverable, so they are the best people to clarify it. The project manager should facilitate a discussion between the team members to ensure they all have a shared understanding of the deliverable. The other answer choices are incorrect.\u00a0If the team members are unable to reach a consensus, the project manager can escalate the issue to the customer or product owner, but it is not the first step. The team members should have the opportunity to discuss the issue and resolve it themselves. Asking the sponsor to clarify the deliverable shoul"},{"q":"A key deadline is approaching specialized team member has suddenly received news that they must leave the office for two weeks. They have approximately three workdays until they leave and they will be unavailable through any communication channels. What should the agile project manager do?","opts":["A.Adjust the project plan and timeline to accommodate the absence.","B.Identify critical tasks and dependencies that may be affected.","C.Introduce a replacement resource for the leaving team member.","D.Ask the team member to quickly complete as much as they can."],"correct":["B"],"explanation":"The project manager should identify critical tasks and dependencies that may be affected by the team member's absence. This will help them to make informed decisions and adjust accordingly. Identifying critical tasks and dependencies also helps in reducing project risk. The other options are incorrect because they should only be considered after identifying critical tasks and dependencies. Identifying the critical tasks and dependencies helps to determine if adjusting the project plan and timeline accordingly or introducing a replacement resource is necessary. Asking the team member to quickly"},{"q":"A pilot project is underway using an agile approach to development. The project is delivering the planned increments on time, but top management is concerned because they do not see the value that the project is adding. How should the project manager communicate the value of the project to top management?","opts":["A.Include top management in all future sprint reviews to address their concerns in real time.","B.Send top management weekly status reports and invite them to retrospectives.","C.Demonstrate how the project's objectives align with the organization's strategic goals.","D.Customize progress reports to address top management's requirements."],"correct":["C"],"explanation":"Demonstrating alignment with strategic goals is the most effective way to communicate the value of the project to top management. This will help top management to better understand the value of the project and to be more supportive of it. The other answer choices are incorrect. Including top management in sprint reviews may not be possible and is not the most effective way to convey the project's value. Retrospectives are focused on process improvement, and status and progress reports provide information on project progress, but they may not clearly demonstrate the project's strategic value."},{"q":"A new project involving team members from two countries has just begun. Due to a time difference, one site finishes work an hour after the other site starts for the day. What should the project manager do to promote communication between the two sites?","opts":["A.Praise the team members who are available after hours.","B.Schedule online meetings during the overlapping hours.","C.Ask the team members to adhere to uniform working hours.","D.Draft a team charter to establish a decision-making method."],"correct":["B"],"explanation":"To promote communication between the two sites, the project manager should schedule online meetings during the overlapping hours. This will ensure that team members from both sites can participate in the meetings and communicate effectively. This can help to avoid misunderstandings and delays, and ultimately lead to a successful project outcome. The other options are incorrect. Praising team members who are available after hours can lead to burnout, resentment, and low morale. Asking team members to adhere to uniform working hours may not be feasible or realistic. Drafting a team charter to es"},{"q":"A project manager has been assigned a project that involves a virtual, multicultural team including representatives from various countries. The project manager needs to prepare a kickoff meeting. What should the project manager do to prepare for the meeting?","opts":["A.Set rules and regulations that must be followed during the project.","B.Ask the sponsor for different resources to facilitate the project.","C.Consider various time zones, communication capabilities, and possible constraints.","D.Set up the project sponsor's language as the official project communication language."],"correct":["C"],"explanation":"The project manager has to consider various internal and external enterprise environmental factors (EEFs) related to variables that affect, restrain, or influence the project team. this includes geographically spread virtual teams with multicultural backgrounds in different time zones, it's crucial for the project manager\u00a0to understand the team's culture, availability, and preferences for the kickoff meetings."},{"q":"A project manager communicates with a key stakeholder via phone calls only, as indicated in the communication management plan. Three weeks into the execution of a project, the project manager begins receiving an increasing amount of redundant ad-hoc communication requests from that stakeholder. How should the project manager address this issue?","opts":["A.Continue with phone call communication as it has been effective so far.","B.Meet with the stakeholder to discuss their communication needs and expectations.","C.Send an email to the stakeholder requesting a change in communication approach.","D.Assign a team member to act as a liaison between the project manager and the stakeholder."],"correct":["B"],"explanation":"An abundance of ad hoc communication requests may indicate that the communication planning was not sufficient to meet stakeholder needs. Meeting with the stakeholder to discuss their communication needs and expectations is the best course of action. By meeting with the stakeholder, the project manager can understand why they are making so many requests and come up with a communication plan that meets their needs. This will help reduce the number of redundant requests and improve the overall communication between the project manager and the stakeholder. The other answer choices are not as effec"},{"q":"A project manager is overseeing a project aimed at providing customers with real-time shipment tracking capabilities. The project team has encountered ongoing disputes primarily revolving around differing interpretations of how user stories contribute to the project's success. Some team members believe the user stories should prioritize speed, while others emphasize accuracy as the top priority. What should the project manager do to address the team members' disagreements over user stories?","opts":["A.Ask the product manager to meet with the team and clarify the requirements of the user stories.","B.Schedule a meeting with the business sponsor to obtain clarification regarding the user stories.","C.Consistently revisit the project charter together with the team members to ensure alignment.","D.Verify that the user stories align with overall business objectives and project goals."],"correct":["D"],"explanation":"When team members are arguing over user stories, it is important to ensure that everyone is aligned on the business values and capabilities that the stories are intended to deliver. This can be done by validating the business values and capabilities mapped to the stories. The other options are incorrect because they are less effective in addressing the core issue. Asking the product manager to clarify the requirements or scheduling a meeting with the business sponsor to obtain clarification may help in some capacity, but it is important to have a shared understanding of how the user stories al"},{"q":"A project manager is assigned to a mobile application development project. The project manager realizes that an agile approach is better suited for the project, but most of the team is not experienced in agile approaches. What should the project manager do next if the organization is open to using an agile approach?","opts":["A.Request that the project be reassigned to a project team with agile experience.","B.Ask to replace the team members who have never used agile approaches.","C.Arrange training on agile principles and mindset for the existing project team.","D.Use a predictive approach since the project team is already familiar with that approach."],"correct":["C"],"explanation":"The project manager should train the team on agile principles to ensure that they can transition to the new approach effectively. If the organization is open to switching to an agile framework, arranging training on agile principles for the existing team can help them gain the necessary skills and knowledge to effectively use agile approaches on the project.\nThe other options are incorrect.\nRequesting that the project be assigned to an agile project team or replacing team members may not be feasible or practical.\u00a0\nUsing a predictive approach may not be the best option as the project manager ha"},{"q":"The project manager of a large team notices team members are not interacting together, which is impacting project performance and the quality of the project outcome. What should the project manager do to help grow team dynamics?","opts":["A.Conduct face-to-face group meetings to understand what the issues are.","B.Notify the project team members' supervisors about the lack of cooperation.","C.Add the lack of team communication as a risk in the risk register and monitor the situation.","D.Refer to the lessons learned to understand how other projects handled similar issues."],"correct":["A"],"explanation":"\"Conduct face-to-face group meetings to understand what the issues are\" is the correct choice as, to have effective results and improve the customer satisfaction, project manager should work continuously on nurturing team members, by listening to their comments and giving feedback regularly. This will help understand what's going on. \"Refer to the lessons learned...\" appears to be an option but this will not give a solution to the situation as the context is different. \"Add the lack of team communication...\" could be one of the steps the Project Manager would be doing but this not going to hel"},{"q":"During the testing phase of a project, a team member finds that some requirements were not met. If the project now adds work to meet the requirements, it may cause a large time and cost overrun. What should the project manager do first?","opts":["A.Escalate the issue to top management.","B.Perform an impact analysis.","C.Call for a stakeholder meeting.","D.Update the risk register."],"correct":["B"],"explanation":"The project manager should first assess the impact of requirements not being met, and then decide on a course of action. It is too soon to notify management or call a stakeholder meeting; the impacts need to be assessed first, before \"sounding the alarm.\" Likewise, the impact analysis would be an input into updating the risk register."},{"q":"The opening of a new overseas office faces potential delays as the required permit has not yet been issued by the local government. The project team met to evaluate the appropriate course of action as outlined in the risk register. After a thorough assessment, the team decided to postpone the opening to another date. Which document should the project manager use to update the project management plan?","opts":["A.Risk management plan","B.Risk report","C.Risk register","D.Lessons learned register"],"correct":["C"],"explanation":"In this scenario, the team identified a risk related to the delay in obtaining the necessary permit, which was already included in the risk register. The team assessed the response to take, which was to postpone the opening to another date. Therefore, the project manager should update the risk register to reflect the new status of the risk and update the project management plan accordingly. The other options are incorrect. The risk management plan describes how risk management activities will be structured and performed. A risk report summarizes information on individual project risks and the "},{"q":"A project team's performance has declined for the last three iterations. Some of the team members are disappointed, and raise their concerns during the retrospective meeting. What should the project manager do?","opts":["A.Identify potential failure points based on the iteration workload.","B.Motivate the team to perform better.","C.Focus on remediation, not merely on correcting symptoms.","D.Compare the team's performance against other project teams."],"correct":["C"],"explanation":"Root cause analysis. Root cause analysis is designed to identify and correct the fundamental cause of a problem. It helps focus remediation not on merely correcting symptoms but on preventing the recurrence of problems. This type of analysis is especially useful as a method to proactively forecast probable events before they occur."},{"q":"A project team working on a high-priority, change-driven project has repeatedly missed release deadlines. The project manager identifies that this is due to the fact that an experienced team member is assigned to multiple projects and has limited bandwidth. What should the project manager do?","opts":["A.Report the issue to the project sponsor.","B.Adjust the schedule and issue a change request.","C.Discuss this issue with the project team immediately.","D.Evaluate the workload of the experienced team member."],"correct":["D"],"explanation":""},{"q":"A large-scale project has been consistently progressing. However, the team is experiencing difficulties in completing some complex stories and maintaining velocity. The project manager discovers that inefficient collaboration has led to misunderstandings and frustrations. What should the project manager do to enhance the team's performance?","opts":["A.Focus on servant leadership.","B.Perform a root cause analysis.","C.Seek insight from a mentor.","D.Improve team communications."],"correct":["D"],"explanation":"The project manager should focus on improving team communications to enhance the team's performance. This can help the team to better understand each other's roles and responsibilities, identify and resolve issues more effectively, and maintain a higher level of productivity. Agile teams should use stand-ups to micro-commit to each other, uncover problems, and ensure the work flows smoothly through the team. The other options are not going to help improve the team's performance Focusing on servant leadership is helpful, but this alone does not help enhance the team's performance. Performing a "},{"q":"A project manager has just been assigned a new project team and needs to assign tasks for an upcoming project quickly and effectively. To ensure that tasks are assigned to the right resources, what approach should you take?","opts":["A.Distribute the tasks evenly because the team should all have equal skill sets.","B.Allocate the most complex tasks to the more senior members of the project team.","C.Evaluate the background, experience, and capabilities of the team, then assign tasks.","D.Assign experienced team members to assist team members who lack experience."],"correct":["C"],"explanation":"Evaluating the background, experience, and capabilities of the team before assigning tasks is the most effective way to ensure that the right tasks are assigned to the right resources. The project manager should consider the unique skills and strengths of each team member and leverage them to achieve better outcomes and an efficient use of time and resources.\nDistributing tasks evenly is not realistic because it assumes that every team member has the same skill set which is improbable.\nAllocating the most complex tasks to the more experienced team members does not guarantee that they have the "},{"q":"A project manager is working with remote team members who are acting independently. What should the project manager do to promote collaboration among team members?","opts":["A.Include the team members in all emails regarding the project.","B.Call team members individually to collect information and provide updates weekly.","C.Promote regular meetings using video conferencing.","D.Ask each team member to fill out a task log for daily updates."],"correct":["C"],"explanation":"The best option is to encourage regular meetings where all parties can connect and develop a sense of collaboration. The other options are not the most efficient way to operate and may not promote collaboration."},{"q":"A\u00a0new project manager is hired to replace a project manager who was recently transferred to another project.\u00a0The team members tell the new project manager that the project is behind schedule due to delays in document approvals from the customer. What should the project manager do first?","opts":["A.Meet with the customer to discuss the delays and negotiate a new deadline.","B.Talk to the previous project manager to understand the situation better.","C.Reach out to the customer and request expedited document approvals.","D.Assess the impact of the delays on the project schedule and budget."],"correct":["B"],"explanation":"By talking to the previous project manager, the new project manager can get a firsthand account of the situation from someone who was already involved in the project. The previous project manager can provide insights into the root cause of the delays, the steps that have already been taken to address them, and the options that are available to the new project manager. The other answer choices are incorrect.\u00a0Meeting with the customer to discuss the delays, negotiating\u00a0a new deadline, or\u00a0requesting expedited document approvals may be necessary, but should not be done before the new project manag"},{"q":"A project manager is tasked with addressing the product owner's concerns about the delivery of the minimum viable product (MVP) in sprint four. Which of the following metrics should the project manager use?","opts":["A.Scheduled Performance Index (SPI)","B.Schedule Cost Index (SCI)","C.Burndown Rate","D.Qualitative Risk Analysis"],"correct":["C"],"explanation":"To address the product owner's concern about the MVP delivery, the project manager should focus on the burndown rate and its alignment with the remaining work required for the MVP. The burndown rate is a key agile metric used to track the progress of work in a sprint or iteration. It shows how much work is remaining in the sprint backlog, helping the project manager monitor whether the team is on track to complete the planned work by the end of the sprint. If the burndown rate is steep and approaching zero, it indicates that the team is making good progress and is likely to meet the sprint goa"},{"q":"A project manager has identified that a task on the critical path is behind schedule. The project manager thinks that additional resources will help, but higher management declined a request for the additional funding necessary to add resources. The project manager must work with the approved resources and budget. What would be the best-suited practice for the project manager to address this situation?","opts":["A.Resource leveling","B.Crashing","C.Fast tracking","D.What-if scenario analysis"],"correct":["C"],"explanation":"Fast tracking allows the project manager to work within the approved resources and budget while also addressing the schedule delay on the critical path. Fast tracking is a schedule compression method in which activities or tasks that are normally done in sequence are performed in parallel. Fast tracking can help the project manager complete the critical path task as quickly as possible without using additional resources. The other options are not effective when additional resources are not available. Resource leveling is a resource optimization technique in which adjustments are made to the pr"},{"q":"A midsize project has the objective of developing an innovative product with changing requirements. Several team members are unavailable for two weeks per month during the duration of the project. The project manager realizes that the cost of quality increases substantially during those periods. However, the team velocity is stable. What should the project manager do to address this issue?","opts":["A.Add resources to the team.","B.Expand the testing effort.","C.Provide cross-training.","D.Increase the sprint duration."],"correct":["C"],"explanation":"As the resources will be away often for the duration of the project, and team velocity is stable, it indicates a gap in the skills and capabilities of the team, that could be solved with cross-training to increase output quality. Increasing the team's adaptability ensures that they can cover for each other when some team members are unavailable. Project teams that are able to adapt the way they work to the environment and the situation are more effective. The other options may not be feasible and do not effectively address the issues. Adding resources to the team may not be possible and does n"},{"q":"A senior team member was very influential and played a crucial role in past projects. In this new project, the senior member no longer plays a crucial role and is demotivated. What should the project manager do to address this situation?","opts":["A.Arrange a team meeting to discuss ways of increasing motivation.","B.Provide incentives to increase motivation.","C.Ask the functional manager to speak with the team member.","D.Arrange a one-on-one meeting with the team member."],"correct":["D"],"explanation":"Feedback sessions are usually the best option to assess team members' concerns and build a relationship to increase motivation. The project manager performs communication roles with team members. The project manager often uses soft skills like interpersonal skills and the ability to manage people within informal networks. These informal networks that project managers develop, maintain, and nurture are more important than formal org structures. Informal networks include the use of established relationships with individuals such as subject matter experts and influential leaders."},{"q":"A project is underway with team members from two different countries and there are complaints from both sides. The team members from Country A believe that team members from Country B are too slow to respond and often have scheduled days off. The team members from Country B believe in a good work/life balance and think more consideration is needed before making decisions. What should the project manager do?","opts":["A.Reevaluate the team charter with team members.","B.Revisit the communications management plan.","C.Remind team members to consider cultural differences.","D.Investigate the root cause of misunderstandings."],"correct":["A"],"explanation":"The project team charter records the project team values, agreements, and operating guidelines, and establishes clear expectations regarding acceptable behavior by project team members. By revisiting and possibly revising the charter, the project manager can work with the team to clarify expectations and address issues related to work/life balance and decision-making processes. Meeting with the team to reevaluate the team charter is the most comprehensive and effective way to address the issue.\nRevisiting the communications management plan may not be necessary as it may not be the cause of the"},{"q":"An organization has a policy requiring all project managers to conduct a standardized audit of another project manager's project once a month. After an audit review, team members complained that the auditor was not fairly reviewing their deliverables. The project manager reviewed the audit results and agreed with the findings.\nWhat should the project manager do to address this situation?","opts":["A.Request that mandatory audits be conducted less frequently.","B.Use status meetings to review deliverables instead of formal audits.","C.Explain that audits are conducted based on standardized measures.","D.Report the project manager who conducted the unfair audit."],"correct":["C"],"explanation":""},{"q":"After nine months, a project concludes its first phase with the release of a new product to the customer. The client is dissatisfied and states that many key features are missing. What should the project manager do first in order to address this issue?","opts":["A.Evaluate the missing features with the client and develop a plan to include them in the next nine-month project phase.","B.Review the project plan to determine if the missing features were part of the original scope or if they were added later.","C.Request additional funding in order to reduce the current release cycle timeline so the team can deliver value sooner.","D.Restart the project by implementing an agile life cycle and incorporate the creation of a minimum viable product (MVP)."],"correct":["B"],"explanation":"The project manager should first review the project plan and scope to determine if the missing features were part of the original scope or if they were added later. This will help to identify the reasons for the missing features and develop a plan to address them. If the missing features were part of the original scope, the project manager should work with the team to identify the reasons for the missing features and develop a plan to address them. This may involve revising the project plan, adjusting priorities, and allocating additional resources as necessary. If the missing features were ad"},{"q":"A project is in the implementation phase. A new project manager discovers that the team members have no previous experience with the technology used for the project. However, there are several functional managers that have experience with the technology. What should the project manager do first to ensure the successful performance of the team?","opts":["A.Ask functional managers to act as mentors or coaches for the team.","B.Request that the sponsor
