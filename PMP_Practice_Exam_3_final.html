    <style>
:root {
    --p-blue: #004b8d;
    --p-dark: #003366;
    --p-bg: #e9e9e9;
    --p-light: #f0f7ff;
    --p-selected: #cce0f5;
    --p-footer: #cccccc;
}
body { background: var(--p-bg); color: #333; font-family: Arial, sans-serif; margin:0; padding:0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
#startScreen, #scoreScreen { position: fixed; inset: 0; background: white; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
#examScreen { display: none; flex-direction: column; height: 100vh; width: 100%; background: white; }
.exam-header { background: var(--p-blue); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.exam-header h2 { font-size: 0.9rem; margin: 0; text-transform: uppercase; }
.exam-body { flex: 1; overflow-y: auto; padding: 30px 20px 100px; max-width: 900px; margin: 0 auto; width: 100%; box-sizing: border-box; }
.q-number { font-size: 1rem; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
.q-text { font-size: 1.1rem; line-height: 1.5; margin-bottom: 30px; }
.option-btn { display: flex; align-items: flex-start; padding: 12px; border: 1px solid transparent; background: white; cursor: pointer; width: 100%; text-align: left; margin-bottom: 2px; }
.option-btn:hover { background: var(--p-light); }
.option-btn.selected { background: var(--p-selected) !important; border: 1px solid var(--p-blue); }
.opt-letter { min-width: 24px; height: 24px; border: 2px solid #555; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 12px; font-weight: bold; font-size: 0.8rem; flex-shrink: 0; }
.option-btn.selected .opt-letter { background: var(--p-blue); color: white; border-color: var(--p-blue); }
.actions { position: fixed; bottom: 0; left: 0; right: 0; background: var(--p-footer); padding: 12px 20px; display: flex; justify-content: space-between; border-top: 1px solid #999; z-index: 100; }
.btn-p { background: linear-gradient(to bottom, #fff, #e5e5e5); border: 1px solid #888; padding: 8px 20px; font-weight: bold; cursor: pointer; border-radius: 3px; font-size: 0.85rem; min-width: 90px; text-transform: uppercase; }
.btn-next { color: var(--p-blue); border-color: var(--p-blue); display: none; }
.start-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 400px; }
.start-option { background: #f8f9fa; border: 1px solid #ddd; padding: 15px; border-radius: 8px; cursor: pointer; text-align: center; }
.start-option.selected { border-color: var(--p-blue); background: var(--p-light); }
.score-big { font-size: 4rem; color: var(--p-blue); font-weight: bold; margin: 20px 0; }
@media (max-width: 600px) { .exam-body { padding-top: 15px; } .q-text { font-size: 1rem; } }

.review-q-card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 20px; margin-bottom: 20px; text-align: left; width: 100%; box-sizing: border-box; }
.review-opt { padding: 10px; margin: 5px 0; border-radius: 4px; border: 1px solid #eee; font-size: 0.9rem; }
.review-opt.user-wrong { background: #ffebee; border-color: #ef5350; }
.review-opt.is-correct { background: #e8f5e9; border-color: #66bb6a; font-weight: bold; }
.review-exp { margin-top: 15px; padding: 15px; background: #f0f7ff; border-left: 4px solid var(--p-blue); font-size: 0.85rem; line-height: 1.5; color: #444; }
.status-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; }

</head>
<body>

<div id="startScreen">
    <h1 style="margin-bottom:10px">PMP Practice Exam</h1>
    <p style="color:#666; margin-bottom:30px">Select question count to begin:</p>
    <div class="start-options">
        <div class="start-option" onclick="setCount(this, 10)">10 Questions</div>
        <div class="start-option" onclick="setCount(this, 25)">25 Questions</div>
        <div class="start-option" onclick="setCount(this, 50)">50 Questions</div>
        <div class="start-option selected" onclick="setCount(this, 175)">Full Exam</div>
    </div>
    <button class="btn-p" style="padding:15px 40px; font-size:1rem" onclick="startExam()">Begin Exam</button>
</div>

<div id="examScreen">
    <div class="exam-header">
        <h2>PMP Simulation</h2>
        <div id="timer">00:00:00</div>
    </div>
    <div class="exam-body">
        <div id="qNumber" class="q-number"></div>
        <div id="qText" class="q-text"></div>
        <div id="options" class="options"></div>
    </div>
    <div class="actions">
        <button class="btn-p" id="btnBack" onclick="prevQ()">Previous</button>
        <button class="btn-p btn-next" id="btnNext" onclick="nextQ()">Next</button>
    </div>
</div>

<div id="scoreScreen" style="display:none">
    <h1>Exam Result</h1>
    <div class="score-big" id="finalScore">0%</div>
    <div id="scoreMeta" style="margin-bottom:30px; font-size:1.2rem"></div>
    <button class="btn-p" id="btnShowReview" onclick="showReview()">Review Answers</button>
<button class="btn-p" onclick="location.reload()">New Session</button>
    <div id="reviewContainer" style="display:none; width: 100%; max-width: 800px; margin-top: 40px; border-top: 2px solid #eee; pt-20">
        <h2 style="margin: 30px 0; color: #333;">Detailed Review</h2>
        <div id="reviewList"></div>
    </div>

</div>

<script>
const ALL_QUESTIONS = [{"q":"In a project where a third-party provider is implementing a custom solution, the project manager must ensure that the local team will have the capacity to support the solution. What should the project manager do to ensure that the local team can support the solution?","opts":["A.Delegate the responsibility of supporting the custom solution to the third-party provider.","B.Conduct comprehensive training sessions for the local team on the new solution.","C.Reduce the responsibilities of the local team to minimize the need for support.","D.Hire additional personnel to provide ongoing support for the local team."],"correct":["B"],"explanation":"It is important to make sure project team members understand and fulfill their roles and responsibilities by identifying gaps in knowledge and skills and developing strategies to address those gaps through training. Training the local team on the new solution will ensure that they have the capacity to support it and are not dependent on outside resources. This will ensure that the local team has the skills and knowledge they need to support the custom solution in the long term. The other options are incorrect. Delegating responsibility to a third-party provider is\u00a0not a comprehensive solution "},{"q":"While planning a new project, a new project manager finds that the request for proposal (RFP) references several government regulations.\u00a0However, the project manager discovers that compliance guidelines related to two specific regulations are being created and are not currently available. Senior management advises the project manager that the guidelines will be available when that stage of the project is reached and directs the project manager to continue working on the proposal. What should the project manager do?","opts":["A.Delay the project and explain the consequences of non-compliance to senior management.","B.Document the interactions with senior management as assumptions in the assumption log.","C.Verify the requirements for the government regulations and establish a strategy for compliance.","D.Continue working on the proposal and update it as more compliance guidelines are understood."],"correct":["B"],"explanation":""},{"q":"Members of an agile team are struggling. While there is trust among the team members, the majority of team decisions are made by a few of the more experienced team members. What should the project manager do in order to enable a high-performing team?","opts":["A.Discourage the experienced team members from speaking first, allowing others to offer ideas.","B.Facilitate meetings to ensure that all team members take part in team decisions.","C.Coach the team to ensure all members offer ideas and team consensus is achieved.","D.Raise the issue in a retrospective and have the team formalize new team agreements."],"correct":["C"],"explanation":""},{"q":"A project is delivering incremental business value to a customer. The success criteria for the project is a 20% increase in market share for the customer.\u00a0\nWhen should the project be considered a success?","opts":["A.When the sprint reviews demonstrate that each iteration delivers a 20% increase in market share.","B.After the project documentation is completed and the project team has been assigned to other projects.","C.At the conclusion of project execution, as part of the project closure report approval process.","D.When 75% of the project has been completed and the Earned Value Management (EVM) diagram indicates that the value is on track."],"correct":["C"],"explanation":"The success criteria for the project is a 20% increase in market share for the customer. This is a business metric, and it can only be accurately measured at the completion of the project. The project should only be considered a success when the final product or service has been delivered and the customer has achieved a 20% increase in market share. This will be determined at the conclusion of project execution, as part of the project closure report approval process. The other options are incorrect because they all measure the project's success based on intermediate metrics, such as the result"},{"q":"At the beginning of an agile project, the project manager is developing the project charter with the team. They are unable to agree on the team values. What should the project manager discuss with the team to address the conflict?","opts":["A.Sustainable pace","B.Definition of done (DoD)","C.Respecting the timebox","D.Project ceremonies"],"correct":["A"],"explanation":"Team values, such as sustainable pace and core hours Toolbox"},{"q":"A project manager is involved in a project where requirements are constantly evolving. What should the project manager do to achieve success?","opts":["A.Provide regular updates and request deliverable-based approvals from the product owner.","B.Work with the team to ensure they are on track and delivering on schedule.","C.Maintain a comfortable working atmosphere to improve team cohesion.","D.Ensure documentation and processes are filed appropriately and update the product owner."],"correct":["A"],"explanation":"The project manager is dealing with a project with an evolving scope. Such projects require the project manager to engage constantly with the product owner for feedback and sign off on project deliverables. The other answer choices are incorrect. They are all proper PM processes, however they don't focus on the evolving scope in the question."},{"q":"In the early stages of team formation, a project manager is unable to focus on the main tasks because team members are constantly asking for help to resolve conflicts regarding the interpretation of the client's requirements. What should the project manager do?","opts":["A.Empower the team to resolve conflicts among themselves.","B.Spend time resolving these conflicts with the team.","C.Use the conflict resolution committee to help resolve these conflicts.","D.Escalate the conflicts to the program manager."],"correct":["A"],"explanation":"The project manager should first empower the team to resolve conflicts among themselves. This is because the team members are the closest to the work and have the most expertise on the client's requirements. Empowering the team to resolve conflicts will help them to develop their problem-solving and communication skills. It will also free up the project manager's time so that they can focus on the main tasks of the project. The other answer choices are incorrect.\u00a0Spending time resolving these conflicts with the team may be necessary if the team is unable to resolve the conflicts themselves. Ho"},{"q":"A new product was accepted by the customer, but after two weeks the project manager received a complaint from the customer saying that the product's functionality requirements were not met. What should the project manager do first?","opts":["A.Escalate the issue to the project sponsor.","B.Review the scope validation process.","C.Schedule an inspection of the product.","D.Validate the scope with the customer."],"correct":["B"],"explanation":"Toolbox"},{"q":"A project manager is newly assigned to an ongoing project and determines that the quality has been consistent. There is a considerable budget for quality assurance, and other areas of the project could benefit from these funds. What should the project manager do?","opts":["A.Implement a budget reduction strategy to reallocate funds.","B.Perform a full inspection since there is no margin for error.","C.Introduce sampling as a cost-effective way to ensure quality.","D.Keep the budget intact for now and continue monitoring."],"correct":["D"],"explanation":"The project manager is new to the project, so it is crucial that they take time to familiarize themselves with the existing quality assurance process and the project's specific quality needs and challenges. Project quality has been consistent, and reducing the budget at this time could jeopardize the overall quality of the project. Quality assurance efforts focus on finding quality issues as soon as possible because discovering quality issues late in development would have substantial implications and could result in project failure.\nThe other options are incorrect.\nReducing or reallocating th"},{"q":"A project manager has developed a project management plan based on agile methodologies in an effort to deliver the product quickly. However, the project is complex and the requirements are unclear, putting the schedule at risk. What should the project manager do to get the project back on track?","opts":["A.Rebaseline the schedule to accept additional expectations and potential delays.","B.Review the product backlog with the product owner and team to resolve the status.","C.Increase the number of standup meetings and implement daily status updates.","D.Adjust the plan to employ more iterative and incremental life cycle features."],"correct":["B"],"explanation":"Reviewing the product backlog with the product owner and team to resolve the status is correct because poorly understood or unclear requirements mean the backlog may be prioritized incorrectly causing delays. Some features may need to be split or other realigned. Having the product owner is key as they have approval for the backlog and influence business stakeholders if needed. The team on the other hand has the insight needed and the project manager can facilitate the right outcome. The other answer choices are incorrect. Rebaselining\u00a0the schedule to accept additional expectations and potenti"},{"q":"A key resource approaches the project manager after the kick-off meeting and expresses concern that they will be unable to deliver their assigned tasks due to other priorities. What should the project manager do?","opts":["A.Schedule a team meeting to assess and manage priorities.","B.Document the lack of availability as a risk in the risk register.","C.Escalate this issue to the project sponsor for executive support.","D.Update the project management plan accordingly to reflect a potential delay."],"correct":["A"],"explanation":"Scheduling\u00a0a team meeting to assess and manage priorities\u00a0is correct because it allows the team to have a clear understanding of all individual and team priorities and commitments, and hence work on resource capacity, leveling, and smoothing. It also allows the key resource the possibility to share their challenges and possibly get help while still retained on the team, especially if their skill sets are very much needed. The other answer choices are incorrect. Simply documenting the lack of availability as a risk in the risk register is incorrect and will not solve the issue; a root-cause sol"},{"q":"While validating deliverables, a project manager realizes that one of the project team members used an older version of the scope definition document, causing substantial errors. What should the project manager do to manage this situation?","opts":["A.Discuss the latest deliverables during the next meeting.","B.Update the project document register.","C.Perform a change control process.","D.Share the updated scope definition document with the team."],"correct":["C"],"explanation":"A change control process should be initiated to document the issue, assess its impact, determine necessary corrective actions, and implement those actions. This will help to ensure that the project remains on track and that the deliverables meet the requirements of the latest scope definition document. Performing a change control process ensures that the issue is formally addressed and corrected in a structured manner.\nThe other options are incorrect.\nDiscussing the latest deliverables during the next meeting may not be sufficient in this case. The use of an outdated scope definition document "},{"q":"In an agile project, the project status indicates that the project is 95% completed. During an iteration review, the stakeholders were concerned about the business value being delivered. What should the project manager do to ensure the project is properly aligned?","opts":["A.Communicate with the stakeholders to mitigate their concerns.","B.Instruct the project sponsor to review the project goals and work completed.","C.Meet with the product owner to re-evaluate the project's scope and deliverables.","D.Request that the business analyst adjust the project goals accordingly."],"correct":["C"],"explanation":"In an agile project, if stakeholders are concerned about the business value being delivered despite the project being 95% completed, the project manager should meet with the product owner to re-evaluate the project's scope and deliverables. This will help ensure that the project is properly aligned with the business needs and that the expected business value is being delivered. It is important for project managers to continuously monitor the work being done to ensure it remains optimally aligned with the benefits that need to be achieved. The other answer choices are incorrect. Communicating w"},{"q":"A project manager is leading a project to implement a process improvement software system that was developed in-house. However, the adoption across the organization was less than 50% due to a misalignment with core processes. Which three of the following actions should the project manager have performed to realize the project benefits?","opts":["A.Conducted a full needs assessment in the design phase.","B.Launched the pilot in a core business unit and collected feedback.","C.Ensured wider stakeholder engagement to gain greater buy-in.","D.Instructed the marketing team to collect feedback from customers.","E.Developed a clear change management plan that included training."],"correct":["A","B","C"],"explanation":"Conducted a full needs assessment in the design phase. Launched the pilot in a core business unit and collected feedback. Ensured wider stakeholder engagement to gain greater buy-in. Conducting a full needs assessment in the design phase would have helped the project manager to identify the specific needs of the organization and ensure that the software system was designed to meet those needs. Launching the pilot in a core business unit and collecting feedback would have allowed the project manager to test the software system with a real-world user group and get feedback on how to improve it. "},{"q":"The first iteration of an agile project consists of a minimum viable product (MVP) that is now successfully completed. The team members are eager to hand the product over to the customer. How should the product be confirmed as ready for customer use?","opts":["A.The scrum master determines that all requirements are satisfied.","B.The project team agrees the MVP meets the definition of done (DoD).","C.The senior manager and customer approve and accept the product.","D.The product owner decides that the MVP passes all required quality tests."],"correct":["B"],"explanation":"The definition of done (DoD) is a checklist of all the criteria required to be met so that a deliverable can be considered ready for customer use. In an agile context, the decision of when an MVP meets the DoD and can be released to the customer is typically made by the agile team. The team works together to ensure that the MVP meets the DoD and is ready for release to the customer. This decision is based on the team's assessment of whether the MVP meets the acceptance criteria and is of sufficient quality to be released. This helps to prevent misunderstandings and ensures that everyone is wor"},{"q":"A company initiated a project to build a new hydropower plant. Analysis was performed to determine regulatory, safety, and security compliance requirements. After the analysis, it was apparent that some elements necessary to achieve compliance may be difficult and expensive to implement. Stakeholders are concerned about the added cost and complexity and have differing opinions on the importance of compliance and its potential implications. What should the project manager do?","opts":["A.Meet with the stakeholders and emphasize the importance of compliance and the costs of non-compliance.","B.Review the stakeholder register and determine which stakeholders have the highest authority and influence.","C.Escalate the compliance concerns and the disparity between stakeholder opinions to the project sponsor.","D.Identify compliance requirements that can be excluded in order to align with stakeholder expectations."],"correct":["A"],"explanation":"Stakeholders must understand the importance of compliance and the risks of non-compliance. Compliance is important because it ensures that an organization is following laws, regulations, and standards that are relevant to its operations. Compliance helps organizations avoid penalties and fines, and maintain their reputation and credibility. Failure to comply with requirements can result in legal and financial consequences and damage to the organization's reputation. Compliance also helps organizations operate more efficiently and effectively by identifying and mitigating risks, improving proce"},{"q":"A project manager is assigned to a top innovation project that has high visibility with the company executives. Recently, one of the project requirements changed and requires the use of new and innovative technology. The change requires the creation of a new position to be filled by someone familiar with the new technology. During a status meeting, a current team member expresses interest in the new role and confirms they are certified in this new technology. What should the project manager do?","opts":["A.Reassign the team member to the task to support their growth at the organization, and acquire a resource to replace the team member's old role.","B.Ask the team member to continue the current job assignment while also taking on the new assignment as time allows.","C.Escalate the request to the project sponsor in order to determine if the team member can be assigned to the new assignment.","D.Hire a new team member and ask the existing team member to provide the\u00a0training needed for the new team member to obtain certification."],"correct":["A"],"explanation":"The project manager should reassign the team member to the new role to support their growth at the organization and acquire a resource to replace the team member's old role. This will not only help the team member develop their skills and knowledge but also ensure that the project has the necessary expertise to successfully implement the new technology.\nThe other options are incorrect.\nAsking the team member to perform both roles is unreasonable, and dividing attention will cause a decrease in quality and efficiency. As the position has been created in response to the requirement change, the r"},{"q":"A business manager and\u00a0product owner are requesting a more flexible way to incorporate changes into the product backlog. They want to reduce go-to-market time in order to react to a competitor's release strategy. What should the project manager do?","opts":["A.Coach the product owner to prioritize product backlog items in accordance with business goals.","B.Review the assumption log and the project management plan to identify potential changes.","C.Establish a comprehensive change control process and select a change control board (CCB).","D.Authorize all key stakeholders to make modifications in order to deliver the product faster."],"correct":["A"],"explanation":"The prioritization of the backlog items is the responsibility of the product owner. In markets where competitors are releasing new products frequently, the features planned for a new release may be updated in response. A competitor's release strategy can trigger a change in direction that requires the product owner to reprioritize the product backlog. The other options are incorrect. Reviewing the assumption log and the project management plan does not directly address the request to reduce go-to-market time. Establishing a comprehensive change control process may not be necessary depending on"},{"q":"A company is about to start a project in a remote place known for extreme weather. It was agreed to implement the project using a predicted, multiphase approach. Each phase is composed of several iterations. What should the project manager do in the event of extreme weather?","opts":["A.Pause work until a specialized team arrives to assess the damage that was done to the site.","B.Consult the initial plans in case of an emergency, then update and follow the corrective procedures.","C.Advise management to reconsider such an investment and the continuity of the project.","D.Stop the iteration, run a retrospective, and move to the next phase of the project."],"correct":["B"],"explanation":"The correct answer is to consult the initial plans in case of an emergency, then update and follow the corrective procedures.\nPlanning risk responses is the process of developing options, selecting strategies, and agreeing on actions to address overall project risk exposure, as well as to treat individual project risks.\u00a0\nThe other options are incorrect because the first thing that the project manager should do is consult the initial plans. The risk of extreme weather was acknowledged. Pausing work or stopping the iteration may turn out to be the approved risk response, but the project manager "},{"q":"A project manager is not sure if the team has the critical skills needed to implement a key feature of an upcoming deliverable. In order to mitigate the risk of sprint failure, what should the project manager do?","opts":["A.Ask for support from the sponsor to replace the low performers\u00a0with new team members with a specific skill set.","B.Negotiate with the stakeholder to postpone this key feature to a later release while figuring out a better alternative.","C.Identify the potential skill gap and propose a strategy to address the gaps with training, mentoring, or coaching.","D.Embrace the risk, accept the sprint failure, and try to motivate the team toward better performance in the future."],"correct":["C"],"explanation":"The role of the project manager as a servant leader is to create high-performing teams. Servant leaders place emphasis on developing project team members to their highest potential by focusing on addressing issues and gaps. It is important to make sure project team members understand and fulfill their roles and responsibilities. Mitigation strategies can include identifying gaps in knowledge and skills as well as strategies to address those gaps through training, mentoring, or coaching.\nThe other options are incorrect because they do not mitigate the risk. Embracing the risk is not proactive a"},{"q":"A delivery team member is complaining about the workload and the number of top priorities they are handling. Another team member is complaining that they cannot do their own work due to the lack of progress from the first team member. They are both frustrated and the dispute is negatively impacting productivity and morale.\nWhat should the project manager do to improve team performance and resolve the underlying dispute?","opts":["A.Find common ground to show them that they agree on workload issues.","B.Recognize that emotions are part of this issue and address them first.","C.Initiate conflict resolution techniques to identify which of them is to blame.","D.Employ stakeholder engagement mechanisms and escalate the situation."],"correct":["B"],"explanation":"The project manager must recognize that emotions are part of the issue and address them first. The project manager should listen to both team members and acknowledge their concerns. Recognizing and addressing emotions can help build trust and create a more positive working environment.\nThe other options are incorrect.\nFinding common ground to show them that they agree on the workload issue assumes that they agree and does not address the emotional aspect of the conflict.\nInitiating conflict resolution techniques can be helpful, but assigning blame is counterproductive in conflict management.\nE"},{"q":"A project manager is managing a project for a successful startup. The startup has shown exponential growth with multiple benefits to the team members, including flexible work hours and a work-from-home policy. During the last retrospective, one of the team members noted that the team velocity improved when the team was physically gathered in the project room. What should the project manager do?","opts":["A.Gather feedback and analyze the impact of physical\u00a0location on team velocity.","B.Refine the backlog to improve team velocity and maintain current policies.","C.Share the idea with senior management and suggest updating company policies.","D.Update the resource management plan and team charter to promote colocation."],"correct":["A"],"explanation":""},{"q":"An events company is planning a new event for a client that holds biannual conferences. The project is being managed by a new project manager who has reviewed the lessons learned log from the last event and is concerned that a past issue may reoccur. How should the project manager proceed?","opts":["A.Identify the root cause and consult with stakeholders.","B.Handle the issue if it arises during the event planning.","C.Recommend rescheduling the upcoming conference.","D.Implement the same strategies used in the last event."],"correct":["A"],"explanation":""},{"q":"A project manager is working on a new project. Two key project resources have a disagreement regarding a requirement. The project manager wants to understand both points of view, but one resource is not willing to meet with the project manager. What should the project manager do?","opts":["A.Escalate the issue to the project sponsor.","B.Accept the position of the senior project resource.","C.Review the organizational process assets (OPAs).","D.Refer to the team's ground rules and project vision."],"correct":["D"],"explanation":"The project manager must obtain an agreement on how the team should proceed, and this can be found in the established ground rules. They must also obtain consensus and use this information to resolve conflicts in alignment with the project vision. The other answer choices are incorrect. Escalating the issue without first trying to resolve it is not good practice; accepting the position of the senior project resource is not good conflict resolution; the OPAs are higher-level and do not necessarily address specific team resolutions."},{"q":"A new project manager is assigned to a project in the execution phase. The project just completed the deliverables for the first phase. During a workshop to review the scope for the second phase of the project, a couple of stakeholders complain that they were not informed of the benefits already delivered. What should the project manager do to resolve this issue?","opts":["A.Escalate the issue to the steering committee because the sponsor should have informed stakeholders.","B.Escalate the issue to the sponsor because the question came from some of the senior stakeholders.","C.Record the issue in the issue log, discuss it with the change manager, and update the communications management plan.","D.Record the issue in the register, review the stakeholder matrix, and update the risk management plan."],"correct":["C"],"explanation":"Stakeholders that are not aware of the benefits and the value delivered throughout the project is a common issue and it is the responsibility of the project manager to resolve it when it happens. The root cause is poor stakeholder assessment and/or communication plan. Communication is the responsibility of the project manager, sometimes involving the change manager. The other answer choices are incorrect. Escalating to the steering committee and sponsor is incorrect because it is not their responsibility to resolve the issue. The PM has access to the stakeholders because they were invited to t"},{"q":"During week two of a two-week sprint, one of the core team members has an emergency and is unable to work on the project for the rest of the sprint. What should the project manager do first?","opts":["A.Request that the product manager increase the project timeline.","B.Identify tasks that can be reassigned to other team members.","C.Extend the sprint to offset the loss of the core team member.","D.Get additional resources from other teams to complete the sprint."],"correct":["B"],"explanation":"The first step for the project manager in this situation should be to identify tasks that can be reassigned to other team members. This will help ensure that the project can continue to move forward without delay. It's important for the project manager to remain flexible and adaptable in the face of unexpected challenges. By communicating clearly with the team and stakeholders and making adjustments as needed, the project can still be completed successfully. The other options are incorrect. If reassignment is not possible, then the project manager may need to adjust the project timeline and de"},{"q":"During a kick-off meeting, the sponsor informs the project team that they can not attend any meetings for the first half of the project. The sponsor would like to assign a replacement. What should the project manager do?","opts":["A.Request that the replacement holds substantial influence and decision-making authority.","B.Set up a meeting with the replacement sponsor as soon as possible to discuss the upcoming agenda.","C.Request the full attention of the sponsor and escalate this issue to the project management office (PMO).","D.Analyze the impact of the change and work with the sponsor to identify a suitable replacement."],"correct":["D"],"explanation":"The project manager should analyze the impact of the change and work with the sponsor to identify a suitable replacement who can attend project meetings and provide the necessary support.\u00a0The project manager must also assess the potential consequences of the sponsor's absence, such as delays, communication gaps, reduced engagement, etc. This is the most comprehensive and proactive approach to addressing the situation while maintaining effective communication and collaboration. It is important for the project manager to maintain open communication with the sponsor and the replacement to ensure "},{"q":"While planning a global solution delivery in a multinational organization, the project manager and team drafted all work items and defined the priorities and methodologies for implementation. During one of the daily meetings, a team member expresses concern about the compliance of the technology being used and proposes an alternative that is more aligned with the data privacy policies of the country. What should the project manager do first?","opts":["A.Ask the architecture owner to assess the team member's proposal and evaluate\u00a0the compliance concerns.","B.Assess the validity of the concern and evaluate the compliance of the current and newly proposed technology.","C.Meet with the customer and ask if they would be comfortable implementing the newly proposed technology.","D.Get support from the information technology (IT) department regarding the feasibility of the new technology."],"correct":["B"],"explanation":""},{"q":"A project manager is assigned to a long-term project with a duration of three years. Which approach should the project manager take to address near-term activities, while long-term work is planned at a high level and detailed later?","opts":["A.Focus on acquiring a team and deliver as soon as possible.","B.Engage the sponsor in the validation and prioritization processes.","C.Perform workshops with the client for delivery dates.","D.Validate the requirements and perform rolling wave planning."],"correct":["D"],"explanation":"As we progress through the items on our road-map, the feedback we gather as we begin to validate our ideas at each step will inform what we need to do in the future. With a Rolling Wave Plan, we should have regular checkpoints to incorporate new information and adjust our plan accordingly. The other answer choices are incorrect. They do not address the need for the progressive elaboration required in a long-term project."},{"q":"A project is currently behind schedule when a new team member, known for their high performance, is assigned to the team. While assessing the new team member, the project manager realizes that the individual lacks training for the specific project but has the skills and relevant experience to join the team. What should the project manager do?","opts":["A.Ensure that the team member receives training before joining the team.","B.Assign the new team member to critical activities under close monitoring while they receive training.","C.Assign the new team member to noncritical activities without close monitoring while training is provided.","D.Decline the addition of the new team member to the team."],"correct":["C"],"explanation":""},{"q":"A project is in the planning phase and requires tremendous time and effort for data collection and analysis. The project sponsor asks the project manager to skip a planned focus group discussion and brainstorming sessions in an effort to accelerate the process. What should the project manager do next?","opts":["A.Report the issue to the project steering committee.","B.Acknowledge the project sponsor's request and skip the sessions.","C.Tell\u00a0the project sponsor that skipping the\u00a0sessions will jeopardize the project.","D.Meet with the project sponsor to understand the reasons for the time constraints."],"correct":["D"],"explanation":"By meeting with the project sponsor and discussing the issue, the project manager can\u00a0ensure that the project is completed on time and within budget, while also meeting the needs of all stakeholders. The other answer choices are incorrect.\u00a0Reporting the issue to the project steering committee should not be done before the project manager has met with the project sponsor to understand the situation and discuss alternative solutions.\nAcknowledging\u00a0the project sponsor's request and skipping the sessions is not a good option because it does not take into account the importance of the focus group d"},{"q":"At an agile project meeting, a team member gives an update on the status of their important task. A new team member interrupts them when they hear their task mentioned and gives a status update before the first team member has finished their update. What should the project manager do?","opts":["A.Privately talk to the two team members after the meeting.","B.Tell the new team member that they are acting unprofessionally.","C.Pause to discuss appropriate meeting protocol with the team.","D.Ask the new team member to wait until their teammate finishes."],"correct":["D"],"explanation":""},{"q":"A serious quality issue has been identified during the implementation of a major public infrastructure project. The issue is likely to cause a substantial delay to the committed project completion date. As the project manager, what should you do?","opts":["A.Ignore the issue and hope that it does not cause a substantial delay to the completion date.","B.Delay the project until the newly identified quality\u00a0issue can be completely resolved.","C.Implement a strategy to address the newly identified\u00a0issue without notifying the stakeholders.","D.Meet with the project team and stakeholders to discuss the issue and possible solutions."],"correct":["D"],"explanation":""},{"q":"A project manager is in the execution phase of a project. A newly identified stakeholder continuously bypasses the project manager to get feedback from the project sponsor directly, thus escalating pressure and frustration for all members of the team. What should the project manager do next?","opts":["A.Call a project meeting of all stakeholders to discuss the matter and develop a suitable action plan.","B.Email the communications management plan to the stakeholder and point out that they agreed to the plan.","C.Meet the project sponsor and confirm that the project manager must be the single point of contact.","D.Meet with the stakeholder to understand their needs and update the communication management plan."],"correct":["D"],"explanation":"An abundance of ad hoc communication requests may indicate that the communication planning does not meet stakeholder needs. The stakeholder's actions are causing frustration, so further stakeholder engagement is necessary to ensure stakeholder information requirements are met. Meeting with the newly identified stakeholder can help the project team effectively respond to changing circumstances and create shared understanding and alignment. The other options are incorrect because they do not directly address or resolve the issue at hand. Meeting with the stakeholders or calling a project meeting"},{"q":"A project manager is leading a hybrid project with a self-organizing team. The team is unable to agree on the scope for the next increment. How should the project manager resolve this issue?","opts":["A.Facilitate a team discussion to understand why the team is unable to agree on the scope for the next increment.","B.Escalate the issue to the project sponsor so that the risk posed by the disagreements over scope becomes visible.","C.Collaborate with a suitable subject matter expert (SME) to determine the scope for the next increment.","D.Request that the team votes on the options and identify the appropriate scope based on a majority vote."],"correct":["A"],"explanation":"Facilitating a team discussion will help to identify underlying issues and work towards a mutually agreeable solution. Hybrid teams contribute to the scope determination process by providing input and feedback based on their unique perspectives and expertise. It is important for the project manager to facilitate open communication and collaboration among team members to ensure that everyone's input is considered and that the scope is aligned with the project goals and objectives. Supporting the team through problem-solving builds a supportive culture and leads to a trusting and collaborative e"},{"q":"A project manager in a manufacturing company was notified of a failure of the delivered machinery during the initial tests. The machine failed to comply with standard design specifications, resulting in malfunctions and safety concerns. What should the project manager do first to address the issue?","opts":["A.Review the initial testing procedure and execution.","B.Assess the environmental and individual factors.","C.Evaluate the technical documentation of the machine.","D.Check the communications between the stakeholders."],"correct":["A"],"explanation":"The project manager should first review the initial testing procedure and execution to identify any potential issues or gaps in the process that may have led to the failure of the machinery. This will help to determine the root cause of the problem and develop a plan to address it. It is important for the project manager to work closely with the testing team and other stakeholders to gather all relevant information and ensure that the testing process is thorough and effective. Once the root cause is identified, the project manager can then develop a plan to address the issue and prevent simila"},{"q":"During the daily standup meeting, one of the team members informs the team that a user story that was initially part of the sprint planning has become invalid due to a recently announced policy change. What should the project manager do in response to this situation?","opts":["A.Close the user story related to the policy change and explain that it is no longer valid.","B.Remove the user story from the current sprint and schedule it for the next sprint.","C.Notify the stakeholders that user stories committed for a sprint cannot be modified.","D.Remove the user story from the sprint and ask the team to expedite the completion of the current sprint."],"correct":["A"],"explanation":"Closing the user story related to the policy change is the most appropriate response because it is the most efficient and effective way to deal with an invalid user story. It is important to keep the sprint backlog as up-to-date as possible, and closing the user story will ensure that it is not worked on by the team. The project manager should also provide an explanation to the team and stakeholders about why the user story was closed. The other options are incorrect because they either do not directly address the situation or do not provide a comprehensive solution to handle the invalid user "},{"q":"At the end of a large project, the stakeholders realize that the achieved benefits are not the same as the expected benefits. Which item, if poorly defined at the start of the project, could have led to this issue?","opts":["A.Requirements documentation","B.Project scope","C.Business case","D.Benefits metrics"],"correct":["D"],"explanation":"To detect that the benefits are achieved, there must be a metric monitoring in order to make sure that the benefits are being accomplished during the project life cycle."},{"q":"A project manager believes that the project team could benefit from development activities to improve project performance and outcomes. The project manager decides to plan specific development activities for each team member. What should the project manager do first to ensure the success of this initiative?","opts":["A.Conduct a skills assessment of the team members.","B.Ask the team to determine their development plans.","C.Distribute clear development plans to the team members.","D.Implement a reward system based on performance."],"correct":["A"],"explanation":"The project manager should conduct a skills assessment of the team members first to ensure the success of the initiative. This will help the project manager identify the strengths and weaknesses of each team member and plan development activities that are tailored to their individual needs. By conducting a skills assessment, the project manager can also ensure that the development activities are aligned with the project goals and will ultimately improve project performance and outcomes. The other options are not as effective in identifying development needs.\nAsking the team to conduct a self-a"},{"q":"A construction project has progressed for about 18 months, and the schedule performance index (SPI) is 0.68. The project manager intends to complete the project as planned without additional cost. What should the project manager do to complete the project on time?","opts":["A.Crash the schedule.","B.Fast track the schedule.","C.Reduce the project scope.","D.Reduce the project quality."],"correct":["B"],"explanation":"Fast tracking provides opportunity to recover without any additional cost, but it might add some risks to be considered in the project. The other answer choices are incorrect. Crashing the schedule will incur additional cost; changes to project scope and quality must go through the change management process."},{"q":"During a standup, a team member falsely reports the completion of a story which is a dependency for other stories. When the team begins to work\u00a0on related stories, they are unable to continue with development because the initial story is not finished. What should the project manager do first?","opts":["A.Review the sprint planning with the whole team to understand story interdependencies.","B.Speak to the team member who falsely reported the completion of the story.","C.Tell the product owner to review the acceptance criteria before pushing it into the sprint backlog.","D.Ask the team to explain their interpretation of the definition of done (DoD) at the end of the sprint."],"correct":["B"],"explanation":"The most important thing for the project manager to do first is to privately speak to the team member who falsely reported the completion of the story. This will allow the project manager to understand the team member's perspective and to address the situation in a timely and effective manner. The other answer choices are important steps that the project manager should take, but they should not be done before speaking to the team member privately. By addressing the situation directly with the team member, the project manager can help resolve the issue quickly and prevent it from happening agai"},{"q":"A project manager for a building project has been informed that a required permit from the local government has not yet been obtained. Applying for the permit will delay project delivery by 21 days at a cost of US$40,000. The fine for not having the permit in place is US$1,900 a day. What should the project manager do?","opts":["A.Apply for the permit and delay project delivery by 21 days.","B.Ignore the permit requirement and continue with the project.","C.Attempt to negotiate with the local government for a pardon.","D.Allocate the fine amount as an additional project expense."],"correct":["A"],"explanation":"Obtaining the required permit is essential to comply with local regulations and avoid potential legal issues and fines. While it will delay the project, it is the responsible and ethical course of action, as it ensures legal compliance and minimizes the risk of costly fines in the long run. The other options are incorrect because are not appropriate in this scenario. Ignoring the permit requirements is incorrect because it is not a responsible or ethical decision for a project manager. The project manager could be fined heavily and have the project shut down. There could also be substantial le"},{"q":"A project is currently in progress. The project manager has been notified of a new process that may be helpful if it is incorporated into the project. What should the project manager do?","opts":["A.Evaluate how the new process can be incorporated.","B.Issue a priority order for the change.","C.Determine the benefit of the change.","D.Modify the requirements document for the change."],"correct":["C"],"explanation":"The first step in incorporating a new process into a project is to understand the benefits of the change. This will help the project manager determine if the change is worth the effort and resources required to implement it. The project manager should also consider the impact of the change on the project schedule, budget, and scope. The other options are incorrect because they would be done after the benefits of the change have been determined. Evaluating how the new process can be incorporated is incorrect because it would happen after determining the benefit of the change. Once the potential"},{"q":"A project manager is developing a project management plan. The project duration is set for three months due to regulatory compliance and dependency on senior staff. Which two project objectives should be defined well enough to be included in the project management plan? (Choose two)","opts":["A.Improve the processes and reduce rework by keeping senior staff turnover to a minimum level.","B.Develop detailed process maps to align operational activities with the new software system.","C.Enhance the development process by redesigning new templates for the design documentation.","D.Reduce the company's environmental footprint by using detailed recycling guidelines for all employees.","E.Identify training needs and create a development plan to complete the delivery in three months."],"correct":["A","C"],"explanation":"Improve the processes and reduce rework by keeping senior staff turnover to a minimum level. Enhance the development process by redesigning new templates for the design documentation. Improving the process and reducing rework addresses the potential risk of senior staff turnover, which could impact project continuity and quality. This aligns with the project's constraints (e.g., regulatory compliance and dependency on senior staff) and supports the goal of completing the project successfully within the fixed three-month duration. Enhancing the development process focuses on improvement through"},{"q":"A project manager works for a company involved in complex turnkey projects. During a team assessment, the project manager finds that overall performance is negatively impacted because the team has trouble adjusting to frequent changes in project requirements and status. What should the project manager do to ensure the team is better equipped to adjust to change?","opts":["A.Request that the sponsor communicate directly with the project team.","B.Communicate with stakeholders regularly to avoid frequent changes.","C.Provide one-on-one guidance to each team member on a consistent basis.","D.Establish clear and consistent communication channels and protocols."],"correct":["D"],"explanation":""},{"q":"In the middle of an iteration for the development of a project deliverable, a team member suggests a new method of doing the work. The method may require several days of work to implement, but it may help the team work more efficiently. How should the project manager respond to the suggestion?","opts":["A.Immediately implement the suggested change to improve team efficiency without consulting the team.","B.Reject the suggestion as it provides no value to the customer and is not aligned with the project's goals.","C.Document the idea for future consideration but continue with the current iteration without making any changes.","D.Acknowledge the suggestion and assess the new method and the potential impact on team efficiency."],"correct":["D"],"explanation":"Acknowledging the team member's suggestion shows respect for their input and encourages a collaborative atmosphere. Assessing the new method and its potential impact on team efficiency ensures that decisions are made with a clear understanding of the implications and allows for informed decision-making. Once the project manager has assessed the new method, they can make a decision about whether or not to implement it. The other options are incorrect. Immediately implementing the change without proper evaluation and team input can lead to disruptions and unintended consequences. Rejecting the s"},{"q":"The quality management plan (QMP) calls for regression testing before each product release, but these tests were not included in the work breakdown structure (WBS). What should the project manager do first?","opts":["A.Submit a change request to add regression testing work packages to the project scope.","B.Request extra test resources from the quality assurance functional manager.","C.Suggest to the project client that regression testing be removed from the quality requirements.","D.Seek approval from the project sponsor to remove regression testing from the QMP."],"correct":["A"],"explanation":"The quality management plan (QMP) drives the quality management processes and regression testing is a part of the QMP. Hence the project manager should submit a change request to add regression testing work packages to the project scope. The other answer choices are incorrect. Requesting extra test resources is something the project manager will do after the change request for the regression testing work packages is approved. Hence this option is not the appropriate answer. Removing regression testing from the quality requirements and QMP is not the right thing to do as it will decrease the qu"},{"q":"A company is kicking off a new hybrid project to be in compliance with government regulations. The team has established a velocity of 50 story points per iteration. Every iteration lasts 1 week. The sponsor wants to know when the project will be done if there are 1,500 story points remaining.","opts":["A.30 weeks","B.15 weeks","C.4 weeks","D.1 week"],"correct":["A"],"explanation":"There are 1,500 story points remaining, velocity = 50 points per iteration. # of iterations remaining = 1,500/ 50 = 30. Every iteration lasts 1 week, then the team will need 30 weeks to complete the project."},{"q":"At the first meeting about a road construction project, the project manager reminds the team of the importance of observing all rules when carrying out their duties and interacting with stakeholders. Later in the project, team members start coming to meetings late and do not follow other ground rules. To ensure the project outcomes and schedule are not affected, what should the project manager do next?","opts":["A.Address the issue with the specific team members who violated the ground rules.","B.Remove the team members who violated the ground rules.","C.Promote all team members who do not violate any ground rules.","D.Allow the team to investigate any team members who violate the ground rules."],"correct":["A"],"explanation":"Conflict should be addressed first and usually in private, using a direct, collaborative approach. It's important for the project manager to be firm but also understanding and to work with the team members to find solutions to any issues that may be causing them to violate the ground rules. The other answer choices are incorrect. They do not promote a healthy team spirit. If disruptive conflict continues, formal procedures may be used, including disciplinary actions. Removing team members who violated the ground rules or promoting all team members who do not violate any ground rules are not ap"},{"q":"A project manager is leading a project that follows the company's predictive approach. The project manager discovers that the project is behind schedule and over budget because a key stakeholder has been submitting an unusually high number of change requests. What should the project manager do to help the company achieve its desired project outcomes?","opts":["A.Review the risk management plan to determine a mitigation plan.","B.Use the contingency reserve to implement a fast-track activity.","C.Review the change control process and implement improvements.","D.Escalate the problem with the stakeholder to the project sponsor."],"correct":["C"],"explanation":"The project manager should assess the current change control process to determine why the stakeholder's change requests are causing the project to fall behind schedule and go over budget. Implementing improvements to the change control process can help manage and streamline the changes more effectively.\u00a0This may involve streamlining the process, adding new steps, or updating the criteria for approving or denying change requests. The other options are incorrect because they are less effective in addressing the core issue of excessive change requests. Reviewing the risk management plan may help "},{"q":"A project manager is leading a project to deliver a new product in a heavily regulated industry and must prioritize quality management practices. The project manager is considering the management of quality improvements. What should the project manager emphasize to ensure focus on managing quality improvements?","opts":["A.Prioritize rapid product release and analyze consumer feedback to identify and execute the necessary quality improvements.","B.Implement a strategy of frequent quality audits and product defect tracking to identify and address any quality issues.","C.Streamline quality and compliance practices by delegating responsibility for quality control to a designated team member.","D.Establish clear quality metrics and targets for each project stage to ensure compliance with regulatory quality standards."],"correct":["D"],"explanation":""},{"q":"A project manager working in a matrix organization is managing a project that is scheduled to be completed in one month. At today's project meeting, the project manager was informed that errors encountered in the software code are steadily increasing. During discussions with the development team lead, the project manager is told that this is normal when trying to stay on schedule. The development team is pressing to move on so a deadline is not missed, but the project manager is concerned. What should the project manager do?","opts":["A.Update the work breakdown structure (WBS) and extend the durations in the project schedule to allow more development time.","B.Direct the team to continue development to avoid missing the deadline, noting that the risk has been mitigated.","C.Examine the quality metrics to determine if the project is complying with the documented quality requirements.","D.Submit a change request through the change control process to extend the deadline, allowing more time for development."],"correct":["C"],"explanation":"Examine the quality: A Quality metric describes a project or product attribute & how the Control Quality process will verify compliance. The PM checks the metrics to see if the increase in, or the number of errors, is out of compliance. Until the check is done, it is not known if the increase is out compliance. The other answer choices are incorrect. Continue development: The project manager may press the team to continue, but until the quality metric is checked, it may result in non-compliance. Update the WBS: The WBS would only be changed if there was to be a change in scope and there is no "},{"q":"A project manager observes that team members are not collaborating or being proactive. What should the project manager have done at the beginning of the project to achieve a better project environment?","opts":["A.Conducted an assessment of team dynamics.","B.Assigned all tasks at the beginning of the project.","C.Facilitated additional team meetings.","D.Split the project into more iterations."],"correct":["A"],"explanation":"Conducting an assessment of team dynamics at the beginning of a project can help the project manager understand the strengths and weaknesses of the team and identify any potential issues that may arise during the project. This can help the project manager create a better project environment by addressing any issues early on and promoting collaboration and proactivity among team members.\u00a0\nThe other options are incorrect.\nAssigning all tasks at the beginning of the project, holding additional team meetings, or splitting the project into more iterations do not address the root cause of the lack o"},{"q":"A project manager realizes that the team needs training on a specific technology that is required in the project. What should the project manager do to mitigate this risk?","opts":["A.Assess the team's knowledge of the technology and look for recommended training options.","B.Contract with an expert provider to do the piece of work that uses that specific technology.","C.Create an item in the risk log and notify the sponsor.","D.Fix any training gaps as they arise during the project."],"correct":["A"],"explanation":"Fixing the training gaps as they arise during the project is not proactive and could have unforeseen negative impacts that could jeopardize the project."},{"q":"A project manager working in an agile environment realizes that some new team members are having difficulty understanding how more senior team members accomplished certain results on the project. What should the project manager do?","opts":["A.Arrange a review meeting with stakeholders.","B.Ensure team members focus on their tasks.","C.Assess the need for knowledge transfer.","D.Encourage and facilitate peer mentoring."],"correct":["D"],"explanation":"Encouraging and facilitating peer mentoring can be an effective way for new team members to learn from more experienced team members and understand how certain results were achieved on the project. This can also help promote collaboration and teamwork among team members.\u00a0\nThe other options are incorrect.\nOrganizing a stakeholder meeting or ensuring team members focus on their tasks does not directly address the root cause of the issue, which is the difficulty of new team members in understanding what older team members did.\u00a0\nAssessing the need for knowledge transfer can help to avoid similar s"},{"q":"During product development, two functional departments indicate that they are short on resources and cannot build and deliver all the products on time. What should the project manager do to address this concern?","opts":["A.Escalate the issue to the sponsor and request confirmation of the project scope.","B.Ask the functional manager to hire additional resources to meet the requirements.","C.Request team members work extra hours to meet the commercial needs.","D.Analyze the critical path to deliver the minimum viable product (MVP)."],"correct":["D"],"explanation":"A concept that projects can use when constrained is the Minimum Viable Product (mvp), which is a scope management paradigm. When scope is too large and time/budgets are limited, we identify the MVP to deliver an acceptable outcome. The PM should have already confirmed the project scope with the sponsor, secured appropriate resources, and allocated sufficient hours."},{"q":"At the end of the first phase of a stadium expansion project, the project manager realizes they will be running behind schedule for the next project phase. The delay is due to new safety requirements that must be adhered to. Stakeholders are frustrated that they were not aware of the potential safety requirement changes. What should you have done to avoid this situation and ensure that stakeholders are aware of potential disruptions?","opts":["A.Increase the project's contingency reserve to accommodate unforeseen safety-related issues.","B.Hold regular communication meetings with the site supervisor to stay updated on safety requirements.","C.Implement a proactive risk assessment process during project initiation to identify potential safety-related delays.","D.Request additional resources and personnel to address safety concerns as they arise."],"correct":["C"],"explanation":"A proactive risk assessment process is the best way to identify potential safety-related delays before they happen. The risk assessment process should be a collaborative effort between the project manager, the project team, and the stakeholders. This process involves identifying all of the potential risks associated with the project and evaluating their likelihood and impact. The project manager should communicate the risk assessment findings to stakeholders so that they are aware of all the potential risks. By identifying and assessing potential safety-related delays early on, the project man"},{"q":"An agile team is planning for a 2-week iteration. In the middle of the last few iterations, the product owner made changes and reprioritized features, affecting the team's deliverables. What should the project manager do first?","opts":["A.Escalate the issue to senior management and request that the product owner take action.","B.Inform the team to ignore the changes requested by the product owner during the iteration.","C.Explain the implications of making changes during an iteration to the product owner.","D.Request the product owner make\u00a0changes as needed since an agile approach responds to change."],"correct":["C"],"explanation":"The first step that the project manager should take is to explain the implications of making changes during an iteration to the product owner. This is because the product owner may not be aware of the impact that making changes during an iteration can have on the team's deliverables and the overall project schedule. The project manager should explain that making changes during an iteration can lead to scope creep, delays, and decreased quality. The other answer choices are not as effective. Escalating the issue to senior management and requesting that the product owner take action should be a "},{"q":"A project manager is responsible for a 12-month waterfall project to create a new product. The project is nine months into execution when the customer suggests using a new technology becomes available that would reduce the project costs by 10%. What should the project manager do?","opts":["A.Update the configuration management plan to include the new technology as part of the design.","B.Continue working as planned since the new technology was not part of the project management plan.","C.Create a change request to evaluate the feasibility and impact of using the new technology.","D.Ask the development team to implement all remaining components with the new technology."],"correct":["C"],"explanation":"It's essential to acknowledge the customer's suggestion and evaluate the potential impact of the new technology in a structured manner. Creating a change request allows for a structured evaluation of how the new technology would affect the project. This process ensures that decisions are made based on a clear understanding of the potential impacts. The other options are incorrect because they do not acknowledge the customer's suggestion and the potential impact of the new technology. Updating the configuration management plan assumes that the new technology is feasible and the change will be a"},{"q":"A project sponsor is increasingly anxious about the value returned from the investment made in a project and wants to ensure that the original dates are met.\u00a0\nWhat should the project manager do to convince the sponsor that the project is on track?","opts":["A.Emphasize the value delivered at the phase gate.","B.Increase the number of project status reports.","C.Present past forecasts and current performance.","D.Invite the project sponsor to daily project meetings."],"correct":["C"],"explanation":""},{"q":"A project manager used to work on predictive projects and now has started working on a project using a hybrid approach. What should the project manager do to enable the teams to focus on their mission?","opts":["A.Implement a Scrum method.","B.Adopt servant leadership.","C.Apply lean methods.","D.Innovate with new processes."],"correct":["B"],"explanation":"Servant leadership is the practice of leading the team by focusing on understanding and addressing the needs and development of team members to enable the highest possible team performance.\u00a0\nThe other options may not directly address the transition from predictive to hybrid methods and creating an environment where the team can focus on their mission."},{"q":"A team member who is unfamiliar with the subject matter is struggling to complete a complex deliverable. What should the agile project manager do to ensure that the team member is able to take on a similar challenge in the future?","opts":["A.Ensure that the team member receives adequate training and is comfortable with the subject matter.","B.Encourage the team member to take on more stories on this subject matter until they are completely comfortable.","C.Ask the team member to avoid taking on stories on this subject matter until the person is comfortable with the subject matter.","D.Replace the team member with a more experienced team member who will improve the team's velocity."],"correct":["A"],"explanation":"The project manager should provide needed training to address the specific gap where the team member is unfamiliar with the subject matter. The other answer choices are incorrect. Encouraging the team member to take on more or avoid the specific subject matter does not directly address the fact that the team member needs more training on the subject matter. It could also affect the team velocity and quality. Replacing the team member is also incorrect because it would adversely affect the team dynamics, the team member would not improve and grow."},{"q":"A senior team member is having challenges with a new project team member. The senior team member asks the project manager for advice on how to handle the new team member. What should the project manager do?","opts":["A.Check the team member's performance and responsibility assignment matrix to assess the conflict.","B.Instruct the senior team member to confront the new team member at the next daily standup meeting.","C.Coach the senior team member on conflict resolution models and how they can be applied to this situation.","D.Ask for a one-on-one meeting with the new team member and tell them to avoid the senior team member."],"correct":["C"],"explanation":""},{"q":"An organization recently updated its strategic plan and some of the changes were substantial. During a meeting for an ongoing project, an important stakeholder questioned how the project aligned with the new strategic plan. What should the project manager do first to address this concern effectively?","opts":["A.Review and revise the project charter to ensure alignment with organizational strategy.","B.Schedule a follow-up meeting with the stakeholder to discuss their concerns.","C.Remind the stakeholders that the project was initiated prior to the strategy change.","D.Assure the stakeholder that the project is aligned with the new organizational strategy."],"correct":["A"],"explanation":"The alignment of project and organizational goals is essential. The project manager should review and revise the project charter to ensure that the project is operating in alignment with the new organizational strategy. If the organization\u2019s goals shift, the project manager may need to pivot the direction of the project to meet current values. The project manager can address the stakeholder's concerns effectively by confirming alignment and making necessary revisions. The other options are incorrect. Reminding the stakeholders that the project was initiated prior to the strategy change does no"},{"q":"A project manager calls a meeting to identify risks for a complicated project. Several subject matter experts are invited to this meeting along with the project team. Why has the project manager invited the subject matter experts?","opts":["A.\u00a0Subject matter experts have specialized expertise and can help identify and address high-risk issues.","B.Identifying risks in a meeting with subject matter experts makes getting better project resources easier.","C.Risks will be easier to accept if the subject matter experts who attended the meeting work together.","D.The project manager can leverage subject matter experts' resources to follow up on the identified risks."],"correct":["A"],"explanation":""},{"q":"A project team has completed project deliverables, but the project manager would like to evaluate whether the project has delivered the intended value to the sponsor. What is the most appropriate factor for the project manager to evaluate?","opts":["A.The alignment of the achieved deliverable against the sponsor's expectations.","B.Whether the project's deliverables maximized potential income for the sponsor.","C.Whether delivery performance variances were within the sponsor's thresholds.","D.The project's overall adherence to scope, time, and budget constraints."],"correct":["A"],"explanation":"The most appropriate factor for the project manager to evaluate is the alignment of all achieved deliverables against the expected deliverables. This will help ensure that the project has met the sponsor's expectations and delivered the intended value. It is important for project managers to continuously monitor the work being done to ensure it remains optimally aligned with the benefits that need to be achieved. The other options are incorrect. Whether the project's deliverables maximized potential income may be a factor to evaluate, but on its own does not necessarily indicate value delivery"},{"q":"The service provider and their client agree on about 80% of the scope of a project contract they are working on for the delivery of marketing content. The client has a fixed budget and target completion date and wants to get the most business value from the project as possible by increasing the scope based on a best-effort delivery close to the end of the project. What should the project manager do?","opts":["A.Create the contract based on the agreed scope and plan addendum changes.","B.Ensure that a change control process is documented in the contract.","C.Propose a dynamic scope contract option and add a fixed number of iterations.","D.Increase the number of resources in the contract to deliver the requirements."],"correct":["C"],"explanation":""},{"q":"A global, cross-functional team has been assembled to deliver a multinational initiative. What should the project manager do to ensure that there is full team participation throughout the project?","opts":["A.Coordinate time zone information and agree to meeting times.","B.Ensure software is delivered in multiple languages.","C.Translate the project documentation.","D.Provide guidance on common tools and practices."],"correct":["A"],"explanation":"The project manager must be sensitive to the needs of the virtual team. Specifically, understanding time zone and culture (global calendars) differences will be key to the project's success. Having the team agree to specific meeting times that fit a global calendar will help to ensure team participation throughout the project. The other answer choices are incorrect. The main focus of this question is about participation. Translating the project documentation and final software does not ensure the team will participate because we cannot assume that the software is intended for a global audience"},{"q":"An information technology (IT) project manager was assigned a new team for a software development project in an agile environment. The project manager estimates that the project will take a certain number of days based on past experience in another organization. How should the project manager validate this assumption and properly plan and manage the project schedule?","opts":["A.Conduct a survey in the organization and generate data to validate claims.","B.Estimate based on sprint review meetings and stakeholder input.","C.Study previous sprint planning meetings and the organization's project culture.","D.Ask the te
