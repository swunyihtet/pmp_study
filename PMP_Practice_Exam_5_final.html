<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PMP Exam Simulator</title>
    <style>
:root {
    --p-blue: #004b8d;
    --p-bg: #f5f5f5;
    --p-light: #f0f7ff;
    --p-selected: #cce0f5;
    --p-footer: #cccccc;
}
body { background: var(--p-bg); color: #333; font-family: Arial, sans-serif; margin:0; padding:0; min-height: 100vh; }
#startScreen, #scoreScreen { position: fixed; inset: 0; background: white; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 40px 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
#examScreen { display: none; flex-direction: column; min-height: 100vh; background: white; }
.exam-header { position: sticky; top: 0; background: var(--p-blue); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
.exam-header h2 { font-size: 0.9rem; margin: 0; text-transform: uppercase; }
.exam-body { flex: 1; padding: 30px 20px 120px; max-width: 900px; margin: 0 auto; width: 100%; box-sizing: border-box; }
.q-number { font-size: 1rem; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
.q-text { font-size: 1.1rem; line-height: 1.5; margin-bottom: 30px; font-weight: 500; }
.option-btn { display: flex; align-items: flex-start; padding: 15px; border: 1px solid transparent; background: white; cursor: pointer; width: 100%; text-align: left; margin-bottom: 2px; }
.option-btn:hover { background: var(--p-light); }
.option-btn.selected { background: var(--p-selected) !important; border: 1px solid var(--p-blue); }
.opt-letter { min-width: 26px; height: 26px; border: 2px solid #555; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 15px; font-weight: bold; font-size: 0.85rem; flex-shrink: 0; }
.option-btn.selected .opt-letter { background: var(--p-blue); color: white; border-color: var(--p-blue); }
.actions { position: fixed; bottom: 0; left: 0; right: 0; background: var(--p-footer); padding: 15px 30px; display: flex; justify-content: space-between; border-top: 1px solid #999; z-index: 500; }
.btn-p { background: linear-gradient(to bottom, #fff, #e5e5e5); border: 1px solid #888; padding: 10px 25px; font-weight: bold; cursor: pointer; border-radius: 3px; font-size: 0.9rem; min-width: 100px; text-transform: uppercase; }
.btn-next { color: var(--p-blue); border-color: var(--p-blue); }
.review-q-card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 20px; margin-bottom: 25px; text-align: left; width: 100%; box-sizing: border-box; }
.review-opt { padding: 10px; margin: 5px 0; border-radius: 4px; border: 1px solid #eee; font-size: 0.95rem; display: flex; align-items: flex-start; gap: 10px; }
.review-opt.is-correct { background: #e8f5e9; border-color: #66bb6a; font-weight: bold; }
.review-opt.user-wrong { background: #ffebee; border-color: #ef5350; }
.review-exp { margin-top: 15px; padding: 15px; background: #f8fafc; border-left: 4px solid var(--p-blue); font-size: 0.9rem; line-height: 1.6; color: #334155; }
.status-tag { display: inline-block; padding: 4px 12px; border-radius: 4px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 12px; }
.status-correct { background: #e8f5e9; color: #166534; }
.status-wrong { background: #ffebee; color: #991b1b; }
.score-big { font-size: 5rem; color: var(--p-blue); font-weight: 800; margin: 20px 0; }
</style>
</head>
<body>

<div id="startScreen">
    <h1 style="margin-bottom:10px">PMP Practice Exam</h1>
    <p style="color:#666; margin-bottom:30px">Choose assessment volume:</p>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:30px; width:100%; max-width:400px;">
        <button class="btn-p" onclick="setCount(10)">10 Questions</button>
        <button class="btn-p" onclick="setCount(25)">25 Questions</button>
        <button class="btn-p" onclick="setCount(50)">50 Questions</button>
        <button class="btn-p" onclick="setCount(175)">Full Exam</button>
    </div>
    <button class="btn-p" style="padding:15px 50px; background:var(--p-blue); color:white; border:none;" onclick="startExam()">Launch Exam</button>
</div>

<div id="examScreen">
    <div class="exam-header">
        <h2>PMP Simulation</h2>
        <div id="timer" style="font-weight:bold">00:00:00</div>
    </div>
    <div class="exam-body">
        <div id="qNumber" class="q-number"></div>
        <div id="qText" class="q-text"></div>
        <div id="options" class="options"></div>
    </div>
    <div class="actions">
        <button class="btn-p" id="btnBack" onclick="prevQ()">Previous</button>
        <button class="btn-p btn-next" id="btnNext" onclick="nextQ()">Next</button>
    </div>
</div>

<div id="scoreScreen" style="display:none">
    <h1 id="scoreHeading">Exam Result</h1>
    <div class="score-big" id="finalScore">0%</div>
    <div id="scoreMeta" style="margin-bottom:30px; text-align:center;"></div>
    
    <div style="display:flex; gap:10px; margin-bottom:40px">
        <button class="btn-p" id="btnShowReview" onclick="showReview()">Review All</button>
        <button class="btn-p" onclick="location.reload()">Restart</button>
    </div>

    <div id="reviewContainer" style="display:none; width:100%; max-width:800px; border-top:1px solid #ddd; padding-top:40px;">
        <div id="reviewList"></div>
        <button class="btn-p" style="width:100%; margin-top:20px" onclick="location.reload()">Start New Session</button>
    </div>
</div>

<script>
const ALL_QUESTIONS = [{"q":"Which is an essential component for maintaining the support and commitment of all stakeholders?","opts":["A.Honesty","B.Effective communication","C.Transparency","D.Reliability"],"correct":["B"],"explanation":""},{"q":"Project manager B has been assigned to take over a project from Project Manager A. Project Manager A informs Project Manager B that the project is on schedule, only because Project Manager A constantly pushes the team to perform. What is the first action Project Manager B should take as the new project manager?","opts":["A.Check the risk status.","B.Check the cost performance.","C.Determine a management strategy.","D.Tell the team the new objectives."],"correct":["C"],"explanation":""},{"q":"Due to a recent incident, a dissatisfied stakeholder files a complaint about a project that has been closed. What can the project manager do to help resolve this?","opts":["A.Execute the relationship management plan.","B.Consult with the project sponsor to manage the dissatisfied stakeholder.","C.Review the project management information system (PMIS) archives.","D.Update the risk register."],"correct":["C"],"explanation":"PMBoK Sixth Edition in Chapter 4 states: \"4.3.2.2 PROJECT MANAGEMENT INFORMATION SYSTEM (PMIS) The PMIS provides access to information technology (IT) software tools, such as scheduling software tools, work authorization systems, configuration management systems, information collection and distribution systems, as well as interfaces to other online automated systems such as corporate knowledge base repositories. Automated gathering and reporting on key performance indicators (KPI) can be part of this system. 4.3.2.3 MEETINGS Meetings are used to discuss and address pertinent topics of the proj"},{"q":"A project steering group has made a decision to change the vendor that will deliver a component of a project. Which of the following activities should be included in the handover? (Choose 2).","opts":["A.The old vendor should provide training for the new one and assist with the transition.","B.Both vendors should provide additional incentives for staff during the transition.","C.The new vendor should take over activities as per the existing project plan.","D.The new vendor should shadow the old vendor to ensure knowledge transfer."],"correct":["A","D"],"explanation":"Option B is incorrect because very likely vendor A didn't meet acceptance criteria and staff should not be rewarded for poor performance Option C\u00a0is incorrect because taking over immediately, without a transition period introduces risk. Using the existing plan developed with the old vendor is also a risk to the project. The correct approach is to ensure formal and informal knowledge transfer."},{"q":"A project requires the services of a specialized vendor to install a very complex and expensive piece of equipment. The project manager sent an email a week ago to a partner to request a specialist\u00a0come on-site. Unfortunately, the vendor has not replied to confirm. What communication method was used in this case?","opts":["A.Pull","B.Interactive","C.Push","D.Interpersonal"],"correct":["C"],"explanation":"Email is a push communication method: it\u00a0can be confirmed that it was sent, but it does not necessarily mean it was received and understood. The project manager should have\u00a0followed up for a response to ensure that the message was\u00a0received and understood. Toolbox"},{"q":"In a program, several groups are identifying problem solving techniques and each group presents a proposal. Among those listed, which is valid?","opts":["A.Performing project health checks","B.Reading literature related to your industry","C.Establishing a project suggestion box","D.All of\u00a0the above"],"correct":["D"],"explanation":"Project team members and other stakeholders can provide information, suggestions, and assistance in working with all the various forms of uncertainty. To optimize value delivery, project teams should use problem solving as well as a holistic-thinking approach to changes and unplanned events. Projects can be challenging from the perspectives of technical challenges, environmental influences, and interpersonal interactions.\u00a0Recommending a new approach to a problem or a way of working can be intimidating. Likewise, it can be challenging to disagree with a subject matter expert or someone with gre"},{"q":"You are managing a complex project with a large number of stakeholders. You decided to use the Salience Model to identify and group the most important stakeholders based on their power, urgency and legitimacy. Which of the following aspects is the most important in this instance?","opts":["A.Dominant","B.Dependent","C.Demanding","D.Definitive"],"correct":["D"],"explanation":"In the Salience model the Definitive group contains the stakeholder that have the highest power, urgency and legitimacy"},{"q":"A project manager is leading a project team\u00a0composed of members from different departments, including engineering, marketing, and sales. During the development process, a conflict arises between the engineering and marketing teams. The engineering team is focused on delivering the product on time and within budget, while the marketing team is focused on ensuring that the product meets the needs of the target market. What should the project manager do?","opts":["A.Suggest that the engineering and marketing teams each give up something to reach an agreement.","B.Suggest that the engineering and marketing teams work together to find a solution that works for both teams.","C.Suggest that the engineering team is correct\u00a0and ensure that the product is delivered on time and within budget.","D.Suggest that the engineering and marketing teams\u00a0compete to see who can come up with the best solution."],"correct":["B"],"explanation":"The project manager should recommend a collaboration solution. This is because collaboration is the most effective way to resolve conflicts between teams with different priorities. By working together, the engineering and marketing teams can find a solution that meets the needs of both teams and ensures the success of the project. The other answer choices are incorrect.\u00a0Compromise cannot\u00a0be an effective conflict resolution if both teams are not\u00a0willing to give up something in order to reach an agreement. In this case, the engineering team may not be willing to compromise on their goal of deliv"},{"q":"A project manager is working on a complex project. The project includes many stakeholders with conflicting priorities. Which two actions should the project manager take to be prepared for negotiations and gain support from all of the stakeholders? (Choose two)","opts":["A.Allow enough contingency to cope with scope changes.","B.Develop a good relationship with the project team.","C.Understand the politics and personal interests of the stakeholders.","D.Develop a good communications management plan.","E.Develop a good risk management plan."],"correct":["B","C"],"explanation":"Negotiations, including agreements, require people skills rather than good planning. Although having good Communication and Risk plans as well a clear project schedule may help those are outcomes of the negotiation. Agile is not a silver bullet and it is not always the best option for project delivery Toolbox"},{"q":"A group of stakeholders at a financial institution are conducting a project closure review. Some of the stakeholders are concerned that the project deliverables do not satisfy the established closure criteria. What is the first thing that the project manager should do to address this issue?","opts":["A.Assure the stakeholders that the project deliverables satisfy all established closure criteria.","B.Propose that the closure criteria be amended by removing the criteria that have not been met.","C.Take corrective measures by adapting the closure criteria and extending the project timeline.","D.Perform a thorough analysis to determine why the closure criteria have not been satisfied."],"correct":["D"],"explanation":"Toolbox"},{"q":"A project manager is assigned to a very complex and technical project. The project manager is currently working on the resources plan, and intends to recommend to the project sponsor that external resources should be used instead. What risks can be mitigated using one or more vendors to deliver components of the project? (Choose 3).","opts":["A.Financial","B.Schedule","C.Technical","D.Political","E.Scope"],"correct":["A","B","D"],"explanation":"Using vendors the financial and schedule related risks can be minimized by using fixed price and milestones payments engagements. By not using internal resources political risks are also easy to mitigate. Although usually external resources may have better technical skills that's not always the case. Especially in case of in house developed components and systems technical engaging a vendor will bring additional challenges. Scope changes is a risk that is independent of internal or external resources."},{"q":"A complex construction project entails the meeting of several regulations throughout project execution. The project team is brainstorming how to implement an effective method to\u00a0ensure compliance throughout the term of the project. Which compliance review process is suitable for this situation?","opts":["A.Conduct a gated review throughout the project phases.","B.Review at the end of the project.","C.Review before the closure of the project.","D.Conduct an informal review only that is based on need."],"correct":["A"],"explanation":"This is the most effective way to ensure compliance throughout the term of a complex construction project. By conducting gated reviews throughout the project, the project team can identify and address any compliance issues early on, before they become major problems. By conducting gated reviews throughout the project phases, the project team can ensure that the project complies with all applicable regulations. This will help to protect the project team from liability and ensure that the project is successful. The other answer choices are incorrect.\u00a0A review at the end of the project is not eno"},{"q":"A project manager planning a strategic predictive project has suddenly fallen ill. The project baseline must be submitted to the customer within 3 days, and the project management office (PMO) director must find someone to finish the planning. The choices are: Project manager A: highly experienced in Scrum projects only, available immediately for 2 days only Project manager B: moderately experienced mainly in construction projects, available the next day for 1 week Which project manager should the PMO director choose and on what basis?","opts":["A.A is available immediately and has more experience to plan quickly and correctly.","B.B better understands the complexities of predictive planning and has use of a network of subject matter experts (SMEs).","C.A is more up to date and conversant with the latest project planning trends and methodologies.","D.B will be available to work for a longer period in case the submission deadline is missed."],"correct":["B"],"explanation":"The more complex estimation work in predictive projects often relies on expert input. Access to SMEs as well as predictive mindset and experience would be critical to completing the planning baseline. There is no point in selecting a project manager just because he / she is available"},{"q":"A project to create a new product is completed and introduced into the market, but sales are much lower than expected. Analysis determines that the product is misaligned with the organization's core competencies. During what activity should this have been discovered?","opts":["A.What-if scenario analysis","B.Business case review","C.Strategic performance evaluation","D.Scope definition"],"correct":["B"],"explanation":"PMBoK Sixth Edition states that: \"1.2/1.6.6.1 PROJECT BUSINESS CASE The project business case is a documented economic feasibility study used to establish the validity of the benefits of a selected component lacking sufficient definition and that is used as a basis for the authorization of further project management activities. The business case lists the objectives and reasons for project initiation. It helps measure the project success at the end of the project against the project objectives. The business case is a project business document that is used throughout the project life cycle. The"},{"q":"An internal project has delivered its scope on time, within budget, and with the expected quality. The client was satisfied with the result and it enabled them to launch the new product to market. However, the product did not attract the expected interest and did not cover the investment made. The project team is aware of these results and it is impacting their morale to deliver the next project. How should the project manager handle this situation? Choose 2 answers.","opts":["A.Have a discussion with the team to explain that the product success is not a direct result of the project and it does not reflect their performance","B.Have a meeting with the business to make sure they understand the project met its objectives","C.No action is necessary, as the project manager is only responsible for the project deliverables.","D.Have a conversation with the business sponsor to validate the strategy for the new project based on this result."],"correct":["A","D"],"explanation":"Modern Leadership: Be Accountable for Outcomes. Responsible for the team motivation, Accountable for giving the client information to enable client success but ultimately not responsible for the product result. Maintaining good morale in any workplace setting can be a bit of a challenge, so it\u2019s important as a virtual manager to do what you can to create an environment where morale is high, but also recognize when it\u2019s not\u2014and then do something about it. Toolbox"},{"q":"In an agile environment, a project leader should always consider a time for open and free discussions between team members on how the team can increase their performance. Why is this practice important for the team?","opts":["A.Teams should take actions to continuously increase productivity","B.Teams should continuously experiment new ways of doing things","C.Teams should continuously seek to improve their processes","D.Teams should continuously push their members to work harder"],"correct":["C"],"explanation":"Empowering the team to take decisions on how their processes can be improved will lead to better productivity. The Project Lead must coach the team on how they can analyze and improve their processes as a team and take accountability and pride in improving the processes. Experimentation and taking actions alone may increase risks. Pushing team members to continuously work harder may lower moral and motivation. Toolbox"},{"q":"A project manager is facing a delay in a project\u00a0due to a decision made by the functional manager to provide onsite support for another project without consulting other parties impacted by this decision. What should the project manager do first?","opts":["A.Check the impact of the delay on schedule and cost.","B.Share the work schedule with the functional manager.","C.Meet with stakeholders to agree on a communications management plan.","D.Inform the customer about the delay and set a new delivery date."],"correct":["A"],"explanation":"The project manager's first priority is to assess the impact of the delay on the project schedule and cost. This will help them to determine the best course of action to take. Once they have a better understanding of the impact, they can then communicate with stakeholders and develop a plan to mitigate the delay. The other answer choices are incorrect. Sharing\u00a0the work schedule with the functional manager, meeting with stakeholders to agree on a communications management plan, and informing the customer about the delay are all important but\u00a0not the first priority. The project manager needs to "},{"q":"A team receives outsourced deliverables and determines that they do not meet the agreed-upon acceptance criteria. What should the project manager reference to verify this with the vendor?","opts":["A.Procurement management plan","B.Request for proposal (RFP)","C.Statement of work (SOW)","D.Inspections"],"correct":["C"],"explanation":"Statement of Work(SOW) will contain all the work that needs to be executed for the project to be completed and accepted. Hence this is the correct answer. All other remaining options are irrelevant as Procurement Management Plan will describe how procurement will be done and how vendors will be managed. The Request for Proposal(RFP) describes the project, its goals, and the organization that is sponsoring it and outlines the bidding process and contract terms. Inspections are carried out to identify and correct errors in a completed deliverable. Toolbox"},{"q":"A project manager participates\u00a0in a focus group that implements project management changes across the organization. The\u00a0goal is to improve project effectiveness and success. Which process should the project manager suggest for lasting and successful change within projects?","opts":["A.Conduct individualized skills assessments and provide targeted training for each team member.","B.Monitor external regulations and adapt project management practices accordingly.","C.Faciliate open communication and build buy-in from all project stakeholders.","D.Implement a project management change management plan aligned with industry best practices."],"correct":["D"],"explanation":"By implementing a project management change management plan aligned with industry best practices, changes, timelines, and implementation processes can be better defined, communication strategies can be developed, and potential issues can be mitigated. The other answer choices are incorrect. Individualized training is\u00a0valuable, but training alone doesn't guarantee adoption without broader organizational shifts and support. Regulatory monitoring is important, but it is not the primary focus for internal project management improvement. Open communication is crucial, but it's most effective within"},{"q":"A team is working on a complex and fast-changing new product development project. After a recent process evaluation, the team decides to add an agile toolkit to the predictive approach they are using. This addition is intended to improve the overall project delivery, success, and productivity. Which of the following describes how this change is intended to add value to the overall delivery, success, and productivity?","opts":["A.Use the agile toolkit to leverage the ability of agile methods to respond effectively to change, while maintaining the benefits of a predictive approach to project management.","B.Use the agile toolkit to replace all predictive methods with new agile methods, and by doing so, reduce poor productivity.","C.Use the agile toolkit to compare agile against predictive methods, then choose the best approach for future projects.","D.Use the agile toolkit and ask team members to choose between agile and predictive methods so that they will work more effectively and productively."],"correct":["A"],"explanation":"The scenario is an example of a hybrid life cycle, which seeks to leverage the adaptability of agile methods and the structured development of the waterfall model. Replacement or comparison would defeat the purpose of the hybrid concept, which is to use the strengths of both approaches. Toolbox"},{"q":"A demanding project stakeholder insists that an additional feature be added to a project product without changing the scope, budget, or schedule. The project manager allows this feature to be included since it adds great value to the end product. However, the project manager discovers that adding this feature has lengthened the project schedule and increased project costs.\nWhich process should the project manager have followed before including the additional product feature?","opts":["A.Change control","B.Schedule planning","C.Procurement planning","D.Quality audit"],"correct":["A"],"explanation":"Any change requests should be accompanied by an evaluation of any new risks that are introduced as well as changes in scope, budget, or schedule. All changes must be evaluated for the potential value they bring to the project and the potential resources, time, and budget needed to realize the potential value. The project manager should work with the change control board and the demanding stakeholder to guide change requests through the change control process. Approved changes are integrated into the applicable project planning documents, product backlog, project scope, etc. The other options a"},{"q":"During a retrospective meeting, the project team confirmed that all deliverables were completed according to the specifications provided in the product backlog. However, the number of errors found during testing increased dramatically. What should the project manager do?","opts":["A.Meet with quality assurance specialists to clarify the issue and seek resolutions.","B.Review the risk management plan to determine the mitigation strategy.","C.Perform a Monte Carlo analysis to identify possible scenarios and actions.","D.Register the risk in the risk register and monitor it during the next iteration."],"correct":["A"],"explanation":"Toolbox"},{"q":"A project manager decided to involve a third party to manage project risk given that they had more experience than the current project team. What kind of response strategy did the project manager apply to address overall project risk?","opts":["A.Avoid","B.Exploit","C.Transfer","D.Reduce"],"correct":["C"],"explanation":"The correct answer is transfer.\nRisk transference is a risk response strategy whereby the project team shifts the impact of a threat to a third party, together with ownership of the response.\nThe other options are incorrect because involving a third party to manage specific project risks, does not necessarily reduce, avoid, or exploit the risk, it shifts (or transfers)\u00a0the impact of the risk to the third party. Risk avoidance is a risk response strategy whereby the project team acts to eliminate the threat or protect the project from its impact. Risk exploiting is a risk response strategy wher"},{"q":"A project manager in a cross-functional organization needs to inform the department manager of the number and type of resources required, and the length of time they will be needed. What should the project manager use to present this resource information?","opts":["A.Resource assignments","B.Resource histogram","C.Responsibility assignment matrix (RAM)","D.Project organization chart"],"correct":["B"],"explanation":"A resource histogram, by definition defines resource requirements over time. Resource assignments take place once the need for resources has been determined and available resources have been identified. The Project organization chart and Responsibility assignment matrix will not identify the need for resources nor for what duration they are needed. Toolbox"},{"q":"While preparing a project charter for a new project, a project manager reviews lessons learned from previous projects. The lessons learned documents show frequent issues with low engagement levels and stakeholder misalignment on project objectives. What should the project manager do to avoid repetition of this issue in the new project?","opts":["A.Allow any stakeholder to join the change control board (CCB) at any time in the project.","B.Include all stakeholders in the responsibility assignment matrix (RAM) for acceptance of the deliverables.","C.Gather all the requirements provided by every individual stakeholder and include in the work breakdown structure (WBS).","D.Build a common understanding among stakeholders about key deliverables described in the approved project charter."],"correct":["D"],"explanation":"Including all stakeholders, all their requirements, and any to join the CCB would not resolve the problem of stakeholder misalignment and may lead to further issues with too much involvement when it is not required. The project manager should build a common understanding among the stakeholders to avoid these issues."},{"q":"A project manager is working on a long-term project in a complex environment. The project manager's focus is on maintaining healthy team work and collaboration. What conflict resolution strategy should be used within the project team?","opts":["A.Problem solving","B.Compromising","C.Accommodating","D.Consultation"],"correct":["A"],"explanation":"It is recommended to avoid the conflict or problem by solving it before it becomes an issue that could impact the team work and environment. Toolbox"},{"q":"A project manager is managing a project involving a few vendors. The project sponsor asks how the project will acquire goods and external services. Where should this information be documented?","opts":["A.In the Procurement Management Plan","B.In the Master Service Agreement","C.In the Bill of Materials Contract","D.In the Service Level Agreement"],"correct":["A"],"explanation":"Procurement Management Plan includes how the project will acquire goods and external services Master Service Agreement is a generic document and doesn't have any details about goods and services. Bill of materials doesn't include services. The Service Level Agreement is an Operational Document."},{"q":"A project manager seeks to alleviate the IT department's workload while empowering the business to initiate new implementations and lay the groundwork for future solutions. How should the project manager facilitate this transition?","opts":["A.Enforce stringent IT governance policies centralized within the IT department, ensuring uniformity and control over all IT endeavors.","B.Mandate comprehensive IT project proposals to the IT department for assessment and approval before any project can commence.","C.Enable business units to use a simplified IT project management platform to initiate and monitor projects independently.","D.Collaborate with cross-functional IT business teams to jointly plan and execute IT projects, fostering cooperation between stakeholders."],"correct":["C"],"explanation":"This approach grants business units more autonomy and control over their IT projects, which can reduce the burden on the IT department while still ensuring transparency and oversight. It empowers the business to take the lead in managing IT initiatives effectively. The other options are incorrect because they all involve centralized control and oversight by the IT department, which can increase bureaucracy and slow down the process rather than empowering business units. Enforcing stringent IT governance policies can restrict business units' autonomy and flexibility. While it may provide contro"},{"q":"A company is using Lean Six Sigma methodology on a project. Midway through the project, an external Lean consultant is invited to conduct an audit to ensure that the methodology is being properly applied. Which process is being employed?","opts":["A.Manage Quality","B.Control Quality","C.Perform Qualitative Risk Analysis","D.Plan Quality Management"],"correct":["A"],"explanation":"PMBoK Sixth Edition Chapter 8 Section 8.2 Manage Quality states: \"The project manager and project team may use the organization's quality assurance department, or other organizational functions, to execute some of the Manage Quality activities such as failure analysis, design of experiments, and quality improvement. Quality assurance departments usually have cross-organizational experience in using quality tools and techniques and are a good resource for the project Project Quality Management processes and the interrelations of these processes in the Project Quality Management Knowledge Area. "},{"q":"A transportation company is transforming its operational processes and the main system this company uses to move freight. The scope statement is in place. An iterative delivery approach has been agreed by all stakeholders. What does the project manager need to do next to help the team understand the work that needs to be done?","opts":["A.Start working on the project management plan with work packages, a detailed schedule, and work assignments for team members.","B.Work directly with stakeholders on the work breakdown structure (WBS) and assign tasks with a required timeline for each team member to start the work.","C.Work with the team to decompose the scope into a WBS and work packages in order to create required deliverables and timelines.","D.Create the requirements management plan to outline how project requirements will be collected, analyzed, and documented, and then assign requirements to team members."],"correct":["C"],"explanation":"To understand the work, the scope needs to be decomposed into a work breakdown structure with specific work packages included. Then the detailed requirements documentation is completed based on the agreed scope and the WBS. Without the detailed scope statement, it is not possible to proceed with creating a detailed schedule or work assignments . Hence all the remaining options are incorrect. Toolbox"},{"q":"During the team meeting, two of the team members who worked on the same tasks are arguing about who is at\u00a0fault for the task being late. None of them want to be perceived as the one who caused the delay. What is the most likely cause of this issue?","opts":["A.Conflicting Priorities","B.Unclear Responsibilities","C.Personal Competition","D.Personnel Selection"],"correct":["B"],"explanation":"Any of the stated answers COULD be correct. The PM may have specific insight, but lacking that, the most likely culprit is a lack of clarity in responsibilities. If those are clarified, not only will conflict be less likely, but it will become more obvious where the issue lies. Toolbox"},{"q":"You are the project manager in an organization that is implementing agile delivery. You have experience as a scrum master and will perform this role in addition to the project management responsibilities. One of the team members wants to know what the main focus of a servant leader is. What will be your response?","opts":["A.Client satisfaction and value delivered demonstration.","B.Growth and well-being of people and communities they belong to.","C.Stakeholders expectation management and communication.","D.Productivity and efficiency to achieve commitments made."],"correct":["B"],"explanation":"A servant leader seeks leadership\u00a0opportunities to serve others. They measure success through the growth, development, and well-being of team members and the communities they belong to. The other answer choices options are more applicable to a traditional leader, but not the main focus of servant leadership."},{"q":"During project implementation, an issue arises that requires the execution of the project's contingency plan, which will impact the project schedule. What should the project manager do?","opts":["A.Initiate a risk audit.","B.Issue a change request.","C.Review the cost impact.","D.Update the contingency plan."],"correct":["B"],"explanation":"Issuing a change request is the formal process for enacting changes on an established project. If there are challenges that could impact the project schedule and budget, issuing a change request can help formalize the need for changes to the project plan, including adjustments to the schedule and budget. A change request will formally document and manage the change and help ensure that the project remains on track and that all stakeholders are aware of the changes.\nThe other options are incorrect because they are not the best course of action in this situation. While other actions like risk au"},{"q":"A project manager is working on a complex project with many stakeholders that have conflicting priorities. Senior management asked the project manager to avoid \"noise\" because this is a highly political project. The project manager opted to use expert opinion from well known industry profiles. What did the project manager do to satisfy senior management's request?","opts":["A.Responded in a friendly manner to senior management","B.Appeared to be consistent in the use of words and actions","C.Cooperated with senior management to achieve mutual goals","D.Took action based on the senior management's power to act"],"correct":["D"],"explanation":"Use the Law of Authority to establish your own credentials or credibility early in the negotiation process. When establishing your approach or explaining how or why decisions have been made, link your position to known, respected sources in order to garner credibility. Toolbox"},{"q":"An educational institution raises a complaint after placing an order for a software module from a company using agile practices. The complaint claims that billing for payment of a partial delivery violates the Agile Manifesto if the customer was not involved in progress meetings. The customer's claim is supported by which of the Four Values of the Agile Manifesto?","opts":["A.Processes maintaining a constant pace indefinitely","B.Software delivery frequently and in short periods","C.Customer collaboration over contract negotiation","D.Working software as a primary measure of progress"],"correct":["C"],"explanation":"The main violation of the Agile Values was in the lack of collaboration with the customer. The first Agile Value is Individuals and Interactions over processes and tools. Toolbox"},{"q":"During a team meeting, team members asked the project manager to advise them on project dependencies. What should the project manager ask the team to do for internal dependencies?","opts":["A.Become familiar with the latest organizational changes.","B.Read about the merger with a competing organization.","C.Check the changes related to the work-from-home policy.","D.Become familiar with the upgrade of the Internet provider."],"correct":["A"],"explanation":"Only organizational change can impact the team delivery velocity. Merger with a competitor will impact only if there is followed by an organizational change, working from home should not impact the velocity and upgrade to a new internet provider should operate at better parameters,"},{"q":"A project manager for a large government organization decides to save money by changing the local implementation partner, and is considering using offshore resources instead. What are the main risks associated with using offshore resources? (Choose 3).","opts":["A.Offshore resources may need more supervision due to time and cultural differences","B.Offshore resources may not have the same business domain knowledge as the previous vendor","C.Offshore resources may need more effort in planning and managing project budgets","D.Offshore resources may need longer onboarding due to geopolitical differences","E.Offshore resources may need detailed documentation due to time and cultural differences"],"correct":["A","C","D"],"explanation":"Cultural and time differences are offshore specific risks. The budget can be dependent on exchange rate fluctuations and may involve local partners that will increase the overhead. Options B) and E) are not specific to offshore resources. They are risks associated with a vendor change Toolbox"},{"q":"What interpersonal skills do project managers or teams need to monitor stakeholder relationships, evaluate engagement strategies, and modify these approaches as needed?","opts":["A.Active listening, leadership, and cultural and political awareness","B.Coaching, decision-making, and cultural and political awareness","C.Active listening, team building, leadership, and networking","D.Networking, influencing, and cultural awareness"],"correct":["A"],"explanation":"To effectively monitor stakeholder relationships, evaluate engagement strategies, and modify approaches as needed, a project manager or team requires active listening skills to understand stakeholder needs and concerns. Leadership skills are necessary to guide the project and influence stakeholders. Cultural and political awareness helps navigate diverse stakeholder environments, understand different perspectives, and adapt engagement strategies accordingly. Toolbox"},{"q":"During the planning of a project with incremental deliveries, the team realizes that they will need\u00a0specific expertise for one of the deliverables towards the end of the project. What should the project manager do next?","opts":["A.Enroll the team in training so they can be equipped with the needed expertise.","B.Request the availability of the needed resources with\u00a0expertise from the project sponsor.","C.Ask the team members to acquire expertise through self-paced learning.","D.Define and share the work agreement with the team to coordinate activities to acquire expertise."],"correct":["B"],"explanation":"The project manager should request the availability of the needed resources with\u00a0expertise from the project sponsor. The other answer choices are incorrect. Team training and self-paced learning may take too long to ensure team members gain the needed expertise on time for the final deliveries. Defining\u00a0and sharing\u00a0a work agreement with the needed team to coordinate activities effectively does not address the need for specific expertise. Toolbox"},{"q":"What is the difference between risks and issues? (Choose two).","opts":["A.Risks are uncertain and issues are certain.","B.Risks are certain and issues are uncertain.","C.Risks have occurred and issues may not occur.","D.Risks may not occur and an issue has occurred."],"correct":["A","D"],"explanation":"A.Risks are uncertain and issues are certain. D.\u00a0Risks may not occur and an issue has occurred. The correct answer is that risks are uncertain and may not occur, and issues are certain and have occurred.\nA risk is an uncertain event or condition that, if it occurs, has a positive or negative effect on one or more project objectives. \u00a0An issue is a current condition or situation that may have an impact on the project objectives. Toolbox"},{"q":"A long-term agile project has just reached its midway mark and a new project manager is appointed to take over. Additional to the project manager, a current stakeholder was interchanged with another who has more experience regarding the projects\u2019 technology. What next step should the project manager take?","opts":["A.Discuss expectations from the stakeholder and revise the engagement plan accordingly.","B.Encourage the new stakeholder to convene with the product owner to review pertinent information.","C.Notify all stakeholders after revising the project plan with new contents added.","D.Hold all upcoming sprint review meetings with the new stakeholder in attendance and revise the project plan."],"correct":["B"],"explanation":"In agile environment, the product owner must work closely with stakeholders, teams, and customers to define the product direction. The project manager's next steps should be to encourage the new stakeholder to convene and engage with the product owner to review pertinent information. The other answer choices are incorrect. These options do not address the key stakeholder which is the product owner in this case. Toolbox"},{"q":"A lengthy, ongoing project exhausts a project team. Due to deadline issues, the project manager cannot extend the project schedule. What should the project manager do next?","opts":["A.Review the project charter.","B.Provide more recognition to team members.","C.Discuss the situation with the team.","D.Request additional resources."],"correct":["C"],"explanation":"The project manager should discuss the situation with the team. This way, the team knows that their concerns are being heard and that the project manager is willing to work with them to find a solution. Since the project manager cannot extend the project schedule, the team needs to find ways to be more efficient and the team\u00a0may have ideas about how to improve the situation or how to reduce the workload. The other answer choices are incorrect.\u00a0Reviewing the project charter is important, but it is not the most important thing to do at this stage; the team is already exhausted and they need more"},{"q":"A project manager is working on a large business transformation project. All of the build deliverables were signed off and the project manager is managing the transition to BAU (Business as Usual). Which of the following are important operational readiness considerations that the project manager needs to consider? (Choose 2).","opts":["A.A cheat sheet for core functionality is provided and self training is encouraged.","B.Formal training and access to documentation should be provided to all users.","C.Responsibility and accountability are formally handed over to operational teams.","D.The project team remains responsible for operational support during BAU."],"correct":["B","C"],"explanation":"Validate readiness for transition include ensuring that there is a formal hand over of responsibilities to operational teams. The project team is dismantled and resources released after a set warranty. Providing summary documentation and leaving the users on their own can lead to poor benefits realisation Toolbox"},{"q":"A project manager is working on a new compliance project that is different from regular projects as it will involve multinational partners and several government departments. The project will result in the adoption of new standards and procedures. What must the project manager do from the onset?","opts":["A.Ensure that the business requirements are defined and met","B.Ensure solution design is available from the start of the project","C.Ensure execution and handover are done effectively","D.Ensure the interpretation of compliance guidance and validation"],"correct":["D"],"explanation":"Ensure the interpretation of compliance guidance and validation is correct as the government is involved and it will help determine potential threats to compliance. All other options are generic for all projects. Toolbox"},{"q":"A project is being executed. The project's life cycle is defined as predictive; however, a major deliverable will be handed over incrementally to the customer. The assigned resources are experienced and reliable and are willing to make decisions that the project manager used to make after each incremental delivery on other projects. What should the project manager do?","opts":["A.Inform the team that although this is a hybrid environment, the project manager must still be responsible for making decisions.","B.Consult the product owner about letting the resources make decisions.","C.Support the decisions of the team and transfer the decision making responsibility to them.","D.Schedule a steering committee meeting and obtain their approval on the request."],"correct":["C"],"explanation":"The servant leader in an Agile or Hybrid environment must empower the team based on its strengths around a purpose/goal and eliminate organizational impediments for delivering results. Hence this option is the correct answer. The team takes decisions in a hybrid environment and is entirely responsible for the project outcome. Hence this option is incorrect. The Product owner being a part of the team should be involved in the decision making process. Hence there is no need for the Project Manager to explicitly inform the Product owner. Hence this option is incorrect. The steering committee does"},{"q":"A project manager is working on requirement management in a pharmaceutical company. Which improvement is something the project manager's organization should expect as an outcome of the project?","opts":["A.Reduced quality","B.Increased costs","C.Reduced risks","D.Increased schedule"],"correct":["C"],"explanation":"Toolbox"},{"q":"What are the four team-building leadership styles?","opts":["A.Visionary, affiliative, coaching and participative","B.Visionary, affiliative, coaching and pace setting","C.Visionary, affiliative, coaching and directive","D.Visionary, affiliative, coaching and high waters"],"correct":["A"],"explanation":"Visionary, affiliative, coaching and participative are all related to team building leadership styles. Pace setting, directive and high waters are non-team builder leadership styles, focusing more on achievements than relationship. Toolbox"},{"q":"Which of the following steps gives special attention to the group decision making processes?","opts":["A.Problem Definition","B.Problem Solution Generation","C.Ideas to Action","D.Solution Action Planning"],"correct":["C"],"explanation":"Ideas to action occur when project teams need to define the criteria, rate the pros and cons of the alternatives and select the best among them. Particularly, special attention is given to the group decision making processes since most organizational decisions, especially the complex ones, are made by groups rather than individuals. Toolbox"},{"q":"A project team is working on a complex high-priority project. The project manager is informed that there is a superficial disagreement between a project sponsor and a project team member. This conflict could negatively impact the project timeline and must be resolved immediately. The team member desires to maintain a good relationship with the project sponsor and asks the project manager how they should approach the situation.\u00a0\nWhat conflict resolution approach should the project manager suggest?","opts":["A.Collaborating","B.Accommodating","C.Compromising","D.Forcing"],"correct":["B"],"explanation":""},{"q":"A new warehouse facility is under construction. The project manager implements team development efforts such as training that will result in a lower defect ratio. What should the project manager do next?","opts":["A.Introduce a training program.","B.Update the resource management plan.","C.Increase quality control reviews.","D.Add training costs to the budget."],"correct":["B"],"explanation":"PMBoK Sixth Edition Chapter 9 states: \"9.4.2.6 TRAINING Training includes all activities designed to enhance the competencies of the project team members. Training can be formal or informal. Examples of training methods include classroom, online, computer-based, on-the-job training from another project team member, mentoring, and coaching. If project team members lack the necessary management or technical skills, such skills can be developed as part of the project work. Scheduled training takes place as stated in the resource management plan. Unplanned training takes place as a result of obser"},{"q":"A project manager has identified stakeholders for a software development project: the sales team will be the primary users of the new software application; the IT department will be responsible for deploying and maintaining the new software application; and the project sponsor is the executive who is responsible for approving the project and providing funding. The project manager is in the planning phase of the project, and must engage the stakeholders. What is the most important thing for the project manager to do to build shared understanding?","opts":["A.Hold a kick-off meeting with all stakeholders.","B.Create a stakeholder register and communication plan.","C.Identify the stakeholders' needs and expectations.","D.Document the stakeholders' concerns and risks."],"correct":["C"],"explanation":"The most important thing for the project manager to do to build shared understanding is to identify the stakeholders' needs and expectations. This will help the project manager to understand what the stakeholders want from the project and how they will be affected by it. Once the project manager understands the stakeholders' needs and expectations, they can then develop a project plan that meets their needs and minimizes their risks. The other answer choices are incorrect.\u00a0The kick-off meeting is an opportunity to introduce the project to the stakeholders and to get their input, but it is not "},{"q":"At which stage in the Tuckman team development model should the project manager put the most focus on increasing team motivation?","opts":["A.Forming","B.Storming","C.Norming","D.Performing"],"correct":["A"],"explanation":"The earlier a project manager instills motivation during the forming/develop team stage, the team can collaboratively build on the positive foundation. Forming sets the tone for the duration of the project. Storming phase, team members may be busy with their internal conflicts Norming Phase, team members may settle down with their conflicts and busy with their priorities of work Performing phase, the team will perform and deliver the projects. so it is better to put the focus on increasing team motivation at forming phase Toolbox"},{"q":"During a project's initiation phase, the project manager reviews the business case and finds that information is incomplete. What should the project manager do?","opts":["A.Add an information gap to the risk register.","B.Review the project statement of work (SOW) to create the project charter.","C.Revise the business case to narrow the project scope and create the project charter.","D.Review the business case with the sponsoring organization to confirm that the project aligns with business needs."],"correct":["D"],"explanation":"PMBoK Sixth Edition Chapter 2 states: \"INITIATING PROCESS GROUP The Initiating Process Group consists of those processes performed to define a new project or a new phase of an existing project by obtaining authorization to start the project or phase. The purpose of the Initiating Process Group is to align the stakeholders\u2019 expectations and the project purpose, inform stakeholders of the scope and objectives, and discuss how their participation in the project and its associated phases can help to ensure their expectations are met. Within the Initiating processes, the initial scope is defined an"},{"q":"During project execution, a project manager learns that a team member's functional manager wants to remove them from a project because they believe\u00a0they should not execute a certain task due to conflicting priorities. What should the project manager do first?","opts":["A.Check the responsibility assignment matrix (RAM).","B.Check the work breakdown structure (WBS).","C.Check the organizational chart.","D.Check the resource management plan."],"correct":["A"],"explanation":"The project manager should first check the responsibility assignment matrix (RAM). The RAM is a document that identifies who is responsible for each task on the project. By checking the RAM, the project manager can verify that the team member is responsible for the task that the functional manager is concerned about. If the team member is responsible for the task, the project manager should then meet with the functional manager to discuss their concerns. The project manager should explain why the task is important to the project and why the team member is the best person to complete the task. "},{"q":"A project manager is leading an agile project. The product owner complains that the project team is constantly completing fewer story points than the Scrum team working on another project. What should the project manager do to address this issue?","opts":["A.Ask the team to address this issue as part of the retrospective to improve their velocity in the next sprint.","B.Tell the product owner that it is incorrect to compare velocity across teams because story points are specific to each team.","C.Get approval from the product owner to add a contingency buffer to the sprint, and change the duration to increase velocity.","D.Take full responsibility for\u00a0the team\u2019s low performance as compared to the other team and apologize."],"correct":["B"],"explanation":"Story points are a relative measure defined by each Scrum team. Because of that it can't be and should not be used to compare teams. There is no need to add contingency or take any responsibility as it is not at all an issue."},{"q":"A newly-hired project manager is running a project for the first time and is worried about rising tensions. Project team members are arguing during an effort-intensive phase and stakeholders have voiced some doubts about the project's performance. In a discussion with a senior project manager, the new project manager admits that they have a fear of conflict and asks the senior project manager how they perceive conflict. How should the senior project manager respond?","opts":["A.Conflict in projects is inevitable - focus on managing it.","B.Conflict in projects is preventable - replan the mitigation.","C.Conflict in projects is disastrous - prepare a recovery plan.","D.Conflict in projects is healthy - refrain from interfering."],"correct":["A"],"explanation":"Conflict happens on all projects. Fear of conflict can restrict communication and creativity. It is not uncommon to want to avoid conflict, but not all conflict is negative. How conflict is handled can either lead to more conflict or to better decision making and stronger solutions. The others are incorrect because they are not true-to-life descriptions of conflict. Conflict is not always preventable. Certainly, there are times when it is, but there are many instances where conflict cannot be prevented. Conflicts should not be perceived as disastrous. Damage incurred from conflict can be repai"},{"q":"A team member is hosting an event and invites several colleagues through their work calendars. Another team member, who was not invited to the event, is noticeably distracted during several standup meetings. What should the project manager do?","opts":["A.Ask the individual who is hosting the event to mark it as private.","B.Set up a meeting with the distracted team member to discuss any issues.","C.Ask the individual who is hosting the event to use private communication methods.","D.Add a social events section to the charter to handle these situations."],"correct":["B"],"explanation":"Since the team member used work calendars to send the invite, the Project Manager should first check with the team member, the reason for omitting the other team member. The same should be explained to the distracted member in their meeting. This meeting will also enable the Project Manager to check if there is any other issue that is bothering the distracted team member. Hence setting up the meeting with the distracted team member is the correct answer. Marking the invite as private or using private communication methods may not be appropriate, since the team member used work calendars to sen"},{"q":"In an agile development environment, when should a risk analysis be performed?","opts":["A.Before the start of each iteration","B.During the daily standup meeting","C.In the retrospective meeting","D.After every scrum meeting"],"correct":["A"],"explanation":"The correct answer is before the start of each iteration.\nThe initial iteration would occur after an initial risk analysis, and that process should be repeated after every subsequent iteration. It is necessary to analyze new and existing risks to thoroughly understand their potential impact on project outcomes while preparing for each iteration. An iteration planning meeting is used to clarify the details of the backlog items, acceptance criteria, and work effort required to meet an upcoming iteration commitment.\u00a0\nThe other options are incorrect because they are not appropriate times to analyz"},{"q":"A senior manager informs a project manager that the project is not performing as well as other projects. What can the project manager use to improve performance for the next series of iterations?","opts":["A.Retrospective session","B.Backlog analysis","C.Team building","D.Team motivation"],"correct":["A"],"explanation":"A retrospective review checks the progress against the plan and identifies if there are any needed changes, it also helps to manage stakeholder engagement by showing progress made and work to be done. Team building and team motivation are always good, but first the PM and the senior manager needs to understand the progress from the retrospective review. The backlog will only provide activities that can be included in the next iteration. Toolbox"},{"q":"An agile team has been struggling to keep up with the planned pace, which is frequently resulting in sprint failures. What should the project manager do to help avoid this situation in the future?","opts":["A.Ask the project sponsor to approve overtime to compensate for the lack of performance while adjusting the plan.","B.Review the velocity of the team over the last several sprints and adjust the plan accordingly.","C.Replace junior team members with more experienced ones, and negotiate the project scope to compensate for the budget gap.","D.Switch to a Kanban approach to have better control on the planned pace by limiting work in progress."],"correct":["B"],"explanation":"The best indicator of team capacity is the velocity metric and the delivery plan should take that in account prior to any solid commitment Toolbox"},{"q":"A new graduate recently joined a mature agile R&D team. A mentor, assigned to work with the graduate, is overwhelmed by the extra workload. Team performance and motivation are dropping. How can the project manager help with this situation?","opts":["A.Maintain a laissez-faire leadership style with the team, but use a transactional style to give firm guidance to the graduate.","B.Ask the mentor to use a collaborative servant leader approach to perform the usual duties along with the mentor role.","C.Cancel the mentor plan and focus on keeping the graduate motivated by learning through an intensive immersion.","D.Ask three more team members to share the mentor role in order to reduce the individual mentor workload by 75%."],"correct":["A"],"explanation":"The graduate is in need of authoritative and stable guidelines and positive feedback while the team must not lose their autonomy to maintain motivation. Collaborative servant leadership approach is used for increasing team gel and motivation Without mentor it is difficult to learn through an insensitive immersion Asking three team members to share the mentor role is not an effective way Toolbox"},{"q":"A project team decides to document new aspects of a regulation as additional elements in the work breakdown structure (WBS). Which of the following are potential downsides to this approach? (Choose 2).","opts":["A.Traceability improves but requirements will likely remain fragmented.","B.Traceability of requirements becomes more difficult at the project level.","C.Some of these requirements may not be completed as part of the project itself.","D.Regulatory requirements are not necessarily tied to the scope of the project.","E.Splitting the new items takes time and also requires effort to update the WBS."],"correct":["A","C"],"explanation":"Since the regulatory changes are multiple dimensions (technical, legal, organizational, control) that most likely cannot be managed in a single branch of the WBS. Toolbox"},{"q":"A project manager is working with a Scrum team that is continually missing deadlines. The steering committee is concerned about the project as it is not clear that it will deliver the expected value. After some analysis, the project manager discovers there is a mismatch of competencies in one of the teams. What should the project manager do?","opts":["A.Accept the risk of the project missing deadlines due to the mismatch.","B.Provide appropriate training to compensate for the mismatch.","C.Update the project schedule to reflect the delay.","D.Emphasize to the teams the importance of meeting the agreed deadlines."],"correct":["B"],"explanation":"Continuously assess and refresh team skills to meet project needs. In this case providing training will help mitigate the mismatch in knowledge/ skills required. Hence this option is the correct answer. The project manager is expected to take action to mitigate the risk of missing deadlines as the steering committee is concerned about the project. Hence the option of accepting the risk or updating the project schedule to reflect the delay or emphasizing the importance of meeting the deadlines is ruled out. Hence these options are not correct. Toolbox"},{"q":"In an industrial plant, the owner has decided to add more capacity to the plant by installing a new machine and updating the software used in production. This capacity enlargement will occur while the plant is still functioning and producing. The software update will be accomplished using an agile approach in order to minimize risk. The machine procurement, installation, and integration will be accomplished using predictive approaches. What types of communications will the project manager have to design into the schedule management plan to ensure the project will be on schedule?","opts":["A.Weekly colocated meetings with the relevant stakeholders","B.Biweekly written status reports from the relevant stakeholders","C.Weekly one-on-one meetings with each of the relevant stakeholders","D.Biweekly conference calls with the relevant stakeholders"],"correct":["A"],"explanation":"As far as possible, conducting the Colocation meetings are the best form of communications. Hence it is the correct answer. one-on-one meetings are done when the team member has difficulty in expressing any concerns in public to the Project Manager. Hence this option is incorrect. Biweekly written status reports are more of formal communication means and is not the correct answer. Bi-weekly conference calls is not the best means of communication, if there is a facility for collocated meetings. Hence this option is not the preferred choice. Toolbox"},{"q":"A project manager is working on a complex project that has high interest from senior management. There are many stakeholders with competing priorities, which requires significant negotiation skills to overcome rising conflicts. Which two principles should the project manager follow when developing the negotiation strategy? (Choose two).","opts":["A.Separate the people from the problem.","B.Focus on political issues first.","C.Focus on management priorities.","D.Focus on interests, not positions.","E.Delegate the decisions to the team."],"correct":["A","D"],"explanation":"By following the principles of separating the people from the problem and focusing on interests, not positions, the project manager can develop a negotiation strategy that is more likely to be successful in this complex and challenging situation. The project manager\u00a0should focus on the problem at hand, rather than the people involved to avoid personal attacks and keep the negotiations on track. The project manager should also focus on\u00a0the underlying interests of the stakeholders, rather than their stated positions to identify mutually beneficial solutions and reduce conflict. The other answer "},{"q":"An agile project is running its fifth iteration out of 10. After the last retrospective, the team members realize that they had to work extra hours to deliver the committed work. What should the project manager do?","opts":["A.Ask the team to have a lower commitment for the next iteration.","B.Ask for additional team members to maintain the velocity.","C.Conduct a focused retrospective to help the team to discover the root cause.","D.Implement a checkpoint in the iteration to verify if the team is on track."],"correct":["C"],"explanation":"The project manager needs to conduct a focused retrospective to determine the root cause of why the team had to work extra hours to deliver the committed work. The primary objective for the Project Manager or Scrum master is to ensure how to maintain or improve the velocity of the team besides removing impediments for the team. Hence this option is correct Asking the team to have a lower commitment for the next iteration is contradicting the agile development values of incremental value. Hence this option is incorrect. Agile teams are generally fixed in number and additional team members are n"},{"q":"During an important\u00a0project, one of the contractors complains that the approval process is difficult to handle and may delay the project schedule. What should the project manager do first?","opts":["A.Hire additional resources for the team to mitigate this risk.","B.Discuss\u00a0with the team to find options to mitigate the risk.","C.Escalate the risk to upper management as critical for timely delivery.","D.Add the\u00a0risk to the risk register to be monitored and reviewed."],"correct":["D"],"explanation":"The project manager should immediately record the risk in the risk register. After that, the project manager can discuss with the team to determine solutions to mitigate the risk. Hiring additional resources for the team could potentially increase the project cost, and escalating the risk to\u00a0 upper management should be done only after the project manager and team fail\u00a0to find a mitigating solution. This question and rationale were developed in reference to: Toolbox"},{"q":"A large infrastructure organization is reviewing and standardizing project tools and techniques. Regarding the question \u201cWhen should the decision be made to take corrective action?\u201d, which process group can this question come from?","opts":["A.Initiating Process Group","B.Planning Process Group","C.Executing Process Group","D.Monitoring and Controlling Process Group"],"correct":["D"],"explanation":"Corrective actions are taken in Monitoring & Control Process Group Toolbox"},{"q":"An application developer took a story card to work that read \"Customer can pay using credit card\". After the implementation, the functionality was rejected because the application could not accept foreign credit cards. What should the project manager have done to avoid this issue?","opts":["A.Described the user story in more detail.","B.Scheduled the user story for the next iteration.","C.Performed iterative backlog grooming with the team.","D.Gathered more detailed requirement specifications from end users."],"correct":["A"],"explanation":"In order to avoid this situation, the user story should have been made available in detail to capture the requirement for foreign credit card acceptance. The other answer choices are incorrect they would not have helped the project manager avoid the situation, rather they are iterative steps in an agile approach. Toolbox"},{"q":"In two months, there will be a delivery of project machines from a factory. The project team is in the process of performing a follow-up meeting to review the commitments and dependencies regarding these machines. Which actions should the project team take to ensure that the deliveries are properly performed by the factory? (Choose 2).","opts":["A.Ensure that they track and monitor all dependencies and report at regular intervals.","B.Send an email to the research and development factory one week before delivery.","C.Specify exactly when a dependency is required and for how long this requirement holds.","D.Schedule a meeting with the factory regarding how the machine is going to be manufactured.","E.Talk to the factory employees to ascertain if they are qualified to build the machines."],"correct":["A","C"],"explanation":"Review and update your dependencies list throughout the project. Toolbox"},{"q":"A project manager engaged in the delivery of a global project is in the process of recruiting a project team. After the team is formed, what should the project manager do?","opts":["A.Send a welcome email and host a team introductory event with the team members so they get to know each other.","B.Send a project management plan and charter to team members to familiarize them with project goals and procedures.","C.Arrange a meeting for team members to discuss any concerns regarding requirements and project scope.","D.Send the team members a survey to learn more about each member, share the results via email."],"correct":["A"],"explanation":"A project manager should strive to have team members that know each other in order to collaborate more efficiently. By sending a welcome email and hosting a team introductory meeting, the team members will get to know each other first. The other choices are incorrect because they are not the first step in the process."},{"q":"A project manager is working with a team to develop work packages. The project manager noticed a gap in the requirements gathering where important points were missing, which would impact the project timeline. What should the project manager do?","opts":["A.Meet with the project sponsor to discuss canceling the project.","B.Meet with the project sponsor and stakeholders to request a budget increase.","C.Meet with the product manager to create a backlog with the missing requirements.","D.Evaluate the impact, update the risk register, and present it to the stakeholders."],"correct":["C"],"explanation":"Working in a hybrid environment requires team collaboration to define stories and prioritize them. The project manager should work with the product manager to create a backlog for the missing requirements to minimize project timeline delay. The other answer choices are incorrect. Canceling the project will derail all efforts thus far and a budget increase may not be feasible. Toolbox"},{"q":"What tool should a project manager incorporate to better identify and respond to common stakeholder resistance to change challenges?","opts":["A.Change management","B.Risk management","C.Stakeholder management","D.Communication management"],"correct":["A"],"explanation":"Toolbox"},{"q":"A company's project management office (PMO) is incorporating more adaptive technologies and has hired a new project manager with hybrid project management experience. The team is slow in adopting the new methodology and has not been updating project artifacts in a timely manner. Which action should the project manager take to improve the team's performance?","opts":["A.Send an email asking all project team members to complete updates at the end of the day.","B.Set up a training session for all project team members.","C.Reach out to the functional managers for support.","D.Speak individually with each project team member about making the needed updates."],"correct":["B"],"explanation":"Any new team takes time to adapt to new process and methodology. Setting up training session will help the team. Electronically making artifacts available is a variation to traditional war room geographically dispersed team This question and rationale were developed in reference to: Toolbox"},{"q":"Which of the following is a tactic that a project manager can employ to effectively monitor the impact of the risk on the project while monitoring risks?","opts":["A.Risk avoidance","B.Risk escalation","C.Risk acceptance","D.Risk reporting"],"correct":["D"],"explanation":"The correct answer is risk reporting.\nWhile monitoring risks, the risk manager collects project performance data, produces performance measures, and reports and disseminates performance information. A risk report is a project document that is developed progressively throughout the risk management processes and summarizes information on individual project risks and the level of overall project risk.\nThe other options are incorrect because they are risk responses, not tactics for monitoring risks. Risk responses are the agreed-upon response actions that are appropriate for the priority of the in"},{"q":"A project manager is leading a project that is vital to their organization and the local environmental and energy authority. During a team meeting to discuss project risks , the team raised a high risk that an important senior manager is not currently involved with project. What should the project manager do to mitigate this risk?","opts":["A.Implement regular status reporting.","B.Escalate this risk to senior management.","C.Develop a highly detailed project management plan","D.Invite the senior manager to daily project meetings."],"correct":["B"],"explanation":"The project manager should escalate the risk to senior management to ensure that they are aware of the issue and can take steps to address it.\u00a0The senior manager is a key stakeholder who can have a major impact on the project. If they are not involved, it is more likely that the project will fail. The other answer choices are incorrect as they do not mitigate the risk.\u00a0Implementing regular status reporting will keep the senior manager informed of the project's progress, but it will not ensure that they are involved in the project.\u00a0Developing a highly detailed project management plan is importa"},{"q":"A project manager is on a mega industrial project. The project team is distributed throughout six different countries and time zones. During a review meeting, it was noticed that important baselined milestone dates were missed. What is the most likely reason for the missed deadlines?","opts":["A.Lack of buy-in commitment","B.Poor team communication","C.Misunderstanding stakeholder expectations","D.Stakeholders' expectation is set too high"],"correct":["B"],"explanation":"Missing milestone dates is not due to stakeholders, but is directly incumbent on the project team. That makes team communication the most likely culprit. Toolbox"},{"q":"A project team is in the process of identifying the benefits associated with two projects in order to choose the one that will deliver more business value. The task involves analyzing which project best helps the company meet its compliance and regulatory requirements, as well as improve customer satisfaction. Which of the following be
