st describes the category of the benefits being analyzed in this task?","opts":["A.Quantitative benefit","B.Qualitative benefit","C.Quality benefit","D.Real benefit"],"correct":["B"],"explanation":"Qualitative benefits would involve non-numerical inputs and outputs. Customer satisfaction and compliance both represent non-numerical benefits and hence are qualitative in nature. A quantitative benefit would be measured numerically. Quality benefit is the quality of work benefit. Toolbox"},{"q":"A project manager considers compliance to be part of the organization's process assets. The project team, however, has decided to include compliance as inputs to the relevant processes rather than document these rules as requirements. What is the project manager's compliance responsibility?","opts":["A.Acts as coordinator for the resources and activities","B.Conducts audits for the compliance requirement","C.Performs risk analyses of compliance risks","D.Changes process assets of the organization"],"correct":["A"],"explanation":"Since the team has decided to include compliance as inputs, it is assumed that project environment is agile based and so, the best action for the Project Manager is to determine the necessary approach and support the team as coordinator. Hence this choice is the correct answer. In an agile environment, the project manager is a servant leader involved in removing obstacles and impediments for the team, and the team performs all development activities. Hence all other options are incorrect. Toolbox"},{"q":"During project closure, the project manager finds it difficult to obtain successful project completion feedback. Some stakeholders disagree with the project's success criteria and have been frustrated with the project from the beginning. To what should the project manager refer to address these concerns?","opts":["A.Project charter","B.Quality management plan","C.Scope statement","D.Requirements documentation"],"correct":["A"],"explanation":"Project objectives and success criteria should be documented and agreed to in the project charter. Inputs to the project charter also include business documents which would align the project to the business strategy. The quality management plan, scope statement, and requirements documentation would not have the detail to the overall project success criteria."},{"q":"There is a variety of communication styles along a continuum that includes passive at one end \u2013 expressive in the middle \u2013 aggressive at the other end. As a project manager, which is the best style for success in communications with stakeholders","opts":["A.Passive","B.Aggressive","C.Passive-Aggressive","D.Expressive"],"correct":["D"],"explanation":"Toolbox"},{"q":"While working on a project, the project team realizes that recent data center upgrades could impact the project's outcome. Certain modules of the project deliverable are incompatible with the new environment. The team identifies the appropriate steps to address the issue. What is the next step for the project manager?","opts":["A.Request a budget increase.","B.Submit a change request.","C.Change the project schedule.","D.Update the requirements document."],"correct":["B"],"explanation":"PMBoK Sixth Edition Chapter 4 Section 4.3.3.4 and Section 4.3.3.5 states: \"CHANGE REQUESTS A change request is a formal proposal to modify any document, deliverable, or baseline. When issues are found while project work is being performed, change requests can be submitted, which may modify project policies or procedures, project or product scope, project cost or budget, project schedule, or quality of the project or product results. Other change requests cover the needed preventive or corrective actions to forestall negative impact later in the project. Any project stakeholder may request a ch"},{"q":"While developing the stakeholder management plan for a large project, a project manager organizes a workshop to\u00a0identify and assess stakeholder power and influence. Due to time constraints, the workshop can only be one day long. What should the project manager do to achieve\u00a0this goal within the workshop timeframe?","opts":["A.Use a Power-Interest Matrix","B.Use\u00a0Nominal Group Technique","C.Use a Stakeholder Cube Model","D.Use a Pareto Diagram"],"correct":["A"],"explanation":"The Power-Interest Matrix is ideal for the project manager to use in this situation because it allows participants to brainstorm and collectively identify relevant stakeholders. The matrix visually positions stakeholders based on their level of power (ability to influence the project) and interest (level of concern or involvement). The other answer choices are incorrect. The Nominal Group Technique focuses on generating ideas anonymously before the discussion. While it can facilitate initial identification, it lacks the visual assessment and power/interest analysis the matrix offers. The Stake"},{"q":"A project manager is struggling to figure out the performance of the project teams in an agile environment. For the same scope of work, team A has calculated and delivered 100 story points and team B has calculated and delivered 125 story points. Which team is performing better?","opts":["A.Team A as they have calculated fewer story points than team B.","B.Team B as they have calculated more story points than team A.","C.The team that completes the most stories selected from the sprint backlog.","D.The team with the least amount of defects in their deliverables."],"correct":["D"],"explanation":"In an agile environment, the focus is on delivering working software frequently, rather than on completing the most stories or calculating the most story points. Therefore, the team that has delivered the most working software with the fewest defects is considered to be performing better. The other answer choices are incorrect.\u00a0Team A as they have calculated fewer story points than team B: Story points are a measure of the size and complexity of a story, not of its quality. Therefore, the fact that team A has calculated fewer story points does not necessarily mean that they are performing bett"},{"q":"A new project manager is attempting to enable shared leadership within their virtual team. Which of the following options should the project manager avoid?","opts":["A.Respect team members\u2019 competencies","B.Loosen the reins and avoid the \u201cresponsibility trap\u201d","C.Encourage leadership behaviors","D.Maintain a \"natural distance\" with the team"],"correct":["D"],"explanation":"In many companies, team members report a \u201cnatural distance\u201d between the team leader and the team members. Team members feel separated from the team leader, who is often rather seen as management's representative than being a true team member. However, when team leaders interpret themselves as supporting team task accomplishments through their participation in shared leadership, just as any other team member, then team leaders can become more respected and trusted team members themselves. As such, they will be involved in more open communication processes and thus foster the very core purpose o"},{"q":"A project manager is creating a software project's quality management plan. While reviewing lessons learned from past, similar projects, the project manager discovers that rework due to quality issues resulted in cost overruns. What should the project manager do to ensure that quality is addressed throughout the software development life cycle?","opts":["A.Conduct recurring retrospectives to regularly check on the effectiveness of quality processes.","B.Assign a resource to focus solely on the project\u2019s quality.","C.Ensure that quality is tied to performance reviews.","D.Identify new quality policies and procedures for the project."],"correct":["A"],"explanation":"The PM has identified that quality may be a risk in this project, based on lessons learned from past projects. In developing the quality management plan, the PM should ensure that quality checks are done regularly so that the risk is avoided. The responsibility of managing quality would typically require several skill sets that one person may not have. The team should be involved in quality management. Tying quality to performance reviews will not avoid the same quality issues that have happened in the past. The quality management plan should incorporate the organizations quality policies and "},{"q":"A large corporation is transforming itself from a predictive to agile approach. A project team with knowledge of agile practices is experiencing significant conflicts with the executives regarding the processes to be followed. How should these conflicts be resolved?","opts":["A.Negotiate with the executives and agree on a process.","B.Train the executives on agile practices.","C.Include the executives in team retrospectives.","D.Request that the executives use agile practices."],"correct":["B"],"explanation":"Many a times, it is felt that executives know all, but as key stakeholders, they also need to have the Agile mindset and training at the beginning of digital transformation. Hence this option is correct. Negotiating with executives or including them in team retrospectives or requesting the executives to use agile processes can be possible only after the executives are trained on agile processes. Hence all these options are incorrect. This question and rationale were developed in reference to: Choose Your WoW! A Disciplined Agile Delivery H Toolbox"},{"q":"A project manager recently joined a new organization. The project sponsor is a subject matter expert and wants to manage scope by delivering in small increments and changing the scope based on feedback. Which of the following approaches should be the recommended option?","opts":["A.Scrum","B.Waterfall","C.Kanban","D.Predictive"],"correct":["A"],"explanation":"This is the perfect situation for a delivery using Scrum. The sponsor has the authority and knowledge to manage the product backlog and wants the flexibility to change the scope based on feedback on small increments delivered to users, Waterfall and predictive won't be as effective as agile. Kanban is focused on flow and doesn't offer the possibility to change the scope based on feedback. Toolbox"},{"q":"A project manager is working on a complex, political project with many stakeholders having conflicting priorities. Senior management asked the project manager to ensure that there was no \"noise\" regarding the project. During a stakeholder meeting, the project manager asked a series of questions to confirm acceptance for each deliverable before asking for acceptance of the whole project. What did the project manager do to satisfy stakeholders?","opts":["A.Responded to positive actions of the stakeholders to reward actions","B.Acted in a manner that was consistent in the use of words and actions","C.Engaged with stakeholders by cooperating toward mutual goals","D.Acted based on the power authorized by senior management"],"correct":["B"],"explanation":"Law of Commitment and Consistency can be called \u201cGet the other person saying \u2018yes, yes\u2019 immediately.\u201d This occurs when one party asks the other side to make a number of \u201csmall\u201d decisions that lead to only one obvious conclusion: to accept the general concession. The approved project charter formally initiates the project. A project charter may still be used to establish internal agreements within an organization to ensure proper delivery under the contract. The Project Manager has to negotiate project agreements. Project Manager has to persuade the Stakeholders and achieve acceptance. The corr"},{"q":"In the middle of a project incremental delivery, due to a change in the technology, a team member informed the project leader that due to a lack of knowledge in the technology the delivery will be delayed and suggests outsourcing services. What should the project manager do?","opts":["A.Inform the end user of the delay of the specific delivery due to the new technology","B.Search for an outsourcing service with the experience needed","C.Inform the sponsor of the delay and ask for their support and approval","D.Discuss the impact of the new technology with the team and decide action jointly"],"correct":["D"],"explanation":"The project manager is responsible of enabling his team to work as autonomously as possible"},{"q":"A project manager is leading an agile project. For iterations one through five, the team\u2019s velocity chart displays 18 story points, 30 story points, 22 story points, 23 story points, and 22 story points. What does this information demonstrate about the team's performance?","opts":["A.The team is not following agile practices properly.","B.The team's velocity is stabilizing over time.","C.The team is lagging behind as per the schedule.","D.The team needs to change their agile methodology."],"correct":["B"],"explanation":"Toolbox"},{"q":"All quality controls have passed, and a project deliverable is ready to be released to the customer. However, a change request to add new quality criteria has been approved. What should the project manager do first?","opts":["A.Update the project management plan.","B.Stop the release of the deliverable to the customer.","C.Use the new quality criteria for future deliverables.","D.Update the risk register."],"correct":["B"],"explanation":"If a new quality change has been approved after the project deliverable is ready, the deliverable will not meet the new quality requirements and should not be released to the customer. The new quality criteria should be used for all deliverables, not only future ones. The risk register would contain risks associated with quality, however, a quality change has been approved. The question did not state a new quality risk has been identified. Updating the project management plan would require an approved change, which may be the case here, but that is not the first thing the project manager shoul"},{"q":"A project manager has noticed apparent interpersonal conflict between some team members during the initiation of a project. When should the project manager address this problem?","opts":["A.At the earliest time possible to prevent the conflict from escalating later in the project","B.Prior to every meeting by reminding the project team to be respectful with each other","C.Directly after an outburst or dispute between members to determine which member is right","D.At the end of the project to let the conflict de-escalate and record it in the lessons learned"],"correct":["A"],"explanation":"Project Managers must initiate conflict management early and proactively to mitigate against escalation."},{"q":"During the weekly meeting, team members are reviewing the tasks assigned by the Project Manager. A few team members are complaining that there is not enough information to estimate how long it will take to complete the work. What is the most likely cause for this issue?","opts":["A.Project objectives are not clearly defined","B.The business environment is very dynamic","C.Internal competition between team members","D.Roles & Responsibilities are not clearly defined"],"correct":["A"],"explanation":"If the project objectives are not clearly defined then the team members may complain about not having enough information for the estimation Dynamic business environments and internal competition between team members can even have impacts on project delivery. roles and responsibilities not clearly defined is incorrect because the problem is the lack of clarity on scope not on task allocation Toolbox"},{"q":"A team has been working for two months and has consistently missed planned user stories. How should the project manager address this issue?","opts":["A.Promote changing the iteration duration in order to commit as planned.","B.Ensure the sprint size is appropriate for the iteration duration.","C.Engage in recruiting a highly skilled resource to reinforce the skills.","D.Consider using a reward system to encourage timely delivery."],"correct":["B"],"explanation":"As the team has not yet improved in their estimates, one possible way is to split user stories to help in estimating work and also in what the team can commit to. Hence ensuring the sprint size is appropriate for the iteration duration is the correct choice. In agile projects, the duration for each iteration is timeboxed and hence it is recommended not to change the iteration duration .Hence this is an incorrect answer. Engaging in recruiting a highly skilled resource or considering using a reward system is not applicable as the issue is not related to lack of motivation or skills. Hence these"},{"q":"An approved project charter stated that an agile approach must be used. During a lessons learned session, the client indicates that the team was unable to provide reliable cost estimates for the project, and that more time should be allocated to define the scope during the first iteration. What lesson should be captured in the lessons learned repository?","opts":["A.The client should be exposed to the agile approach in advance to understand the cost estimating process.","B.The agile approach should not be used if the client requires reliable cost estimates.","C.During the first iteration of a project, time should be allocated to define the scope and ensure that reliable cost estimates are performed.","D.Client communications should be included in the daily standups."],"correct":["A"],"explanation":"Agile environments are subject to high degrees of uncertainty and frequent changes. Only high level cost estimates are needed and they will be adjust with each iteration. The agile approach should be used if it is specified in the charter. Costs and scope changes should be managed with each iteration to comply with the overall project budget. Daily standup are short meetings to review status of tasks and performance of the project. Client communications should not be part of the daily standups. Toolbox"},{"q":"A project manager works for a global company and understands the importance of the requirement management plan. When should the requirement management plan be implemented?","opts":["A.At the start of the project","B.Prior to executing","C.After customer contract signature","D.During the planning phase"],"correct":["A"],"explanation":"The requirements management plan should be implemented at the start of the project not in the planning phase or prior to executing or after customer contract signature Toolbox"},{"q":"An experienced project manager is managing a multi-million dollar agile project. The project manager communicates the ground rules to the team, but after 12 iterations, the project manager starts noticing that some team members are not following the ground rules. What should the project manager do first to ensure team adherence to the ground rules?","opts":["A.Contact human resources to request a written warning letter be sent to team members not following the ground rules.","B.Ask the functional manager to replace team members not following the ground rules.","C.Schedule a meeting with the project team to reinforce the ground rules.","D.Notify the project sponsor about this behavior and ask the sponsor to take disciplinary action."],"correct":["C"],"explanation":"The PM should rectify the ground rules to the team. As an Agile PM, the PM should be a servant leader and therefore facilitate the information to the team and on this case, educate the team again on the ground rules before doing any escalation It is not the job of human resources, functional manager or project sponsor to enforce ground rules to the team Toolbox"},{"q":"A project team recently experienced delays due to noncompliance which have made the project schedule less flexible and increased risk to cost and poor quality. The team is brainstorming about ways to avoid this in future. What is most far-reaching implication for the organization if this noncompliance is not resolved?","opts":["A.Business survival and continuity","B.Unhappy clients or end users","C.Slower response to system","D.Fines and penalties"],"correct":["A"],"explanation":"Business survival and continuity is correct as it is the more far reaching implication, other options are incorrect as these implications are short lived. Toolbox"},{"q":"A project manager is managing a hybrid project. A stakeholder has directly contacted a team member and has requested a change. Due to the request, the team member was distracted from their work, which caused a loss in productivity. What should the team member do?","opts":["A.Inform the stakeholder that the correct procedure for new requirements is to provide it directly to the project manager.","B.Inform the stakeholder that the correct procedure for new requirements is to provide it directly to the change control board (CCB).","C.Inform the scrum master regarding the stakeholder's request for a change and the impact this has had on productivity.","D.Inform the scrum master so that the change can be discussed directly with the stakeholder."],"correct":["C"],"explanation":"The team member approaching the Scrum Master is the correct choice, as it is the role of the Scrum Master to make sure that any obstacles and impediments are removed from the team. The Scrum Master should now make sure there is no further loss of productivity to the team through any means in the future. The Scrum Master does not have the authority to discuss the change directly with the stakeholder in Agile Projects. It is the team that is responsible for requirements. Hence this option is not correct. The team member should not be involved in advising the stakeholder on any kind of process re"},{"q":"A team lead is assigned to an ongoing project. The team members have been working together for a while. How should the team lead start building relationships?","opts":["A.Distribute tasks and observe the quality of the deliverables.","B.Talk about personal preferences and make sure the team understands your approach.","C.Ask some team members to share information about other members to become familiar with the team.","D.Ask the team members directly about both personal and work-related matters."],"correct":["D"],"explanation":"The indicated approach to build relationship and trust is showing you are interested on the other party."},{"q":"A project manager's team has identified the lack of proper knowledge transfer expectations in the project. Which of the obstacles does not apply in this situation?","opts":["A.A systematic review of the completed project","B.Personally handled failures and mistakes","C.Insufficient individual motivation to document the lessons learned","D.Sparse leadership involvement to promote knowledge transfer"],"correct":["A"],"explanation":"Any review is a knowledge transfer exercise. Toolbox"},{"q":"During a project steering committee meeting, the project manager reports that a formerly supportive key team member has become resistant to and negative about changes. Where should this information be captured?","opts":["A.Responsible, accountable, consult, and inform (RACI) matrix","B.Stakeholders engagement assessment matrix","C.Risk register and issue log","D.Work performance reports"],"correct":["B"],"explanation":"The stakeholder management plan identifies the strategies and actions required to promote productive involvement of stakeholders in decision making and execution. Documenting this detail in an assessment matrix provides for a ready reference to needed detail. A RACI matrix defines the specific roles of individuals, however does not elaborate beyond that. The Risk Register is used to document the risk, including the probability and impact, however is not the means to document specifics of the individual thoughts of team members. . Work performance reports relate to the work itself, not the thou"},{"q":"A\u00a0product team is using a prototyping approach to deliver a multiyear business initiative. The project manager notices that a few user stories are taking longer to be delivered. What should the project manager do?","opts":["A.Review the project timeline and reallocate resources.","B.Conduct a retrospective with the team to identify bottlenecks.","C.Escalate the issue to senior management for intervention.","D.Modify the project scope to remove the delayed user stories."],"correct":["B"],"explanation":"The project manager should lead a retrospective meeting to empower the project team to identify bottlenecks and threats to performance and to suggest changes to improve efficiency. The other options are not as effective. Reviewing the project timeline and reallocating resources doesn't address the underlying issues causing the delays and should only be considered after the team has identified the specific issues. Escalating the issue to senior management is not advisable at this stage, and the team should strive to resolve issues on their own before considering escalation. Modifying the projec"},{"q":"A project manager is managing an agile project. A new team member, who has never worked in an agile team, joins the project. The new member asks the project manager to explain why an agile approach is used. What should\u00a0the project manager's response be?","opts":["A.To eliminate the risk and increase the predictability and visibility","B.To deliver value faster and change the scope based on feedback","C.To reduce the costs and increase the quality of the end deliverables","D.To eliminate the need for documentation by delivering working products"],"correct":["B"],"explanation":"Agile doesn't reduce costs due to iterative delivery but will deliver business value by delivering faster what the business needs. Agile doesn't reduce risk even increasing the positive risk (opportunities) and doesn't exclude documentation. Toolbox"},{"q":"A project is being audited to ensure compliance with organizational policies. What process is being conducted?","opts":["A.Audit Schedule","B.Plan Quality Management","C.Control Quality","D.Manage Quality"],"correct":["D"],"explanation":"PMBoK Sixth Edition Chapter 8 Section 8.2 states: \"Manage Quality is the process of translating the quality management plan into executable quality activities that incorporate the organization's quality policies into the project. The key benefits of this process are that it increases the probability of meeting the quality objectives as well as identifying ineffective processes and causes of poor quality. Manage Quality uses the data and results from the control quality process to reflect the overall quality status of the project to the stakeholders. This process is performed throughout the pro"},{"q":"A project manager is assessing two investment opportunities. Project A is expected to generate cash flows of $100,000 per year for five years, with an initial investment of $350,000. Project B is expected to generate cash flows of $80,000 per year for five years, with an initial investment of $250,000. The company's required rate of return is 10%. What is the Net Present Value (NPV) for each project, and which one should the project manager recommend?","opts":["A.The NPV for Project A is -$21,462.75, and for Project B is -$14,850.30. The project manager should recommend Project B because it has a lower NPV.","B.The NPV for Project A is $21,462.75, and for Project B is $14,850.30. The project manager should recommend neither project as their NPVs are similar.","C.The NPV for Project A is -$21,462.75, and for Project B is -$14,850.30. The project manager should recommend neither project as both have negative NPVs.","D.The NPV for Project A is $21,462.75, and for Project B is $14,850.30. The project manager should recommend Project A because it has a higher NPV."],"correct":["D"],"explanation":"NPV represents the net value generated by a project after considering the initial investment and the present value of future cash flows. In this case, Project A has a positive NPV ($21,462.75), indicating that it generates a net positive value after accounting for the initial investment. Project B also has a positive NPV ($14,850.30), but it is lower than Project A's NPV. Generally, when comparing investment opportunities, a project manager should recommend the one with the higher NPV because it generates more value for the company, assuming all other factors are equal. Project A has a higher "},{"q":"A project manager in an organization is considering implementing an agile project delivery. The organization has a strong project management office (PMO) and a well-defined change control process. What key aspect of agile project delivery should the project manager emphasize as the most compelling argument for its adoption?","opts":["A.Agile delivery can improve quality through incremental delivery and efficient defect repair.","B.Agile teams offer flexibility in accommodating planned changes while streamlining the approval process.","C.The product owner utilizes a list known as the backlog to prioritize work items, including planned changes.","D.Agile delivery is well-suited for handling unforeseen changes and shifting business expectations."],"correct":["D"],"explanation":"The strength of agile in handling unforeseen changes and shifting business expectations is a compelling argument for its adoption, especially in an organization with a strong PMO and a well-defined change control process. The other options are incorrect because they are not the most compelling arguments for its adoption in an organization with a strong PMO and a well-defined change control process. Improving quality and addressing defects may not be as compelling in an organization with a strong PMO and well-defined change control process. Such an organization likely already has quality assura"},{"q":"A project team uses the Internal Rate of Return (IRR) occasionally to select the project projected to be most beneficial to the company. On one such occasion the IRR figures for the four projects were: Project A = 5%, Project B = 0%, Project C = 3% , Project D = 10%. Which of these projects should be selected based on these IRR figures provided?","opts":["A.Project A","B.Project B","C.Project C","D.Project D"],"correct":["D"],"explanation":"The project with an IRR of 10% should be chosen. 10% is the highest value of the presented options, signifying the greatest potential return. Toolbox"},{"q":"A project manager is in a successful automotive company with high quality standards. The project manager needs to ensure that they create a high-quality WBS. Which of the following is not a key characteristic of a high quality WBS?","opts":["A.Deliverable oriented","B.Hierarchical","C.The 100% rule","D.Customer focused"],"correct":["D"],"explanation":"WBS is used by the project team only and is not usually a deliverable to the customer. PMBoK Sixth Edition Chapter 3 states: \"3.5 CREATE WBS Create Work Breakdown Structure (WBS) is the process of subdividing project deliverables and project work into smaller, more manageable components. The key benefit of this process is that it provides a framework of what has to be delivered. This process is performed once or at predefined points in the project. The needs of the project determine which components of the project management plan and which project documents are necessary\" WBS is an internal do"},{"q":"A company has an existing contract to maintain and enhance a client's customer database. The company's legal department informs the project manager that a new piece of legislation requiring stricter protection of customer information might soon be signed into law. The law will require additional security features to be implemented into the database the project manager is maintaining. These features are not included in the scope of the current contract. What should the project manager do?","opts":["A.Seek the project sponsor's support to influence the client to amend the contract immediately.","B.Ask the legal department to raise the issue in the next contract negotiation with the customer.","C.Update the risk register with the issue and plan risk response with the project sponsor and client.","D.Wait until the legal requirements are finalized so the change in scope can be concretely defined."],"correct":["C"],"explanation":"Updating the risk register and discussing risk response plans is the correct answer because it is the most proactive and comprehensive approach to addressing the issue. By updating the risk register, the project manager is ensuring that the issue is documented and tracked, and by planning risk response with the project sponsor and client, the project manager involves the key stakeholders in developing a plan to mitigate the risk. The other options are incorrect. While it is important to involve the project sponsor in addressing contract-related issues, attempting to influence the client to ame"},{"q":"A project team has identified a number of defects with some deliverables and intends to resolve these as soon as possible. The project manager will need to submit a change request to the change control board (CCB). What\u00a0should the project manager do\u00a0before the request is\u00a0submitted?","opts":["A.Implement the\u00a0changes immediately due to time constraints.","B.Send the change request to the client for approval.","C.Complete an impact analysis of each requested change.","D.Send the change requests\u00a0to\u00a0the sponsor for approval."],"correct":["C"],"explanation":"The project manager should complete an impact analysis of each requested change before submitting the change request to the CCB.\u00a0The project manager needs to understand and communicate the impact of the changes on the project. The other answer choices are incorrect.\u00a0The project manager needs to understand the impact of the changes before seeking approval and implementing them. Toolbox"},{"q":"A project manager is working on a complex project that has a very high environmental impact. The project was approved by the organization's PMO and is now in the planning phase. The project sponsor provided the project manager with a list of all project stakeholders. What will be the next activity in the Stakeholder Management Plan?","opts":["A.Analyze","B.Monitor","C.Engage","D.Identify"],"correct":["A"],"explanation":"In the planning, execution, and monitoring stages, continuous evaluation and \"analysis\" of both external and internal stakeholders. The Sponsor provided a list of all stakeholders therefore \"Identify\" is incorrect. Before \"Engaging\" and \"Monitoring\" Stakeholders, the Project Manager must perform a stakeholder analysis to understand their influence and impact on the project. Toolbox"},{"q":"The steering committee has asked a project manager experienced in agile to provide an indication of the time remaining on a medium-sized project. What tools can be used to provide this information?","opts":["A.Analysis of the business requirements document","B.A release burndown chart","C.Story points for the remaining user stories","D.Surrogate measurements"],"correct":["B"],"explanation":"The project manager will need to understand and apply which tools are suitable for certain tasks. Release burndown chart tool provide an indication of the time remaining of the project. Toolbox"},{"q":"A project team just completed an environmental scan and have uncovered a lot of related hindrances that could potentially affect the project delivery negatively. The project manager is working with the team to understand the details of each identified hindrance and how the hindrances relate to each other, in order to understand the overall complexity of the project. This will enable the team to arrive at a plan that addresses the challenges identified. Which of the following techniques has the project manager used in this instance?","opts":["A.Pareto analysis","B.Critical analysis","C.Systems thinking","D.Total quality management"],"correct":["C"],"explanation":"The Project manager by looking at the connections between the different hindrances to have a full understanding of the picture used system thinking Total quality management (TQM) is the continual process of detecting and reducing or eliminating errors in manufacturing, streamlining supply chain management, improving the customer experience, and ensuring that employees are up to speed with training. The Pareto Principle states that 80 percent of a project's benefit comes from 20 percent of the work. Or, conversely, that 80 percent of problems can be traced back to 20 percent of causes. Pareto A"},{"q":"Some team members assigned to a new technology project expressed their lack of knowledge about the technology and the challenges they will face during implementation. What should the project manager do?","opts":["A.Due to the project due dates, replace the members with more knowledgeable staff.","B.Ask the team members to do some research and self-learning efforts about the technology.","C.Reallocate the members to work on and complete different tasks for which they have experience.","D.Reassure the team members that a training path is in place to learn the new technology."],"correct":["D"],"explanation":"The project manager is responsible of providing opportunities to hone the skills and knowledge of the team members to increase the mastery of the team performance. Replacing the members with more knowledgeable staff will take time for recruiting and forming the team as well even though asking team members to self learning may be helpful that is not that effective us instructor lead training Reallocate the members to work on the tasks for which they have experience is not going to help us to implement the project successfully"},{"q":"A project team recently completed a long-term project using a predictive approach. The team then started a new project with the same project manager, but now they are using an agile approach. After the initial sprint, the team waits for the project manager to make decisions on behalf of the team, as has been done in previous projects. What should the project manager do?","opts":["A.Ask the product owner to make decisions for the team.","B.Give continuous positive feedback to all team members.","C.Remind the team that they are using an agile approach.","D.Coach the team to guide and support their own decisions."],"correct":["D"],"explanation":"The project manager should recognize that the team is accustomed to working a certain way, and may have trouble adjusting to the new methodology right away. Using agile methods requires more of a servant leadership style and may have self-managing project teams. Coaching is a key role for a project leader in an agile approach. The project manager should coach the team to guide and support their own decisions and change the predictive way of working. Successful leadership enables someone to influence, motivate, direct, and coach people under any condition. Project team members who feel empowere"},{"q":"An impact assessment reveals that a deliverable could be delayed by two weeks. A key resource has not been available to work on a non-critical activity due to other priorities. This could cause work overload on the other remaining resources. Since cost is a major constraint for this project, what should the project manager do immediately?","opts":["A.Determine if the task has available float to meet the project end date.","B.Hire a temporary resource to do the job.","C.Consult the team and reduce the scope.","D.Change the resource calendar to avoid major delays."],"correct":["A"],"explanation":"If costs is a major constraint, the PM should not immediately hire additional resources. The first thing to do is to understand the impact to the schedule. If the activity does not fall on the critical path, there may be some float so that if the activity start is delayed, it may not delay the entire project. This should be understood before the resource calendar is changed. A reduction in the scope would require an approved change request. Toolbox"},{"q":"A project manager is leading a project with 34 team members from six countries. The scope of the project is to modernize a process used for almost 40 years in the organization. What criteria should the project manager consider while developing the communication plan? (Choose 3).","opts":["A.Personal diversity","B.Age diversity","C.Cultural diversity","D.Skill diversity"],"correct":["A","C","D"],"explanation":"The project team members are from six different countries, so it is important to consider the different cultures that may impact communication. For example, some cultures may prefer more formal communication, while others may prefer more informal communication. It is also important to consider the different personal preferences of the team members. For example, some people may prefer to communicate via email, while others may prefer to communicate in person. Finally, it is important to consider the different levels of skills and proficiency in the tasks required. The project manager needs to m"},{"q":"A project manager has engaged the sponsor and discussed concerns regarding noncompliance. The project manager understands that this could be a potential audit situation. What should the project manager do?","opts":["A.Do nothing and continue to work as before, assuming there will be an audit.","B.Disengage the noncompliant department, as this is problematic.","C.Disclose the source of the problem to the auditors and let them decide.","D.Gain the commitment and approval from leadership on noncompliance."],"correct":["C"],"explanation":"The correct answer is to disclose the source of the problem to the auditors and let them decide because it demonstrates transparency and adherence to ethical practices. By reporting the noncompliance issue to the auditors, the project manager ensures that appropriate actions can be taken to address the situation. The other answer choices are incorrect for the following reasons: \"Do nothing and continue to work as before since they will be an audit\" is incorrect because it ignores the importance of addressing noncompliance and risks potential consequences for the project and organization. \"Dise"},{"q":"A customer's requested design change is approved by the change control board (CCB). The project manager then discovers that the change will cause a three-month project delay. What should the project manager have done to avoid this?","opts":["A.Increased the authorized budget, and requested additional resources","B.Redefined the project scope to include the new design","C.Fast tracked and crashed the schedule","D.Thoroughly assessed the request in accordance with the risk management plan"],"correct":["D"],"explanation":"PMBoK Sixth Edition Chapter 4 and 11 state: \"Risk management plan. Described in Section 11.1.3.1. The risk management plan provides information on risk-related roles and responsibilities, indicates how risk management activities are included in the budget and schedule, and describes categories of risk, which may be expressed as a risk breakdown structure, 4.6.2.5 MEETINGS Change control meetings are held with a change control board (CCB) that is responsible for meeting and reviewing the change requests and approving, rejecting, or deferring change requests. Most changes will have some sort of "},{"q":"A company is considering adopting the agile methodology for future projects. The project manager is leading a discussion focused on the benefits associated with the agile methodology. Which of the following points should the project manager highlight?","opts":["A.Transparency is central, early and reliable delivery, methodology embraces change","B.Product based method, divides projects into valuable phases, focuses on business justification","C.Clear documentation exist, single point of responsibility, effective collaboration","D.No overtime if possible, face-to-face contact and constantly looking back to move forward"],"correct":["A"],"explanation":"Transparency in central, early and reliable delivery, methodology embraces the change represent three core elements of agile methodology. Agile focusses on customer collaboration over contract negotiation working software over comprehensive documentation and individual interaction over process and tools Toolbox"},{"q":"A project team is working on determining the dependencies for activities for an ongoing project. What action should the project team take first to manage dependencies successfully?","opts":["A.Monitor and track the dependencies.","B.Communicate the dependencies to the sponsor.","C.Assess and document the dependencies.","D.Appoint project schedulers for all tasks."],"correct":["C"],"explanation":"Assess and document the dependencies is the correct answer as the project team reviews and updates the activities' dependencies list throughout the project. Monitor and track the dependencies and Communicate the dependencies to the sponsor. are incorrect as these are later activities after determining the dependencies first. Appoint project schedulers for all tasks is incorrect as this is a project team task in question Toolbox"},{"q":"A project team has successfully completed a project. The same team and three\u00a0new people start another project led by a new scrum master. How will the new scrum master lead?","opts":["A.High directive, high supportive","B.Low directive, high supportive","C.High directive, low supportive","D.Low directive, low supportive"],"correct":["B"],"explanation":"The new scrum master should adopt a low directive, high supportive,\u00a0servant leadership style. In this scenario, the project team has already successfully completed a project and has a strong understanding of the client's business domain. The team members are experienced and capable, and they require less direction and guidance. By adopting a low directive approach, the new scrum master can empower the team, encourage their autonomy, and allow them to apply their expertise. However, the new scrum master should provide high supportive behavior to build trust, facilitate communication, and provid"},{"q":"A project manager is helping an organization transition from traditional methods to agile. The infrastructure, data warehousing, and enterprise architecture teams operate very differently than the application development teams.\nHow should the project manager implement agile in this organization?","opts":["A.Ask every team in the organization to implement the same agile methodology so that a one-size-fits-all solution can provide consistency across all teams.","B.Tailor the implementation by deliberately adapting the approach to make it more suitable for the given environment and work at hand.","C.Force the top-down transition approach by asking the CEO to provide support for implementing agile in every team in the organization.","D.Ask one team to implement scrum as a pilot so that all other teams in the organization can also implement scrum by learning from this team."],"correct":["B"],"explanation":"The other options are incorrect because they do not recognize the fundamental differences between the departments and teams across the organization. It could be counterproductive to force change and/or\u00a0force teams to work within a one-size-fits-all framework and it does not address the issue at hand. Asking one team to implement scrum as a pilot does not address the lingering issues that may inhibit team functionality if the approach is not tailored appropriately. These incorrect options are also ineffective ways to bring about organizational change. Change management should be a comprehensive"},{"q":"A customer requires knowing exactly the state of a product, the overall project, and the next steps planned for the next month each month. How should the project manager communicate with this customer?","opts":["A.Send a weekly status email, including a complete assessment of earned value.","B.Generate a monthly status report and include technical issues as an attachment.","C.Have a monthly call with the customer\u00a0to summarize what happened recently and give a general review of the product.","D.Present the project progress in monthly increments with a formal validation and comprehensive understanding of the status."],"correct":["D"],"explanation":"The best way for the project manager to communicate the required information with the customer is to present the project progress in monthly increments with a formal validation and comprehensive understanding of the status. This will ensure optimum stakeholder engagement. The other answer choices are incorrect as they are not the best way to get validation and engagement from key stakeholders. A complete assessment of earned value does not address all requirements; the customer may not be interested in technical issues; calling the customer once a month implies disengagement with the customer."},{"q":"During a complex project,\u00a0a\u00a0stakeholder informs the\u00a0project manager about a requirement and proposes to call a meeting to inform team members mid-sprint. What should the project manager do first?","opts":["A.Schedule a meeting with the stakeholder and a team member.","B.Ask the stakeholder to\u00a0explain and implement the requirements immediately.","C.Host a meeting with all team members to discuss the requirements.","D.Request the product owner add to the product backlog to be treated in the next iteration."],"correct":["D"],"explanation":"While acknowledging the stakeholder's input is crucial, during a sprint, maintaining team focus and minimizing disruptions is important for achieving sprint goals. Thus, the project manager should request that the product owner add the requirement to the backlog for later evaluation and prioritization. The other answer choices are incorrect because calling meetings or implementing changes mid-sprint can disrupt team focus and potentially derail the sprint goal. Toolbox"},{"q":"A pharmaceutical project in the initiation phase is likely to be impacted by new market regulations. Which stakeholder categories should the project manager assign to the relevant regulatory body?","opts":["A.External with high power/influence","B.Internal with high power/influence","C.Internal with antagonist/resistant support level","D.External with antagonist/resistant support level"],"correct":["A"],"explanation":"External with high power/influence is the right choice for the given context. A regulatory body is an external organization which could have high impact on a project even if they are not directly involved. The project is likely to be affected by external market regulations. So, the Rest of the options \"Internal with high power/influence\", \"Internal with antagonist/resistant support level\" and \"External with antagonist/resistant support level\" are obviously not right choices Toolbox"},{"q":"A project manager was just given a new project to handle. She is working on the project documents and, after reading the Project Charter, is compiling the risks as she sees them. Once she completes the list, when should it be reviewed?","opts":["A.When starting the project and as each risk is closed.","B.While organizing, preparing, and carrying out the work.","C.During weekly meetings as new risks are identified and added.","D.Regularly and throughout the project."],"correct":["D"],"explanation":"Identify Risks is the process of identifying individual project risks as well as sources of overall project risk, and documenting their characteristics. The key benefit of this process is the documentation of the existing individual project risks and the sources of overall project risk. It also brings together information so the project team can to respond appropriately to the identified risks. This process is performed throughout the project."},{"q":"An operational support project is running smoothly, but a customer consistently complains about a lack of visibility into the quality of the support work. How should the project manager address this customer concern?","opts":["A.Prepare relevant reports, send them to the customer daily, and publish them in a shared folder for future review.","B.Request the customer to appoint a manager from their area to review day-to-day activities and agreements reached during all discussions.","C.Plan a recurring governance meeting with the customer to present progress and publish data in a shared folder for future review.","D.Inform the customer that every day after the most important discussions occur,\u00a0one team member will oversee updating them."],"correct":["C"],"explanation":"By implementing a recurring governance meeting, the project manager establishes a proactive and collaborative approach to addressing the customer's concerns, fostering a stronger relationship, and ensuring project success. This demonstrates effective communication skills, customer focus, and commitment to continuous improvement. The other answer choices are not as effective. While providing daily reports can be informative, it might overwhelm the customer and lack the interactive element of a meeting. Requesting a customer manager for day-to-day oversight places an unnecessary burden on the cu"},{"q":"A project manager is assigned to a project that is already in progress because the original project manager left the organization unexpectedly. Unfortunately, the previous project manager did not adhere to the organization's knowledge transfer procedures prior to leaving the organization. What can the new project manager do to fill the knowledge gaps? (Choose 3)","opts":["A.Review the project documentation, including the project plan, requirements document, and risk register.","B.Proceed with the project as planned and engage in job shadowing activities.","C.Meet with key stakeholders to understand their expectations and priorities.","D.Interview team members to learn about their areas of expertise and experience with the project.","E.Reach out to the previous project manager and request a comprehensive knowledge transfer."],"correct":["A","C","D"],"explanation":"Review the project documentation, including the project plan, requirements document, and risk register. Meet with key stakeholders to understand their expectations and priorities. Interview team members to learn about their areas of expertise and experience with the project. All three correct options are practical and effective ways for a new project manager to fill knowledge gaps when the previous project manager has not adhered to knowledge transfer procedures. Reviewing project documentation can provide insights into the project's history, goals, scope, and potential risks. It helps the new"},{"q":"A project team has been tasked to build a new product. The team builds the demo first and add features to the initial product. This is an example of what technical practice?","opts":["A.Test-Driven Development (TDD)","B.Continuous Delivery","C.Behavior-Driven Development","D.Spikes"],"correct":["B"],"explanation":"Continous delivery technique allow the team to create a demo and continously make improvements until the product is complete and the client is satisfied. Toolbox"},{"q":"A project manager wants to establish an incentive and rewards strategy for the project team. What approach should be taken?","opts":["A.Ask Human Resources department which incentives should be provided.","B.Check on budget availability in order to determine specific reward amounts.","C.Provide an opportunity for publicly presenting the outcomes.","D.Identify the specific needs for each team member to determine incentives."],"correct":["D"],"explanation":"Not all rewards are money based. We need to understand individual preferences when recognizing and motivating. Toolbox"},{"q":"A new project has high uncertainty in the cost required for completion. What approach should the project manager use to determine the expected costs?","opts":["A.Analogous estimating","B.Statistical techniques estimating","C.Parametric estimating","D.Three-point estimating"],"correct":["D"],"explanation":"Three-point estimating uses the most likely, optimistic, and pessimistic estimates, which improves estimate accuracy for a project with high uncertainty. Analogous estimating uses values from a previous similar project. Since this project has a high level of uncertainty, it can be assumed there is no similar project to compare. Parametric estimating uses a statistical relationship with historical data and is often used in construction. Other statistical techniques are not the best approach for a project with a high level of uncertainty. Toolbox"},{"q":"An executive stakeholder has crucial decision power on the execution and success of a project. How should this stakeholder's importance be reflected in the stakeholder engagement plan?","opts":["A.Describe the executive's support level, expectations, risk threshold, and appropriate communications for various project needs.","B.Rank the executive in an organizational chart and illustrate any affinities or hostilities with other stakeholders.","C.Label the executive as \"supportive\" and ensure that email, phone numbers, and absence/vacation times are up to date.","D.Describe the executive's involvement in similar past projects in order to decide the appropriate engagement level on a case-by-case basis."],"correct":["A"],"explanation":"The stakeholders should be ranked by power/interest and support level. Expectations and risk threshold information also help determine an individual engagement strategy for various project situations. Ranking the executive in an organizational chart is not going to help you\u00a0here label the executive as \"supportive\" and ensure that email and phone numbers are up to date and are already covered in communications for various project needs Toolbox"},{"q":"A project vendor has informed a project manager that an outsourced project deliverable will be available 6 months later than the agreed project schedule. The vendor stated that they are focusing on other project deliverables with priority dependencies, and this particular deliverable had no stated dependencies. What should the project manager do to avoid schedule delays in future?","opts":["A.Monitor the dependencies and respond to challenges.","B.Ensure that all new dependencies are finish to start","C.Specify any dependencies if they exist.","D.Conduct a meeting to inform the customer."],"correct":["C"],"explanation":"Review and update your dependencies list throughout the project. Toolbox"},{"q":"Project managers must be able to identify flaws that cause errors in decision making. Which option would help a project manager make optimal decisions?","opts":["A.Utilizing biases","B.Using false assumptions","C.Checking with others","D.Applying logical errors"],"correct":["C"],"explanation":"To ensure we make rational, unbiased decisions, critical decision-making requires us to check with others. Using false assumptions and applying logical errors will lead to wrong decisions Toolbox"},{"q":"The project team members are dispersed across different countries. Suddenly, travel restrictions do not allow team members to collocate. When analyzing project risks, which risk analysis tools should the project manager use? (Choose two).","opts":["A.Risk checklist","B.Context diagram","C.Meetings","D.Data representation","E.Diagramming techniques"],"correct":["A","E"],"explanation":"Toolbox"},{"q":"During a group activity to identify an input to the Plan Procurement Management process, some participants disagree with the ranking of compliance-related items. What tool or technique should the project manager use to resolve this?","opts":["A.Affinity diagram","B.Multicriteria decision analysis","C.Nominal group technique","D.Brainstorming"],"correct":["C"],"explanation":"The nominal group technique is a structured group process that helps to ensure that everyone's opinion is heard and considered. It is a non-confrontational approach, which can help to diffuse any tension or conflict that may be present and is a relatively quick and easy way to reach a decision. The other answer choices are incorrect because they are not as effective in resolving disagreements.\u00a0An affinity diagram is a tool for grouping items together based on their similarities. Multicriteria decision analysis is a tool for comparing different options against a set of criteria.\u00a0Brainstorming i"},{"q":"After consultation with executive stakeholders, it was decided that the project manager would replace a vendor while the project is in the execution phase. The new vendor simply has more domain knowledge and was not identified earlier, but is probably the right vendor candidate now. Which of the following documents would contain the best information for the new vendor?","opts":["A.Request for Information (RFI)","B.Request for Quote (RFQ)","C.Request for Proposal (RFP)","D.Request for Contract (RFC)"],"correct":["C"],"explanation":"The RFP contains all the functional and non functional requirements and the acceptance criteria. The other documents are brief from the scope point of view RFC and RFQ may have the RFP as a reference and RFI can focus on a specific aspect only. An RFP is used when there is a problem in the project and the solution is not easy to determine. This is the most formal of the \u201crequest for\u201d documents and has strict procurement rules for content, timeline, and seller responses. Toolbox"},{"q":"The sponsor notified the product owner that the budget was approved for a project. However, any additional investment for the project would have to wait until the next fiscal year. The product owner is concerned that this will hold up the project. What should the product owner do?","opts":["A.Track the budget based on the release plan and show the value to the business.","B.Explain that the project is just starting and the budget will need to be adjusted.","C.Track the budget based on each sprint and remove nice-to-have deliverables.","D.Ensure that the project manager monitors every invoice from the project."],"correct":["A"],"explanation":"Toolbox"},{"q":"A project manager needs to ensure that the products of the organization meet certain government standards and regulations. The project manager's team is developing a business requirements document (BRD) to help in this regard. Which of the following statements are correct about compliance requirements? (Choose 2).","opts":["A.Compliance requirements are functional requirements and must be included in the BRD.","B.Compliance requirements are non-functional requirements and must be documented in the BRD.","C.Compliance requirements should be part of the project scope and should be managed by the project team.","D.Compliance requirements can be considered organization assets and do not need to be included in the BRD.","E.Compliance requirements can not be considered organization assets and must be included in the BRD."],"correct":["B","C"],"explanation":"B. Compliance requirements are non-functional requirements and must be documented in the BRD. C. Compliance requirements should be part of the project scope and should be managed by the project team. All functional requirements must be documented. Compliance requirements are typically non-functional because they define the quality\u00a0and constraints of the project's deliverables rather than specific features or functionalities.\u00a0They are a condition or capability that is necessary to be present in an end deliverable to satisfy a business need. Government standards and regulations establish project"},{"q":"At the midway point of a project, the project manager was informed of a market movement that would make the project results useless to the client. This information could cause the project to be cancelled or at least a big change on the scope and desired outcome. What should the project manager do next?","opts":["A.Prepare all status reports and demos to keep the client focused on the project execution that has been successful.","B.Have a transparent discussion with the project sponsor, offering support on the strategy evaluation if needed.","C.Continue working on the project execution, as the business strategy is not responsibility of the project manager.","D.Halt the project immediately, as the project manager knows it will be useless to the client."],"correct":["B"],"explanation":"The project manager has to be the business lens. Toolbox"},{"q":"A project manager is leading a project that is being implemented simultaneously in two countries with an 11-hour time zone difference. The project manager needs to determine a mutually convenient time to provide stakeholders with information on the project's schedule, cost, and performance progress. What should the project manager do?","opts":["A.Use a world clock to\u00a0identify a few potential times that work for all stakeholders.","B.Send a survey to stakeholders asking them for their availability during the\u00a0week.","C.Schedule two separate meetings, one for stakeholders in each country.","D.Record the meeting and send it to stakeholders to watch on their own time."],"correct":["A"],"explanation":"The best way to determine a mutually convenient time to provide stakeholders with information is to use a world clock to visualize the time differences and identify a few potential times that work for everyone. This will help to ensure that all stakeholders are able to participate in the meeting, regardless of their location. The other answer choices are not as effective or as feasible. Sending a survey to stakeholders may not be effective because it is time-consuming and there is no guarantee that everyone will respond. Scheduling two separate meetings may not be feasible because it may be di"},{"q":"A multinational company is locally developing a digital product using a new technology platform. The only expert on this platform is located in the company's headquarters, and they are responsible for providing support to different countries. How can the local project manager ensure the involvement of this expert?","opts":["A.Design a travel schedule so that timely, onsite assistance can be provided.","B.Include the expert on the team using a virtual environment.","C.Ask the project sponsor to assign the expert as a full-time member of the team.","D.Ask team members to contact the expert as an external expertise source on an as-needed basis."],"correct":["B"],"explanation":"The expert is not located locally, but needs to be involved in the team while maintaining their other support responsibilities. The PM needs to engage the expert using a virtual environment. They cannot easily be reassigned as a full time member due to other responsibilities and a travel schedule will take time away both from the project and the other responsibilities. Since they are an expert, they should be engaged virtually as a team member and not just consulted when needed. Toolbox"},{"q":"A team member approaches the project manager immediately after the end of the project meeting about his need for help to complete a late-due-date task. What should the project manager do?","opts":["A.Ignore the team member's request, and ask for double the efforts to complete the task","B.Discuss the issue during the daily meeting, and decide the course of action with the team","C.Ask the team member to step out from the task and re-allocate the task to someone else","D.Ask a junior team member to help in the completion of the task on the due date"],"correct":["B"],"explanation":"The project manager is always responsible for balancing both tasks and relationships between team members. Discussing the issue during the daily meeting and deciding the next course of action with the team is the ideal choice.\u00a0It is important to get input from the team on how to best address the issue. The team may have some creative ideas that the project manager has not considered. The other answer choices are incorrect.\u00a0Ignoring the team member's request is not a good way to build trust and rapport. It also sends the message that the project manager is not interested in hearing concerns fro"},{"q":"A project team is faced with deciding on the next steps to take in order to address recently identified tasks schedule delays. The project manager expects team members to make the appropriate decisions for their respectively assigned tasks and proceed to implement them. Which type of leadership style is the project manager using in this instance?","opts":["A.Democratic","B.Autocratic","C.Free rein","D.Smoothing"],"correct":["C"],"explanation":"laissez -faire leadership style leaves the decision up to everyone as in this scenario. Free-rein leadership style is also called as laissez -faire leadership style Democratic - This project manager draws on the team members' knowledge and skills and is able to create a group commitment to common goals. Smoothing - resource smoothing is defined as a technique that adjusts the activities of a schedule model so that all requirements for the resources do not go beyond the resource limits already pre-defined during the planning Autocratic management strictly means the manager makes all the decisio"},{"q":"A project manager is managing a project with a hybrid approach and has requested a senior team member to perform a quantitative risk analysis. The team member responds that they do not have the knowledge to perform such an analysis. What should the project manager do?","opts":["A.Escalate the issue to the functional manager.","B.Contact the project management office (PMO) and request them to assign another team member who has the knowledge to perform this task to the team.","C.Help the team member to perform the quantitative risk analysis through coaching, mentoring, and training.","D.Perform the quantitative risk analysis for the team member."],"correct":["C"],"explanation":"In a hybrid project, the Project Manager is a servant leader and should do everything to support the team. In this case, if the Project Manager is not skilled in performing qualitative risk analysis, it is expected that the project manager arranges training, mentoring and coaching from experts that can help the team member perform the expected task. Hence this option is the correct answer. Escalating the issue to the functional manager may not guarantee solution . Hence this is an incorrect option. The Project Manager even if skilled to perform the task, should not be doing the task for the te"},{"q":"An agile coach is counseling a large software organization that has been using waterfall methodology and now plans to start using agile or hybrid methodology. What would be a project manager's suggestion?","opts":["A.Continue using waterfall, since hybrid does not fit with the organizational structure.","B.Start with agile and then move to hybrid, although agile takes time to implement.","C.Start using hybrid methodologies because waterfall knowledge is transferable.","D.Start using hybrid, the more appropriate methodology for software organizations."],"correct":["B"],"explanation":"Transitioning from waterfall to agile or hybrid methodologies requires a shift in practices, mindset, and organizational culture. Starting with agile allows the organization to experience the benefits of iterative and collaborative approaches, learn from feedback, and continuously improve. It is a phased approach that allows the organization to adapt to the changes gradually. The other answer choices are incorrect. Continuing to use waterfall without considering agile or hybrid methodologies may limit the organization's ability to respond to changing market dynamics and embrace the benefits of"},{"q":"One in two dispersed teams fails\u00a0to reach objectives due to:","opts":["A.Inability to manage the distributed workforce","B.Conflict management","C.Team purpose identification","D.Distribution of power"],"correct":["A"],"explanation":"Research has indicated that one in two dispersed teams has been shown to fail to reach its objectives due to its inability to manage the distributed workforce. Toolbox"},{"q":"Which of the following is different to the other options for managing external stakeholders in mega projects?","opts":["A.Persuasion","B.Deputation","C.Give and take","D.Strict orders"],"correct":["D"],"explanation":"Persuasion, deputation and give and take, amongst others, are options that can tactically influence the outcomes of mega projects. Strict orders tend to deprive team members contributions to influencing positive outcomes on a project. Toolbox"},{"q":"A project manager is leading a project with a scope partially delivered by a vendor. The vendor's processes and tools differ from the project team's, which may pose a risk. How should the project manager\u00a0mitigate this risk?","opts":["A.Coach the internal project team to use the vendor's processes and tools.","B.Train the vendor to use the same processes and tools as the internal team.","C.Develop a strategy to align the internal and vendor\u00a0processes and tools.","D.Recommend engaging a new vendor that uses the internal processes and tools."],"correct":["C"],"explanation":"Finding a common ground between internal and vendor processes is the most efficient solution. This allows for a smoother workflow and reduces integration risks. The other answer choices are incorrect. While the team might adapt, forcing them to use unfamiliar tools can decrease efficiency and increase errors. Training the vendor might be expensive and time-consuming, especially if their processes are well-established. Finding a new vendor can be expensive, delay the project, and eliminate the benefits of the existing vendor relationship. Toolbox"},{"q":"After an annual staff review, discussing project management and soft skills knowledge, the company made a decision to train all staff members to face new challenges. The method to train all staff members will be on a website where all content, exams, \u00a0templates, and other organizational assets are available.\nWhat method is being used for training purposes?","opts":["A.Pull","B.Push","C.Interactive","D.Interpersonal"],"correct":["A"],"explanation":"In pull communication, the sender creates information or content that receivers can passively access [pull content] at their convenience. It is not real-time. Here, the method used to train all staff members is posting all the content, exams, and interactive methods on the website and the staff members will log into the website to access the content. Hence this option is the correct answer. The other options are incorrect because they involve real-time communication.\nPush communication, interactive communication or interpersonal communication are more real-time communication methods. Hence all"},{"q":"Which one of the following is not a Resource-Based Power in relation to mega projects?","opts":["A.Recruiting on a contractual basis","B.Recruiting expert talents","C.Recruitment on the basis of secondment","D.Recruitment via Direct Control"],"correct":["D"],"explanation":"Recruitment via direct control is not a resource - based power in relation to mega projects Resource-based theory suggests that resources that are valuable, rare, difficult to imitate, and nonsubstitutable best position a firm for long-term success Toolbox"},{"q":"Which of the following project artifacts do not utilize the WBS as an input?","opts":["A.Project schedule","B.Project scope","C.Risk management plan","D.Quality plan"],"correct":["B"],"explanation":"WBS is developed based on the agreed scope. Toolbox"},{"q":"A project manager wants to motivate their team members and improve project performance. Which approach is most likely to be effective?","opts":["A.Reward all team members equally with formal awards to publicly recognize their achievements.","B.Implement initiatives based on the project manager's understanding of what motivates others.","C.Delegate motivation to team members, assuming they are professionals who self-motivate.","D.Offer a diverse range of motivational incentives tailored to individual team member needs."],"correct":["D"],"explanation":"The project manager\u00a0should recognize each team member as an individual, especially when creating strategies to motivate each of the individuals on the team. Different things motivate people at different times in their lives. The other answer choices are incorrect.\u00a0Equal\u00a0rewards for all team members fail to consider diverse needs and contributions, potentially demotivating high performers and neglecting specific areas for improvement. Relying solely on personal assumptions can lead to mismatched incentives and ineffective motivation strategies. While professionals have intrinsic motivation, ass"},{"q":"During release planning, a conflict arises between stakeholders regarding prioritizing certain needs, which is causing the development team to lose focus. To align all stakeholders and resolve this conflict, which conflict resolution technique should the project manager employ?","opts":["A.Forcing","B.Collaboration","C.Withdrawal","D.Smoothing"],"correct":["B"],"explanation":"The best course of action is to resolve the conflict through collaboration. Collaborating involves incorporating multiple views about the conflict. The objective is to learn about the various views and see things from multiple perspectives. By fostering inclusive and collaborative environments, knowledge and expertise are more freely exchanged, which in turn enables better project outcomes. The other options are incorrect because they are not appropriate, do not consider the stakeholder's concerns, and do not address the root cause of the conflict. The conflict should be resolved through colla"},{"q":"The project manager of an AI project leads with grace and confidence. They\u00a0provide support, listen attentively, and allow\u00a0their team members to work under little supervision. What model of worker behavior does the project manager exhibit?","opts":["A.Expectancy\u00a0theory","B.Theory X","C.Theory Y","D.Theory Z"],"correct":["C"],"explanation":"Theory Y\u00a0managers believe people are interested in performing their best given the right motivation and proper expectations. These managers provide support to their teams, are concerned about their team members, and are good listeners. The other answers are incorrect.\u00a0Theory X\u00a0managers believe most people do not like work and will try to steer clear of it; they believe people have little to no ambition, need constant supervision, and won\u2019t actually perform the duties of their job unless threatened.\u00a0Theory X managers unknowingly also subscribe to the Expectancy Theory. If they expect people to "},{"q":"An experienced project manager is preparing a kick-off meeting for a new service assessment. A high-level description of the service has been provided. What should the project manager do first?","opts":["A.Develop the project charter.","B.Develop the responsible, accountable, consult, and inform (RACI) matrix.","C.Define the project scope statement.","D.Create the work breakdown structure (WBS)."],"correct":["A"],"explanation":"PMBoK Sixth Edition Chapter 4 Section 4.1 states: \"Develop Project Charter\u2014The process of developing a document that formally authorizes the existence of a project and provides the project manager with the authority to apply organizational resources to project activities\" The Project Manager should prepare Project Charter before initiating the \"Kick-Off\" meeting relating to the start of a new project. Toolbox"},{"q":"A project manager has just completed the initiation phase of a project and needs to identify and analyze the stakeholders. The project charter focused on scope
