and budget approval only. What should the project manager do to identify stakeholders?","opts":["A.Review lessons learned from previous projects.","B.Review the project charter.","C.Conduct a brainstorming session with the project team.","D.Review the organization chart."],"correct":["A"],"explanation":"The project manager should review the lessons learned from previous projects which can help in identifying stakeholders who have been involved in similar projects and who may have a vested interest in the current project. The other answer choices are incorrect. The project charter does not specifically mention stakeholders;\u00a0the project team may not have a complete understanding of the project's scope and objectives; and\u00a0not all stakeholders are included in the organization chart. Toolbox"},{"q":"A project manager is on a project that is part of a business transformation initiative impacting most of the 10,000 employees in the company. The scope of the project is the improvement of collaboration between teams by implementing a new cloud platform that will replace a 20-year-old communication tool. What will be the most critical success factor?","opts":["A.Good quality, go-live should have zero critical defects.","B.Good user interface developed by talented graphical artists","C.Good change management planning and execution","D.Good change control process with fast approvals"],"correct":["C"],"explanation":"Any project that impacts a large number of people needs significant change management to ensure that the change won't be rejected. Regardless of how good the quality is and how beautiful the user interface is the success rate is the adoption of the new process and the tools supporting it. Toolbox"},{"q":"A product owner has requested to incorporate embedded functionality for the patient portal in the next sprint. The team decided to perform an Affinity Estimation session to define how much value will be delivered. Which role is responsible to facilitate the session?","opts":["A.Product Owner","B.Scrum Master","C.Developer","D.Stakeholder"],"correct":["B"],"explanation":"Toolbox"},{"q":"A newly formed team has become accustomed to agile practices. The project lead has noticed that while they are performing according to expectations, there is boredom with daily team practices among many of the team members. What should the project lead do in this situation?","opts":["A.Allow the team to self-organize and have them analyze the situation in their retrospective session and self correct.","B.Challenge the team to find new ways to achieve higher levels of performance to improve the situation.","C.Speak with individual team members to determine what they would like to do to improve the situation in the team.","D.Have the team inform senior management of the situation and ask for recommendations."],"correct":["B"],"explanation":"Agile practices always encourages the team to find new ways of working to achieve higher levels of performance. Hence this option is correct. As the team is newly formed, the Project lead is expected to educate the team members on new agile practices with the help from the Scrum Master and not allow the team members to analyse the situation on their own. Hence this option is incorrect. As the team is new, speaking to the individual team members on what they would like to do is inappropriate It is for the Project lead and the Scrum Master to provide enough guidance and motivation to the team me"},{"q":"A project manager discovers a significant flaw in a major project deliverable. Which project management process is being performed?","opts":["A.Manage Quality","B.Control Quality","C.Plan Quality Management","D.Statistical Sampling"],"correct":["B"],"explanation":"Control quality is the process that records deliverable results and ensure the project outputs are correct. Statistical sampling is not a project management process, it is a tool and technique for control quality. Plan quality management should be done early on in the project, not when evaluating deliverables. Manage quality translates the quality management plan into executable tasks, it does not evaluate project deliverables. Toolbox"},{"q":"A project is in the execution phase. Equipment and devices must be transported from the vendor's warehouse to the project site through five towns. Which stakeholders should the project manager involve in planning and executing a safe transport? (Choose 3).","opts":["A.City councils","B.Project sponsor","C.Equipment installers","D.Equipment suppliers","E.Warehouse technician"],"correct":["B","C","D"],"explanation":"In the planning, execution, and monitoring stages, continuous evaluation and analysis of both external and internal stakeholders. City Councils are not project stakeholders. Toolbox"},{"q":"After stakeholder data and information collection is\u00a0complete, an analysis of the collected data begins. The power/interest scores are plotted for each stakeholder on a set of the axis to provide a visualization of stakeholder power and interest. There are three stakeholders that have low power and low interest. What are the actions for them?","opts":["A.They must be kept satisfied by ensuring their concerns and questions are addressed adequately.","B.They require minimal management effort.","C.They must be kept informed and updated on the project.","D.They must be kept satisfied, but also actively engaged with and consulted on the project."],"correct":["B"],"explanation":"Low power and low interest stake holders require minimum management effort. High power and high interest stake holders must be kept satisfied Low power and high interest stake holders must be kept informed and updated on the project Toolbox"},{"q":"A company is kicking off a new hybrid project to be in compliance with new government regulations. The team has established a reliable velocity of 40 story points per iteration. Every iteration lasts 2 weeks. The sponsor wants to know when the project will be done if there are 800 story points remaining.","opts":["A.4 hours","B.8 weeks","C.40 days","D.10 months"],"correct":["D"],"explanation":"There are 800 story points remaining, velocity = 40 points per iteration. # of iterations remaining = 800/ 40= 20. Every iteration lasts 2 weeks, then the team will need 10 months to complete the project. Toolbox"},{"q":"A project manager is managing an agile project. The PMO manager is not familiar with agile delivery. Which of the following statements describe the agile approach?","opts":["A.Responding to change over following a plan","B.Customer collaboration over following a plan","C.Responding to change over processes and tools","D.Customer collaboration over comprehensive testing"],"correct":["A"],"explanation":"The main characteristic of Agile delivery is that embrace change over strictly following a detailed plan. Toolbox"},{"q":"A project manager is leading a team on a new development project. The team is made up of a diverse group of people with different personalities and work styles. The project manager is committed to creating a cohesive and productive team, so they decided to introduce the DISC behavior model to help team members understand each other better. Based on the DISC behavior model, which of the following characteristics best describes the Influence style?","opts":["A.Direct, result-oriented, and firm","B.Outgoing, enthusiastic, optimistic","C.Accommodating, patient, humble, tactful","D.Analytical, reserved, and precise"],"correct":["B"],"explanation":"The Influence style in the DISC model focuses on building relationships, communicating, and working effectively with others. Therefore, individuals with this style often exhibit the characteristics of being outgoing, enthusiastic, and optimistic. These traits make them excellent team players who can inspire and motivate others within the team. Direct, result-oriented, and firm characteristics are more characteristic of the Dominant style. Accommodating, patient, humble, and tactful characteristics are more characteristic of the Steadiness style. Analytical, reserved, and precise characteristic"},{"q":"Select three ways to improve and practice leadership skills. (Choose 3)","opts":["A.Engage the team in the project process.","B.Be actively involved in the project tasks.","C.Treat each team member the same way.","D.Ask for feedback and analyze the results.","E.Use democracy for all team decisions."],"correct":["A","B","D"],"explanation":"you need to tailor your leadership style to the member/team. Toolbox"},{"q":"A project manager has made compliance-related changes by adopting a new project delivery approach. During external validation, an audit revealed that some of the component work did not conform to the organization's standards. What should the project manager have done?","opts":["A.Executed only compliant deliverables.","B.Clarified interpretation of\u00a0compliance guidelines.","C.Translated\u00a0business requirements to design.","D.Researched\u00a0regulations in the public sector."],"correct":["B"],"explanation":"The project manager should have ensured they understand the compliance guidelines before making compliance-related changes while adopting a new project delivery approach that could pose threats to compliance. The other answer choices are incorrect because they suggest actions that do not promote the specific compliance standards for the project. Toolbox"},{"q":"After an organization trained and implemented a new mandatory project management software application for all project staff, the project manager noticed that several team members show low levels of commitment to the new software. What is the cause for this?","opts":["A.Fear of the unknown","B.Lack of required skills","C.Lack of clear project vision","D.Too much communication"],"correct":["A"],"explanation":"Fear of the unknown is often a major reason for low commitment. Managers should investigate the potential for insecurities, determine the cause, and work with team members to reduce the anxieties created by their negative perceptions. The other answer choices do not necessarily lead to low commitment."}];
let examQs = [];
let currentIdx = 0;
let userAnswers = {};
let chosenCount = 175;
let startTime;
let timerInterval;

function setCount(n) { chosenCount = n; startExam(); }

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function startExam() {
    examQs = shuffle([...ALL_QUESTIONS]).slice(0, chosenCount);
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('examScreen').style.display = 'flex';
    startTime = Date.now();
    timerInterval = setInterval(updateTimer, 1000);
    renderQuestion();
}

function updateTimer() {
    const diff = Math.floor((Date.now() - startTime) / 1000);
    const h = Math.floor(diff / 3600).toString().padStart(2, '0');
    const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
    const s = (diff % 60).toString().padStart(2, '0');
    document.getElementById('timer').textContent = h + ":" + m + ":" + s;
}

function renderQuestion() {
    const q = examQs[currentIdx];
    const isMulti = q.correct.length > 1;
    document.getElementById('qNumber').textContent = "Question " + (currentIdx + 1) + " of " + examQs.length;
    document.getElementById('qText').innerHTML = q.q + (isMulti ? "<br><small style='color:var(--p-blue); font-weight:bold;'>(Choose " + q.correct.length + " options)</small>" : "");
    
    const container = document.getElementById('options');
    container.innerHTML = '';
    
    const currentSelection = userAnswers[currentIdx] || [];

    q.opts.forEach(opt => {
        const letter = opt.charAt(0);
        const text = opt.substring(2);
        const btn = document.createElement('div');
        btn.className = 'option-btn';
        if (currentSelection.includes(letter)) btn.classList.add('selected');
        
        btn.innerHTML = '<span class="opt-letter">' + letter + '</span><span>' + text + '</span>';
        btn.onclick = () => selectOption(letter, isMulti, q.correct.length);
        container.appendChild(btn);
    });
    
    document.getElementById('btnBack').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
    const hasEnoughChoices = isMulti ? (currentSelection.length === q.correct.length) : (currentSelection.length > 0);
    document.getElementById('btnNext').style.display = hasEnoughChoices ? 'block' : 'none';
    document.getElementById('btnNext').textContent = currentIdx === examQs.length - 1 ? 'Finish' : 'Next';
    window.scrollTo(0,0);
}

function selectOption(letter, isMulti, maxChoices) {
    if (!userAnswers[currentIdx]) userAnswers[currentIdx] = [];
    let selections = userAnswers[currentIdx];

    if (!isMulti) {
        userAnswers[currentIdx] = [letter];
    } else {
        const idx = selections.indexOf(letter);
        if (idx > -1) {
            selections.splice(idx, 1);
        } else {
            if (selections.length < maxChoices) {
                selections.push(letter);
            }
        }
    }
    renderQuestion();
}

function nextQ() {
    if (currentIdx < examQs.length - 1) {
        currentIdx++;
        renderQuestion();
    } else {
        finishExam();
    }
}

function prevQ() {
    if (currentIdx > 0) {
        currentIdx--;
        renderQuestion();
    }
}

function finishExam() {
    clearInterval(timerInterval);
    let correct = 0;
    examQs.forEach((q, idx) => {
        const userSelection = userAnswers[idx] || [];
        const correctAnswers = q.correct;
        const isMatch = userSelection.length === correctAnswers.length && userSelection.every(val => correctAnswers.includes(val));
        if (isMatch) correct++;
    });
    
    const score = Math.round((correct / examQs.length) * 100);
    document.getElementById('examScreen').style.display = 'none';
    document.getElementById('scoreScreen').style.display = 'flex';
    document.getElementById('finalScore').textContent = score + "%";
    document.getElementById('scoreMeta').innerHTML = "Correct: <strong>" + correct + "</strong> / " + examQs.length + "<br>Result: <strong style='color:" + (score >= 70 ? "#166534" : "#991b1b") + "'>" + (score >= 70 ? "PASS" : "FAIL") + "</strong>";
    document.getElementById('scoreScreen').scrollTop = 0;
}

function showReview() {
    const container = document.getElementById('reviewContainer');
    const list = document.getElementById('reviewList');
    const screen = document.getElementById('scoreScreen');
    
    container.style.display = 'block';
    document.getElementById('btnShowReview').style.display = 'none';
    document.getElementById('scoreHeading').textContent = 'Review Mode';
    list.innerHTML = '';
    
    examQs.forEach((q, idx) => {
        const userSelection = userAnswers[idx] || [];
        const correctAnswers = q.correct;
        const isMatch = userSelection.length === correctAnswers.length && userSelection.every(val => correctAnswers.includes(val));
        
        const card = document.createElement('div');
        card.className = 'review-q-card';
        
        let optsHtml = '';
        q.opts.forEach(opt => {
            const letter = opt.charAt(0);
            let stateClass = '';
            if (correctAnswers.includes(letter)) stateClass = 'is-correct';
            else if (userSelection.includes(letter) && !correctAnswers.includes(letter)) stateClass = 'user-wrong';
            optsHtml += '<div class="review-opt ' + stateClass + '"><strong>' + letter + '</strong> ' + opt.substring(2) + '</div>';
        });
        
        card.innerHTML = '<div class="status-tag ' + (isMatch ? 'status-correct' : 'status-wrong') + '">' + (isMatch ? 'Correct' : 'Incorrect') + '</div>' +
            '<div style="font-weight: bold; margin-bottom: 15px;">Question ' + (idx + 1) + ': ' + q.q + '</div>' +
            '<div class="review-opts">' + optsHtml + '</div>' +
            '<div class="review-exp"><strong>Explanation:</strong> ' + (q.explanation || 'No explanation provided.') + '</div>';
        list.appendChild(card);
    });
    
    screen.scrollTop = 0;
}
</script>

</html>
